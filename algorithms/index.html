<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>oncOS — Algorithms</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1668a3">
<script>(function(){try{var t=localStorage.getItem('oncos-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Algorithms">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{
    --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
    --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
    --status-success:#1f8a5b; --status-success-soft:#e7f4ee;
    --status-warning:#c9820a; --status-warning-soft:#fbf1dc;
    --status-danger:#d8322f; --status-danger-soft:#fbeae9;
    --status-info:#1668a3; --status-info-soft:#e6eff6;
    --font-serif:'Noto Serif',Georgia,serif;
    --font-sans:'Noto Sans',system-ui,sans-serif;
    --mono:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    /* legacy aliases kept so downstream rules read naturally */
    --bg:var(--paper); --panel:var(--paper); --line:var(--hair);
    --accent:var(--teal); --chip:var(--accent-soft); --sans:var(--font-sans);
    --sidebar-w:248px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg); color:var(--ink); font:14px/1.5 var(--sans); -webkit-text-size-adjust:100%;}

  .wm{margin:0; font-family:'Montserrat',var(--font-sans); font-weight:700; letter-spacing:-1px; color:var(--ink);
    line-height:1; text-decoration:none;}
  .wm .os{color:var(--accent);}
  .tag{margin:8px 0 0; color:var(--muted); font-size:11px; font-weight:600;
    font-family:var(--sans); letter-spacing:.18em; text-transform:uppercase;}

  .mhead{display:none; position:sticky; top:0; z-index:40; background:var(--bg);
    border-bottom:1.2px solid var(--rule); align-items:center; gap:12px;
    padding:calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 10px calc(14px + env(safe-area-inset-left));}
  .burger{flex:0 0 auto; width:38px; height:38px; border:1px solid var(--line); border-radius:0;
    background:var(--bg); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;}
  .burger svg{width:20px;height:20px;}
  .mhead .mbrand{display:flex; flex-direction:column; gap:1px;}
  .mhead .mbrand .wm{font-size:16px; line-height:1.1;}
  .mhead .tag{margin:0; font-size:10px; letter-spacing:.16em;}

  .layout{display:flex; min-height:100vh; min-height:100dvh;}
  .sidebar{flex:0 0 var(--sidebar-w); width:var(--sidebar-w); background:var(--panel);
    border-right:1px solid var(--line); position:sticky; top:0; align-self:flex-start;
    height:100vh; height:100dvh; overflow-y:auto;
    padding:22px 16px calc(22px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:18px;}
  .sidebar .wm{font-size:20px;}
  .sidebar .wm-wrap{padding-bottom:15px; border-bottom:1.2px solid var(--rule);}
  .sidebar .tag{margin-bottom:0;}
  .facet .flabel{font-family:var(--sans); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600; margin:0 0 8px 2px;}
  .navlist{display:flex; flex-direction:column; gap:2px;}
  .navitem{display:flex; justify-content:space-between; align-items:center; gap:8px; text-align:left;
    font-size:13px; padding:7px 10px; border-radius:0; cursor:pointer; background:transparent;
    color:var(--ink); border:1px solid transparent; border-left:2px solid transparent; user-select:none; font-family:var(--sans); width:100%;}
  .navitem:hover{background:var(--accent-soft);}
  .navitem.active{background:var(--accent-soft); color:var(--accent); border-color:transparent; border-left-color:var(--accent); font-weight:600;}
  .navitem .n{font-family:var(--sans); font-size:11px; color:var(--muted);}
  .navitem.active .n{color:var(--accent);}
  .navitem.muted{color:var(--muted); cursor:default;}
  .navitem.muted:hover{background:transparent;}

  .backdrop{display:none;}

  main{flex:1 1 auto; min-width:0; padding:22px clamp(16px,3vw,30px) 40px;}
  .topbar{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .h-title{font-family:var(--font-serif); font-size:22px; font-weight:600; margin:0; letter-spacing:-.01em;}
  .count{color:var(--muted); font-size:12px;}
  .search{width:100%; max-width:540px; margin:0 0 16px; padding:9px 4px; font-size:15px;
    border:none; border-bottom:1.2px solid var(--rule); border-radius:0; background:transparent; color:var(--ink); font-family:var(--sans);}
  .search:focus{outline:none; border-bottom-color:var(--accent);}

  .sysdiv{font-family:var(--sans); font-weight:700; font-size:11px; color:var(--muted);
    letter-spacing:.12em; text-transform:uppercase; margin:22px 0 8px 2px; padding-bottom:6px; border-bottom:1px solid var(--grid);}
  .sysdiv:first-of-type{margin-top:0;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:0; box-shadow:none;
    overflow:hidden; transition:border-color .14s; margin-bottom:10px;}
  .card:hover{border-color:var(--accent);}
  .card.open{border-color:var(--accent); box-shadow:none;}
  .card-head{padding:14px 16px; display:flex; justify-content:space-between; gap:12px; align-items:flex-start; cursor:pointer;}
  .aname{font-family:var(--font-serif); font-weight:600; font-size:16px; line-height:1.3;}
  .ameta{margin-top:7px; display:flex; flex-wrap:wrap; gap:5px;}
  .tagpill{font-size:10.5px; padding:2px 8px; border-radius:2px; background:var(--accent-soft); color:var(--slate); font-family:var(--sans); font-weight:600; letter-spacing:.02em;}
  .tagpill.sys{background:var(--status-info-soft); color:var(--status-info);}
  .asum{margin-top:8px; font-size:12px; color:var(--muted);}
  .caret{color:var(--accent); font-size:13px; transition:transform .15s; flex-shrink:0; margin-top:3px;}
  .card.open .caret{transform:rotate(90deg);}
  .gbody{display:none; padding:4px 16px 16px; border-top:1px solid var(--line);}
  .card.open .gbody{display:block;}
  .gnote{margin-top:14px; padding-top:12px; border-top:1px solid var(--grid);
    font-size:11px; color:var(--muted); line-height:1.6;}
  .gnote b{color:var(--accent);}

  /* ---- sectioned-flow algorithm body ---- */
  .algo{display:flex; flex-direction:column; margin-top:6px;}
  .algo-section{border-top:1px solid var(--grid);}
  .algo-section:first-child{border-top:0;}
  .sec-head{display:flex; align-items:center; gap:10px; width:100%; background:transparent;
    border:0; cursor:pointer; padding:12px 2px; text-align:left; font-family:var(--font-sans); color:var(--ink);}
  .sec-head:hover .sec-title{color:var(--accent);}
  .sec-chev{color:var(--accent); font-size:11px; transition:transform .15s; flex:0 0 auto; width:12px;}
  .algo-section.open .sec-chev{transform:rotate(90deg);}
  .sec-title{font-family:var(--font-serif); font-weight:600; font-size:14.5px; line-height:1.25; flex:1 1 auto; min-width:0;}
  .sec-n{font-family:var(--sans); font-size:11px; color:var(--muted); font-weight:600; flex:0 0 auto; white-space:nowrap; padding-top:2px;}
  .sec-body{display:none; padding:2px 0 16px;}
  .algo-section.open .sec-body{display:block;}

  .flow{display:flex; flex-direction:column; align-items:stretch;}
  .flow .conn{width:1.5px; height:13px; background:var(--hair); margin:0 auto; flex:0 0 auto;}

  .gnode, .gentry, .gdecision, .gnote2{overflow-wrap:break-word;}
  .gnode{background:var(--paper); border:1px solid var(--hair); border-left:3px solid var(--teal);
    border-radius:2px; padding:9px 12px;}
  .gnode .eyb{font-family:var(--sans); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); font-weight:700; margin-bottom:3px;}
  .gnode .gtitle{font-family:var(--font-serif); font-size:14.5px; font-weight:700; color:var(--ink); line-height:1.28;}
  .gnode .gline{font-size:12px; color:var(--slate); margin-top:4px; line-height:1.45;}
  .gnode .gtox{font-size:11.5px; color:var(--status-danger); margin-top:4px; line-height:1.4;}
  .gnode.distinct{border-left-color:var(--status-warning); border-style:dashed; background:var(--status-warning-soft);}
  .gnode.distinct .gtitle{color:var(--status-warning);}
  .gnode.terminal{background:var(--teal); border-color:var(--teal); border-left-color:var(--teal);}
  .gnode.terminal .gtitle, .gnode.terminal .gline{color:var(--btn-ink);}

  .gentry{background:var(--ink); color:#fff; border-radius:2px; padding:10px 13px;}
  .gentry .g-t{font-family:var(--font-serif); font-weight:700; font-size:14.5px; line-height:1.25;}
  .gentry .g-s{font-size:11.5px; color:#c6d3de; margin-top:3px; line-height:1.4;}

  .gdecision{background:var(--accent-soft); border:1px solid var(--hair); border-radius:2px;
    padding:9px 13px; text-align:center;}
  .gdecision .g-t{font-family:var(--font-serif); font-weight:700; font-size:13.5px; color:var(--ink);}
  .gdecision .g-h{font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4;}

  .gsubhead{font-family:var(--sans); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--accent); font-weight:700; padding:6px 2px 5px; border-bottom:1px solid var(--grid); margin:2px 0;}

  .gnote2{border:1px dashed var(--hair); border-radius:2px; padding:8px 11px;
    font-size:11.5px; color:var(--muted); line-height:1.5;}

  .gchips{display:flex; flex-wrap:wrap; gap:5px; margin-top:7px;}
  .gchip{font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:.02em;
    padding:2px 7px; border-radius:2px; white-space:nowrap;}
  .k-ph3{background:var(--status-info-soft); color:var(--status-info);}
  .k-ph2{background:var(--status-warning-soft); color:var(--status-warning);}
  .k-abs{background:var(--status-danger-soft); color:var(--status-danger);}
  .k-con{background:var(--accent-soft); color:var(--slate);}
  .k-low{background:var(--grid); color:var(--muted);}

  /* ---- desktop-flowchart layout (opt-in: .algo.flowmode) ---- */
  /* Mobile / narrow: .flowcanvas is a plain block; .arms & .branchrow collapse to
     display:contents, so the DOM lays out as the identical vertical stack and the
     SVG overlay is hidden — the mobile view is unchanged. */
  .algo.flowmode .fedges{display:none;}
  .algo.flowmode .arms, .algo.flowmode .branchrow{display:contents;}
  .algo.flowmode .algo-section{border-top:1px solid var(--grid);}
  .algo.flowmode .flowcanvas > .algo-section:first-of-type{border-top:0;}

  @media (min-width:980px){
    /* block scroll container + a max-content track centred by margin:auto; wider than
       the card it left-aligns and scrolls (auto-margins clamp) instead of clipping. */
    .algo.flowmode{display:block; overflow-x:auto; position:relative;}
    .algo.flowmode .flowcanvas{position:relative; width:max-content; min-width:100%; margin:0 auto;}
    .algo.flowmode .flowcanvas > *{position:relative; z-index:1;}
    .algo.flowmode .fedges{display:block; position:absolute; top:0; left:0; z-index:0; pointer-events:none; overflow:visible;}
    .algo.flowmode .fedges path{fill:none; stroke:var(--teal); stroke-width:1.6;}
    .algo.flowmode .fedges path.head{fill:var(--teal); stroke:none;}
    .algo.flowmode .fedges text{fill:var(--slate); font-family:var(--font-sans); font-size:11px; font-weight:700; text-anchor:middle; paint-order:stroke; stroke:var(--paper); stroke-width:4px;}
    .algo.flowmode .algo-section{border-top:0;}
    .algo.flowmode .conn{display:none;}
    .algo.flowmode .flow{align-items:center; gap:22px;}
    .algo.flowmode .flow > .gnode{width:auto; max-width:360px;}
    .algo.flowmode .arms{display:flex; align-items:flex-start; justify-content:center; gap:36px; padding-top:24px;}
    .algo.flowmode .arms > .algo-section{flex:0 0 auto;}
    /* stage split: fan the threshold decision into two tidy CENTRED arm headers
       (chevron+title+count clustered), matching the in-section branch-fan style
       instead of a stretched full-width bar the connector drops into the middle of */
    .algo.flowmode .arms > .algo-section > .sec-head{justify-content:center;}
    .algo.flowmode .arms > .algo-section > .sec-head .sec-title{flex:0 0 auto;}
    .algo.flowmode .branchrow{display:flex; align-items:flex-start; justify-content:center; gap:14px;}
    .algo.flowmode .branchrow > .gnode{width:186px; flex:0 0 auto;}
    .algo.flowmode .gentry, .algo.flowmode .gdecision{max-width:520px; margin-left:auto; margin-right:auto; text-align:center;}
    .algo.flowmode .gnote2{max-width:600px; margin-left:auto; margin-right:auto;}
    .algo.flowmode .gsubhead{text-align:center; border-bottom:0; width:100%;}
    .algo.flowmode .sec-body{padding-bottom:26px;}
    /* flowchart reads as a diagram — all text in Noto Sans (override the serif titles) */
    .algo.flowmode .sec-title,
    .algo.flowmode .gnode .gtitle,
    .algo.flowmode .gentry .g-t,
    .algo.flowmode .gdecision .g-t{font-family:var(--font-sans);}
  }

  .empty{text-align:center; color:var(--muted); padding:64px 20px;}
  .empty .eic{width:52px; height:52px; margin:0 auto 16px; border-radius:0; background:var(--accent-soft);
    color:var(--accent); display:flex; align-items:center; justify-content:center;}
  .empty .eic svg{width:28px; height:28px;}
  .empty h2{margin:0 0 6px; font-family:var(--font-serif); font-size:16px; font-weight:600; color:var(--ink);}
  .empty p{margin:0 auto; max-width:380px; font-size:12.5px; line-height:1.6;}

  .foot{margin-top:26px; padding-top:14px; border-top:1px solid var(--grid); color:var(--muted); font-size:11.5px; line-height:1.6;}

  @media (max-width:880px){
    .mhead{display:flex;}
    .layout{display:block;}
    .sidebar{position:fixed; top:0; left:0; z-index:50; height:100vh; height:100dvh;
      width:min(82vw,300px); flex-basis:auto; transform:translateX(-100%); transition:transform .22s ease;
      border-right:1px solid var(--line); padding-top:calc(22px + env(safe-area-inset-top));}
    body.nav-open .sidebar{transform:translateX(0);}
    .sidebar .wm-wrap{display:none;}
    body.nav-open .backdrop{display:block; position:fixed; inset:0; z-index:45; background:rgba(15,42,67,.28);}
    main{padding:16px 14px 32px;}
    /* reclaim horizontal room for the pathway on small screens */
    .card-head{padding:13px 13px;}
    .gbody{padding:2px 12px 14px;}
    .sec-head{padding:13px 0; gap:9px;}
    .gnode{padding:9px 11px;}
    .gentry, .gdecision{padding:9px 11px;}
  }
  /* phones — tighten type + spacing so nodes stay scannable one-handed */
  @media (max-width:560px){
    main{padding:14px 11px 28px;}
    .gbody{padding:2px 10px 12px;}
    .card-head{padding:12px 12px;}
    .aname{font-size:15px;}
    .sec-title{font-size:13.5px;}
    .gnode .gtitle, .gentry .g-t{font-size:13.5px;}
    .gnode .gline{font-size:11.5px; line-height:1.4;}
    .gdecision .g-t{font-size:12.5px;}
    .flow{gap:0;}
    .gchip{font-size:9.5px; padding:2px 6px;}
  }
  @media (min-width:881px){ .mhead{display:none;} }

  /* --- oncOS dark mode (shared: _oncos-kit/oncos_theme.py — keep in sync) --- */
  :root{ --rule:var(--ink); --btn-ink:#ffffff; color-scheme:light; }
  :root[data-theme="dark"]{
    --ink:#e8eef4; --teal:#4aa6e2; --slate:#a8bac8; --muted:#8497a7;
    --hair:#263d52; --grid:#1c3145; --accent-soft:#173350; --paper:#0e2233;
    --rule:#37546e; --btn-ink:#08243b;
    --status-success:#3cbe86; --status-success-soft:#123527;
    --status-warning:#e0a94a; --status-warning-soft:#372c12;
    --status-danger:#f0716e; --status-danger-soft:#3c1e1e;
    --status-info:#4aa6e2; --status-info-soft:#173350;
    color-scheme:dark;
  }
  html{ transition:background .18s ease, color .18s ease; }
  .theme-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    width:36px; height:36px; padding:0; cursor:pointer; flex:0 0 auto;
    background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:0;
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{ color:var(--teal); border-color:var(--teal); background:var(--accent-soft); }
  .theme-toggle svg{ width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .theme-toggle .i-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-sun{ display:block; }
  /* --- oncOS mobile QA (roadmap #4; kept in sync with _oncos-kit/oncos_theme.py) --- */
  @media (hover:none) and (pointer:coarse){ input, select, textarea { font-size:16px !important; } }
  @media (max-width:760px){ html, body { overflow-x:clip; } }
  /* Algorithms-specific dark fixes: the entry node is a filled prominent box —
     keep it dark (its bg used var(--ink), which flips near-white) so white text stays legible. */
  .mhead .theme-toggle{ margin-left:auto; }
  .wm-wrap{ position:relative; }
  .wm-wrap .theme-toggle{ position:absolute; top:0; right:0; }
  :root[data-theme="dark"] .gentry{ background:#12314c; }
</style>
</head>
<body>

<header class="mhead">
  <button class="burger" id="burger" aria-label="Open navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
  </button>
  <div class="mbrand">
    <a class="wm homelink" href="../" aria-label="oncOS home">onc<span class="os">OS</span></a>
    <p class="tag">Algorithms</p>
  </div>
  <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle light / dark"><svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="wm-wrap">
      <a class="wm homelink" href="../" aria-label="oncOS home">onc<span class="os">OS</span></a>
      <p class="tag">Algorithms</p>
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle light / dark"><svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    </div>
    <div class="facet"><div class="flabel">Tumour system</div><div class="navlist" id="nav"></div></div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <main>
    <div class="topbar">
      <h1 class="h-title">Algorithms</h1>
      <span class="count" id="count"></span>
    </div>
    <input id="search" class="search" type="search" placeholder="Search tumour, pathway, or system…" autocomplete="off">
    <div id="list"></div>
    <div class="empty" id="empty">
      <div class="eic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4.5" rx="1"/><rect x="2.5" y="17.5" width="6" height="4.5" rx="1"/><rect x="15.5" y="17.5" width="6" height="4.5" rx="1"/><path d="M12 6.5v7"/><path d="M5.5 17.5v-3a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v3"/></svg>
      </div>
      <h2 id="empty-h">No algorithms yet</h2>
      <p id="empty-p">This module will hold tumour-type-specific treatment pathways and mindmaps. Add the first one in <code>algorithms.js</code>.</p>
    </div>
    <div class="foot" id="foot"></div>
  </main>
</div>

<script src="algorithms.js"></script>
<script>
  // Canonical tumour systems — the organizing axis for the sidebar. Extend as needed.
  const SYSTEMS = [
    'Thoracic','Breast','Gastrointestinal','Hepatobiliary & Pancreatic',
    'Genitourinary','Gynaecological','Head & Neck','Skin & Melanoma',
    'CNS','Sarcoma','Endocrine & Neuroendocrine','Haematological (Lymphoma)'
  ];

  const data = (window.ALGORITHMS || []).filter(a => a.id && a.title);

  const listEl  = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const emptyH  = document.getElementById('empty-h');
  const emptyP  = document.getElementById('empty-p');
  const navEl   = document.getElementById('nav');
  const footEl  = document.getElementById('foot');

  let activeSystem = null, query = '';

  function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  const countBySystem = s => data.filter(a => a.system === s).length;

  function renderNav(){
    navEl.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'navitem' + (!activeSystem ? ' active' : '');
    all.innerHTML = `<span>All systems</span><span class="n">${data.length}</span>`;
    all.onclick = () => { activeSystem = null; closeNav(); render(); };
    navEl.appendChild(all);

    SYSTEMS.forEach(s => {
      const n = countBySystem(s);
      const el = document.createElement('button');
      el.className = 'navitem' + (activeSystem === s ? ' active' : '') + (n === 0 ? ' muted' : '');
      el.innerHTML = `<span>${esc(s)}</span><span class="n">${n}</span>`;
      if (n > 0) el.onclick = () => { activeSystem = activeSystem === s ? null : s; closeNav(); render(); };
      navEl.appendChild(el);
    });
  }

  function matches(a){
    if (activeSystem && a.system !== activeSystem) return false;
    if (query){
      const hay = [a.title, a.tumour, a.system, a.summary].filter(Boolean).join(' ').toLowerCase();
      if (!query.split(/\s+/).every(t => hay.includes(t))) return false;
    }
    return true;
  }

  // ---- sectioned-flow pathway renderer ------------------------------------
  const KIND_CHIP = { ph3:'k-ph3', ph2:'k-ph2', abs:'k-abs', con:'k-con', low:'k-low' };
  const SPINE = { entry:1, decision:1, subhead:1 };  // nodes a connector may descend from

  function nodeHTML(n, id){
    const ia = id ? ` id="${esc(id)}"` : '';
    if (n.kind === 'entry')
      return `<div class="gentry"${ia}><div class="g-t">${esc(n.title)}</div>${
        n.sub ? `<div class="g-s">${esc(n.sub)}</div>` : ''}</div>`;
    if (n.kind === 'decision')
      return `<div class="gdecision"${ia}><div class="g-t">${esc(n.title)}</div>${
        n.sub ? `<div class="g-h">${esc(n.sub)}</div>` : ''}</div>`;
    if (n.kind === 'subhead')
      return `<div class="gsubhead"${ia}>${esc(n.title)}</div>`;
    if (n.kind === 'note')
      return `<div class="gnote2"${ia}>${esc(n.title || (n.lines || []).join(' '))}</div>`;

    // option
    const cls = 'gnode' + (n.tone === 'distinct' ? ' distinct' : n.tone === 'terminal' ? ' terminal' : '');
    const eyb = n.eyebrow ? `<div class="eyb">${esc(n.eyebrow)}</div>` : '';
    const lines = (n.lines || []).map(l => `<div class="gline">${esc(l)}</div>`).join('');
    const tox = n.tox ? `<div class="gtox">${esc(n.tox)}</div>` : '';
    const chips = (n.chips && n.chips.length)
      ? `<div class="gchips">${n.chips.map(c => `<span class="gchip ${KIND_CHIP[c.k] || 'k-con'}">${esc(c.t)}</span>`).join('')}</div>`
      : '';
    return `<div class="${cls}"${ia}>${eyb}<div class="gtitle">${esc(n.title)}</div>${lines}${tox}${chips}</div>`;
  }

  function sectionHTML(sec, idx){
    let inner = '';
    (sec.nodes || []).forEach((n, i) => {
      const prev = sec.nodes[i - 1];
      // connector descends only along the spine (from an entry/decision/subhead, or into a decision)
      if (prev && (SPINE[prev.kind] || n.kind === 'decision')) inner += '<div class="conn"></div>';
      inner += nodeHTML(n);
    });
    const optN = (sec.nodes || []).filter(n => n.kind === 'option').length;
    return `<div class="algo-section${sec.open ? ' open' : ''}">
      <button class="sec-head" aria-expanded="${sec.open ? 'true' : 'false'}">
        <span class="sec-chev">▶</span>
        <span class="sec-title">${esc(sec.title)}</span>
        ${optN > 0 ? `<span class="sec-n">${optN} option${optN === 1 ? '' : 's'}</span>` : ''}
      </button>
      <div class="sec-body"><div class="flow">${inner}</div></div>
    </div>`;
  }

  // ---- desktop-flowchart path (opt-in via a.desktopFlow) -------------------
  // Same node data + same mobile output as sectionHTML; adds branchrow wrappers,
  // node ids and (at the algo level) an SVG connector overlay + side-by-side arms.
  // On mobile the .arms / .branchrow wrappers are display:contents, so the DOM
  // lays out identically to the vertical stack; the SVG is hidden.
  function flowSectionHTML(sec, algoId, si){
    const nodes = sec.nodes || [];
    let inner = '', lastDecisionId = '', ni = 0, i = 0;
    while (i < nodes.length){
      const n = nodes[i];
      if (n.kind === 'option' && n.branch){
        const prev = nodes[i - 1];
        if (prev && SPINE[prev.kind]) inner += '<div class="conn"></div>';
        let cells = '';
        while (i < nodes.length && nodes[i].kind === 'option' && nodes[i].branch){
          cells += nodeHTML(nodes[i], `${algoId}__${si}_${ni}`); ni++; i++;
        }
        inner += `<div class="branchrow">${cells}</div>`;
      } else {
        const prev = nodes[i - 1];
        if (prev && (SPINE[prev.kind] || n.kind === 'decision')) inner += '<div class="conn"></div>';
        const id = `${algoId}__${si}_${ni}`;
        inner += nodeHTML(n, id);
        if (n.kind === 'decision') lastDecisionId = id;
        ni++; i++;
      }
    }
    const optN = nodes.filter(n => n.kind === 'option').length;
    const labelAttr = sec.branchLabel ? ` data-branch-label="${esc(sec.branchLabel)}"` : '';
    const html = `<div class="algo-section${sec.open ? ' open' : ''}"${labelAttr}>
      <button class="sec-head" aria-expanded="${sec.open ? 'true' : 'false'}">
        <span class="sec-chev">▶</span>
        <span class="sec-title">${esc(sec.title)}</span>
        ${optN > 0 ? `<span class="sec-n">${optN} option${optN === 1 ? '' : 's'}</span>` : ''}
      </button>
      <div class="sec-body"><div class="flow">${inner}</div></div>
    </div>`;
    return { html, lastDecisionId };
  }

  function flowAlgoHTML(a){
    const secs = a.sections || [];
    let inner = '', i = 0, lastDecisionId = '';
    while (i < secs.length){
      if (secs[i].role === 'branch'){
        let arms = '';
        while (i < secs.length && secs[i].role === 'branch'){
          arms += flowSectionHTML(secs[i], a.id, i).html; i++;
        }
        inner += `<div class="arms" data-branch-from="${esc(lastDecisionId)}">${arms}</div>`;
      } else {
        const built = flowSectionHTML(secs[i], a.id, i);
        if (built.lastDecisionId) lastDecisionId = built.lastDecisionId;
        inner += built.html; i++;
      }
    }
    // .flowcanvas = a max-content, margin:auto centred track. Wider than the card it
    // left-aligns + scrolls (block auto-margins clamp) rather than clipping the centre.
    return `<div class="flowcanvas"><svg class="fedges" aria-hidden="true"></svg>${inner}</div>`;
  }

  function cardHTML(a){
    const pills = [
      a.system ? `<span class="tagpill sys">${esc(a.system)}</span>` : '',
      a.tumour ? `<span class="tagpill">${esc(a.tumour)}</span>` : ''
    ].join('');
    const hasBody = a.sections && a.sections.length;
    const algoInner = a.desktopFlow ? flowAlgoHTML(a) : a.sections.map((s, i) => sectionHTML(s, i)).join('');
    const body = hasBody ? `<div class="gbody">
        <div class="algo${a.desktopFlow ? ' flowmode' : ''}">${algoInner}</div>
        ${a.provenance ? `<div class="gnote">${esc(a.provenance)}</div>` : ''}
      </div>` : '';
    return `<div class="card" data-id="${esc(a.id)}">
      <div class="card-head">
        <div>
          <div class="aname">${esc(a.title)}</div>
          <div class="ameta">${pills}</div>
          ${a.summary ? `<div class="asum">${esc(a.summary)}</div>` : ''}
        </div>
        ${hasBody ? '<span class="caret">▶</span>' : ''}
      </div>
      ${body}
    </div>`;
  }

  function render(){
    renderNav();
    const list = data.filter(matches);

    // Group by system, in SYSTEMS order.
    let html = '';
    SYSTEMS.forEach(s => {
      const inSys = list.filter(a => a.system === s);
      if (!inSys.length) return;
      html += `<div class="sysdiv">${esc(s)}</div>`;
      inSys.forEach(a => html += cardHTML(a));
    });
    // Any with an unrecognised/blank system fall under "Other".
    const other = list.filter(a => !SYSTEMS.includes(a.system));
    if (other.length){
      html += `<div class="sysdiv">Other</div>`;
      other.forEach(a => html += cardHTML(a));
    }
    listEl.innerHTML = html;

    const filtered = activeSystem || query;
    countEl.textContent = data.length
      ? (filtered ? `${list.length} of ${data.length}` : `${data.length} algorithm${data.length===1?'':'s'}`)
      : '';

    if (!data.length){
      emptyEl.style.display = 'block';
      emptyH.textContent = 'No algorithms yet';
      emptyP.innerHTML = 'This module will hold tumour-type-specific treatment pathways and mindmaps. Add the first one in <code>algorithms.js</code>.';
    } else if (!list.length){
      emptyEl.style.display = 'block';
      emptyH.textContent = 'No matching algorithms';
      emptyP.textContent = 'Adjust the search or pick a different tumour system.';
    } else {
      emptyEl.style.display = 'none';
    }

    listEl.querySelectorAll('.card-head').forEach(h => h.onclick = () => {
      const card = h.parentElement;
      if (card.querySelector('.gbody')){ card.classList.toggle('open'); scheduleFlows(); }
    });

    // collapsible pathway sections (inside the card body — independent of card open/close)
    listEl.querySelectorAll('.sec-head').forEach(h => h.onclick = () => {
      const sec = h.parentElement;
      const open = sec.classList.toggle('open');
      h.setAttribute('aria-expanded', open ? 'true' : 'false');
      scheduleFlows();
    });

    scheduleFlows();
  }

  // ---- SVG connector engine for desktop-flowchart algorithms --------------
  const isWide = () => window.matchMedia('(min-width:980px)').matches;
  const flVis = el => el && el.offsetParent !== null && el.getClientRects().length;

  function drawFlow(algo){
    const canvas = algo.querySelector(':scope > .flowcanvas');
    const svg = canvas && canvas.querySelector(':scope > .fedges');
    if (!svg) return;
    if (!isWide() || algo.offsetParent === null){ svg.innerHTML = ''; return; }
    const W = canvas.scrollWidth, H = canvas.scrollHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    const s = svg.getBoundingClientRect();
    const cx = el => { const r = el.getBoundingClientRect(); return r.left + r.width / 2 - s.left; };
    const yb = el => el.getBoundingClientRect().bottom - s.top;
    const yt = el => el.getBoundingClientRect().top - s.top;
    let out = '';
    const edge = (f, t, label) => {
      if (!flVis(f) || !flVis(t)) return;
      const x1 = cx(f), y1 = yb(f), x2 = cx(t), y2 = yt(t);
      const my = y1 + Math.max(12, (y2 - y1) / 2);
      out += `<path d="M${x1} ${y1} V${my.toFixed(1)} H${x2} V${(y2 - 7).toFixed(1)}"/>`;
      out += `<path class="head" d="M${x2} ${y2} l-5 -8 l10 0 z"/>`;
      if (label) out += `<text x="${x2}" y="${(my - 5).toFixed(1)}">${esc(label)}</text>`;
    };
    // intra-section spine + fan edges (notes are asides; conn divs ignored)
    canvas.querySelectorAll('.sec-body > .flow').forEach(flow => {
      let prev = null;
      [...flow.children].forEach(ch => {
        if (ch.classList.contains('conn')) return;
        if (ch.classList.contains('branchrow')){
          [...ch.children].forEach(cell => edge(prev, cell));
          prev = null; return;
        }
        if (ch.classList.contains('gnote2')){
          // A note mid-chain (prev set) is an inline step: wire the spine THROUGH it so
          // the connector stops at its edges instead of crossing its interior. A note that
          // trails a branchrow / opens a flow (prev null) is a true aside — leave it unwired.
          if (prev){ edge(prev, ch); prev = ch; }
          return;
        }
        if (prev) edge(prev, ch);
        prev = ch;
      });
    });
    // cross-section edges: threshold decision -> each arm's header
    canvas.querySelectorAll(':scope > .arms').forEach(arms => {
      const from = document.getElementById(arms.getAttribute('data-branch-from') || '');
      if (!from) return;
      [...arms.children].forEach(arm => {
        if (!arm.classList || !arm.classList.contains('algo-section')) return;
        const head = arm.querySelector(':scope > .sec-head');
        if (head) edge(from, head, arm.getAttribute('data-branch-label'));
      });
    });
    svg.innerHTML = out;
  }

  function redrawFlows(){ listEl.querySelectorAll('.algo.flowmode').forEach(drawFlow); }
  let flraf; function scheduleFlows(){ cancelAnimationFrame(flraf); flraf = requestAnimationFrame(redrawFlows); }
  window.addEventListener('resize', scheduleFlows);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleFlows);
  window.addEventListener('load', scheduleFlows);

  function closeNav(){ document.body.classList.remove('nav-open'); }
  searchEl.addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById('burger').onclick = () => document.body.classList.toggle('nav-open');
  document.getElementById('backdrop').onclick = closeNav;

  footEl.innerHTML = `${data.length} pathway${data.length===1?'':'s'} · oncOS — Algorithms · Not medical advice — verify against the primary source and institutional protocol before clinical use.`;
  render();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>

</body>
