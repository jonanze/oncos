<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
:root{
 --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
 --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
 --status-warning:#c9820a;
 --g1:#5b6b78; --g1s:#eef1f4; --g2:#c9820a; --g2s:#fbf1dc; --g3:#e0620a; --g3s:#fcecdd;
 --g4:#d8322f; --g4s:#fbeae9; --g5:#7a1512; --g5s:#f4e3e2;
 --font-serif:'Noto Serif',Georgia,serif; --font-sans:'Noto Sans',system-ui,sans-serif;
 --sidebar-w:248px;
}
*{box-sizing:border-box}
html,body{margin:0;overflow-x:hidden;max-width:100%}
body{background:var(--paper);color:var(--ink);font:14px/1.5 var(--font-sans);-webkit-text-size-adjust:100%}

.wm{margin:0;font-family:'Montserrat',var(--font-sans);font-weight:700;letter-spacing:-1px;color:var(--ink);line-height:1;text-decoration:none}
.wm .os{color:var(--teal)}
.tag{margin:8px 0 0;color:var(--muted);font-size:11px;font-weight:600;font-family:var(--font-sans);letter-spacing:.18em;text-transform:uppercase}

.mhead{display:none;position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1.2px solid var(--ink);
 align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 10px calc(14px + env(safe-area-inset-left))}
.burger{flex:0 0 auto;width:38px;height:38px;border:1px solid var(--hair);border-radius:0;background:var(--paper);
 color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.burger svg{width:20px;height:20px}
.mhead .mbrand{display:flex;flex-direction:column;gap:1px}
.mhead .mbrand .wm{font-size:16px;line-height:1.1}
.mhead .tag{margin:0;font-size:10px;letter-spacing:.16em}

.layout{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{flex:0 0 var(--sidebar-w);width:var(--sidebar-w);background:var(--paper);border-right:1px solid var(--hair);
 position:sticky;top:0;align-self:flex-start;height:100vh;height:100dvh;overflow-y:auto;
 padding:22px 16px calc(22px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:20px}
.sidebar .wm{font-size:20px}
.sidebar .wm-wrap{padding-bottom:15px;border-bottom:1.2px solid var(--ink)}
.sidebar .tag{margin-bottom:0}
.facet .flabel{font-family:var(--font-sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 8px 2px}
.socnav{display:flex;flex-direction:column;gap:1px}
.socnav a{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--slate);text-decoration:none;
 padding:5px 8px;border-left:2px solid transparent;cursor:pointer;line-height:1.35}
.socnav a:hover{color:var(--teal);background:var(--accent-soft)}
.socnav a.on{color:var(--ink);font-weight:600;border-left-color:var(--teal);background:var(--accent-soft)}
.socnav a .c{color:var(--muted);font-weight:400;font-size:11px;font-variant-numeric:tabular-nums}
.sbtn{width:100%;font-family:var(--font-sans);font-size:12.5px;font-weight:600;color:var(--ink);background:var(--paper);
 border:1.2px solid var(--hair);border-radius:0;padding:9px 12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.sbtn:hover{border-color:var(--teal);color:var(--teal)}
.sbtn svg{width:15px;height:15px;flex:0 0 auto}

.backdrop{display:none}
main{flex:1 1 auto;min-width:0;padding:22px clamp(16px,3vw,30px) 40px;max-width:1040px}
.topbar{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.h-title{font-family:var(--font-serif);font-size:22px;font-weight:600;margin:0;letter-spacing:-.01em}
.count{color:var(--muted);font-size:12px}
.lede{color:var(--slate);font-size:12.5px;margin:0 0 14px;max-width:660px;line-height:1.55}
.search{width:100%;max-width:540px;margin:0 0 22px;padding:9px 4px;font-size:15px;border:none;border-bottom:1.2px solid var(--ink);
 border-radius:0;background:transparent;color:var(--ink);font-family:var(--font-sans)}
.search:focus{outline:none;border-bottom-color:var(--teal)}
.search::placeholder{color:var(--muted)}

.socgroup{margin:0 0 26px}
.soch{display:flex;align-items:baseline;gap:10px;margin:0 0 4px;scroll-margin-top:16px}
.soch h2{font-family:var(--font-serif);font-size:18px;font-weight:600;margin:0;letter-spacing:-.01em}
.soch .n{color:var(--muted);font-size:11.5px}

.term{border-top:1px solid var(--grid)}
.term:first-child{border-top:none}
.term>summary{list-style:none;cursor:pointer;padding:12px 2px;display:flex;align-items:center;gap:10px;justify-content:space-between}
.term>summary::-webkit-details-marker{display:none}
.term .tname{font-family:var(--font-serif);font-size:16px;font-weight:600;color:var(--ink);line-height:1.3}
.term .chev{color:var(--muted);flex:0 0 auto;transition:transform .16s}
.term[open] .chev{transform:rotate(90deg)}
.term .body{padding:0 2px 16px}
.def{color:var(--slate);font-size:12.5px;margin:2px 0 0;line-height:1.55}
.nav{color:var(--muted);font-size:12px;margin:9px 0 0;line-height:1.5}
.nav b{color:var(--slate);font-weight:600}

.ladder{margin:12px 0 0;display:grid;gap:6px}
.grow{display:grid;grid-template-columns:48px 1fr;border:1px solid var(--hair);border-left-width:3px;border-radius:0;overflow:hidden}
.gtag{font-family:var(--font-sans);font-weight:700;font-size:11.5px;display:flex;align-items:center;justify-content:center;padding:8px 4px;text-align:center;line-height:1.15}
.gtxt{padding:9px 12px;font-size:13px;color:var(--ink);line-height:1.5}
.gtxt.empty{color:var(--muted)}
.g1{border-color:var(--g1)} .g1 .gtag{background:var(--g1s);color:var(--g1)}
.g2{border-color:var(--g2)} .g2 .gtag{background:var(--g2s);color:var(--g2)}
.g3{border-color:var(--g3)} .g3 .gtag{background:var(--g3s);color:var(--g3)}
.g4{border-color:var(--g4)} .g4 .gtag{background:var(--g4s);color:var(--g4)}
.g5{border-color:var(--g5)} .g5 .gtag{background:var(--g5s);color:var(--g5)}
mark{background:#fdf3b0;color:inherit;padding:0 1px}

/* inline grade calculator */
.calc{border:1px solid var(--hair);border-top:2.5px solid var(--teal);padding:11px 13px 13px;margin:12px 0 2px;background:var(--paper)}
.calc-h{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);font-weight:600;margin:0 0 9px}
.calc-scales{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px}
.csc{font-size:11px;font-weight:600;color:var(--slate);background:var(--paper);border:1px solid var(--hair);border-radius:0;padding:4px 9px;cursor:pointer}
.csc:hover{border-color:var(--teal);color:var(--teal)}
.csc.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.calc-in{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.calc-in input{width:104px;padding:8px 9px;font-size:14px;border:1px solid var(--hair);border-radius:0;font-family:var(--font-sans);color:var(--ink);background:var(--paper)}
.calc-in input:focus{outline:none;border-color:var(--teal)}
.calc-in .u{color:var(--muted);font-size:12.5px}
.calc-out{margin:11px 0 0;display:flex;align-items:center;gap:10px;min-height:22px;flex-wrap:wrap}
.gchip{font-family:var(--font-sans);font-weight:700;font-size:12px;padding:3px 9px;border:1px solid;border-left-width:3px;white-space:nowrap}
.gchip.c0{border-color:#1f8a5b;background:#e7f4ee;color:#1f8a5b}
.gchip.c1{border-color:var(--g1);background:var(--g1s);color:var(--g1)}
.gchip.c2{border-color:var(--g2);background:var(--g2s);color:var(--g2)}
.gchip.c3{border-color:var(--g3);background:var(--g3s);color:var(--g3)}
.gchip.c4{border-color:var(--g4);background:var(--g4s);color:var(--g4)}
.gchip.c5{border-color:var(--g5);background:var(--g5s);color:var(--g5)}
.calc-out .cnote{font-size:12px;color:var(--slate);line-height:1.4}
.calc-note{font-size:11px;color:var(--muted);margin:9px 0 0;line-height:1.5}

.empty{text-align:center;color:var(--muted);padding:60px 0;display:none}
.foot{margin-top:30px;padding-top:16px;border-top:1px solid var(--hair);color:var(--muted);font-size:11px;line-height:1.6}
.foot b{color:var(--slate)}
.foot .disc{margin-top:8px}

/* converter modal */
.modal{position:fixed;inset:0;background:rgba(15,42,67,.34);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal.show{display:flex}
.sheet{background:var(--paper);border-radius:0;max-width:520px;width:100%;padding:20px 20px 22px;border-top:3px solid var(--teal)}
.sheet h3{margin:0 0 3px;font-family:var(--font-serif);font-size:19px;font-weight:600}
.sheet .sub{color:var(--muted);font-size:12px;margin:0 0 14px}
.sheet .x{float:right;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:none;background:none;padding:0}
.cv-pick{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px}
.cv-pick .cvp{font-size:12px;font-weight:600;color:var(--slate);background:var(--paper);border:1px solid var(--hair);border-radius:0;padding:6px 11px;cursor:pointer}
.cv-pick .cvp:hover{border-color:var(--teal);color:var(--teal)}
.cv-pick .cvp.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.cv-io{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.cv-field label{display:block;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
.cv-field input,.cv-field select{width:100%;padding:9px 10px;font-size:14px;font-family:var(--font-sans);color:var(--ink);background:var(--paper);border:1px solid var(--hair);border-radius:0;outline:none}
.cv-field input:focus,.cv-field select:focus{border-color:var(--teal)}
.cv-all{margin:14px 0 0;border-top:1px solid var(--grid);padding-top:10px}
.cv-all .r{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.cv-all .r .u{color:var(--muted)} .cv-all .r .v{font-weight:600;font-variant-numeric:tabular-nums}
.cv-note{color:var(--muted);font-size:11px;margin:12px 0 0;line-height:1.5}

@media (max-width:880px){
 .mhead{display:flex}
 .layout{display:block}
 .sidebar{position:fixed;top:0;left:0;z-index:50;height:100vh;height:100dvh;width:min(84vw,300px);flex-basis:auto;
  transform:translateX(-100%);transition:transform .22s ease;border-right:1px solid var(--hair);padding-top:calc(22px + env(safe-area-inset-top))}
 body.nav-open .sidebar{transform:translateX(0)}
 .sidebar .wm-wrap{display:none}
 body.nav-open .backdrop{display:block;position:fixed;inset:0;z-index:45;background:transparent}
 main{padding:16px}
}
@media (min-width:881px){ .mhead{display:none} }
@media print{ .mhead,.sidebar,.search,.backdrop{display:none!important} .layout{display:block} main{padding:0} .term[open] .body,.term .body{display:block} .term{break-inside:avoid} }

000, 2], [10000, 3]], "top": 4, "caveat": {"3": "transfusion indicated", "4": "life-threatening consequences"}}, {"label": "Platelets", "unit": "×10⁹/L", "dir": "low", "mildRef": "LLN", "cuts": [[75.0, 1], [50.0, 2], [10.0, 3]], "top": 4, "caveat": {"3": "transfusion indicated", "4": "life-threatening consequences"}}], "note": null}}, {"id": "s0-thrombocytosis", "term": "Thrombocytosis", "definition": "A finding based on laboratory test results that indicate an increase in number of platelets in a blood specimen.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s0-thrombotic-microangiopathy", "term": "Thrombotic microangiopathy", "definition": "A disorder characterized by a form of thrombotic microangiopathy with laboratory findings that indicate hemolytic anemia, severe thrombocytopenia, and renal insufficiency/failure.", "nav": "", "grades": {"1": "", "2": "Outpatient intervention indicated (e.g., modification of immunosuppression)", "3": "Transfusion or IV intervention indicated", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s0-thrombotic-thrombocytopenic-purpura", "term": "Thrombotic thrombocytopenic purpura", "definition": "A disorder characterized by a deficiency of ADAMTS13 and the presence of microangiopathic hemolytic anemia, thrombocytopenic purpura, fever, renal abnormalities and neurological abnormalities such as seizures, hemiplegia, and visual disturbances. It is an acute or subacute condition.", "nav": "", "grades": {"1": "", "2": "", "3": "Laboratory findings with clinical consequences (e.g., renal insufficiency, petechiae)", "4": "Life-threatening consequences, (e.g., CNS hemorrhage or thrombosis/embolism or renal failure)", "5": "Death"}}, {"id": "s0-blood-and-lymphatic-system-disorders-other-specify", "term": "Blood and lymphatic system disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Cardiac disorders", "short": "Cardiac", "id": "soc1", "terms": [{"id": "s1-aortic-valve-disease", "term": "Aortic valve disease", "definition": "A disorder characterized by a defect in aortic valve function or structure.", "nav": "", "grades": {"1": "Asymptomatic valvular thickening with or without mild valvular regurgitation or stenosis by imaging", "2": "Asymptomatic; moderate regurgitation or stenosis by imaging", "3": "Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled with medical intervention", "4": "Life-threatening consequences; urgent intervention indicated (e.g., valve replacement, valvuloplasty)", "5": "Death"}}, {"id": "s1-asystole", "term": "Asystole", "definition": "A disorder characterized by a dysrhythmia without cardiac electrical activity. Typically, this is accompanied by cessation of the pumping function of the heart.", "nav": "", "grades": {"1": "", "2": "", "3": "Intervention indicated; device (e.g., pacemaker)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-atrial-fibrillation", "term": "Atrial fibrillation", "definition": "A disorder characterized by a dysrhythmia without discernible P waves and an irregular ventricular response due to multiple reentry circuits. The rhythm disturbance originates above the ventricles.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated; electrical cardioversion", "3": "Symptomatic, urgent intervention indicated; device (e.g., pacemaker); ablation; new onset", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s1-atrial-flutter", "term": "Atrial flutter", "definition": "A disorder characterized by a dysrhythmia with organized rhythmic atrial contractions with a rate of 200-300 beats per minute. The rhythm disturbance originates in the atria.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Symptomatic, urgent intervention indicated; device (e.g., pacemaker); ablation", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s1-atrioventricular-block-complete", "term": "Atrioventricular block complete", "definition": "A disorder characterized by a dysrhythmia with complete failure of atrial electrical impulse conduction through the AV node to the ventricles.", "nav": "", "grades": {"1": "", "2": "Non-urgent intervention indicated", "3": "Symptomatic and incompletely controlled medically, or controlled with device (e.g., pacemaker); new onset", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-atrioventricular-block-first-degree", "term": "Atrioventricular block first degree", "definition": "A disorder characterized by a dysrhythmia with a delay in the time required for the conduction of an electrical impulse through the atrioventricular (AV) node beyond 0.2 seconds; prolongation of the PR interval greater than 200 milliseconds.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s1-cardiac-arrest", "term": "Cardiac arrest", "definition": "A disorder characterized by cessation of the pumping function of the heart.", "nav": "", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-chest-pain-cardiac", "term": "Chest pain - cardiac", "definition": "A disorder characterized by substernal discomfort due to insufficient myocardial oxygenation e.g., angina pectoris.", "nav": "Consider Cardiac disorders: Myocardial infarction. Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; pain on exertion; hemodynamically stable; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Pain at rest; cardiac catheterization; new onset cardiac chest pain; unstable angina; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s1-heart-failure", "term": "Heart failure", "definition": "A disorder characterized by the inability of the heart to pump blood at an adequate volume to meet tissue metabolic requirements, or, the ability to do so only at an elevation in the filling pressure.", "nav": "If asymptomatic, consider Cardiac disorders: Left ventricular dysfunction.", "grades": {"1": "Mild symptoms; no initiation or intensification of treatment", "2": "Outpatient initiation or intensification of treatment", "3": "Hospitalization indicated", "4": "Requiring inotropic support, mechanical circulatory support, or consideration of cardiac transplantation", "5": "Death"}}, {"id": "s1-left-ventricular-dysfunction", "term": "Left ventricular dysfunction", "definition": "A disorder characterized by an ASYMPTOMATIC abnormality of cardiac function.", "nav": "If symptomatic, consider Cardiac disorders: Heart failure.", "grades": {"1": "Left ventricular ejection fraction (LVEF) ≥50% AND one or more of the following: 1) New relative decline in Global Longitudinal Strain (GLS) >15% from baseline 2) New rise in cardiac biomarkers", "2": "LVEF 40 - 49% AND one or more of the following: 1) LVEF reduction by ≥10% 2) New relative decline in GLS >15% from baseline 3) New rise in cardiac biomarkers", "3": "New LVEF reduction to <40%", "4": "", "5": ""}}, {"id": "s1-mitral-valve-disease", "term": "Mitral valve disease", "definition": "A disorder characterized by a defect in mitral valve function or structure.", "nav": "", "grades": {"1": "Asymptomatic valvular thickening with or without mild valvular regurgitation or stenosis by imaging", "2": "Asymptomatic; moderate regurgitation or stenosis by imaging", "3": "Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled with medical intervention", "4": "Life-threatening consequences; urgent intervention indicated (e.g., valve replacement, valvuloplasty)", "5": "Death"}}, {"id": "s1-mobitz-type-ii-atrioventricular-block", "term": "Mobitz (type) II atrioventricular block", "definition": "A disorder characterized by a dysrhythmia with relatively constant PR interval prior to the block of an atrial impulse. This is the result of intermittent failure of atrial electrical impulse conduction through the atrioventricular (AV) node to the ventricles.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Symptomatic and incompletely controlled medically, or require a device (e.g., pacemaker)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-mobitz-type-i", "term": "Mobitz type I", "definition": "A disorder characterized by a dysrhythmia with a progressively lengthening PR interval prior to the blocking of an atrial impulse. This is the result of intermittent failure of atrial electrical impulse conduction through the atrioventricular (AV) node to the ventricles.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Symptomatic and incompletely controlled medically, or controlled with device (e.g., pacemaker)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-myocardial-infarction", "term": "Myocardial infarction", "definition": "A disorder characterized by gross necrosis of the myocardium; this is due to an interruption of blood supply to the area.", "nav": "", "grades": {"1": "", "2": "Asymptomatic; imaging or ECG features consistent with myocardial infarction which may be of uncertain age", "3": "Hemodynamically stable AND detection of a rise and/or fall of Cardiac troponin values with at least 1 value above the 99th percentile URL AND at least 1 of the following: 1) Symptoms of myocardial ischemia; 2) New ischemic ECG changes; 3) Development of pathological Q waves; 4) Imaging evidence of new loss of viable myocardium or new regional wall motion abnormality in a pattern consistent with an ischemic etiology; 5) Identification of a coronary thrombus by angiography", "4": "Life-threatening consequences; hemodynamically UN stable AND detection of a rise and/or fall of Cardiac troponin values with at least 1 value above the 99th percentile URL AND at least 1 of the following: 1) Symptoms of myocardial ischemia; 2) New ischemic ECG changes; 3) Development of pathological Q waves; 4) Imaging evidence of new loss of viable myocardium or new regional wall motion abnormality in a pattern consistent with an ischemic etiology; 5) Identification of a coronary thrombus by angiography", "5": "Death"}}, {"id": "s1-myocarditis", "term": "Myocarditis", "definition": "A disorder characterized by inflammation of the muscle tissue of the heart.", "nav": "", "grades": {"1": "Asymptomatic with Lab or ECG findings only", "2": "Symptoms with moderate activity or exertion", "3": "Severe with symptoms at rest or with minimal activity or exertion; intervention indicated; new onset of symptoms", "4": "Life-threatening consequences; urgent intervention indicated (e.g., continuous IV therapy or mechanical hemodynamic support); hemodynamically unstable requiring non-invasive or invasive ventilation; complete or high grade AV block; significant ventricular arrhythmia", "5": "Death"}}, {"id": "s1-palpitations", "term": "Palpitations", "definition": "A disorder characterized by an unpleasant sensation of irregular and/or forceful beating of the heart.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s1-paroxysmal-atrial-tachycardia", "term": "Paroxysmal atrial tachycardia", "definition": "A disorder characterized by a dysrhythmia with abrupt onset and sudden termination of atrial contractions with a rate of 150- 250 beats per minute. The rhythm disturbance originates in the atria.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Symptomatic, urgent intervention indicated; ablation", "4": "Life-threatening consequences; incompletely controlled medically; cardioversion indicated", "5": "Death"}}, {"id": "s1-pericardial-effusion", "term": "Pericardial effusion", "definition": "A disorder characterized by fluid collection within the pericardial sac, usually due to inflammation.", "nav": "Consider Cardiac disorders: Pericardial tamponade, Pericarditis.", "grades": {"1": "", "2": "Asymptomatic effusion size small to moderate", "3": "Effusion with physiologic consequences", "4": "Life-threatening consequences; hospitalization", "5": "Death"}}, {"id": "s1-pericardial-tamponade", "term": "Pericardial tamponade", "definition": "A disorder characterized by an increase in intrapericardial pressure due to the collection of blood or fluid in the pericardium.", "nav": "Consider Cardiac disorders: Pericarditis.", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-pericarditis", "term": "Pericarditis", "definition": "A disorder characterized by irritation to the layers of the pericardium (the protective sac around the heart).", "nav": "", "grades": {"1": "Asymptomatic, ECG or physical findings (e.g., rub) consistent with pericarditis", "2": "Symptomatic pericarditis (e.g., chest pain)", "3": "Pericarditis with physiologic consequences (e.g., pericardial constriction)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-pulmonary-valve-disease", "term": "Pulmonary valve disease", "definition": "A disorder characterized by a defect in pulmonary valve function or structure.", "nav": "", "grades": {"1": "Asymptomatic valvular thickening with or without mild valvular regurgitation or stenosis by imaging", "2": "Asymptomatic; moderate regurgitation or stenosis by imaging", "3": "Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled with medical intervention", "4": "Life-threatening consequences; urgent intervention indicated (e.g., valve replacement, valvuloplasty)", "5": "Death"}}, {"id": "s1-sick-sinus-syndrome", "term": "Sick sinus syndrome", "definition": "A disorder characterized by a dysrhythmia with alternating periods of bradycardia and atrial tachycardia accompanied by syncope, fatigue and dizziness.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic, intervention not indicated; change in medication initiated", "3": "Symptomatic, intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-sinus-bradycardia", "term": "Sinus bradycardia", "definition": "A disorder characterized by a dysrhythmia with a heart rate less than 60 beats per minute that originates in the sinus node.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic, intervention not indicated; change in medication initiated", "3": "Symptomatic, intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-sinus-tachycardia", "term": "Sinus tachycardia", "definition": "A disorder characterized by a dysrhythmia with a heart rate greater than 100 beats per minute that originates in the sinus node.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic; non-urgent medical intervention indicated", "3": "Urgent medical intervention indicated", "4": "", "5": ""}}, {"id": "s1-supraventricular-tachycardia", "term": "Supraventricular tachycardia", "definition": "A disorder characterized by a dysrhythmia with a heart rate greater than 100 beats per minute that originates above the ventricles.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Symptomatic, urgent intervention indicated", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s1-tricuspid-valve-disease", "term": "Tricuspid valve disease", "definition": "A disorder characterized by a defect in tricuspid valve function or structure.", "nav": "", "grades": {"1": "Asymptomatic valvular thickening with or without mild valvular regurgitation or stenosis", "2": "Asymptomatic; moderate regurgitation or stenosis by imaging", "3": "Symptomatic; severe regurgitation or stenosis; symptoms controlled with medical intervention", "4": "Life-threatening consequences; urgent intervention indicated (e.g., valve replacement, valvuloplasty)", "5": "Death"}}, {"id": "s1-ventricular-arrhythmia", "term": "Ventricular arrhythmia", "definition": "A disorder characterized by a dysrhythmia that originates in the ventricles.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Urgent intervention indicated", "4": "Life-threatening consequences; hemodynamic compromise", "5": "Death"}}, {"id": "s1-ventricular-fibrillation", "term": "Ventricular fibrillation", "definition": "A disorder characterized by a dysrhythmia without discernible QRS complexes due to rapid repetitive excitation of myocardial fibers without coordinated contraction of the ventricles.", "nav": "", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; hemodynamic compromise", "5": "Death"}}, {"id": "s1-ventricular-tachycardia", "term": "Ventricular tachycardia", "definition": "A disorder characterized by a dysrhythmia with a heart rate greater than 100 beats per minute that originates distal to the bundle of His.", "nav": "", "grades": {"1": "", "2": "Non-urgent medical intervention indicated", "3": "Symptomatic, urgent intervention indicated", "4": "Life-threatening consequences; hemodynamic compromise", "5": "Death"}}, {"id": "s1-cardiac-disorders-other-specify", "term": "Cardiac disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Ear and labyrinth disorders", "short": "Ear / labyrinth", "id": "soc2", "terms": [{"id": "s2-ear-pain", "term": "Ear pain", "definition": "A disorder characterized by a sensation of marked discomfort in the ear.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-external-ear-pain", "term": "External ear pain", "definition": "A disorder characterized by a sensation of marked discomfort in the external ear region.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-hearing-impaired", "term": "Hearing impaired", "definition": "A disorder characterized by partial or complete loss of the ability to detect or understand sounds resulting from damage to ear structures.", "nav": "", "grades": {"1": "Adult: Subjective change in hearing in the absence of documented hearing loss; threshold shift of 15 - 25 dB averaged at 2 contiguous test frequencies in at least one ear (on a 1, 2, 4, 3, 6, and 8 kHz audiogram); Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB hearing loss (HL) (i.e., 25 dB HL or greater); sensorineural hearing loss (SNHL) above 4 kHz (i.e., 6 or 8 kHz) in at least one ear", "2": "Adult: Hearing loss not requiring hearing aid; intervention not indicated; limiting instrumental ADL; threshold shift of >25 dB averaged at 2 contiguous test frequencies in at least one ear (on a 1, 2, 3, 4, 6, and 8 kHz audiogram); Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB at 4 kHz in at least one ear; mild/moderate impact on age-appropriate normal daily activity", "3": "Adult: Hearing loss requiring hearing aid; intervention indicated; limiting self-care ADL; threshold shift of >25 dB averaged at 3 contiguous test frequencies in at least one ear(on a 1, 2, 3, 4, 6, and 8 kHz audiogram); Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Hearing loss sufficient to indicate therapeutic intervention, including hearing aids; threshold shift >20 dB at 2 to <4 kHz in at least one ear; severe impact on age-appropriate normal daily activity", "4": "Adult : Nonservicable hearing; decrease in hearing to profound bilateral loss (absolute threshold >80 dB HL at 2 kHz and above); Pediatric: Audiologic indication for cochlear implant; >40 dB HL (i.e., 45 dB HL or more); SNHL at 2 kHz and above", "5": ""}}, {"id": "s2-middle-ear-inflammation", "term": "Middle ear inflammation", "definition": "A disorder characterized by inflammation (physiologic response to irritation), swelling and redness to the middle ear.", "nav": "", "grades": {"1": "Serous otitis", "2": "Serous otitis, medical intervention indicated", "3": "Mastoiditis; necrosis of canal soft tissue or bone", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s2-tinnitus", "term": "Tinnitus", "definition": "A disorder characterized by noise in the ears, such as ringing, buzzing, roaring or clicking.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-vertigo", "term": "Vertigo", "definition": "A disorder characterized by a sensation as if the external world were revolving around the patient (objective vertigo) or as if he himself were revolving in space (subjective vertigo).", "nav": "", "grades": {"1": "Mild symptoms", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-vestibular-disorder", "term": "Vestibular disorder", "definition": "A disorder characterized by dizziness, imbalance, nausea, and vision problems.", "nav": "", "grades": {"1": "", "2": "Symptomatic; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-ear-and-labyrinth-disorders-other-specify", "term": "Ear and labyrinth disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Endocrine disorders", "short": "Endocrine", "id": "soc3", "terms": [{"id": "s3-adrenal-insufficiency", "term": "Adrenal insufficiency", "definition": "A disorder characterized by the adrenal cortex not producing enough of the hormone cortisol and in some cases, the hormone aldosterone. It may be due to a disorder of the adrenal cortex as in Addison's disease or primary adrenal insufficiency.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "Severe symptoms; hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-cushingoid", "term": "Cushingoid", "definition": "A disorder characterized by signs and symptoms that resemble Cushing's disease or syndrome: buffalo hump obesity, striations, adiposity, hypertension, diabetes, and osteoporosis, usually due to exogenous corticosteroids.", "nav": "", "grades": {"1": : "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-hypoparathyroidism", "term": "Hypoparathyroidism", "definition": "A disorder characterized by a decrease in production of parathyroid hormone by the parathyroid glands. Navigational Note : -", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "Severe symptoms; medical intervention or hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-hypophysitis", "term": "Hypophysitis", "definition": "A disorder characterized by inflammation and cellular infiltration of the pituitary gland.", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-hypopituitarism", "term": "Hypopituitarism", "definition": "A disorder characterized by a decrease in production of hormones from the pituitary gland.", "nav": "Consider Endocrine disorders: Hypophysitis.", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-hypothyroidism", "term": "Hypothyroidism", "definition": "A disorder characterized by a decrease in production of thyroid hormone by the thyroid gland.", "nav": "Consider Endocrine disorders: Hypophysitis.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; thyroid replacement initiated; increase in current thyroid replacement therapy; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-precocious-puberty", "term": "Precocious puberty", "definition": "A disorder characterized by unusually early development of secondary sexual features; the onset of sexual maturation begins usually before age 8 for girls and before age 9 for boys.", "nav": "", "grades": {"1": "Physical signs of puberty with no biochemical markers for females <8 years and males <9 years", "2": "Physical signs and biochemical markers of puberty for females <8 years and males <9 years", "3": "", "4": "", "5": ""}}, {"id": "s3-testosterone-deficiency", "term": "Testosterone deficiency", "definition": "A disorder characterized by low testosterone.", "nav": "", "grades": {"1": "Asymptomatic; mild symptoms with no intervention indicated", "2": "Replacement therapy initiated", "3": "", "4": "", "5": ""}}, {"id": "s3-thyroiditis", "term": "Thyroiditis", "definition": "A disorder characterized by inflammation or destruction of the thyroid gland.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Medical intervention indicated", "3": "Hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-virilization", "term": "Virilization", "definition": "A disorder characterized by inappropriate masculinization occurring in a female or prepubertal male.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s3-endocrine-disorders-other-specify", "term": "Endocrine disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Eye disorders", "short": "Eye", "id": "soc4", "terms": [{"id": "s4-blurred-vision", "term": "Blurred vision", "definition": "A disorder characterized by visual perception of unclear or fuzzy images.", "nav": "Consider: Eye disorders: Uveitis.", "grades": {"1": "Intervention not indicated", "2": "Symptomatic; moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Symptomatic with marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-cataract", "term": "Cataract", "definition": "A disorder characterized by partial or complete opacity of the crystalline lens of one or both eyes. This results in a decrease in visual acuity and eventual blindness if untreated.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline); glare symptoms affecting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Symptomatic with marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-corneal-ulcer", "term": "Corneal ulcer", "definition": "A disorder characterized by an area of epithelial tissue loss on the surface of the cornea. It is associated with inflammatory cells in the cornea and anterior chamber.", "nav": "", "grades": {"1": "", "2": "", "3": "Corneal ulcer without perforation in the affected eye", "4": "Perforation in the affected eye", "5": ""}}, {"id": "s4-decreased-night-vision", "term": "Decreased night vision", "definition": "A disorder characterized by an inability to see clearly in dim light.", "nav": "", "grades": {"1": "Symptomatic", "2": "Moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-dry-eye", "term": "Dry eye", "definition": "A disorder characterized by dryness of the cornea and conjunctiva.", "nav": "If corneal ulcer is present, grade under Eye disorders: Corneal ulcer. If related to syndromes not present in CTCAE (ex. Sjogren's syndrome, etc.), report as Other, specify in the most representative SOC.", "grades": {"1": "Clinical or diagnostic observations only; symptoms relieved by lubricants", "2": "Symptomatic; moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline)", "3": "Symptomatic with marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-extraocular-muscle-paresis", "term": "Extraocular muscle paresis", "definition": "A disorder characterized by incomplete paralysis of an extraocular muscle.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only", "2": "Unilateral paresis without double vision", "3": "Bilateral paresis or unilateral paresis causing double vision in peripheral gaze, but not in central gaze", "4": "Bilateral paresis requiring head turning to see beyond central 60 degrees or double vision in central gaze", "5": ""}}, {"id": "s4-eye-pain", "term": "Eye pain", "definition": "A disorder characterized by a sensation of marked discomfort in the eye.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-eyelid-function-disorder", "term": "Eyelid function disorder", "definition": "A disorder characterized by impaired eyelid function.", "nav": "", "grades": {"1": "Clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; nonoperative intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Operative intervention indicated requiring hospitalization; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-flashing-lights", "term": "Flashing lights", "definition": "A disorder characterized by a sudden or brief burst of light.", "nav": "Consider Eye disorders: Retinal tear, Retinal detachment.", "grades": {"1": "Symptomatic", "2": "Limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-floaters", "term": "Floaters", "definition": "A disorder characterized by an individual seeing spots before their eyes. The spots are shadows of opaque cell fragments in the vitreous humor or lens.", "nav": "Consider Eye disorders: Retinal tear, Retinal detachment.", "grades": {"1": "Symptomatic", "2": "Limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-glaucoma", "term": "Glaucoma", "definition": "A disorder characterized by an increase in pressure in the eyeball due to obstruction of the aqueous humor outflow.", "nav": "", "grades": {"1": "Less than 8 mmHg of elevated intraocular pressure (EIOP); no visual field deficit", "2": "Topical medication indicated", "3": "EIOP causing visual field deficits", "4": "Visual field deficit within the central 10 degrees of the visual field in the affected eye", "5": ""}}, {"id": "s4-keratitis", "term": "Keratitis", "definition": "A disorder characterized by inflammation to the cornea of the eye.", "nav": "Consider Eye disorders: Corneal ulcer.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline)", "3": "Symptomatic with marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200); corneal ulcer; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Perforation; best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-optic-nerve-disorder", "term": "Optic nerve disorder", "definition": "A disorder characterized by involvement of the optic nerve (second cranial nerve).", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only", "2": "Moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline)", "3": "Marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200)", "4": "Best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-papilledema", "term": "Papilledema", "definition": "A disorder characterized by swelling around the optic disc.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Asymptomatic; no visual field deficit", "2": "Symptomatic; moderate decrease in visual acuity (best corrected visual acuity 20/40 and better or 3 lines or less decreased vision from known baseline)", "3": "Symptomatic with marked decrease in visual acuity (best corrected visual acuity worse than 20/40 or more than 3 lines of decreased vision from known baseline, up to 20/200)", "4": "Best corrected visual acuity of 20/200 or worse in the affected eye", "5": ""}}, {"id": "s4-periorbital-edema", "term": "Periorbital edema", "definition": "A disorder characterized by swelling due to an excessive accumulation of fluid around the orbits of the face.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Soft or non-pitting", "2": "Indurated or pitting edema; topical intervention indicated", "3": "Edema associated with visual disturbance; increased intraocular pressure, glaucoma or retinal hemorrhage; diuretics indicated; operative intervention indicated", "4": "", "5": ""}}, {"id": "s4-photophobia", "term": "Photophobia", "definition": "A disorder characterized by fear and avoidance of light.", "nav": "", "grades": {"1": "Symptomatic", "2": "Limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s4-retinal-detachment", "term": "Retinal detachment", "defini aracterized by a sensation of marked discomfort in the face.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s6-fatigue", "term": "Fatigue", "definition": "A disorder characterized by a state of generalized weakness with a pronounced inability to summon sufficient energy to accomplish daily activities.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Fatigue relieved by rest", "2": "Fatigue not relieved by rest; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Fatigue not relieved by rest, limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s6-fever", "term": "Fever", "definition": "A disorder characterized by elevation of the body's temperature above the upper limit of normal.", "nav": "Consider Injury, poisoning and procedural complications: Infusion related reaction.", "grades": {"1": "38.0 - 39.0 degrees C (100.4 - 102.2 degrees F)", "2": ">39.0 - 40.0 degrees C (102.3 - 104.0 degrees F)", "3": ">40.0 degrees C (>104.0 degrees F) for <=24 hrs", "4": ">40.0 degrees C (>104.0 degrees F) for >24 hrs", "5": "Death"}}, {"id": "s6-flu-like-symptoms", "term": "Flu like symptoms", "definition": "A disorder characterized by a group of symptoms similar to those observed in patients with the flu. It includes fever, chills, body aches, malaise, loss of appetite and dry cough.", "nav": "Synonym: Flu, Influenza; Consider Injury, poisoning and procedural complications: Infusion related reaction.", "grades": {"1": "Mild flu-like symptoms present", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact usion into the surrounding tissue. Signs and symptoms may include induration, erythema, swelling, burning sensation and marked discomfort at the infusion site.", "nav": "", "grades": {"1": "Painless edema", "2": "Erythema with associated symptoms (e.g., edema, pain, induration, phlebitis)", "3": "Ulceration or necrosis; severe tissue damage; operative intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s6-injection-site-reaction", "term": "Injection site reaction", "definition": "A disorder characterized by an intense adverse reaction (usually immunologic) developing at the site of an injection.", "nav": "", "grades": {"1": "Tenderness with or without associated symptoms (e.g., warmth, erythema, itching)", "2": "Pain; lipodystrophy; edema; phlebitis", "3": "Ulceration or necrosis; severe tissue damage; operative intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s6-localized-edema", "term": "Localized edema", "definition": "A disorder characterized by swelling due to excessive fluid accumulation at a specific anatomic site.", "nav": "Prior to using this term consider specific edema areas and/or causes: Cardiac disorders: Heart failure; General disorders and administration site conditions: Edema face, Peripheral edema; Nervous system disorders: Edema cerebral; Respiratory, thoracic and mediastinal disorders: Laryngeal edema, Pulmonary edema; Eye disorders: Periorbital edema; Vascular disorders: Lymphedema. Record final diagnosis/cause once determined.", "grades": {"1": "Localized to dependent areas, no disability or functional impairment", "2": "Moderate localized edema and intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe localized edema and intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity  (DILI); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; moderate to severe encephalopathy; coma", "5": "Death"}}, {"id": "s7-hepatic-hemorrhage", "term": "Hepatic hemorrhage", "definition": "A disorder characterized by bleeding from the liver.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s7-hepatic-necrosis", "term": "Hepatic necrosis", "definition": "A disorder characterized by a necrotic process occurring in the hepatic parenchyma.", "nav": "", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent invasive intervention indicated", "5": "Death"}}, {"id": "s7-hepatic-pain", "term": "Hepatic pain", "definition": "A disorder characterized by a sensation of marked discomfort in the liver region.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s7-hepatitis", "term": "Hepatitis", "definition": "A disorder characterized by inflammation of the liver.", "nav": "Consider Infections and infestations: Hepatitis viral, Hepatobiliary disorders: Hepatic failure. Report Autoimmune hepatitis under Hepatobiliary disorders: Other, specify.", "grades": {"1": "", "2": "Moderate symptoms; medical intervention indicated", "3": "Symptomatic liver dysfunction; compensated cirrhosis; hospitalization or prolongation of existing hospitalization indicated", "4": "Life-threatening consequences; severe decompensated liver function (e.g., coagulopathy, encephalopathy, coma)", "5": "Death"}},  "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Immune system disorders", "short": "Immune system", "id": "soc8", "terms": [{"id": "s8-allergic-reaction", "term": "Allergic reaction", "definition": "A disorder characterized by an adverse general response from exposure to an allergen.", "nav": "If related to infusion, consider Injury, poisoning and procedural complications: Infusion related reaction. If related to immunization, consider Injury, poisoning and procedural complications: Systemic post-immunization reaction. Do not report both.", "grades": {"1": "Systemic intervention not indicated", "2": "Oral intervention indicated", "3": "Bronchospasm; hospitalization indicated for clinical sequelae; IV intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s8-anaphylaxis", "term": "Anaphylaxis", "definition": "A disorder characterized by an acute inflammatory reaction resulting from the release of histamine and histamine-like substances from mast cells, causing a hypersensitivity immune response. Clinically, it presents with breathing difficulty, dizziness, hypotension, cyanosis and loss of consciousness and may lead to death.", "nav": "If related to infusion, consider Injury, poisoning and procedural complications: Infusion related reaction. Do not report both.", "grades": {"1": "", "2": "", "3": "Symptomatic bronchospasm, with or without urticaria; parenteral intervention indicated; allergy-related edema/angioedema; hypotension", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s8-autoimmune-disorder", "term": "Autoimmune disorder", "definition": "A disorder characterized by loss of function or tissue destruction of an organ or multiple organs, arising from humoral or cellular immune responses of the individual to his own tissue constituents.", "nav": "Prior to using this term consider specific autoimmune AEs.", "grades": {"1": "Asymptomatic; serologic or other evidence of autoimmune reaction, with normal organ function; intervention not indicated", "2": "Evidence of autoimmune reaction involving a non-essential organ or function (e.g., hypothyroidism)", "3": "Autoimmune reactions involving major organ (e.g., colitis, anemia, myocarditis, kidney)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s8-cytokine-release-syndrome", "term": "Cytokine release syndrome", "definition": "A disorder characterized by fever, tachypnea, headache, tachycardia, hypotension, rash, and/or hypoxia caused by the release of cytokines.", "nav": "Consider reporting other organ dysfunctions including neurological toxicities such as: Psychiatric disorders: Confusion, Hallucinations; Nervous system disorders: Dysphasia, Headache, Seizure, Tremor.", "grades": {"1": "Fever with or without constitutional symptoms", "2": "Hypotension responding to fluids; hypoxia requiring low-flow nasal cannula or blow-by", "3": "Hypotension managed with one pressor; hypoxia requiring high-flow nasal cannula, facemask, nonrebreather mask, or Venturi mask", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s8-graft-versus-host-disease", "term": "Graft versus host disease", "definition": "A disorder characterized by donor cells attacking the recipient's organs.", "nav": "", "grades": {"1": "", "2": "Oral intervention indicated", "3": "IV intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", " al intervention indicated", "3": "Hospitalization indicated", "4": "", "5": ""}}, {"id": "s11-blood-bicarbonate-decreased", "term": "Blood bicarbonate decreased", "definition": "A finding based on laboratory test results that indicate a decrease in levels of bicarbonate in a venous blood specimen.", "nav": "Consider Metabolism and nutrition disorders: Acidosis, Alkalosis.", "grades": {"1": "<LLN and no intervention initiated", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-blood-bilirubin-increased", "term": "Blood bilirubin increased", "definition": "A finding based on laboratory test results that indicate an abnormally high level of total bilirubin in the blood. Excess bilirubin is associated with jaundice.", "nav": "Consider Hepatobiliary disorders: Hepatic failure. Report Autoimmune hepatitis under Hepatobiliary disorders: Other, specify.", "grades": {"1": ">ULN - 1.5 x ULN if baseline was normal or less than normal; 1.0 - 1.5 x baseline if baseline was >ULN", "2": ">1.5 - 3.0 x ULN if baseline was normal or less than normal; >1.5 - 2.5 x baseline if baseline was >ULN", "3": ">3.0 - 10.0 x ULN if baseline was normal or less than normal; >2.5 - 10.0 x baseline if baseline was >ULN", "4": ">10.0 x ULN if baseline was normal or less than normal; >10.0 x baseline if baseline was >ULN", "5": ""}, "calc": {"analyte": "Total bilirubin", "scales": [{"label": "Bilirubin", "unit": "× ULN", "kind": "ratio", "dir": "high", "mildRef": 1.0, "cuts": [[1.5, 1], [3.0, 2], [10.0, 3]], "top": 4}], "note": "Thresholds assume baseline ≤ ULN. If baseline > ULN, CTCAE grades on × baseline — see the ladder."}}, {"id": "s11-blood-corticotrophin-decreased", "term": "Blood corticotrophin decreased", "definition": "A finding based on laboratory test results that indicate a decrease in the expected levels of corticotrophin (ACTH) in a blood specimen.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medic ymptomatic and intervention not indicated", "3": "Asymptomatic decrease of >8 units drop; >5 units drop along with the presence of pulmonary symptoms (e.g., >Grade 2 hypoxia or >Grade 2 dyspnea); intervention indicated", "4": "", "5": ""}}, {"id": "s11-cd4-lymphocytes-decreased", "term": "CD4 lymphocytes decreased", "definition": "A finding based on laboratory test results that indicate a decrease in levels of CD4 lymphocytes in a blood specimen.", "nav": "", "grades": {"1": "<LLN - 500/mm3; <LLN - 0.5 x 10^9/L", "2": "<500 - 200/mm3; <0.5 - 0.2 x 10^9/L", "3": "<200 - 50/mm3; <0.2 - 0.05 x 10^9/L", "4": "<50/mm3; <0.05 x 10^9/L", "5": ""}}, {"id": "s11-cholesterol-high", "term": "Cholesterol high", "definition": "A finding based on laboratory test results that indicate higher than normal levels of cholesterol in a blood specimen.", "nav": "", "grades": {"1": ">ULN - 300 mg/dL; >ULN - 7.75 mmol/L", "2": ">300 - 400 mg/dL; >7.75 - 10.34 mmol/L", "3": ">400 - 500 mg/dL; >10.34 - 12.92 mmol/L", "4": ">500 mg/dL; >12.92 mmol/L", "5": ""}}, {"id": "s11-creatinine-clearance-decreased", "term": "Creatinine clearance decreased", "definition": "A finding based on laboratory test results that indicate a decrease in creatinine clearance (CrCl) in a 24-hour urine collection.", "nav": "Report Grade 4 and 5 as Renal and urinary disorders: Acute kidney injury or Chronic kidney disease.", "grades": {"1": "", "2": "26 - 49 ml/min", "3": "10 - 25 ml/min", "4": "", "5": ""}}, {"id": "s11-creatinine-increased", "term": "Creatinine increased", "definition": "A finding based on laboratory test results that indicate increased levels of creatinine in a biological specimen.", "nav": "Consider Renal and urinary disorders: Acute kidney injury, Glomerulonephritis, Tubulointerstitial nephritis.", "grades": {"1": ">ULN - 1.5 x ULN", "2": ">1.5 - 3.0 x baseline if baseline is below LLN; >1.5 - 3.0 x ULN", "3": ">3.0 x baseline if baseline is below LLN; >3.0 - 6.0 x ULN", "4": ">6.0 x ULN", "5": " 4", "3": "FEV1% 50 - 59%; GLI Z-score <-4", "4": "", "5": ""}}, {"id": "s11-ggt-increased", "term": "GGT increased", "definition": "A finding based on laboratory test results that indicate higher than normal levels of the enzyme gamma-glutamyltransferase in the blood specimen. GGT (gamma-glutamyltransferase ) catalyzes the transfer of a gamma glutamyl group from a gamma glutamyl peptide to another peptide, amino acids or water.", "nav": "", "grades": {"1": ">ULN - 2.5 x ULN if baseline was normal or less than normal; 1.0 - 1.5 x baseline if baseline was >ULN", "2": ">2.5 - 5.0 x ULN if baseline was normal or less than normal; >1.5 - 3.0 x baseline if baseline was >ULN", "3": ">5.0 - 20.0 x ULN if baseline was normal or less than normal; >3.0 - 10.0 x baseline if baseline was >ULN", "4": ">20.0 x ULN if baseline was normal or less than normal; >10.0 x baseline if baseline was >ULN", "5": ""}, "calc": {"analyte": "GGT", "scales": [{"label": "GGT", "unit": "× ULN", "kind": "ratio", "dir": "high", "mildRef": 1.0, "cuts": [[2.5, 1], [5.0, 2], [20.0, 3]], "top": 4}], "note": "Thresholds assume baseline ≤ ULN. If baseline > ULN, CTCAE grades on × baseline — see the ladder."}}, {"id": "s11-growth-hormone-abnormal", "term": "Growth hormone abnormal", "definition": "A finding based on laboratory test results that indicate abnormal levels of growth hormone (GH) in a biological specimen.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s11-haptoglobin-decreased", "term": "Haptoglobin decreased", "definition": "A finding based on laboratory test results that indicate an decrease in levels of haptoglobin (HP) in a blood specimen.", "nav": "", "grades": {"1": "<LLN", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-hdl-decreased", "term": "HDL decreased", "definition": "A finding based on laboratory test results that indicate a decrease in HDL in a blood specimen.", "nav": "", "grades": {"1": "<LLN", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-hemoglobin-increased", "term": "Hemoglobin increased", "definition": "A finding based on laboratory test results that indicate increased levels of hemoglobin (Hgb) above normal.", "nav": "", "grades": {"1": "Increase in >0 - 2 g/dL above ULN", "2": "Increase in >2 - 4 g/dL above ULN", "3": "Increase in >4 g/dL above ULN", "4": "", "5": ""}}, {"id": "s11-inr-increased", "term": "INR increased", "definition": "A finding based on laboratory test results that indicate an increase in the ratio of the patient's prothrombin time (PT) to a control sample in the blood.", "nav": "", "grades": {"1": ">1.2 - 1.5; >1 - 1.5 x baseline if on anticoagulation; monitoring only indicated", "2": ">1.5 - 2.5; >1.5 - 2.5 x baseline if on anticoagulation; dose adjustment indicated", "3": ">2.5; >2.5 x baseline if on anticoagulation; bleeding", "4": "", "5": ""}}, {"id": "s11-ldl-increased", "term": "LDL increased", "definition": "A finding based on laboratory test results that indicate an increase in LDL in a blood specimen.", "nav": "", "grades": {"1": ">ULN", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-lipase-increased", "term": "Lipase increased", "definition": "A finding based on laboratory test results that indicate an increase in the level of lipase in a biological specimen.", "nav": "Consider Gastrointestinal disorders: Pancreatitis.", "grades": {"1": ">ULN - 1.5 x ULN", "2": ">1.5 - 3.0 x ULN; >3.0 - 5.0 x ULN and asymptomatic", "3": ">3.0 - 5.0 x ULN with signs or symptoms; >5.0 x ULN and asymptomatic", "4": ">5.0 x ULN and with signs or symptoms", "5": ""}}, {"id": "s11-lymphocyte-count-increased", "term": "Lymphocyte count increased", "definition": "A finding based on laboratory test results that indicate an abnormal increase in the number of lymphocytes in the blood, effusions or bone marrow.", "nav": "", "grades": {"1": "", "2": ">4000/mm3 - 20,000/mm3", "3": ">20,000/mm3", "4": "", "5": ""}}, {"id": "s11-neutrophil-count-decreased", "term": "Neutrophil count decreased", "definition": "A finding based on laboratory test results that indicate a decrease in number of neutrophils (ANC) in a blood specimen.", "nav": "", "grades": {"1": "<1500 - 1000/mm3; <1.5 - 1.0 x 10^9/L", "2": "<1000 - 500/mm3; <1.0 - 0.5 x 10^9/L", "3": "<500 - 100/mm3; <0.5 - 0.1 x 10^9/L", "4": "<100/mm3; <0.1 x 10^9/L", "5": ""}, "calc": {"analyte": "Absolute neutrophil count", "scales": [{"label": "ANC", "unit": "/mm³", "dir": "low", "mildRef": 1500, "cuts": [[1000, 1], [500, 2], [100, 3]], "top": 4}, {"label": "ANC", "unit": "×10⁹/L", "dir": "low", "mildRef": 1.5, "cuts": [[1.0, 1], [0.5, 2], [0.1, 3]], "top": 4}], "note": null}}, {"id": "s11-neutrophil-count-increased", "term": "Neutrophil count increased", "definition": "A finding based on laboratory test results that indicate an increase in number of neutrophils (ANC) in a blood specimen.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-serum-amylase-increased", "term": "Serum amylase increased", "definition": "A finding based on laboratory test results that indicate an increase in the levels of amylase in a serum specimen.", "nav": "Consider Gastrointestinal disorders: Pancreatitis.", "grades": {"1": ">ULN - 1.5 x ULN", "2": ">1.5 - 2.0 x ULN; >2.0 - 5.0 x ULN and asymptomatic or with mild signs or symptoms", "3": ">2.0 - 5.0 x ULN with moderate or severe signs or symptoms; >5.0 x ULN and asymptomatic", "4": ">5.0 x ULN and with signs or symptoms", "5": ""}}, {"id": "s11-thyroid-stimulating-hormone-increased", "term": "Thyroid stimulating hormone increased", "definition": "A disorder characterized by an increase in thyroid stimulating hormone (TSH).", "nav": "If intervention initiated or symptomatic, report as Endocrine disorders: Hypothyroidism.", "grades": {"1": "TSH increased and no intervention indicated", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-urinary-protein-increased", "term": "Urinary protein increased", "definition": "A finding based on laboratory test results that indicate the presence of excessive protein in the urine. It is predominantly albumin, but also globulin.", "nav": "24-hour urine collection takes precedence over dipstick.", "grades": {"1": "Adult: 1+ proteinuria; urinary protein ≥ULN - <1.0 g/24 hrs; P/C <1; Pediatric: 1 + proteinuria", "2": "Adult: 2+ and 3+ proteinuria; urinary protein 1.0 - <3.5 g/24 hrs; P/C 1 - 3.5; Pediatric: Urine P/C (Protein/Creatinine) ratio 0.5 - 1.9; 2 - 3+ proteinuria", "3": "Adult: Urinary protein >=3.5 g/24 hrs; 4+ proteinuria; P/C >3.5; Pediatric: Urine P/C (Protein/Creatinine) ratio >1.9, 4+ proteinuria", "4": "", "5": ""}}, {"id": "s11-urine-output-decreased", "term": "Urine output decreased", "definition": "A finding based on test results that indicate urine production is less relative to previous output.", "nav": "", "grades": {"1": "", "2": "", "3": "Adult: Oliguria (<80 ml in 8 hr); Infants: <1 ml/kg/hour; Children: <0.5 ml/kg/hour", "4": "Adult: Anuria (<240 ml in 24 hr); Pediatric: No urine output over 12 hours", "5": ""}}, {"id": "s11-vital-capacity-abnormal", "term": "Vital capacity abnormal", "definition": "A finding based on pulmonary function test results that indicate an abnormal vital capacity (VC) (amount of exhaled after a maximum inhalation) when compared to the predicted value.", "nav": "Consider Investigations: Forced expiratory volume decreased; Respiratory, thoracic and mediastinal disorders: Dyspnea, Respiratory failure.", "grades": {"1": "90 - 75% of predicted value", "2": "<75 - 50% of predicted value; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "<50% of predicted value; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s11-vitamin-d-decreased", "term": "Vitamin D decreased", "definition": "A finding based on laboratory test results that indicate a low concentration of Vitamin D in the blood.", "nav": "", "grades": {"1": "Vitamin D decreased <LLN", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-weight-gain", "term": "Weight gain", "definition": "A finding characterized by an unexpected or abnormal increase in overall body weight; for pediatrics, percentages represent the absolute increase above that expected from the baseline growth curve (not change in growth percentiles).", "nav": "", "grades": {"1": "5 - <10% from baseline", "2": "10 - <20% from baseline", "3": ">=20% from baseline", "4": "", "5": ""}}, {"id": "s11-weight-loss", "term": "Weight loss", "definition": "A finding characterized by a decrease in overall body weight; for pediatrics, less than the baseline growth curve.", "nav": "", "grades": {"1": "5 - <10% from baseline; intervention not indicated", "2": "10 - <20% from baseline; nutritional support indicated", "3": ">=20% from baseline; tube feeding or TPN indicated", "4": "", "5": ""}}, {"id": "s11-white-blood-cell-decreased", "term": "White blood cell decreased", "definition": "A finding based on laboratory test results that indicate a decrease in number of white blood cells (WBC) in a blood specimen.", "nav": "", "grades": {"1": "<LLN - 3000/mm3; <LLN - 3.0 x 10^9/L", "2": "<3000 - 2000/mm3; <3.0 - 2.0 x 10^9/L", "3": "<2000 - 1000/mm3; <2.0 - 1.0 x 10^9/L", "4": "<1000/mm3; <1.0 x 10^9/L", "5": ""}, "calc": {"analyte": "White cell count", "scales": [{"label": "WBC", "unit": "/mm³", "dir": "low", "mildRef": "LLN", "cuts": [[3000, 1], [2000, 2], [1000, 3]], "top": 4}, {"label": "WBC", "unit": "×10⁹/L", "dir": "low", "mildRef": "LLN", "cuts": [[3.0, 1], [2.0, 2], [1.0, 3]], "top": 4}], "note": null}}, {"id": "s11-investigations-other-specify", "term": "Investigations - Other, specify", "definition": "", "nav": "", "gr  symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": ""}}, {"id": "s15-phantom-pain", "term": "Phantom pain", "definition": "A disorder characterized by a sensation of marked discomfort related to a limb or an organ that is removed from or is not physically part of the body.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s15-presyncope", "term": "Presyncope", "definition": "A disorder characterized by an episode of lightheadedness and dizziness which may precede an episode of syncope.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "", "2": "Present (e.g., near fainting)", "3": "", "4": "", "5": ""}}, {"id": "s15-pyramidal-tract-syndrome", "term": "Pyramidal tract syndrome", "definition": "A disorder characterized by dysfunction of the corticospinal (pyramidal) tracts of the spinal cord. Symptoms include an increase in the muscle tone in the lower extremities, hyperreflexia, positive Babinski and a decrease in fine motor coordination.", "nav": "", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-r
