al", "band": "low", "lvl": "Minimal–low", "freq": "<30%"}, {"name": "Zanubrutinib", "qualifier": "", "route": "oral", "band": "low", "lvl": "Minimal–low", "freq": "<30%"}, {"name": "Zongertinib", "qualifier": "", "route": "oral", "band": "low", "lvl": "Minimal–low", "freq": "<30%"}], "ctcae": [{"term": "Nausea", "term_id": "s5-nausea", "calc": false}, {"term": "Vomiting", "term_id": "s5-vomiting", "calc": false}]}, "fn": {"mascc": {"source": "Taplitz RA, et al. Outpatient Management of Fever and Neutropenia in Adults Treated for Malignancy: ASCO/IDSA CPG Update. J Clin Oncol 2018;36(14):1443-1453. DOI 10.1200/JCO.2017.77.6211 (Table 2).", "loc": "ASCO Rec 2.1b · evidence-based, moderate", "burden": {"label": "Burden of febrile neutropenia (general clinical status)", "options": [{"label": "No or mild symptoms", "score": 5}, {"label": "Moderate symptoms", "score": 3}, {"label": "Severe symptoms or moribund", "score": 0}], "note": "Scores 5 / 3 / 0 are NOT cumulative — pick one."}, "items": [{"id": "hypotension", "label": "No hypotension (systolic BP > 90 mmHg)", "score": 5}, {"id": "copd", "label": "No chronic obstructive pulmonary disease", "score": 4}, {"id": "tumor", "label": "Solid tumor, or hematologic malignancy with no previous fungal infection", "score": 4}, {"id": "dehydration", "label": "No dehydration requiring parenteral fluids", "score": 3}, {"id": "outpatient", "label": "Outpatient status (at onset of fever)", "score": 3}, {"id": "age", "label": "Age < 60 years", "score": 2}], "max": 26, "threshold": 21, "interpret": {"low": "Score ≥ 21 → LOW RISK of medical complications — a candidate for outpatient management if clinical + psychosocial/logistic criteria are also met. Serious complications still occur in ≤ 11% of low-risk patients.", "high": "Score < 21 → HIGH RISK — manage as an inpatient with IV empiric therapy."}}, "framework": {"primary_source": "Taplitz RA, et al. Outpatient Management of Fever and Neutropenia in Adults Treated for Malignancy: ASCO/IDSA CPG Update. J Clin Oncol 2018;36(14):1443-1453. DOI 10.1200/JCO.2017.77.6211.", "definitions": [{"term": "Fever", "val": "Single oral temperature ≥ 38.3°C (101°F), or ≥ 38.0°C (100.4°F) sustained over 1 hour."}, {"term": "Neutropenia", "val": "ANC < 1,000/µL (< 1.0 × 10⁹/L)."}, {"term": "Severe neutropenia", "val": "ANC < 500/µL (< 0.5 × 10⁹/L)."}, {"term": "Profound neutropenia", "val": "ANC < 100/µL (< 0.1 × 10⁹/L)."}, {"term": "Protracted", "val": "Neutropenia lasting ≥ 7 days."}], "urgency": "Assess within 15 min of triage; give the first dose of empirical antibiotics within 1 hour of triage. FN is an oncologic emergency — major-complication rate ≈ 25–30%, mortality up to 11%.", "urgency_loc": "ASCO Rec 1.1g–h · strong (empiric antibiotics)", "workup_title": "Initial workup — ASCO Rec 1.1", "workup": ["History + physical to identify infectious foci", "CBC + differential, Hgb, platelets; electrolytes; creatinine, BUN, lactate; LFTs (bilirubin, ALP, transaminases)", "≥ 2 sets of blood cultures from different sites (peripheral + one CVC lumen if present)", "Cultures from other sites (urine, respiratory, CSF, stool, wounds) as indicated", "Chest imaging if lower-respiratory signs/symptoms", "Nasopharyngeal swab for influenza (± expanded viral panel in heme malignancy/HSCT)"], "psychosocial_title": "Psychosocial + logistic requirements for outpatient care — ASCO Rec 3.1", "psychosocial": ["Residence ≤ 1 hour or ≤ 30 miles (48 km) from clinic/hospital", "Primary care physician or oncologist agrees to outpatient management", "Able to comply with frequent clinic visits", "Family member/caregiver at home 24 h/day", "Access to a telephone and transportation 24 h/day", "No history of noncompliance with treatment protocols"], "exclude_title": "Exclude from outpatient care even if MASCC ≥ 21 — ASCO Table 1", "exclude": [{"cat": "Cardiovascular", "items": "Presyncope/syncope · accelerated hypertension · new/worsening hypotension · uncontrolled heart failure, arrhythmia, or angina · clinically relevant bleeding · pericardial effusion"}, {"cat": "Hematologic", "items": "Platelets < 10,000/µL · Hb < 7 g/dL or Hct < 21% · ANC < 100/µL expected ≥ 7 days · DVT or PE"}, {"cat": "Gastrointestinal", "items": "Unable to swallow oral meds · new/worsening diarrhea · melena, hematochezia, or hematemesis · abdominal pain · ascites"}, {"cat": "Hepatic", "items": "Aminotransferases > 5× ULN or worsening · bilirubin > 2.0 mg/dL or clinically relevant increase"}, {"cat": "Infectious", "items": "Clear anatomic site of infection (pneumonia, cellulitis, abdominal, abnormal imaging/cultures) · severe sepsis · antimicrobial allergy · antibiotics ≤ 72 h before presentation · intravascular catheter infection"}, {"cat": "Neurologic", "items": "Altered mental status/sensorium or seizures · CNS infection or noninfectious meningitis · spinal cord compression · new/worsening neurologic deficit"}, {"cat": "Pulmonary/Thorax", "items": "Tachypnea or hypopnea · hypoxemia, hypercarbia · pneumothorax or pleural effusion · cavitary lung nodule or active intrathoracic process"}, {"cat": "Renal", "items": "CrCl ≤ 30 mL/min, oliguria, or worsening renal function · new gross hematuria · urinary obstruction or nephrolithiasis · clinically relevant dehydration · electrolyte abnormalities, acidosis, or alkalosis needing intervention"}, {"cat": "Other comorbidity", "items": "Major organ dysfunction or clinical worsening · physically/medically frail · pregnant or nursing · need for IV pain control · fractures, injuries, or need for emergent radiation"}], "exclude_note": "Not a comprehensive list — does not replace clinical judgment. (ASCO Table 1)", "empiric": {"outpatient_title": "Outpatient (low-risk) oral empiric therapy — ASCO Rec 5.1", "outpatient": "Oral fluoroquinolone (ciprofloxacin OR levofloxacin) PLUS amoxicillin/clavulanate — or PLUS clindamycin if penicillin-allergic.", "outpatient_caveats": ["Do NOT use this regimen if fluoroquinolone prophylaxis was already used before the fever.", "Fluoroquinolone monotherapy is NOT recommended as initial outpatient therapy.", "In settings of high ESBL / fluoroquinolone resistance → admit + carbapenem.", "First dose in clinic/ED/hospital after cultures drawn; observe ≥ 4 hours before discharge (Rec 4.1)."], "inpatient_title": "Inpatient (high-risk) IV empiric therapy — ASCO Rec 1.1h (IDSA)", "inpatient": "Monotherapy with an antipseudomonal β-lactam — cefepime, a carbapenem (meropenem or imipenem-cilastatin), or piperacillin-tazobactam.", "inpatient_caveats": ["Vancomycin is NOT part of the standard initial regimen — add only for suspected catheter/skin-soft-tissue infection, pneumonia, or hemodynamic instability.", "Do not routinely add an aminoglycoside or a gram-positive-targeted agent — no outcome benefit, more toxicity.", "Escalate for resistant organisms: MRSA → vancomycin/linezolid/daptomycin · VRE → linezolid/daptomycin · ESBL → carbapenem · KPC → newer β-lactam / polymyxin.", "Deeper inpatient/ID management is out of scope — see the Acute module / local ID guidance."]}, "reeval_title": "Persistent fever — ASCO Rec 6.1", "reeval": "Low-risk outpatients who do NOT defervesce after 2–3 days of empiric therapy → re-evaluate for a new/progressing infection site and consider hospitalization. Also admit for: fever recurrence, new signs/symptoms, oral meds no longer tolerated, regimen change needed, presentation cultures turning positive, or a resistant species.", "cisne_note": "CISNE (Clinical Index of Stable Febrile Neutropenia) is a second validated score (Rec 2.2) for solid-tumor patients on mild-to-moderate chemo who appear clinically stable; it reclassifies some MASCC low-risk patients as higher risk. Not offered as a calculator here — MASCC is the ASCO-endorsed tool."}, "prophylaxis": {"indication_source": "Taplitz RA, et al. Antimicrobial Prophylaxis for Adult Patients With Cancer-Related Immunosuppression: ASCO/IDSA CPG Update. J Clin Oncol 2018;36(30):3043-3054. DOI 10.1200/JCO.18.00374.", "dose_source": "Doses per NCCN Guidelines, Prevention and Treatment of Cancer-Related Infections, Version 1.2026 (03/11/2026), FEV-A/B/C + INF-6 (facts-with-attribution).", "intro": "Prophylaxis is for HIGH-RISK patients — those expected to have profound, protracted neutropenia (ANC < 100/µL for ≥ 7 days), e.g. most AML/MDS or HSCT with myeloablative conditioning. NOT routine for solid tumors. Generally not indicated when G-CSF effectively shortens the neutropenic period.", "classes": [{"id": "antibacterial", "title": "Antibacterial — fluoroquinolone", "indication": "High risk of FN or profound, protracted neutropenia (most AML/MDS or myeloablative HSCT). NOT routine for solid tumors; may be considered for solid tumor/lymphoma expecting profound neutropenia ≥ 7 days when G-CSF is not given.", "loc": "ASCO Rec 1.2 · high evidence, moderate", "agents": [{"drug": "Levofloxacin", "dose": "500–750 mg PO or IV daily"}, {"drug": "Ciprofloxacin", "dose": "500–750 mg PO q12h (or 400 mg IV q8–12h)"}], "caveats": ["FDA 2016 warning: fluoroquinolones cause disabling tendon/muscle/joint/nerve/CNS effects — reserve deliberately.", "Selects for C. difficile, enterococci, and FQ-resistant/ESBL gram-negatives; rising resistance limits utility.", "Cefpodoxime is an alternative if FQ-intolerant/allergic."]}, {"id": "pjp", "title": "Pneumocystis jirovecii (PJP)", "indication": "Regimens with > 3.5% PJP-pneumonia risk — e.g. prednisone-equivalent ≥ 20 mg daily for ≥ 1 month, or purine-analog therapy. Also consider with prolonged corticosteroids (> 20 mg/day for > 4 weeks) used to treat irAEs.", "loc": "ASCO Rec 2.2 · high evidence, strong", "agents": [{"drug": "TMP-SMX (preferred)", "dose": "1 single-strength daily OR 1 double-strength 3×/week"}, {"drug": "If TMP-SMX-intolerant", "dose": "Dapsone (check G6PD first), atovaquone, or pentamidine (aerosolized or IV)"}], "caveats": ["TMP-SMX also covers Toxoplasma, Nocardia, Listeria; monitor for renal impairment, myelosuppression, hyperkalemia; interacts with methotrexate.", "Continue PJP prophylaxis until recovery from lymphocytopenia. (NCCN INF-6)"]}, {"id": "antifungal", "title": "Antifungal — triazole or echinocandin", "indication": "At risk for profound, protracted neutropenia (most AML/MDS or HSCT), especially with grade III–IV mucositis. NOT routine for solid tumors. Mold-active agent where invasive aspergillosis risk > 6%; candidiasis risk > 10% → triazole/echinocandin.", "loc": "ASCO Rec 2.1 · intermediate evidence, moderate", "agents": [{"drug": "Fluconazole", "dose": "400 mg PO/IV daily — yeast only, NO mold activity"}, {"drug": "Posaconazole (mold-active)", "dose": "300 mg DR tablet PO BID day 1 → 300 mg PO/IV daily"}, {"drug": "Micafungin (echinocandin)", "dose": "parenteral mold/yeast alternative"}], "caveats": ["Fluconazole covers yeast but NOT mold — use a mold-active azole (posaconazole, voriconazole, isavuconazole) or echinocandin where aspergillosis risk is high.", "Late post-allogeneic SCT / GVHD → consider a mold-active agent (e.g. posaconazole).", "Azoles have major CYP drug interactions and QTc effects — review carefully."]}, {"id": "antiviral", "title": "Antiviral (HSV / HBV)", "indication": "HSV-seropositive patients undergoing allogeneic HSCT or leukemia induction → nucleoside analog. Patients at high risk of HBV reactivation → nucleoside reverse-transcriptase inhibitor.", "loc": "ASCO Rec 3.1 (HSV, strong) · Rec 3.2 (HBV, moderate)", "agents": [{"drug": "Acyclovir (HSV/VZV)", "dose": "400–800 mg PO BID"}, {"drug": "Valacyclovir (HSV/VZV)", "dose": "500 mg PO BID (preferred over oral acyclovir for VZV)"}, {"drug": "HBV reactivation", "dose": "Entecavir or tenofovir (per HBV screening guidance)"}], "caveats": ["Yearly inactivated influenza vaccine for all chemo patients + household/HCWs (> 65 y → high-dose). (Rec 3.3)"]}], "precautions_title": "Precautions — ASCO Rec 4.1–4.2", "precautions": ["Hand hygiene + respiratory/cough etiquette for all health-care workers (strong).", "Neutropenic outpatients should avoid high airborne-fungal-spore environments (construction/demolition, gardening/soil, renovation) (strong).", "NOT recommended (no benefit): neutropenic diet, protected environments, surgical masks, footwear exchange, nutritional supplements."]}, "ctcae": [{"term": "Neutrophil count decreased", "term_id": "s11-neutrophil-count-decreased", "calc": true}, {"term": "White blood cell decreased", "term_id": "s11-white-blood-cell-decreased", "calc": true}, {"term": "Fever", "term_id": "s6-fever", "calc": false}, {"term": "Sepsis", "term_id": "s9-sepsis", "calc": false}]}, "anaemia": {"elig": {"source": "Bohlius J, et al. Management of Cancer-Associated Anemia With ESAs: ASCO/ASH Clinical Practice Guideline Update. J Clin Oncol 2019;37(15):1336-1351. DOI 10.1200/JCO.18.02142 (Recs 1.1, 1.2, 2.1, 2.2, 6).", "loc": "gates 1–3 ASCO/ASH Rec 1.1; counselling Rec 6 · NCCN ANEM-3", "gates": [{"id": "cia", "label": "Anaemia is chemotherapy-induced — on myelosuppressive chemotherapy, no other identifiable/treatable cause"}, {"id": "palliative", "label": "Cancer treatment is non-curative (palliative) in intent"}, {"id": "hb", "label": "Haemoglobin has declined to < 10 g/dL"}, {"id": "counsel", "label": "Thromboembolism and mortality / tumour-progression risks discussed (shared decision)"}], "eligible": "All criteria met → an ESA MAY be offered (ESA or RBC transfusion, by patient preference). Use FDA-label dosing, correct iron, and target the lowest Hb that avoids transfusion (do not exceed 12 g/dL).", "ineligible": "One or more criteria not met → an ESA is NOT indicated. Evaluate and treat reversible causes, correct iron deficiency, and use RBC transfusion for symptomatic or high-risk anaemia.", "do_not_use_title": "ESAs are NOT recommended in", "do_not_use": ["Curative-intent chemotherapy — e.g. early-stage breast cancer, Hodgkin lymphoma, non-Hodgkin lymphomas, testicular cancer, early-stage NSCLC, and small cell lung cancer (ASCO Rec 1.2; NCCN ANEM-3).", "Anaemia NOT caused by chemotherapy (ASCO Rec 2.1) — except lower-risk MDS (see below).", "Patients not receiving cancer therapy, or receiving non-myelosuppressive therapy (NCCN ANEM-3).", "Outside the chemotherapy treatment period — discontinue by ~6 weeks after chemotherapy completion (NCCN ANEM-A)."], "mds_exception": "Exception — lower-risk myelodysplastic syndromes with serum erythropoietin ≤ 500 IU/L: an ESA may be offered even without concurrent chemotherapy (ASCO/ASH Rec 2.2). Detailed MDS management is out of scope — see the NCCN MDS guideline."}, "framework": {"primary_source": "Decision framework: Bohlius J, et al. ASCO/ASH ESA Guideline Update. J Clin Oncol 2019;37(15):1336-1351. DOI 10.1200/JCO.18.02142.", "dose_source": "Evaluation, iron-deficiency thresholds, ESA dosing/titration & safety figures per NCCN Guidelines, Hematopoietic Growth Factors, Version 3.2026 (12/05/25), ANEM-1…ANEM-B (facts-with-attribution). Render-verified 2026-07-16.", "transfusion_source": "Transfusion threshold: Carson JL, et al. Red Blood Cell Transfusion: 2023 AABB International Guidelines. JAMA 2023;330(19):1892-1902. DOI 10.1001/jama.2023.12914 (Rec 2 for haematologic/oncologic patients; Rec 1 for the cardiovascular-disease threshold).", "evaluate_title": "Evaluate — confirm chemotherapy-induced anaemia", "trigger": "Evaluate when Hb ≤ 11 g/dL or ≥ 2 g/dL below baseline. (NCCN ANEM-1)", "workup": ["First: reticulocyte count (corrected for degree of anaemia) + MCV", "Haemorrhage — consider upper/lower endoscopy", "Haemolysis — direct antiglobulin test, DIC panel, haptoglobin, indirect bilirubin, LDH", "Nutritional — iron panel (serum iron, TIBC, ferritin), B₁₂, folate", "Renal dysfunction — GFR < 60 mL/min/1.73 m²", "Cancer treatment / drug-induced myelosuppression; hormone dysfunction (thyroid, adrenal, hypogonadism)", "Anaemia of chronic inflammation (CRP, ESR); inherited causes; secondary myeloid disorders / CCUS"], "evaluate_note": "An ESA is only appropriate once the anaemia is confirmed chemotherapy-induced and reversible causes are treated (ASCO Rec 4). Chronic inflammation, and recent oral iron or non-fasting sampling, can falsely elevate ferritin and TSAT — fasting is preferred. (NCCN ANEM-1)", "iron_title": "Iron — assess and correct before/with an ESA", "iron_studies": "Iron panel: serum iron, TIBC, serum ferritin (+ transferrin saturation, TSAT). If ferritin and TSAT are discordant, the low ferritin takes precedence. IV iron is more effective than oral and improves Hb response / reduces transfusion when given with an ESA. (NCCN ANEM-4)", "iron_rows": [{"status": "Absolute iron deficiency", "criteria": "Ferritin < 30 ng/mL AND TSAT < 20%", "action": "IV or oral iron; if no Hb rise by 4 weeks, treat as functional deficiency", "band": "def"}, {"status": "Functional iron deficiency (on ESA)", "criteria": "Ferritin 30–500 ng/mL AND TSAT < 50%", "action": "IV iron together with the ESA", "band": "func"}, {"status": "Possible functional deficiency", "criteria": "Ferritin > 500–800 ng/mL AND TSAT < 50%", "action": "Usually no iron; consider IV iron for select patients (individualise)", "band": "poss"}, {"status": "No iron deficiency", "criteria": "Ferritin > 800 ng/mL OR TSAT ≥ 50%", "action": "No iron supplementation needed", "band": "none"}], "esa_title": "ESA protocol — agents, dosing & titration", "esa_agents": [{"drug": "Epoetin alfa (incl. biosimilar epoetin alfa-epbx)", "dose": "150 units/kg SC 3×/week → 300 units/kg 3×/week; OR 40,000 units SC weekly → 60,000 units weekly"}, {"drug": "Darbepoetin alfa", "dose": "2.25 µg/kg SC weekly → up to 4.5 µg/kg weekly; OR 500 µg SC every 3 weeks (300 µg = equivalent for initial dosing)"}], "esa_alt": ["Darbepoetin alfa fixed dose — 100 µg weekly, 200 µg every 2 weeks, or 300 µg every 3 weeks", "Epoetin alfa — 80,000 units every 2 weeks or 120,000 units every 3 weeks"], "esa_agents_note": "Epoetin alfa, epoetin beta, darbepoetin alfa, and biosimilar epoetin alfa are considered equivalent in efficacy and safety (ASCO Rec 5). All given subcutaneously. The escalation dose is for no response after the initial 4 weeks (epoetin) / 6 weeks (darbepoetin).", "esa_target": "Target the lowest Hb sufficient to avoid RBC transfusion — do NOT exceed 12 g/dL. If Hb reaches the transfusion-avoidance level or rises > 1 g/dL in any 2-week period, reduce the dose by 25% (epoetin alfa) or 40% (darbepoetin alfa). (ASCO Rec 8; NCCN ANEM-A)", "esa_stop": "No response = Hb rise < 1 g/dL and still < 10 g/dL after 4 weeks (epoetin) or 6 weeks (darbepoetin) → discontinue after 8 weeks. Also discontinue once chemotherapy ends — do not continue outside the treatment period. (ASCO Rec 9; NCCN ANEM-A)", "transfusion_title": "RBC transfusion — alternative to, or adjunct with, an ESA", "transfusion_threshold": "Restrictive strategy: for hospitalised adults with haematologic/oncologic disorders, transfuse when Hb < 7 g/dL (AABB 2023 Rec 2); use an 8 g/dL threshold if there is pre-existing cardiovascular disease (AABB 2023 Rec 1).", "transfusion_indications": ["Symptomatic (physiologic): sustained tachycardia, tachypnoea, chest pain, dyspnoea on exertion, lightheadedness, syncope, or severe fatigue preventing usual activity → transfuse per AABB.", "High risk (progressive Hb decline with recent intensive chemo/RT), or asymptomatic with cardiac, chronic pulmonary, or cerebrovascular disease → consider transfusion per AABB.", "Asymptomatic without significant comorbidities → observe with periodic re-evaluation. (NCCN ANEM-2)"], "safety_title": "ESA safety — weigh against transfusion, counsel every patient", "safety": ["Thromboembolism ↑ — relative risk of thrombosis +48% to +69%; absolute VTE 7.5% (ESA) vs 4.9% (control). Evaluate risk factors: prior thromboembolism, heritable thrombophilia/hypercoagulability, elevated pre-chemo platelets, hypertension, steroids, prolonged immobilisation, recent surgery, IMiD-based myeloma therapy, hormonal agents. (NCCN ANEM-A; ASCO Rec 6)", "Survival / tumour progression — decreased survival when targeting Hb > 12 g/dL; the risk is not fully excluded even below 12 g/dL. Do not use outside the chemo treatment period or in patients not on chemotherapy. Possibly deleterious in metastatic breast cancer.", "Hypertension — control blood pressure before starting and monitor during treatment.", "Pure red cell aplasia (anti-EPO neutralising antibodies) — rare; suspect if a prior response to the ESA is lost, and report to the FDA.", "FDA boxed warning — ESAs are not indicated when the anticipated chemotherapy outcome is cure."]}, "iron": {"source": "Parenteral iron doses per NCCN Guidelines, Hematopoietic Growth Factors, Version 3.2026 (12/05/25), ANEM-B (facts-with-attribution). Render-verified 2026-07-16.", "intro": "IV iron (more effective than oral) improves Hb response and reduces transfusion when given with an ESA — 5 of 6 trials showed benefit in absolute or functional iron deficiency. Choose an agent by dose target and availability; total course ≈ 1000–1500 mg.", "agents": [{"drug": "Ferric carboxymaltose", "dose": "750 mg IV (≥ 50 kg) ×2 doses ≥ 7 days apart, total 1500 mg; or 15 mg/kg IV (< 50 kg), max 1500 mg", "caveat": "Severe hypophosphataemia — check phosphorus 5–10 days after dosing"}, {"drug": "Ferric derisomaltose", "dose": "1000 mg IV over ≥ 20 min, single dose (≥ 50 kg); or 20 mg/kg over ≥ 20 min (< 50 kg), max 1000 mg", "caveat": ""}, {"drug": "Ferric gluconate", "dose": "125 mg IV over 60 min, once weekly × 8 doses (total 1000 mg); individual doses > 125 mg not recommended", "caveat": ""}, {"drug": "Ferumoxytol (select cases)", "dose": "510 mg IV over 15 min ×2 doses 3–8 days apart (total 1020 mg); or 1020 mg IV single dose over 15–30 min", "caveat": "For iron-deficiency anaemia if oral-iron intolerant/unresponsive or CKD; not prospectively studied in CIA; may interfere with MRI"}, {"drug": "Iron sucrose", "dose": "1000 mg total treatment course (various schedules — see prescribing information)", "caveat": ""}, {"drug": "Low-molecular-weight iron dextran", "dose": "Per prescribing information; test dose per institutional practice; IV (IM not recommended)", "caveat": "Adverse effects may be delayed 24–48 hours"}], "caveats": ["Common IV-iron adverse effects: hypotension/hypertension, nausea, vomiting, diarrhoea, pain, fever, dyspnoea, pruritus, headache, dizziness.", "Premedication is NOT routine — reserve for a history of allergy to more than one drug, allergic diathesis/asthma, or inflammatory arthritis; give it before any test dose."]}, "ctcae": [{"term": "Anemia", "term_id": "s0-anemia", "calc": true}]}, "diarrhoea": {"triage": {"source": "Bossi P, et al. Diarrhoea in adult cancer patients: ESMO Clinical Practice Guidelines. Ann Oncol 2018;29(Suppl 4):iv126-iv142. DOI 10.1093/annonc/mdy145 (Table 1 warning signs; Table 10 general principles).", "loc": "ESMO 2018 Table 1 + Table 10 general principles [V, A]", "intro": "Grade the diarrhoea by CTCAE (increase in stools/day over baseline), then check for warning signs. ANY warning sign — or grade 3–4 diarrhoea — makes the course COMPLICATED and warrants admission and intensive treatment.", "flags": [{"id": "g34", "label": "Grade 3–4 diarrhoea (≥ 7 stools/day over baseline, incontinence, or need for hospitalisation)"}, {"id": "fever", "label": "Fever, sepsis or neutropaenic sepsis"}, {"id": "neutropenia", "label": "Neutropaenia"}, {"id": "dehydration", "label": "Dehydration — orthostasis, reduced urine output, or renal impairment"}, {"id": "cramps", "label": "Moderate–severe abdominal cramping (especially not relieved by loperamide)"}, {"id": "nv", "label": "Persistent nausea / vomiting (≥ grade 2), or inability to eat"}, {"id": "blood", "label": "Frank blood in the stool"}, {"id": "ps", "label": "Diminished performance status, or a previous admission for diarrhoea"}], "uncomplicated": "UNCOMPLICATED (grade 1–2, no warning signs) — manage as an outpatient: oral hydration + loperamide and dietary measures; reassess in 12–24 h. (ESMO Table 10 [V, A])", "complicated": "COMPLICATED — admit, give IV fluids/electrolytes, send a stool work-up including Clostridioides difficile, hold the offending drug, and treat intensively (± octreotide, consider empiric antibiotics); involve gastroenterology. (ESMO Table 10 [V, A])"}, "framework": {"primary_source": "Decision framework & doses: Bossi P, et al. Diarrhoea in adult cancer patients: ESMO Clinical Practice Guidelines. Ann Oncol 2018;29(Suppl 4):iv126-iv142. DOI 10.1093/annonc/mdy145 (Tables 1, 2, 10).", "label_source": "Agent-specific special-situation regimens (irinotecan, neratinib) from the current FDA prescribing information — see the Special situations section.", "assess_title": "Assess — grade, then triage uncomplicated vs complicated", "grade_note": "Grade by CTCAE Diarrhea (increase in stools/day over baseline; account for a stoma). Take a history: onset relative to the drug, culprit agent, stool frequency/consistency, blood, fever, oral intake. (ESMO Fig 1)", "uncomplicated_def": "Uncomplicated = grade 1–2 with no complicating signs → conservative outpatient management. (ESMO Table 10 [V, A])", "complicated_def": "Complicated = grade 3–4, OR grade 1–2 with any warning sign (moderate–severe cramping, nausea/vomiting, diminished performance status, fever, sepsis, neutropaenia, bleeding, dehydration) → hospitalise, evaluate, monitor closely, treat intensively; involve gastroenterology. (ESMO Table 10 [V, A])", "workup": ["WBC + differential — neutropaenia (febrile-neutropaenia risk) / leukocytosis (infection)", "Haemoglobin — blood loss / marrow; haemoconcentration", "Potassium, sodium, calcium, magnesium — electrolyte disturbance", "Creatinine, urea — renal impairment", "CRP, procalcitonin — infection / inflammation", "Blood gases + lactate — acidosis (→ intensive care)", "Stool studies incl. Clostridioides difficile (also Salmonella, Campylobacter) — infective causes", "TSH / ACTH — rare endocrine causes (hyperthyroidism, hypoadrenalism)"], "first_line_title": "First-line — uncomplicated diarrhoea", "loperamide": "Loperamide — 4 mg initially, then 2 mg every 2–4 h or after every unformed stool; maximum 16 mg/day. (ESMO Table 10 [II, B])", "diet": ["Avoid spices, coffee, alcohol; reduce insoluble-fibre intake. (ESMO [V, C])", "Avoid milk and dairy — except yogurt and firm cheeses — during the diarrhoea. (ESMO [V, C])", "Small, frequent meals; oral rehydration solution between meals."], "rehydration": "Oral rehydration therapy for mild diarrhoea; an oral rehydration solution (WHO or commercial) for more severe disease. (ESMO [I–II, A])", "reassess": "Reassess at 12–24 h. If diarrhoea persists beyond 24–48 h on loperamide, or any warning sign develops, treat as complicated / refractory.", "refractory_title": "Refractory or complicated diarrhoea", "fluids": "IV fluids/electrolytes — rate must exceed ongoing losses (urine output + insensible ~30–50 mL/h + GI losses). If tachycardic/potentially septic, give an initial 20 mL/kg bolus; target urine output > 0.5 mL/kg/h. (ESMO Table 10 [I, A]) Oliguric AKI despite resuscitation → urgent intensive-care/nephrology input. (ESMO [V, B])", "octreotide": "Octreotide — for diarrhoea refractory to loperamide or with severe toxicity: 100–150 µg s.c./i.v. three times daily, titrated up to 500 µg s.c./i.v. tid, or 25–50 µg/h by continuous i.v. infusion. (ESMO Table 10 [IV–V, B])", "second_line": ["Other opioids — tincture of opium, morphine, or codeine — may be used. (ESMO [V, C])", "Oral budesonide — an option for ChT-induced diarrhoea refractory to loperamide (ESMO [IV, C]); prophylactic budesonide is not recommended (ESMO [II, B]).", "Bile-acid sequestrants (cholestyramine, colestipol, colesevelam) — adjuvant for bile-salt malabsorption. (ESMO [III, B])"], "antibiotics": "Consider empiric antibiotics (e.g. a fluoroquinolone) for complicated diarrhoea — fever, neutropaenia, or a positive/suspected infective work-up — after sending stool studies. Treat confirmed Clostridioides difficile per local infectious-disease guidance.", "typhlitis_title": "Neutropaenic enterocolitis (typhlitis) — a distinct emergency", "typhlitis": ["Medical first line: broad-spectrum antibiotics covering gram-negatives, gram-positives and anaerobes (e.g. piperacillin-tazobactam or imipenem-cilastatin, or cefepime/ceftazidime + metronidazole), plus G-CSF, nasogastric decompression, IV fluids, bowel rest, and serial abdominal examinations. Add amphotericin if no response (fungaemia is common). (ESMO [V, A])", "AVOID anticholinergic, antidiarrhoeal and opioid agents — they may aggravate ileus. (ESMO [V, A])", "Surgery for persistent GI bleeding, perforation, abscess, or clinical deterioration. (ESMO [V, A])"], "safety_title": "Safety — when NOT to reach for loperamide", "safety": ["Immune-checkpoint-inhibitor colitis is managed differently — hold the ICI and give corticosteroids; loperamide/opioids are avoided in grade 3–4. Rule it out before treating diarrhoea as ordinary CID. (see the irAE lens → Colitis; ESMO Table 10)", "Neutropaenic enterocolitis — anti-motility and anticholinergic agents are contraindicated (ileus risk). (ESMO [V, A])", "High-dose (irinotecan) loperamide — the 2 mg-every-2-h regimen is time-limited: not more than 48 consecutive hours, because of paralytic-ileus risk. (irinotecan label)", "Always exclude Clostridioides difficile and other infective causes before escalating anti-motility drugs, especially with fever, neutropaenia, or recent antibiotics. (ESMO Fig 2)"]}, "special": {"source": "Drug-specific regimens from the current FDA prescribing information (irinotecan, neratinib) and ESMO 2018 (fluoropyrimidines, infective, ICI). Each item is attributed.", "intro": "Some agents cause diarrhoea by a distinct mechanism or need a specific antidote or prophylaxis — these override the generic ladder above.", "items": [{"agent": "Irinotecan", "detail": "Two patterns. EARLY / cholinergic (during or ≤ 24 h of infusion — cramping, diaphoresis, salivation, lacrimation): atropine 0.25–1 mg IV or SC, prophylactic or therapeutic (unless contraindicated). LATE (> 24 h; median onset ~day 5): high-dose loperamide — 4 mg at first onset, then 2 mg every 2 h until diarrhoea-free for ≥ 12 h (4 mg every 4 h overnight); do NOT exceed 48 consecutive hours (ileus).", "src": "irinotecan FDA label (boxed warning; Warnings 5.1)"}, {"agent": "Neratinib", "detail": "Diarrhoea is near-universal without prophylaxis (grade 3 in ~40%). Give mandatory loperamide prophylaxis from the first dose for 56 days: 4 mg three times daily (days 1–14), 4 mg twice daily (days 15–56), then 4 mg as needed (≤ 16 mg/day, titrate to 1–2 stools/day). A 2-week neratinib dose escalation is an alternative (grade ≥3 diarrhoea ~13%). Send stool cultures for grade 3–4 or complicated diarrhoea.", "src": "neratinib (NERLYNX) FDA label, Table 1"}, {"agent": "EGFR / HER2 TKIs & other targeted agents", "detail": "Very common with EGFR/HER2 tyrosine-kinase inhibitors (afatinib 87–95% any grade, 14–22% grade 3–4; lapatinib); pertuzumab (a HER2 antibody), abemaciclib (a CDK4/6 inhibitor) and others also cause frequent diarrhoea. Manage with prompt loperamide + dietary measures and drug dose-modification; no drug-specific prophylaxis regimen is mandated (unlike neratinib).", "src": "ESMO 2018 Table 5"}, {"agent": "Fluoropyrimidines (5-FU, capecitabine)", "detail": "Early, severe or life-threatening toxicity — including diarrhoea — within 96 h of 5-FU or capecitabine (including in DPD deficiency): uridine triacetate 10 g orally every 6 h for 20 doses, as an emergency antidote alongside supportive care.", "src": "ESMO 2018 Table 10 [II, B]"}, {"agent": "Clostridioides difficile / infective", "detail": "Test stool for C. difficile (and Salmonella, Campylobacter) — especially with fever, neutropaenia, or recent antibiotics. Confirmed C. difficile is treated per local infectious-disease guidance; do not miss it before escalating anti-motility drugs.", "src": "ESMO 2018 Fig 2"}, {"agent": "Immune-checkpoint-inhibitor colitis", "detail": "NOT ordinary CID — hold the ICI and give corticosteroids; loperamide/opioids are avoided in grade 3–4, and infliximab/vedolizumab are used if refractory. Managed in the irAE lens (Colitis) — cross-check there before treating as chemo-induced diarrhoea.", "src": "ESMO 2018 Table 10 · irAE lens (Colitis)"}]}, "ctcae": [{"term": "Diarrhea", "term_id": "s5-diarrhea", "calc": false}]}, "mucositis": {"settings": {"source": "Elad S, et al. MASCC/ISOO clinical practice guidelines for the management of mucositis secondary to cancer therapy. Cancer 2020;126(19):4423-4431. DOI 10.1002/cncr.33100 (PMC7540329). Palifermin schedule: Kepivance FDA label.", "loc": "MASCC/ISOO 2020 — setting-specific recommendations (strength · level of evidence)", "intro": "Pick the treatment setting → the MASCC/ISOO interventions recommended for THAT setting, each tagged with its recommendation strength. Every patient also receives basic oral care (below); these measures sit on top of it.", "options": [{"id": "melphalan", "setting": "High-dose melphalan — autologous HSCT", "recs": [{"iv": "Oral cryotherapy — ice chips held in the mouth around the melphalan infusion", "str": "Recommendation", "loe": "II"}, {"iv": "Photobiomodulation (intraoral low-level laser) — per a validated protocol", "str": "Recommendation", "loe": "I"}]}, {"id": "hsct_tbi", "setting": "Autologous HSCT — high-dose chemo + TBI (haematologic)", "recs": [{"iv": "Palifermin — 60 µg/kg/day IV bolus ×3 days before + ×3 days after conditioning (6 doses); not with melphalan 200 mg/m²", "str": "Recommendation", "loe": "I"}, {"iv": "Photobiomodulation (intraoral low-level laser) — per a validated protocol", "str": "Recommendation", "loe": "I"}]}, {"id": "hn_rt", "setting": "Head & neck RT alone (moderate-dose, < 50 Gy, no chemo)", "recs": [{"iv": "Benzydamine 0.15% mouthwash", "str": "Recommendation", "loe": "I"}, {"iv": "Photobiomodulation (intraoral low-level laser) — per a validated protocol", "str": "Recommendation", "loe": "II"}]}, {"id": "hn_crt", "setting": "Head & neck chemoradiation (concurrent RT-CT)", "recs": [{"iv": "Photobiomodulation (intraoral low-level laser) — per a validated protocol", "str": "Recommendation", "loe": "I"}, {"iv": "Benzydamine 0.15% mouthwash", "str": "Suggestion", "loe": "II"}, {"iv": "Topical morphine 0.2% mouthwash — for established OM pain", "str": "Suggestion", "loe": "III"}]}, {"id": "bolus_5fu", "setting": "Bolus 5-fluorouracil chemotherapy", "recs": [{"iv": "Oral cryotherapy — ice chips ~30 min during the 5-FU bolus", "str": "Recommendation", "loe": "II"}]}, {"id": "other_chemo", "setting": "Standard-dose chemotherapy (other regimens)", "recs": [{"iv": "Multiagent basic oral-care protocol — no specific agent carries a further MASCC/ISOO recommendation in this setting", "str": "Suggestion", "loe": "III"}]}]}, "framework": {"primary_source": "Recommendations: Elad S, et al. MASCC/ISOO clinical practice guidelines for the management of mucositis secondary to cancer therapy. Cancer 2020;126(19):4423-4431. DOI 10.1002/cncr.33100 (PMC7540329).", "label_source": "Palifermin schedule: Kepivance FDA label. mTOR-inhibitor stomatitis: everolimus (Afinitor) FDA label + SWISH trial (Rugo HS, et al. Lancet Oncol 2017;18(5):654-662, DOI 10.1016/S1470-2045(17)30109-2).", "assess_title": "Assess — grade the mucositis, flag the high-risk setting", "grade_note": "Grade by CTCAE Mucositis oral (symptom/functional bands). The WHO Oral Toxicity Scale is the classic OM-specific bedside scale — it combines the mucosal appearance with the ability to eat:", "who_scale": ["0 — none", "1 — soreness / erythema, no ulcers", "2 — ulcers, but able to eat solids", "3 — ulcers, requires a liquid diet (cannot eat solids)", "4 — ulcers, oral alimentation not possible (needs enteral / parenteral support)"], "risk_settings": ["HSCT conditioning — high-dose melphalan, TBI, other high-dose regimens", "Head & neck radiotherapy, especially with concurrent chemotherapy", "Mucotoxic chemo — bolus 5-FU, high-dose methotrexate, anthracyclines, taxanes", "mTOR inhibitors (everolimus, temsirolimus) — a distinct aphthous-like stomatitis (see below)"], "boc_title": "Basic oral care — the foundation for every patient", "boc": ["A multiagent oral-care protocol (MASCC/ISOO suggestion for CT, H&N RT and HSCT) — the base on which the setting-specific measures sit.", "Dental evaluation and treatment before cancer therapy; patient education on oral care.", "Continue gentle toothbrushing and interproximal cleaning; do not stop brushing during neutropenia.", "Bland rinses — saline or sodium bicarbonate — for comfort and hygiene.", "Chlorhexidine is NOT recommended to prevent OM in head & neck RT (it does not reduce OM)."], "treat_title": "Treatment of established oral mucositis — pain & support", "pain": ["Topical morphine 0.2% mouthwash — MASCC/ISOO suggestion for OM pain in head & neck RT-CT.", "Systemic opioids for moderate–severe pain, including patient-controlled analgesia (morphine) in the HSCT setting — general supportive-care practice (doxepin mouthwash and transdermal fentanyl are not endorsed by MASCC/ISOO 2020 — no guideline possible).", "Nutrition and hydration support; escalate to enteral/parenteral support when oral intake fails (WHO grade 3–4).", "Look for and treat secondary infection — oral candidiasis, herpes simplex reactivation."], "mtor_title": "mTOR-inhibitor stomatitis — a distinct entity", "mtor": "Everolimus/temsirolimus cause an aphthous-like stomatitis (everolimus: 44–78%, grade 3–4 4–9%, usually within the first 8 weeks) that is NOT classic mucositis. Prevent it: start a dexamethasone alcohol-free oral solution as a swish-and-spit mouthwash when everolimus is started — SWISH regimen: 0.5 mg/5 mL, 10 mL, swish 2 min then spit, four times daily for 8 weeks (no food or drink for ≥ 1 h after); this cut grade ≥ 2 stomatitis to 2% vs 33% without it. Avoid alcohol-, peroxide-, iodine- or thyme-containing products.", "against_title": "What NOT to use — MASCC/ISOO recommends against", "against": ["Sucralfate (combined topical + systemic) — recommendation against for prevention or treatment of OM pain in head & neck RT and solid-cancer chemo.", "Chlorhexidine mouthwash — suggestion against to prevent OM in head & neck RT.", "Antimicrobial lozenges/pastes — PTA (polymyxin/tobramycin/amphotericin B), BCoG (bacitracin/clotrimazole/gentamicin), and iseganan — recommendation against.", "Topical GM-CSF — suggestion against in HSCT.", "Parenteral (IV) glutamine — recommendation against in HSCT (higher relapse/mortality signal in one study).", "Pilocarpine and pentoxifylline — suggestion against; chewing gum — suggestion against in paediatric chemotherapy."]}, "ctcae": [{"term": "Mucositis oral", "term_id": "s5-mucositis-oral", "calc": false}]}, "cipn": {"agents": {"source": "Agent-specific patterns & dose-modification from the FDA prescribing information and the ESMO-EONS-EANO 2020 CIPN guideline (Jordan B, et al. Ann Oncol 2020;31:1306-1319, DOI 10.1016/j.annonc.2020.07.003).", "loc": "FDA labels + ESMO-EONS-EANO 2020", "intro": "Pick the neurotoxic agent → its CIPN pattern and the dose-modification / management approach. Managing the culprit drug is the single most effective lever — no agent prevents CIPN pharmacologically.", "options": [{"id": "oxaliplatin", "agent": "Oxaliplatin", "pattern": "Two syndromes: an ACUTE, cold-triggered sensory neuropathy within hours–2 days (reversible, resolves in ~14 days, recurs each cycle; ~56% of patients) AND a delayed, cumulative sensory neuropathy (grade 3 median onset ~9 cycles adjuvant / ~6 advanced).", "dosemod": "Counsel cold-avoidance (no cold food/drink/air, gloves for the fridge; do NOT apply ice — it worsens the acute syndrome). Persistent grade 2 → reduce the oxaliplatin dose (75 mg/m² adjuvant, 65 mg/m² advanced); persistent grade 3 → discontinue.", "src": "oxaliplatin FDA label; ESMO 2020 Table 5"}, {"id": "cisplatin", "agent": "Cisplatin", "pattern": "Cumulative large-fibre sensory neuropathy; may progress or persist for months after the platinum is stopped (‘coasting’); dose-limiting; also ototoxic.", "dosemod": "Reduce, delay or stop by grade and cumulative dose; warn that neuropathy can worsen after cessation.", "src": "ESMO 2020; cisplatin label"}, {"id": "taxane", "agent": "Paclitaxel / taxane", "pattern": "Length-dependent (stocking-glove) sensory neuropathy, sometimes an acute pain syndrome in the days after infusion; often partially reversible.", "dosemod": "Dose-reduce or delay for grade ≥ 2; consider switching to a less-neurotoxic taxane or reducing dose intensity.", "src": "taxane FDA label; ESMO 2020"}, {"id": "vincristine", "agent": "Vincristine / vinca alkaloid", "pattern": "Dose-related sensorimotor neuropathy with prominent AUTONOMIC features (constipation, ileus); early loss of ankle reflexes.", "dosemod": "Reduce or hold for severe motor/autonomic toxicity. NEVER give intrathecally — it is almost always fatal (boxed warning).", "src": "vincristine FDA label; ESMO 2020"}, {"id": "bortezomib", "agent": "Bortezomib", "pattern": "Predominantly PAINFUL sensory neuropathy (± autonomic); pre-existing neuropathy worsens.", "dosemod": "Give SUBCUTANEOUSLY and/or move to WEEKLY dosing — roughly halves neuropathy (grade ≥2 PN 24% SC vs 39% IV; grade ≥3 6% vs 15%). Grade 1 with pain or grade 2 → reduce; grade 3 → hold, then resume reduced; grade 4 → discontinue.", "src": "bortezomib (Velcade) FDA label"}, {"id": "imid", "agent": "Thalidomide / IMiD", "pattern": "Dose- and duration-dependent sensory neuropathy that may be irreversible.", "dosemod": "Reduce or stop for grade ≥ 2; monitor cumulatively; lenalidomide/pomalidomide are far less neurotoxic than thalidomide.", "src": "ESMO 2020; thalidomide label"}]}, "framework": {"primary_source": "Loprinzi CL, et al. Prevention and Management of CIPN in Survivors of Adult function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hi(s){
 if(!query) return esc(s);
 const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
 return esc(s).replace(re,'<mark>$1</mark>');
}
function ladder(t){
 let h='<div class="ladder">';
 for(const g of ['1','2','3','4','5']){
  const v=t.grades[g];
  h+=`<div class="grow g${g}"><div class="gtag">G${g}</div>`+
     (v?`<div class="gtxt">${hi(v)}</div>`:`<div class="gtxt empty">—</div>`)+`</div>`;
 }
 return h+'</div>';
}
function calcWidget(t){
 if(!t.calc) return '';
 const c=t.calc, multi=c.scales.length>1;
 const pills = multi ? '<div class="calc-scales">'+c.scales.map((s,i)=>
    `<button class="csc${i===0?' on':''}" data-i="${i}">${scaleName(c,s)}</button>`).join('')+'</div>' : '';
 const note = c.note ? `<div class="calc-note">${esc(c.note)}</div>` : '';
 return `<div class="calc" data-tid="${t.id}" data-scale="0">`+
  `<div class="calc-h">Grade calculator · ${esc(c.analyte)}</div>`+
  pills+`<div class="calc-in"></div><div class="calc-out"></div>${note}</div>`;
}
function card(t,open){

  `<div class="body">${def}${calcWidget(t)}${ladder(t)}${nav}</div></details>`;
}
// ---- grade calculator engine (mirrors verify_thresholds.py) ----
const CALCMAP={}; MODEL.socs.forEach(s=>s.terms.forEach(t=>{if(t.calc)CALCMAP[t.id]=t.calc;}));
function gradeScale(sc,v){
 const num=typeof sc.mildRef==='number';
 if(sc.dir==='high'){ if(num&&v<=sc.mildRef)return 0; for(const [e,g] of sc.cuts){if(v<=e)return g;} return sc.top; }
 else{ if(num&&v>=sc.mildRef)return 0; for(const [e,g] of sc.cuts){if(v>=e)return g;} return sc.top; }
}
function scaleName(c,s){ // pill label: unit alone if all scales share a label, else "label · unit"
 const sameLabel=c.scales.every(x=>x.label===c.scales[0].label);
 return sameLabel? esc(s.unit) : esc(s.label+' · '+s.unit);
}
function buildCalcInputs(w){
 const c=CALCMAP[w.dataset.tid], sc=c.scales[+w.dataset.scale||0], inp=w.querySelector('.calc-in');
 if(sc.kind==='ratio'){
  inp.innerHTML=`<input type="number" inputmode="decimal" step="any" data-r="val" placeholder="value">`+
   `<span class="u">÷</span><input type="number" inputmode="decimal" step="any" data-r="uln" placeholder="ULN">`+
   `<span class="u">= <span data-r="ratio">—</span></span>`;
 } else {
  inp.innerHTML=`<input type="number" inputmode="decimal" step="any" data-r="val" placeholder="value">`+
   `<span class="u">${esc(sc.unit)}</span>`;
 }
 computeCalc(w);
}
function computeCalc(w){
 const c=CALCMAP[w.dataset.tid], sc=c.scales[+w.dataset.scale||0], out=w.querySelector('.calc-out');
 const val=parseFloat(w.querySelector('[data-r="val"]').value);
 let v=val, ratioSpan=w.querySelector('[data-r="ratio"]');
 if(sc.kind==='ratio'){
  const uln=parseFloat(w.querySelector('[data-r="uln"]').value);
  if(isNaN(val)||isNaN(uln)||uln<=0){ if(ratioSpan)ratioSpan.textContent='—'; out.innerHTML=''; return; }
  v=val/uln; if(ratioSpan)ratioSpan.textContent=v.toFixed(2)+'× ULN';
 }
 if(isNaN(v)){ out.innerHTML=''; return; }
 const g=gradeScale(sc,v);
 let note='';
 const strRef=(typeof sc.mildRef==='string');
 const mildGrade=sc.cuts[0][1];
 if(g===0){ note='within normal range'; }
 else if(g===mildGrade && strRef){ note=(sc.dir==='high'?'if above ':'if below ')+sc.mildRef+' (otherwise normal)'; }
 if(sc.caveat && sc.caveat[String(g)]){ note=(note?note+' · ':'')+sc.caveat[String(g)]; }
 const label = g===0 ? 'Normal' : 'Grade '+g;
 out.innerHTML=`<span class="gchip c${g}">${label}</span>`+(note?`<span class="cnote">${esc(note)}</span>`:'');
}

// ---- global cross-facet search (CTCAE terms + irAE entities + supportive topics) ----
// A lightweight flat index built once: each item carries its label, a sub-label,
// the owning facet and an anchor id. The masthead #q searches this across all
// facets; clicking a result jumps into the facet at that anchor. The supportive
// cards' own #gcsfq / #aeq lookups are separate feature inputs, untouched by this.
const SEARCH_INDEX=(()=>{
 const idx=[];
 MODEL.socs.forEach(s=>s.terms.forEach(t=>idx.push(
   {facet:'CTCAE', label:t.term, sub:s.short, anchor:t.id,
    hay:(t.term+' '+(t.definition||'')).toLowerCase()})));
 IRAE.forEach(e=>idx.push(
   {facet:'irAE', label:e.name, sub:e.organ, anchor:e.id,
    hay:(e.name+' '+(e.cause||'')+' '+(e.ctcae||[]).map(c=>c.term).join(' ')).toLowerCase()}));
 (SUPP?SUPP.topics:[]).forEach(t=>idx.push(
   {facet:'Supportive', label:t.name, sub:'Supportive care', anchor:t.id,
    hay:t.name.toLowerCase()}));
 return idx;
})();
const SFACETS=[{key:'CTCAE',label:'CTCAE grading'},{key:'irAE',label:'irAE management'},{key:'Supportive',label:'Supportive care'}];

 $('#htitle').textContent='Search';

   ? `${hits.length} match${hits.length===1?'':'es'} across CTCAE, irAE and supportive care — click a result to open it in its section.`
   : '';
 $('#empty').style.display = hits.length?'none':'block';
 if(!hits.length) return;
 const CAP=50; let html='<div class="sresults">';

  const rows=hits.filter(h=>h.facet===f.key); if(!rows.length) return;
  html+=`<section class="sgroup"><div class="sglabel">${esc(f.label)} <span class="sgn">${rows.length}</span></div>`;
  rows.slice(0,CAP).forEach(r=>{
   html+=`<button class="sresult" data-facet="${esc(r.facet)}" data-anchor="${esc(r.anchor)}">`+
     `<span class="srmain"><span class="srname">${hi(r.label)}</span>`+
     (r.sub?`<span class="srsub">${esc(r.sub)}</span>`:'')+`</span>`+
     `<span class="srfacet f-${r.facet.toLowerCase()}">${esc(f.key)}</span></button>`;
  });
  if(rows.length>CAP) html+=`<div class="smore">+${rows.length-CAP} more — refine your search</div>`;
  html+='</section>';

 list.insertAdjacentHTML('beforeend', html);
}

     `<div class="cipnrow"><span class="cipnk">Pattern</span><span>${esc(o.pattern)}</span></div>`+
     `<div class="cipnrow"><span class="cipnk">Dose-mod / management</span><span>${esc(o.dosemod)}</span></div>`+
     `<div class="anaironcav">${esc(o.src)}</div>`;
   const res=$('#cipnRes'); if(res) res.innerHTML=html;
 }
 document.querySelectorAll('#list .mucpill').forEach(b=>{
   b.addEventListener('click',()=>{
     document.querySelectorAll('#list .mucpill').forEach(x=>x.classList.remove('on'));
     b.classList.add('on'); show(+b.dataset.idx);
   });
 });
 show(0);
}

 const who=(F.who_scale||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const risk=(F.risk_settings||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const boc=(F.boc||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const pain=(F.pain||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const against=(F.against||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const pills=(S.options||[]).map((o,i)=>`<button class="mucpill${i===0?' on':''}" data-idx="${i}">${esc(o.setting)}</button>`).join('');
 return `<div class="scard"><div class="shead"><h3 class="sname">Oral mucositis — assess &amp; manage</h3></div>`+
  `<div class="sbody">`+
   `<div class="smeta"><span class="k">Graded by</span> ${ctLinks({ctcae:d.ctcae})}</div>`+
   `<div class="seclabel">1 · ${esc(F.assess_title)}</div>`+
   `<p class="fnplain">${esc(F.grade_note)}</p>`+
   `<ul class="fncav mucwho">${who}</ul>`+
   `<details class="boxwrap"><summary>High-risk settings</summary><ul class="fncav">${risk}</ul></details>`+
   `<div class="seclabel">2 · ${esc(F.boc_title)}</div>`+
   `<div class="sblock trans"><ul>${boc}</ul></div>`+
   `<div class="seclabel">3 · Prevention by treatment setting</div>`+
   `<div class="anaelig"><h4>Setting selector — MASCC/ISOO recommendations</h4>`+
    `<p class="fnhint">${esc(S.intro)} ${esc(S.loc)}.</p>`+
    `<div class="mucpills">${pills}</div>`+
    `<div class="mucres" id="mucRes"></div></div>`+
   `<div class="seclabel">4 · ${esc(F.treat_title)}</div>`+
   `<div class="sblock fnreev"><ul>${pain}</ul></div>`+
   `<div class="seclabel">5 · ${esc(F.mtor_title)}</div>`+
   `<div class="sblock spec"><p class="fnlead" style="margin:0">${esc(F.mtor)}</p></div>`+
   `<div class="seclabel">${esc(F.against_title)}</div>`+
   `<div class="sblock anadnu"><ul>${against}</ul></div>`+
   `<div class="scredit"><b>Recommendations:</b> ${esc(F.primary_source)}<br>`+
    `<b>Doses:</b> ${esc(F.label_source)}</div>`+
  `</div></div>`;
}
function initMucositisCard(d){
 const opts=(d.settings&&d.settings.options)||[];
 function show(idx){
   const o=opts[idx]; if(!o) return;
   const rows=(o.recs||[]).map(r=>{
     const cls = r.str==='Recommendation'?'rec':(r.str==='Suggestion'?'sug':'non');
     const tag = r.str==='—' ? 'Basic oral care' : (r.str+' · LoE '+r.loe);
     return `<div class="mucrow ${cls}"><span class="muctag">${esc(tag)}</span><span>${esc(r.iv)}</span></div>`;
   }).join('');
   const res=$('#mucRes'); if(res) res.innerHTML = `<div class="mucsetlbl">${esc(o.setting)}</div>${rows}`;
 }
 document.querySelectorAll('#list .mucpill').forEach(b=>{
   b.addEventListener('click',()=>{
     document.querySelectorAll('#list .mucpill').forEach(x=>x.classList.remove('on'));
     b.classList.add('on'); show(+b.dataset.idx);
   });
 });
 show(0);
}
function diaChecklist(T){
 const flags=(T.flags||[]).map(f=>
   `<label class="diachk" data-id="${esc(f.id)}"><input type="checkbox"><span class="diabox"></span><span class="anaclbl">${esc(f.label)}</span></label>`).join('');
 return `<div class="anaelig"><h4>Complicated-vs-uncomplicated triage</h4>`+
  `<p class="fnhint">${esc(T.intro)} Check any that apply — <b>any one</b> makes it complicated. ${esc(T.loc)}.</p>`+
  flags+
  `<div class="diares ok" id="diaRes"><span class="diatag" id="diaTag">Uncomplicated — outpatient management</span>`+
   `<span id="diaText">${esc(T.uncomplicated)}</span></div></div>`;
}
function diarrhoeaCard(d){
 const T=d.triage, F=d.framework, SP=d.special;
 const workup=(F.workup||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const diet=(F.diet||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const second=(F.second_line||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const typh=(F.typhlitis||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const safety=(F.safety||[]).map(x=>`<li>${esc(x)}</li>`).join('');
 const spec=(SP.items||[]).map(x=>
   `<tr><td class="ag">${esc(x.agent)}</td><td>${esc(x.detail)}<div class="anaironcav">${esc(x.src)}</div></td></tr>`).join('');
 return `<div class="scard"><div class="shead"><h3 class="sname">Chemotherapy-induced diarrhoea — assess &amp; manage</h3></div>`+
  `<div class="sbody">`+
   `<div class="smeta"><span class="k">Graded by</span> ${ctLinks({ctcae:d.ctcae})}</div>`+
   `<div class="seclabel">1 · ${esc(F.assess_title)}</div>`+
   `<p class="fnplain">${esc(F.grade_note)}</p>`+
   `<div class="sblock fnout"><h5>Uncomplicated</h5><p class="fnlead" style="margin:0">${esc(F.uncomplicated_def)}</p></div>`+
   `<div class="sblock fninp"><h5>Complicated</h5><p class="fnlead" style="margin:0">${esc(F.complicated_def)}</p></div>`+
   `<details class="boxwrap"><summary>Work-up for complicated diarrhoea</summary><ul class="fncav">${workup}</ul></details>`+
   diaChecklist(T)+
   `<div class="seclabel">2 · ${esc(F.first_line_title)}</div>`+
   `<div class="sblock fnout"><h5>Loperamide</h5><p class="fnlead" style="margin:0">${esc(F.loperamide)}</p></div>`+
   `<p class="fnplain">${esc(F.rehydration)}</p>`+
   `<ul class="fncav">${diet}</ul>`+
   `<p class="fnbnote">${esc(F.reassess)}</p>`+
   `<div class="seclabel">3 · ${esc(F.refractory_title)}</div>`+
   `<div class="sblock fninp"><h5>IV fluids</h5><p class="fnlead" style="margin:0">${esc(F.fluids)}</p></div>`+
   `<div class="sblock fnreev"><h5>Octreotide</h5><p class="fnlead" style="margin:0">${esc(F.octreotide)}</p></div>`+
   `<ul class="fncav">${second}</ul>`+
   `<p class="fnplain">${esc(F.antibiotics)}</p>`+
   `<div class="sblock trans" style="margin-top:10px"><h5>${esc(F.typhlitis_title)}</h5><ul>${typh}</ul></div>`+
   `<div class="seclabel">4 · Special situations</div>`+
   `<p class="fnbnote">${esc(SP.intro)}</p>`+
   `<div class="tscroll"><table class="protab diaspec"><thead><tr><th>Agent / cause</th><th>Approach</th></tr></thead><tbody>${spec}</tbody></table></div>`+
   `<div class="seclabel">${esc(F.safety_title)}</div>`+
   `<div class="sblock fninp"><ul>${safety}</ul></div>`+
   `<div class="scredit"><b>Framework &amp; doses:</b> ${esc(F.primary_source)}<br>`+
    `<b>Agent-specific regimens:</b> ${esc(F.label_source)}</div>`+
  `</div></div>`;
}
function initDiarrhoeaCard(d){
 const T=d.triage; const state={};
 (T.flags||[]).forEach(f=>state[f.id]=false);
 function recalc(){
   const any=Object.values(state).some(Boolean);
   const res=$('#diaRes'); if(!res) return;
   res.className='diares '+(any?'bad':'ok');
   $('#diaTag').textContent = any?'Complicated — admit & treat intensively':'Uncomplicated — outpatient management';
   $('#diaText').textContent = any?T.complicated:T.uncomplicated;
 }
 document.querySelectorAll('#list .diachk').forEach(l=>{
   const id=l.dataset.id, cb=l.querySelector('input');
   cb.addEventListener('change',()=>{ state[id]=cb.checked; l.classList.toggle('on',cb.checked); recalc(); });
 });
 recalc();
}
function renderSupportive(list){
 if(!SUPP){ list.innerHTML='<div class="empty" style="display:block">No supportive-care topics.</div>'; return; }
 $('#htitle').textContent='Supportive care';
 $('#lede').textContent=MODEL.meta.supportive_source||'';
 $('#empty').style.display='none';
 if(activeTopic==='cipn' && SUPP.cipn){
   list.insertAdjacentHTML('beforeend', cipnCard(SUPP.cipn));
   initCipnCard(SUPP.cipn);
 } else if(activeTopic==='mucositis' && SUPP.mucositis){
   list.insertAdjacentHTML('beforeend', mucositisCard(SUPP.mucositis));
   initMucositisCard(SUPP.mucositis);
 } else if(activeTopic==='diarrhoea' && SUPP.diarrhoea){
   list.insertAdjacentHTML('beforeend', diarrhoeaCard(SUPP.diarrhoea));
   initDiarrhoeaCard(SUPP.diarrhoea);
 } else if(activeTopic==='anaemia' && SUPP.anaemia){
   list.insertAdjacentHTML('beforeend', anaemiaCard(SUPP.anaemia));
   initAnaemiaCard(SUPP.anaemia);
 } else if(activeTopic==='fn' && SUPP.fn){
   list.insertAdjacentHTML('beforeend', fnCard(SUPP.fn));
   initFnCalc(SUPP.fn);
 } else if(activeTopic==='antiemesis' && SUPP.antiemesis){
   list.insertAdjacentHTML('beforeend', antiemesisCard(SUPP.antiemesis));
   initAntiemesisLookup(SUPP.antiemesis);
 } else {
   list.insertAdjacentHTML('beforeend', gcsfCard(SUPP.gcsf));
   initGcsfLookup(SUPP.gcsf);
 }
}

function render(){
 buildNav();
 const list=$('#list'); list.innerHTML='';
 const supp = mode==='supportive';           // facet title + note: shown for CTCAE/irAE, hidden for supportive
 $('.topbar').style.display = supp?'none':'';
 $('#lede').style.display   = supp?'none':'';
 if(mode==='irae'){ renderIrae(list); return; }
 if(mode==='supportive'){ renderSupportive(list); return; }
 $('#htitle').textContent='CTCAE v6.0'; $('#lede').textContent=MODEL.meta.source;
 const q=query.toLowerCase(), auto=q.length>=2;
 let shown=0;
 MODEL.socs.forEach(s=>{
  if(activeSoc && s.soc!==activeSoc) return;
  let items=s.terms;
  if(q) items=items.filter(t=>t.term.toLowerCase().includes(q)||(t.definition&&t.definition.toLowerCase().includes(q)));
  if(!items.length) return;
  let html=`<section class="socgroup"><div class="soch"><h2>${esc(s.short)}</h2></div>`;
  html+=items.map(t=>card(t, auto && shown<40)).join(''); html+='</section>';
  list.insertAdjacentHTML('beforeend', html); shown+=items.length;
 });
 $('#empty').style.display = shown?'none':'block';
 document.querySelectorAll('.calc').forEach(buildCalcInputs);
}
// delegated interaction
$('#list').addEventListener('input',e=>{const w=e.target.closest('.calc');if(w)computeCalc(w);});
$('#list').addEventListener('click',e=>{
 const sr=e.target.closest('.sresult'); if(sr){ jumpTo(sr.dataset.facet, sr.dataset.anchor); return; }
 const ct=e.target.closest('.ctlink'); if(ct){ goToTerm(ct.dataset.tid); return; }
 const p=e.target.closest('.csc'); if(!p)return;
 const w=p.closest('.calc'); w.dataset.scale=p.dataset.i;
 w.querySelectorAll('.csc').forEach(x=>x.classList.remove('on')); p.classList.add('on'); buildCalcInputs(w);
});
$('#q').addEventListener('input',e=>{
 query=e.target.value.trim();
 if(query) renderSearch();   // global cross-facet results
 else render();              // query cleared → back to the active facet's normal view
});

// converter
const CV=MODEL.converters; let cvActive=CV[0];
function buildConv(){
 const pick=$('#cvPick'); pick.innerHTML='';
 CV.forEach(c=>{const b=document.createElement('button');b.className='cvp'+(c.id===cvActive.id?' on':'');b.textContent=c.name;
  b.onclick=()=>{cvActive=c;fillUnits();pick.querySelectorAll('.cvp').forEach(p=>p.classList.remove('on'));b.classList.add('on');cvCompute();};pick.appendChild(b);});
 fillUnits();
}
function fillUnits(){const sel=$('#cvUnit');sel.innerHTML='';cvActive.units.forEach(u=>{const o=document.createElement('option');o.value=u.u;o.textContent=u.u;sel.appendChild(o);});$('#cvNote').textContent=cvActive.note||'';}
function fmt(x){if(!isFinite(x))return '—';const a=Math.abs(x);let s=a>=100?x.toFixed(1):a>=1?x.toFixed(2):x.toFixed(3);return s.replace(/\.?0+$/,'');}
function cvCompute(){
 const val=parseFloat($('#cvVal').value),unit=$('#cvUnit').value,src=cvActive.units.find(u=>u.u===unit),all=$('#cvAll');
 if(isNaN(val)||!src){all.innerHTML=cvActive.units.map(u=>`<div class="r"><span class="u">${u.u}</span><span class="v">—</span></div>`).join('');return;}
 const base=val/src.f;
 all.innerHTML=cvActive.units.map(u=>`<div class="r"><span class="u">${u.u}${u.u===unit?' (entered)':''}</span><span class="v">${fmt(base*u.f)}</span></div>`).join('');
}
$('#cvVal').addEventListener('input',cvCompute); $('#cvUnit').addEventListener('change',cvCompute);
$('#convBtn').onclick=()=>{$('#convModal').classList.add('show');document.body.classList.remove('nav-open');buildConv();cvCompute();$('#cvVal').focus();};
$('#convClose').onclick=()=>$('#convModal').classList.remove('show');
$('#convModal').addEventListener('click',e=>{if(e.target===$('#convModal'))$('#convModal').classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#convModal').classList.remove('show');});

// mobile drawer
$('#burger').onclick=()=>document.body.classList.toggle('nav-open');
$('#backdrop').onclick=()=>document.body.classList.remove('nav-open');

$('#lede').textContent = MODEL.meta.source;
$('#foot').innerHTML = '<b>For clinicians and medical education.</b> CTCAE v6.0 grade descriptions reproduced for personal reference; the irAE lens is a guideline-sourced management overlay. Not medical advice or a substitute for clinical judgement.'+
 `<div class="disc">${MODEL.meta.source}</div>`+
 `<div class="disc">${MODEL.meta.irae_source} Generated ${MODEL.meta.generated}.</div>`;
render();
</script>
<script>(function(){var m=document.querySelector('meta[name="theme-color"]');var D='#0d1119',L=(m&&m.getAttribute('content'))||'#f6f7f9';function s(){if(m)m.setAttribute('content',document.documentElement.getAttribute('data-theme')==='dark'?D:L);}s();document.querySelectorAll('.theme-toggle').forEach(function(b){b.addEventListener('click',function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('oncos-theme',t);}catch(e){}s();});});})();</script>
