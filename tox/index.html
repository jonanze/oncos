"", "4": "", "5": ""}}, {"id": "s19-productive-cough", "term": "Productive cough", "definition": "A disorder characterized by expectorated secretions upon coughing.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Occasional/minimal production of sputum with cough", "2": "Moderate sputum production; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Persistent or copious production of sputum; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-pulmonary-edema", "term": "Pulmonary edema", "definition": "A disorder characterized by accumulation of fluid in the lung tissues that causes a disturbance of the gas exchange that may lead to respiratory failure.", "nav": "Unless there is a clear non-cardiac cause, please record this event as Cardiac disorders: Heart failure. Record final diagnosis/cause once determined.", "grades": {"1": "Radiologic findings only; minimal dyspnea on exertion", "2": "Moderate dyspnea on exertion; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe dyspnea or dyspnea at rest; oxygen indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening respiratory compromise; urgent intervention or intubation with ventilatory support indicated", "5": "Death"}}, {"id": "s19-pulmonary-fibrosis", "term": "Pulmonary fibrosis", "definition": "A disorder characterized by the replacement of the lung tissue by connective tissue, leading to progressive dyspnea, respiratory failure or right heart failure.", "nav": "", "grades": {"1": "Radiologic pulmonary fibrosis <25% of lung volume associated with hypoxia", "2": "Evidence of pulmonary hypertension; radiographic pulmonary fibrosis 25 - 50% associated with hypoxia", "3": "Severe hypoxia; evidence of right-sided heart failure; radiographic pulmonary fibrosis >50 - 75%", "4": "Life-threatening consequences (e.g., hemodynamic/pulmonary complications); intubation with ventilatory support indicated; radiographic pulmonary fibrosis >75% with severe honeycombing", "5": "Death"}}, {"id": "s19-pulmonary-fistula", "term": "Pulmonary fistula", "definition": "A disorder characterized by an abnormal communication between the lung and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-pulmonary-hypertension", "term": "Pulmonary hypertension", "definition": "A disorder characterized by an increase in pressure within the pulmonary circulation due to lung or heart disorder.", "nav": "", "grades": {"1": "Asymptomatic; radiographic, physical, or diagnostic findings", "2": "Symptomatic; requiring medical intervention", "3": "Severe symptoms, associated with hypoxia, right heart failure; oxygen indicated", "4": "Life-threatening airway consequences; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-respiratory-failure", "term": "Respiratory failure", "definition": "A disorder characterized by impaired gas exchange by the respiratory system resulting in hypoxia and a decrease in oxygenation of the tissues that may be associated with an increase in arterial levels of carbon dioxide.", "nav": "Consider Respiratory, thoracic and mediastinal disorders: Pneumonitis.", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent intervention, intubation, or ventilatory support indicated", "5": "Death"}}, {"id": "s19-rhinorrhea", "term": "Rhinorrhea", "definition": "A disorder characterized by excessive mucous secretions draining from the nose.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s19-sinus-disorder", "term": "Sinus disorder", "definition": "A disorder characterized by involvement of the paranasal sinuses.", "nav": "", "grades": {"1": "Asymptomatic mucosal crusting; blood-tinged secretions", "2": "Symptomatic stenosis or edema/narrowing interfering with airflow; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stenosis with significant nasal obstruction; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Necrosis of soft tissue or bone; urgent operative intervention indicated", "5": "Death"}}, {"id": "s19-sinus-pain", "term": "Sinus pain", "definition": "A disorder characterized by a sensation of marked discomfort in the face, between the eyes, or upper teeth originating from the sinuses.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-sleep-apnea", "term": "Sleep apnea", "definition": "A disorder characterized by cessation of breathing for short periods during sleep.", "nav": "", "grades": {"1": "Snoring and nocturnal sleep arousal without apneic periods", "2": "Moderate apnea and oxygen desaturation; excessive daytime sleepiness; medical evaluation indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Oxygen desaturation; associated with pulmonary hypertension; medical intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Cardiovascular or neuropsychiatric symptoms; urgent operative intervention indicated", "5": "Death"}}, {"id": "s19-sneezing", "term": "Sneezing", "definition": "A disorder characterized by the involuntary expulsion of air from the nose.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s19-sore-throat", "term": "Sore throat", "definition": "A disorder characterized by marked discomfort in the throat.", "nav": "", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting ability to swallow; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-stridor", "term": "Stridor", "definition": "A disorder characterized by a high pitched breathing sound due to laryngeal or upper airway obstruction.", "nav": "", "grades": {"1": "", "2": "", "3": "Respiratory distress; medical intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-tracheal-fistula", "term": "Tracheal fistula", "definition": "A disorder characterized by an abnormal communication between the trachea and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-tracheal-mucositis", "term": "Tracheal mucositis", "definition": "A disorder characterized by an inflammation or ulceration involving the mucous membrane of the trachea.", "nav": "", "grades": {"1": "Endoscopic findings only; minimal hemoptysis, pain, or respiratory symptoms", "2": "Moderate symptoms; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; hemorrhage or respiratory symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-tracheal-stenosis", "term": "Tracheal stenosis", "definition": "A disorder characterized by a narrowing of the trachea.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., noisy airway breathing), no respiratory distress; medical intervention indicated (e.g., steroids); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stridor or respiratory distress; invasive intervention indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-voice-alteration", "term": "Voice alteration", "definition": "A disorder characterized by a change in the sound and/or speed of the voice.", "nav": "", "grades": {"1": "Mild or intermittent change from normal voice", "2": "Moderate or persistent change from normal voice; still understandable", "3": "Severe voice changes including predominantly whispered speech; may require frequent repetition or face-to-face contact for understandability; may require assistive technology", "4": "", "5": ""}}, {"id": "s19-respiratory-thoracic-and-mediastinal-disorders-other-specify", "term": "Respiratory, thoracic and mediastinal disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Skin and subcutaneous tissue disorders", "short": "Skin / subcutaneous", "id": "soc20", "terms": [{"id": "s20-alopecia", "term": "Alopecia", "definition": "A disorder characterized by a decrease in density of hair compared to normal for a given individual at a given age and body location.", "nav": "", "grades": {"1": "Hair loss of <50% of normal for that individual that is not obvious from a distance but only on close inspection; a different hair style may be required to cover the hair loss but it does not require a wig or hair piece to camouflage", "2": "Hair loss of >=50% normal for that individual that is readily apparent to others; a wig or hair piece is necessary if the patient desires to completely camouflage the hair loss; associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-body-odor", "term": "Body odor", "definition": "A disorder characterized by an abnormal body smell resulting from the growth of bacteria on the body.", "nav": "", "grades": {"1": "Mild odor; physician intervention not indicated; self care interventions", "2": "Pronounced odor; psychosocial impact; patient seeks medical intervention", "3": "", "4": "", "5": ""}}, {"id": "s20-dermatitis-psoriasiform", "term": "Dermatitis psoriasiform", "definition": "A disorder characterized by large, red, rounded plaques covered with thicker scales.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-dermatosis-bullous", "term": "Dermatosis bullous", "definition": "A disorder characterized by inflammation of the skin characterized by the presence of bullae which are filled with fluid.", "nav": "If infectious, consider Infections and infestations: Rash pustular or other site-specific Infections and infestations term.", "grades": {"1": "Asymptomatic", "2": "Painful blisters; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Blisters covering >50% BSA; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Blisters covering >75% BSA; associated with fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-dry-skin", "term": "Dry skin", "definition": "A disorder characterized by flaky and dull skin; the pores are generally fine, the texture is a papery thin texture.", "nav": "", "grades": {"1": "No associated erythema or pruritus", "2": "Associated with erythema or pruritus; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s20-eczematous-dermatitis", "term": "Eczematous dermatitis", "definition": "A disorder characterized by dry and itchy patches of skin involving the epidermis and superficial dermis and includes some scaling, crusting, or serous oozing.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "Oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-erythema-multiforme", "term": "Erythema multiforme", "definition": "A disorder characterized by target lesions (a pink-red ring around a pale center).", "nav": "", "grades": {"1": "Not associated with skin tenderness", "2": "Associated with skin tenderness", "3": "Associated with oral or genital erosions", "4": "Associated with fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-erythroderma", "term": "Erythroderma", "definition": "A disorder characterized by generalized inflammatory erythema and exfoliation. The inflammatory process involves >90% of the body surface area.", "nav": "", "grades": {"1": "", "2": "Erythema covering >90% BSA without associated symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Erythema covering >90% BSA with associated symptoms (e.g., pruritus or tenderness); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Erythema covering >90% BSA with associated fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-exfoliative-dermatitis", "term": "Exfoliative dermatitis", "definition": "A disorder characterized by diffuse erythema and scaling involving > 90% of the body surface area.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s20-hair-color-changes", "term": "Hair color changes", "definition": "A disorder characterized by change in hair color or loss of normal pigmentation.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-hair-texture-abnormal", "term": "Hair texture abnormal", "definition": "A disorder characterized by a change in the way the hair feels.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-hirsutism", "term": "Hirsutism", "definition": "A disorder characterized by the presence of excess hair growth in women in anatomic sites where growth is considered to be a secondary male characteristic and under androgen control (beard, moustache, chest, abdomen).", "nav": "", "grades": {"1": "In women, increase in length, thickness or density of hair in a male distribution that the patient is able to camouflage by periodic shaving, bleaching, or removal of hair", "2": "I te normal daily activity (pediatric)", "3": "Increase in body temperature; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s20-lichenoid-dermatitis", "term": "Lichenoid dermatitis", "definition": "A disorder characterized by a symmetric eruption of flat-topped, red or purple papules on the trunk and extremities.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-nail-changes", "term": "Nail changes", "definition": "A disorder characterized by a change in the nails.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-discoloration", "term": "Nail discoloration", "definition": "A disorder characterized by a change in the color of the nail plate.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-loss", "term": "Nail loss", "definition": "A disorder characterized by loss of all or a portion of the nail.", "nav": "", "grades": {"1": "Asymptomatic separation of the nail bed from the nail plate or nail loss", "2": "Symptomatic separation of the nail bed from the nail plate or nail loss; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-ridging", "term": "Nail ridging", "definition": "A disorder characterized by vertical or horizontal ridges on the nails.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-pain-of-skin", "term": "Pain of skin", "definition": "A disorder characterized by a sensation of marked discomfort in the skin.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age  "grades": {"1": "Mild induration, able to move skin parallel to plane (sliding) and perpendicular to skin (pinching up)", "2": "Moderate induration, able to slide skin, unable to pinch skin; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe induration; unable to slide or pinch skin; limiting joint or orifice movement (e.g., mouth, anus); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Generalized; associated with signs or symptoms of impaired breathing or feeding", "5": "Death"}}, {"id": "s20-skin-ulceration", "term": "Skin ulceration", "definition": "A disorder characterized by a circumscribed, erosive lesion on the skin.", "nav": "", "grades": {"1": "Combined area of ulcers <1 cm; nonblanchable erythema of intact skin with associated warmth or edema", "2": "Combined area of ulcers 1 - 2 cm; partial thickness skin loss involving skin or subcutaneous fat", "3": "Combined area of ulcers >2 cm; full-thickness skin loss involving damage to or necrosis of subcutaneous tissue that may extend down to fascia", "4": "Any size ulcer with extensive destruction, tissue necrosis, or damage to muscle, bone, or supporting structures with or without full thickness skin loss", "5": "Death"}}, {"id": "s20-stevens-johnson-syndrome", "term": "Stevens-Johnson syndrome", "definition": "A disorder characterized by less than 10% total body skin area separation of dermis. The syndrome is thought to be a hypersensitivity complex affecting the skin and the mucous membranes.", "nav": "", "grades": {"1": "", "2": "", "3": "Skin sloughing covering <10% BSA", "4": "Skin sloughing covering >=10% BSA; life-threatening consequences", "5": "Death"}}, {"id": "s20-subcutaneous-emphysema", "term": "Subcutaneous emphysema", "definition": "A disorder characterized by air in the subcutaneous tissue.", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-telangiectasia", "term": "Telangiectasia", "definition": "A disorder characterized by local dilatation of small vessels resulting in red discoloration of the skin or mucous membranes.", "nav": "", "grades": {"1": "Present", "2": "Associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-toxic-epidermal-necrolysis", "term": "Toxic epidermal necrolysis", "definition": "A disorder characterized by greater than 30% total body skin area separation of dermis. The syndrome is thought to be a hypersensitivity complex affecting the skin and the mucous membranes.", "nav": "", "grades": {"1": "", "2": "", "3": "", "4": "Skin sloughing covering >=30% BSA with associated symptoms (e.g., erythema, purpura, or epidermal detachment); life-threatening consequences", "5": "Death"}}, {"id": "s20-urticaria", "term": "Urticaria", "definition": "A disorder characterized by an itchy skin eruption characterized by wheals with pale interiors and well-defined red margins.", "nav": "Consider Immune system disorders: Allergic reaction, Anaphylaxis.", "grades": {"1": "Topical intervention indicated", "2": "Oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-skin-and-subcutaneous-tissue-disorders-other-specify", "term": "Skin and subcutaneous tissue disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-a  ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s21-lymphocele", "term": "Lymphocele", "definition": "A disorder characterized by a cystic lesion containing lymph.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s21-peripheral-ischemia", "term": "Peripheral ischemia", "definition": "A disorder characterized by impaired circulation to an extremity.", "nav": "", "grades": {"1": "", "2": "Brief (<24 hrs) episode of ischemia managed medically and without permanent deficit; claudication", "3": "Prolonged (>=24 hrs) or recurring symptoms and/or invasive intervention indicated; pain at rest", "4": "Life-threatening consequences; major tissue loss; urgent operative intervention indicated", "5": "Death"}}, {"id": "s21-phlebitis", "term": "Phlebitis", "definition": "A disorder characterized by inflammation of the wall of a peripheral vein associated with an intravenous line.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s21-superficial-thrombophlebitis", "term": "Superficial thrombophlebitis", "definition": "A disorder characterized by a blood clot and inflammation involving a superficial vein of the extremities.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s21-superior-vena-cava-syndrome", "term": "Superior vena cava syndrome", "definition": "A disorder characterized by obstruction of the blood flow in the superior vena cava. Signs and symptoms include swelling and cyanosis of the face, neck, and upper arms, cough, orthopnea and headache.", "nav": "", "grades": {"1": "Asymptomatic; incidental finding of SVC thrombosis", "2": "Symptomatic; medical intervention indicated (e.g., anticoagulation, radiation or chemotherapy)", "3": "Severe sympt sy and serial clinical photography.", ""], ["Red flags", "Blistering, mucosal involvement, skin pain, >30% BSA, or systemic features -> monitor for progression to SCAR (SJS/TEN); G4 -> admit.", "rf"], ["Rechallenge", "G1-2 continue/hold; after G3 resume once <=G1 and prednisone <10 mg/day with close monitoring. G4: prefer alternative antineoplastic; restart only if resolved to G1 and ICPi is the sole option.", "rc"]], "grades": [["G1", "c1", "Rash <10% BSA, +/- pruritus or tenderness", [["ICI", "Continue"], ["Topical", "Mild-moderate potency topical corticosteroid + emollients (NCCN: moderate potency); avoid skin irritants"], ["Supportive", "Oral antihistamine for pruritus if present"]], "ASCO 2021 · Table 1 (1.1 Rash/Inflammatory Dermatitis), G1 · NCCN v1.2026 ICI_DERM-1"], ["G2", "c2", "10%-30% BSA +/- symptoms, limiting iADL; or >30% BSA with mild symptoms", [["ICI", "Consider holding; monitor weekly. If not improved after 4 wk, regrade as G3 (NCCN: may continue)"], ["Topical", "Medium-to-high potency topical corticosteroid + emollients; oral antihistamines"], ["Steroids", "Consider prednisone (or equivalent) 0.5-1 mg/kg, taper over 4 wk (NCCN: prednisone 0.5 mg/kg/day only if unresponsive to topical within 1-2 wk)"], ["Referral", "Consider dermatology"]], "ASCO 2021 · Table 1 (1.1 Rash/Inflammatory Dermatitis), G2 · NCCN v1.2026 ICI_DERM-1"], ["G3", "c3", ">30% BSA with moderate/severe symptoms; limiting self-care ADL", [["ICI", "Hold; consult dermatology re appropriateness of resuming"], ["Topical", "High-potency topical corticosteroid + emollients + oral antihistamines; phototherapy for severe pruritus"], ["Steroids", "Oral prednisone (or equivalent) 1 mg/kg/day, taper over >=4 wk (NCCN: prednisone/IV methylprednisolone 0.5-1 mg/kg/day, taper 4-6 wk)"], ["Work-up +", "Consider skin biopsy; consider inpatient care (NCCN)"], ["Referral", "Urgent dermatology"]], "ASCO 2021 · Table 1 (1.1 Rash/Inflammatory Dermatitis), G3 · NCCN v1.2026 ICI_DERM-1"], ["G4", "c4", ncy. Mucosal involvement, skin pain, epidermal detachment, systemic symptoms, or LFT elevation (DRESS/DIHS) -> burn unit / ICU. Even limited BSA bullae/erosions may progress to G3-4.", "rf"], ["Rechallenge", "Do NOT rechallenge - suspected SJS/TEN or any mucous-membrane involvement (not isolated stomatitis) mandates ICPi discontinuation; permanent at G4.", "rc"]], "grades": [["G3", "c3", "Skin sloughing <10% BSA (SJS) with mucosal-involvement signs (erythema, purpura, epidermal/mucous-membrane detachment)", [["ICI", "Discontinue (suspected SJS / any mucosal involvement). ASCO: hold + consult dermatology pending confirmation"], ["Steroids", "IV methylprednisolone (or equivalent) 0.5-1 mg/kg, convert to oral on response, wean >=4 wk (NCCN: 1-2 mg/kg/day). Steroids are NOT contraindicated here - T-cell-mediated mechanism"], ["Escalation", "Immunosuppression warranted (ASCO Table A2); NCCN: consider IVIG (2 g/kg over 2-5 days), etanercept, or cyclosporine"], ["Supportive", "Burn unit / wound care - fluid + electrolyte balance, minimise insensible losses, prevent infection; topical emollients + high-strength topical steroid"], ["Referral", "Urgent dermatology; ophthalmology / ENT / urology / gynaecology for mucosal involvement"]], "ASCO 2021 · Table 1 (1.3 SCAR), G3 · NCCN v1.2026 ICI_DERM-3"], ["G4", "c4", "Detachment >=10% BSA (TEN) with signs +/- systemic symptoms and abnormal bloods (eg LFT rise in DRESS/DIHS)", [["ICI", "Permanently discontinue"], ["Steroids", "IV methylprednisolone (or equivalent) 1-2 mg/kg, tapering when toxicity resolves to normal"], ["Escalation", "IVIG or cyclosporine in severe / steroid-unresponsive cases (NCCN: also etanercept)"], ["Supportive", "Admit to burn unit or ICU; pain / palliative consultation and admission for DRESS manifestations"], ["Referral", "Dermatology + wound care; ophthalmology / urology / gynaecology / ENT for mucosal surfaces"]], "ASCO 2021 · Table 1 (1.3 SCAR), G4 · NCCN v1.2026 ICI_DERM-3"]]}, {"id": "irae-colitis", "o  (wk 0/2/6) -> vedolizumab 300 mg (NCCN: tofacitinib/ustekinumab if biologic-refractory)"], ["Work-up +", "Endoscopy + biopsy; consider admission"], ["Referral", "Gastroenterology"]], "ASCO 2021 · Table 2 (2.1 Colitis), G3-4 · NCCN v1.2026 ICI_GI-4"], ["G4", "c4", "life-threatening consequences", [["ICI", "Permanently discontinue ICI (all agents)"], ["Steroids", "IV methylprednisolone 1-2 mg/kg/day, start immediately; taper 4-6 wk once <=G1"], ["Escalation", "Early infliximab 5 mg/kg if refractory; vedolizumab 300 mg"], ["Work-up +", "Admit; exclude perforation / toxic megacolon; surgical review if needed"], ["Referral", "Gastroenterology + inpatient (+/- surgery)"]], "ASCO 2021 · Table 2 (2.1 Colitis), G3-4 · NCCN v1.2026 ICI_GI-4"]]}, {"id": "irae-hepatitis", "organ": "Hepatic", "name": "Hepatitis (immune-mediated)", "cause": "CTLA-4 · combo > PD-1/PD-L1", "io": ["ctla4", "combo", "pd1", "pdl1"], "ctcae": [{"term": "Alanine aminotransferase increased", "term_id": "s11-alanine-aminotransferase-increased", "calc": true}, {"term": "Aspartate aminotransferase increased", "term_id": "s11-aspartate-aminotransferase-increased", "calc": true}, {"term": "Blood bilirubin increased", "term_id": "s11-blood-bilirubin-increased", "calc": true}, {"term": "Hepatitis", "term_id": "s7-hepatitis", "calc": false}], "shared": [["Exclude", "Viral hepatitis (A/B/C), alcohol, and other drug-induced liver injury (review meds/supplements, acetaminophen); disease-related hepatic dysfunction / liver metastases or progression. For isolated transaminase rise check CK/aldolase (myositis, rhabdomyolysis) and ferritin (HLH). If autoimmune hepatitis suspected: ANA / ASMA / ANCA.", ""], ["Baseline", "AST, ALT, and bilirubin (total + direct), ALKP, albumin before each infusion; weekly if G1 elevation. For grade >=2 add viral serologies, iron studies, autoimmune panel, GGT if ALKP-predominant, PT/INR, and abdominal imaging (ultrasound / contrast CT or MRI).", ""], ["Red flags", "Concomitant bilirubin >2 mg/dL raises risk of hepatic failure (unless Gilbert); synthetic dysfunction (rising INR, ascites, encephalopathy) or AST/ALT >8x ULN -> inpatient care.", "rf"], ["Rechallenge", "G2: resume once recovered to <=G1 and prednisone <=10 mg/day. G3: consider permanent discontinuation if asymptomatic, permanently discontinue if symptomatic. G4: permanently discontinue.", "rc"]], "grades": [["G1", "c1", "AST or ALT >ULN to 3x ULN and/or total bilirubin >ULN to 1.5x ULN (NCCN <3x ULN); asymptomatic", [["ICI", "Continue with close monitoring (NCCN: consider holding for a concerning lab-value trend); consider alternate etiologies"], ["Steroids", "Not indicated - no treatment for G1 LFT abnormality"], ["Work-up +", "Monitor LFTs 1-2x weekly"]], "ASCO 2021 · Table 2 (2.2 Hepatitis), G1 · NCCN v1.2026 ICI_GI-5"], ["G2", "c2", "AST or ALT >3 to 5x ULN and/or total bilirubin >1.5 to 3x ULN; asymptomatic", [["ICI", "Hold temporarily; also hold other potentially hepatotoxic oncologic drugs and stop unnecessary hepatotoxic medications"], ["Steroids", "Prednisone 0.5-1 mg/kg/day if no improvement after 3-5 days (NCCN 3-7 days; max 60 mg/day). Taper over at least 1 month once <=G1; resume ICPi when steroid <=10 mg/day"], ["Escalation", "If inadequate improvement after 3 days, add mycophenolate mofetil (NCCN: MMF up to 1.5 g q12h, or tacrolimus). Infliximab is CONTRAINDICATED in immune-mediated hepatitis"], ["Work-up +", "Increase LFT monitoring to every 3 days (NCCN 3-5 days) + PT/INR; workup other causes (viral, iron studies, autoimmune panel, imaging)"], ["Referral", "Hepatology consult for G2 and above"]], "ASCO 2021 · Table 2 (2.2 Hepatitis), G2 · NCCN v1.2026 ICI_GI-5"], ["G3", "c3", "AST or ALT 5-20x ULN and/or total bilirubin 3-10x ULN, OR symptomatic liver dysfunction; fibrosis by biopsy; compensated cirrhosis; chronic hepatitis reactivation", [["ICI", "Consider permanently discontinuing if asymptomatic; permanently discontinue if symptomatic (NCCN: hold)"], ["Steroids", "I
