adiculitis", "term": "Radiculitis", "definition": "A disorder characterized by inflammation involving a nerve root. Patients experience marked discomfort radiating along a nerve path because of spinal pressure on the connecting nerve root.", "nav": "", "grades": {"1": "Mild symptoms", "2": "Moderate symptoms; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-recurrent-laryngeal-nerve-palsy", "term": "Recurrent laryngeal nerve palsy", "definition": "A disorder characterized by paralysis of the recurrent laryngeal nerve.", "nav": "", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms", "3": "Severe symptoms; medical intervention indicated (e.g., thyroplasty, vocal cord injection)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-reversible-posterior-leukoencephalopathy-syndrome", "term": "Reversible posterior leukoencephalopathy syndrome", "definition": "A disorder characterized by headaches, mental status changes, visual disturbances, and/or seizures associated with imaging findings of posterior leukoencephalopathy. It has been observed in association with hypertensive encephalopathy, eclampsia, and immunosuppressive and cytotoxic drug treatment. It is an acute or subacute reversible condition. Also known as posterior reversible encephalopathy syndrome (PRES).", "nav": "", "grades": {"1": "", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; hospitalization; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s15-seizure", "term": "Seizure", "definition": "A disorder characterized by a sudden, involuntary skeletal muscular contractions of cerebral or brain stem origin.", "nav": "", "grades": {"1": "Brief partial/focal seizure and no loss of consciousness", "2": "Brief generalized seizure; seizure(s) well controlled by anticonvulsants; infrequent partial/focal motor seizures", "3": "New onset seizures (partial/focal or generalized); multiple seizures despite medical intervention", "4": "Life-threatening consequences; prolonged repetitive generalized seizures", "5": "Death"}}, {"id": "s15-somnolence", "term": "Somnolence", "definition": "A disorder characterized by characterized by excessive sleepiness and drowsiness.", "nav": "", "grades": {"1": "Mild but more than usual drowsiness or sleepiness", "2": "Moderate sedation; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Obtundation or stupor", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-spasticity", "term": "Spasticity", "definition": "A disorder characterized by increased involuntary muscle tone that affects the regions interfering with voluntary movement. It results in gait, movement, and speech disturbances.", "nav": "", "grades": {"1": "Mild or slight increase in muscle tone", "2": "Moderate increase in muscle tone and increase in resistance through range of motion", "3": "Severe increase in muscle tone and increase in resistance through range of motion", "4": "Life-threatening consequences; unable to move active or passive range of motion", "5": "Death"}}, {"id": "s15-spinal-cord-compression", "term": "Spinal cord compression", "definition": "A disorder characterized by pressure on the spinal cord.", "nav": "", "grades": {"1": "Radiologic findings only", "2": "Mild or moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-stroke", "term": "Stroke", "definition": "A disorder characterized by an interruption of blood supply to parts of the brain resulting in neurological damage.", "nav": "", "grades": {"1": "Incidental radiographic findings only", "2": "Mild to moderate neurologic deficit; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe neurologic deficit; hospitalization; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-syncope", "term": "Syncope", "definition": "A disorder characterized by spontaneous loss of consciousness caused by insufficient blood supply to the brain.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "", "2": "", "3": "Fainting; orthostatic collapse", "4": "", "5": ""}}, {"id": "s15-tendon-reflex-decreased", "term": "Tendon reflex decreased", "definition": "A disorder characterized by less than normal deep tendon reflexes.", "nav": "Consider Nervous system disorders: Peripheral motor neuropathy, Peripheral sensory neuropathy.", "grades": {"1": "Ankle reflex reduced", "2": "Ankle reflex absent; other reflexes reduced", "3": "Absence of all reflexes", "4": "", "5": ""}}, {"id": "s15-transient-ischemic-attacks", "term": "Transient ischemic attacks", "definition": "A disorder characterized by a brief attack (less than 24 hours) of cerebral dysfunction of vascular origin, with no persistent neurological deficit.", "nav": "If >24 hours, Consider Nervous system disorders: Stroke.", "grades": {"1": "Mild neurologic deficit with or without imaging confirmation", "2": "Moderate neurologic deficit with or without imaging confirmation", "3": "", "4": "", "5": ""}}, {"id": "s15-tremor", "term": "Tremor", "definition": "A disorder characterized by the uncontrolled shaking movement of the whole body or individual parts.", "nav": "", "grades": {"1": "Mild symptoms", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s15-trigeminal-nerve-disorder", "term": "Trigeminal nerve disorder", "definition": "A disorder characterized by dysfunction of the trigeminal nerve (fifth cranial nerve).", "nav": "", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s15-trochlear-nerve-disorder", "term": "Trochlear nerve disorder", "definition": "A disorder characterized by dysfunction of the trochlear nerve (fourth cranial nerve).", "nav": "", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s15-tumor-inflammation-associated-neurotoxicity", "term": "Tumor inflammation-associated neurotoxicity", "definition": "A disorder characterized by localized neurotoxicity related to cellular therapies or other immunotherapies for CNS tumors (TIAN).", "nav": "", "grades": {"1": "Headaches associated with fevers; mild worsening of existing neurological clinical signs and symptoms from baseline, resulting in minor functional deficits for which only observation or symptomatic management is needed", "2": "Moderate changes in the neurological exam from baseline that substantially affect function", "3": "Severe neurological clinical signs and symptoms that may affect critical cardiorespiratory functions; clinical signs and symptoms of increased intracranial pressure (>20 mmHg) that are responsive to intervention", "4": "Life-threatening, clinically significant elevated ICP (>20 mmHg) refractory to CSF drainage with no improvement in clinical symptoms in response to CSF drainage, possibly warranting urgent escalation of neurosurgical intervention; clinical signs and symptoms of impending/early herniation; severe medullary dysfunction requiring endotracheal intubation for airway protection and/or mechanical ventilation", "5": "Death"}}, {"id": "s15-vagus-nerve-disorder", "term": "Vagus nerve disorder", "definition": "A disorder characterized by dysfunction of the vagus nerve (tenth cranial nerve).", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-vasovagal-reaction", "term": "Vasovagal reaction", "definition": "A disorder characterized by a sudden drop of the blood pressure, bradycardia, and peripheral vasodilation that may lead to loss of consciousness. It results from an increase in the stimulation of the vagus nerve.", "nav": "", "grades": {"1": "", "2": "No management indicated", "3": "Requires active management", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s15-nervous-system-disorders-other-specify", "term": "Nervous system disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Psychiatric disorders", "short": "Psychiatric", "id": "soc16", "terms": [{"id": "s16-agitation", "term": "Agitation", "definition": "A disorder characterized by a state of restlessness associated with unpleasant feelings of irritability and tension.", "nav": "", "grades": {"1": "Mild mood alteration", "2": "Moderate mood alteration", "3": "Severe agitation; hospitalization not indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": ""}}, {"id": "s16-anorgasmia", "term": "Anorgasmia", "definition": "A disorder characterized by an inability to achieve orgasm.", "nav": "", "grades": {"1": "Inability to achieve orgasm not adversely affecting relationship", "2": "Inability to achieve orgasm adversely affecting relationship", "3": "", "4": "", "5": ""}}, {"id": "s16-anxiety", "term": "Anxiety", "definition": "A disorder characterized by apprehension of danger and dread accompanied by restlessness, tension, tachycardia, and dyspnea unattached to a clearly identifiable stimulus.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": ""}}, {"id": "s16-confusion", "term": "Confusion", "definition": "A disorder characterized by a lack of clear and orderly thought and behavior.", "nav": "", "grades": {"1": "Mild disorientation", "2": "Moderate disorientation; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe disorientation; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": ""}}, {"id": "s16-delayed-orgasm", "term": "Delayed orgasm", "definition": "A disorder characterized by sexual dysfunction characterized by a delay in climax.", "nav": "", "grades": {"1": "Delay in achieving orgasm not adversely affecting relationship", "2": "Delay in achieving orgasm adversely affecting relationship", "3": "", "4": "", "5": ""}}, {"id": "s16-delirium", "term": "Delirium", "definition": "A disorder characterized by the acute and sudden development of confusion, illusions, movement changes, inattentiveness, agitation, and hallucinations. Usually, it is a reversible condition.", "nav": "", "grades": {"1": "Mild acute confusional state", "2": "Moderate and acute confusional state; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe and acute confusional state; hospitalization indicated; urgent intervention indicated; new onset; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences, threats of harm to self or others; urgent intervention indicated", "5": "Death"}}, {"id": "s16-delusions", "term": "Delusions", "definition": "A disorder characterized by false personal beliefs held contrary to reality, despite contradictory evidence and common sense.", "nav": "", "grades": {"1": "", "2": "Moderate delusional symptoms", "3": "Severe delusional symptoms; outpatient management; new onset", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": "Death"}}, {"id": "s16-depression", "term": "Depression", "definition": "A disorder characterized by melancholic feelings of grief or unhappiness.", "nav": "", "grades": {"1": "Mild depressive symptoms", "2": "Moderate depressive symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe depressive symptoms; hospitalization not indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": "Death"}}, {"id": "s16-euphoria", "term": "Euphoria", "definition": "A disorder characterized by an exaggerated feeling of well-being which is disproportionate to events and stimuli.", "nav": "", "grades": {"1": "Mild mood elevation", "2": "Moderate mood elevation", "3": "Severe mood elevation (e.g., hypomania)", "4": "", "5": ""}}, {"id": "s16-hallucinations", "term": "Hallucinations", "definition": "A disorder characterized by a false sensory perception in the absence of an external stimulus.", "nav": "", "grades": {"1": "Mild hallucinations (e.g., perceptual distortions)", "2": "Moderate hallucinations", "3": "Severe hallucinations; hospitalization not indicated", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": "Death"}}, {"id": "s16-insomnia", "term": "Insomnia", "definition": "A disorder characterized by difficulty in falling asleep and/or remaining asleep.", "nav": "", "grades": {"1": "Mild difficulty falling asleep, staying asleep or waking up early", "2": "Moderate difficulty falling asleep, staying asleep or waking up early", "3": "Severe difficulty in falling asleep, staying asleep or waking up early", "4": "", "5": ""}}, {"id": "s16-irritability", "term": "Irritability", "definition": "A disorder characterized by an abnormal responsiveness to stimuli or physiological arousal; may be in response to pain, fright, a drug, an emotional situation or a medical condition.", "nav": "", "grades": {"1": "Mild; easily consolable", "2": "Moderate; increased attention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe abnormal or excessive response; inconsolable; medical or psychiatric intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s16-libido-decreased", "term": "Libido decreased", "definition": "A disorder characterized by a decrease in sexual desire.", "nav": "", "grades": {"1": "Decrease in sexual interest not adversely affecting relationship", "2": "Decrease in sexual interest adversely affecting relationship", "3": "", "4": "", "5": ""}}, {"id": "s16-libido-increased", "term": "Libido increased", "definition": "A disorder characterized by an increase in sexual desire.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s16-mania", "term": "Mania", "definition": "A disorder characterized by excitement of psychotic proportions manifested by mental and physical hyperactivity, disorganization of behavior and elevation of mood.", "nav": "", "grades": {"1": "Mild manic symptoms (e.g., elevated mood, rapid thoughts, rapid speech, decreased need for sleep)", "2": "Moderate manic symptoms (e.g., relationship and work difficulties; poor hygiene)", "3": "Severe manic symptoms (e.g., hypomania; major sexual or financial indiscretions); hospitalization not indicated; new onset", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": "Death"}}, {"id": "s16-personality-change", "term": "Personality change", "definition": "A disorder characterized by a conspicuous change in a person's behavior and thinking.", "nav": "", "grades": {"1": "Mild personality change", "2": "Moderate personality change", "3": "Severe personality change; hospitalization not indicated", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": ""}}, {"id": "s16-psychosis", "term": "Psychosis", "definition": "A disorder characterized by personality change, impaired functioning, and loss of touch with reality. It may be a manifestation of schizophrenia, bipolar disorder or brain tumor.", "nav": "", "grades": {"1": "Mild psychotic symptoms", "2": "Moderate psychotic symptoms (e.g., disorganized speech; impaired reality testing)", "3": "Severe psychotic symptoms (e.g., paranoid, extreme disorganization); hospitalization not indicated; new onset", "4": "Life-threatening consequences, threats of harm to self or others; hospitalization indicated", "5": "Death"}}, {"id": "s16-restlessness", "term": "Restlessness", "definition": "A disorder characterized by an inability to rest, relax or be still.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s16-suicidal-ideation", "term": "Suicidal ideation", "definition": "A disorder characterized by thoughts of taking one's own life.", "nav": "", "grades": {"1": "Increased thoughts of death but no wish to kill oneself", "2": "Suicidal ideation with no specific plan or intent", "3": "Specific plan to commit suicide without serious intent to die which may not require hospitalization", "4": "Specific plan to commit suicide with serious intent to die which requires hospitalization", "5": ""}}, {"id": "s16-suicide-attempt", "term": "Suicide attempt", "definition": "A disorder characterized by self-inflicted harm in an attempt to end one's own life.", "nav": "", "grades": {"1": "", "2": "", "3": "Suicide attempt or gesture without intent to die", "4": "Suicide attempt with intent to die which requires hospitalization", "5": "Death"}}, {"id": "s16-psychiatric-disorders-other-specify", "term": "Psychiatric disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; hospitalization or urgent intervention indicated", "5": "Death"}}]}, {"soc": "Renal and urinary disorders", "short": "Renal / urinary", "id": "soc17", "terms": [{"id": "s17-acute-kidney-injury", "term": "Acute kidney injury", "definition": "A disorder characterized by the acute loss of renal function (within 2 weeks).", "nav": "Consider Investigations: Creatinine increased; Renal and urinary disorders: Tubulointerstitial nephritis.", "grades": {"1": "", "2": "", "3": "Hospitalization indicated", "4": "Life-threatening consequences; dialysis indicated", "5": "Death"}}, {"id": "s17-bladder-perforation", "term": "Bladder perforation", "definition": "A disorder characterized by a rupture in the bladder wall.", "nav": "", "grades": {"1": "", "2": "Invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; organ failure; urgent operative intervention indicated", "5": "Death"}}, {"id": "s17-bladder-spasm", "term": "Bladder spasm", "definition": "A disorder characterized by a sudden and involuntary contraction of the bladder wall.", "nav": "", "grades": {"1": "Intervention not indicated", "2": "Antispasmodics indicated", "3": "Hospitalization indicated", "4": "", "5": ""}}, {"id": "s17-chronic-kidney-disease", "term": "Chronic kidney disease", "definition": "A disorder characterized by loss of kidney function greater than three months duration.", "nav": "", "grades": {"1": "eGFR (estimated Glomerular Filtration Rate) or CrCl (creatinine clearance) <LLN - 60 ml/min/1.73 m2 or proteinuria 2+ present; urine protein/creatinine >0.5", "2": "eGFR or CrCl <60 - 30 ml/min/1.73 m2", "3": "eGFR or CrCl <30 - 15 ml/min/1.73 m2", "4": "eGFR or CrCl <15 ml/min/1.73 m2; dialysis or renal transplant indicated", "5": "Death"}}, {"id": "s17-cystitis-noninfective", "term": "Cystitis noninfective", "definition": "A disorder characterized by inflammation of the bladder which is not caused by an infection of the urinary tract.", "nav": "", "grades": {"1": "Microscopic hematuria; minimal increase in frequency, urgency, dysuria, or nocturia; new onset of incontinence", "2": "Moderate hematuria; moderate increase in frequency, urgency, dysuria, nocturia or incontinence; urinary catheter placement or bladder irrigation indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Gross hematuria; transfusion, IV medications, or hospitalization indicated; elective invasive intervention indicated", "4": "Life-threatening consequences; urgent invasive intervention indicated", "5": "Death"}}, {"id": "s17-dysuria", "term": "Dysuria", "definition": "A disorder characterized by painful urination.", "nav": "If associated with an infection, report the infection. For grades higher than Grade 1, consider Renal and urinary disorders: Bladder spasm, Cystitis noninfective; Infections and infestations: Urinary tract infection.", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s17-glomerulonephritis", "term": "Glomerulonephritis", "definition": "A disorder characterized by inflammation of the glomerulus, usually based on renal biopsy.", "nav": "", "grades": {"1": "Asymptomatic; laboratory findings only", "2": "Declining glomerular filtration rate (GFR); edema; hypertension; oral management indicated", "3": "IV therapy indicated; immunosuppressant indicated; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated; renal replacement therapy", "5": "Death"}}, {"id": "s17-glucosuria", "term": "Glucosuria", "definition": "A disorder characterized by laboratory test results that indicate glucose in the urine.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s17-hematuria", "term": "Hematuria", "definition": "A disorder characterized by laboratory test results that indicate blood in the urine.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; urinary catheter or bladder irrigation indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Gross hematuria; transfusion, IV medications, or hospitalization indicated; elective invasive intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent invasive intervention indicated", "5": "Death"}}, {"id": "s17-hemoglobinuria", "term": "Hemoglobinuria", "definition": "A disorder characterized by laboratory test results that indicate the presence of free hemoglobin in the urine.", "nav": "Report underlying AE if > Grade 1.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s17-nephrotic-syndrome", "term": "Nephrotic syndrome", "definition": "A disorder characterized by symptoms that include severe edema, proteinuria, and hypoalbuminemia; it is indicative of renal dysfunction.", "nav": "", "grades": {"1": "", "2": "", "3": "IV therapy indicated; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated; renal replacement therapy; anasarca", "5": "Death"}}, {"id": "s17-nocturia", "term": "Nocturia", "definition": "A disorder characterized by the need to get up at night on a regular basis to urinate.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s17-renal-calculi", "term": "Renal calculi", "definition": "A disorder characterized by the formation of crystals/kidney stones in the pelvis of the kidney.", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; occasional use of nonprescription analgesics indicated", "2": "Symptomatic; oral antiemetics indicated; around the clock nonprescription analgesics or any oral narcotic analgesics indicated", "3": "Hospitalization indicated; IV intervention (e.g., analgesics, antiemetics); elective invasive intervention indicated", "4": "Life-threatening consequences; urgent invasive intervention indicated", "5": "Death"}}, {"id": "s17-renal-colic", "term": "Renal colic", "definition": "A disorder characterized by paroxysmal and severe flank marked discomfort radiating to the inguinal area. Often, the cause is the passage of crystals/kidney stones.", "nav": "", "grades": {"1": "Mild pain not interfering with activity; nonprescription medication indicated", "2": "Moderate pain; prescription medication indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s17-renal-hemorrhage", "term": "Renal hemorrhage", "definition": "A disorder characterized by bleeding from the kidney.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Analgesics and hematocrit monitoring indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s17-tubulointerstitial-nephritis", "term": "Tubulointerstitial nephritis", "definition": "A disorder characterized by inflammation of the renal tubule and surrounding tissues.", "nav": "", "grades": {"1": "Laboratory findings without increase in creatinine", "2": "Increase in creatinine; oral management indicated with steroid", "3": "IV therapy indicated; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s17-urinary-fistula", "term": "Urinary fistula", "definition": "A disorder characterized by an abnormal communication between any part of the urinary system and another organ or anatomic site.", "nav": "", "grades": {"1": "", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent invasive intervention indicated", "5": "Death"}}, {"id": "s17-urinary-frequency", "term": "Urinary frequency", "definition": "A disorder characterized by urination at short intervals.", "nav": "", "grades": {"1": "Present", "2": "Medical management indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s17-urinary-incontinence", "term": "Urinary incontinence", "definition": "A disorder characterized by inability to control the flow of urine from the bladder.", "nav": "", "grades": {"1": "Occasional (e.g., with coughing, sneezing, etc.), pads not indicated", "2": "Spontaneous; pads indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Intervention indicated (e.g., clamp, collagen injections); operative intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s17-urinary-retention", "term": "Urinary retention", "definition": "A disorder characterized by accumulation of urine within the bladder because of the inability to urinate.", "nav": "", "grades": {"1": "Urinary, suprapubic or intermittent catheter placement not indicated; able to void with some residual", "2": "Placement of urinary, suprapubic or intermittent catheter placement indicated; medication indicated", "3": "Elective invasive intervention indicated; substantial loss of affected kidney function or mass", "4": "Life-threatening consequences; organ failure; urgent operative intervention indicated", "5": "Death"}}, {"id": "s17-urinary-tract-obstruction", "term": "Urinary tract obstruction", "definition": "A disorder characterized by blockage of the normal flow of contents of the urinary tract.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic but no hydronephrosis, sepsis, or renal dysfunction; urethral dilation, urinary or suprapubic catheter indicated", "3": "Altered organ function (e.g., hydronephrosis or renal dysfunction); invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s17-urinary-tract-pain", "term": "Urinary tract pain", "definition": "A disorder characterized by a sensation of marked discomfort in the urinary tract.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s17-urinary-urgency", "term": "Urinary urgency", "definition": "A disorder characterized by a sudden compelling urge to urinate.", "nav": "", "grades": {"1": "Present", "2": "Medical management indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s17-urine-discoloration", "term": "Urine discoloration", "definition": "A disorder characterized by a change in the color of the urine.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s17-renal-and-urinary-disorders-other-specify", "term": "Renal and urinary disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Reproductive system and breast disorders", "short": "Reproductive / breast", "id": "soc18", "terms": [{"id": "s18-amenorrhea", "term": "Amenorrhea", "definition": "A disorder characterized by the abnormal absence of menses for at least three consecutive menstrual cycles.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s18-azoospermia", "term": "Azoospermia", "definition": "A disorder characterized by laboratory test results that indicate complete absence of spermatozoa in the semen.", "nav": "", "grades": {"1": "", "2": "Absence of sperm in ejaculate", "3": "", "4": "", "5": ""}}, {"id": "s18-breast-pain", "term": "Breast pain", "definition": "A disorder characterized by a sensation of marked discomfort in the breast region.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-dysmenorrhea", "term": "Dysmenorrhea", "definition": "A disorder characterized by abnormally painful abdominal cramps during menses.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-dyspareunia", "term": "Dyspareunia", "definition": "A disorder characterized by painful or difficult coitus.", "nav": "", "grades": {"1": "Mild discomfort or pain associated with vaginal penetration; discomfort relieved with use of vaginal lubricants or estrogen", "2": "Moderate discomfort or pain associated with vaginal penetration; discomfort or pain partially relieved with use of vaginal lubricants or estrogen", "3": "Severe discomfort or pain associated with vaginal penetration; discomfort or pain unrelieved by vaginal lubricants or estrogen", "4": "", "5": ""}}, {"id": "s18-ejaculation-disorder", "term": "Ejaculation disorder", "definition": "A disorder characterized by problems related to ejaculation. This category includes premature, delayed, retrograde and painful ejaculation.", "nav": "", "grades": {"1": "Diminished ejaculation", "2": "Anejaculation or retrograde ejaculation", "3": "", "4": "", "5": ""}}, {"id": "s18-erectile-dysfunction", "term": "Erectile dysfunction", "definition": "A disorder characterized by the persistent or recurrent inability to achieve or to maintain an erection during sexual activity.", "nav": "", "grades": {"1": "Decrease in erectile function (frequency or rigidity of erections) but intervention not indicated (e.g., medication or use of mechanical device, penile pump)", "2": "Decrease in erectile function (frequency/rigidity of erections), erectile intervention indicated, (e.g., medication or mechanical devices such as penile pump)", "3": "Decrease in erectile function (frequency/rigidity of erections) but erectile intervention not helpful (e.g., medication or mechanical devices such as penile pump); placement of a permanent penile prosthesis indicated (not previously present)", "4": "", "5": ""}}, {"id": "s18-fallopian-tube-obstruction", "term": "Fallopian tube obstruction", "definition": "A disorder characterized by blockage of the normal flow of the contents in the fallopian tube.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; elective intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s18-feminization-acquired", "term": "Feminization acquired", "definition": "A disorder characterized by the development of secondary female sex characteristics in males due to extrinsic factors.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s18-gynecomastia", "term": "Gynecomastia", "definition": "A disorder characterized by excessive development of the breasts in males.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic (e.g., pain or psychosocial impact)", "3": "Severe symptoms; elective operative intervention indicated", "4": "", "5": ""}}, {"id": "s18-hematosalpinx", "term": "Hematosalpinx", "definition": "A disorder characterized by the presence of blood in a fallopian tube.", "nav": "", "grades": {"1": "Minimal bleeding identified on imaging study or laparoscopy; intervention not indicated", "2": "Moderate bleeding; medical intervention indicated", "3": "Invasive intervention indicated; hospitalization", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s18-irregular-menstruation", "term": "Irregular menstruation", "definition": "A disorder characterized by a change in cycle or duration of menses from baseline.", "nav": "Consider Reproductive system and breast disorders: Amenorrhea.", "grades": {"1": "Intermittent/irregular menses for <=3 consecutive menstrual cycles", "2": "Intermittent/irregular menses for >3 consecutive menstrual cycles", "3": "", "4": "", "5": ""}}, {"id": "s18-lactation-disorder", "term": "Lactation disorder", "definition": "A disorder characterized by disturbances of milk secretion. It is not necessarily related to pregnancy that is observed in females and can be observed in males.", "nav": "", "grades": {"1": "Mild changes in lactation, not significantly affecting production or expression of breast milk", "2": "Changes in lactation, significantly affecting breast production or expression of breast milk", "3": "", "4": "", "5": ""}}, {"id": "s18-menorrhagia", "term": "Menorrhagia", "definition": "A disorder characterized by abnormally heavy vaginal bleeding during menses.", "nav": "", "grades": {"1": "Mild; iron supplements indicated", "2": "Moderate symptoms; medical intervention indicated (e.g., hormones)", "3": "Hospitalization; operative intervention indicated (e.g., hysterectomy)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-nipple-deformity", "term": "Nipple deformity", "definition": "A disorder characterized by an abnormality of the nipple.", "nav": "", "grades": {"1": "Asymptomatic; asymmetry with slight retraction and/or thickening of the nipple areolar complex", "2": "Symptomatic; asymmetry of nipple areolar complex with moderate retraction and/or thickening of the nipple areolar complex", "3": "", "4": "", "5": ""}}, {"id": "s18-oligospermia", "term": "Oligospermia", "definition": "A disorder characterized by a decrease in the number of spermatozoa in the semen.", "nav": "", "grades": {"1": "Sperm concentration >0 to <15 million/ml", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s18-ovarian-function-insufficiency", "term": "Ovarian function insufficiency", "definition": "A disorder characterized by the development of oligomenorrhea or amenorrhea for at least 3 consecutive months and serum follicle-stimulating hormone (FSH) levels in the menopausal range before age 40. Symptoms of estrogen deficiency may include hot flashes, night sweats, mood swings, and vaginal dryness. Laboratory findings include elevated serum FSH. Other supportive laboratory findings include decreased serum estradiol and anti-Mullerian hormone (AMH) levels.", "nav": "", "grades": {"1": "Intermittent/irregular menses for 3 consecutive months with basal FSH levels >25 IU/L but less than postmenopausal range", "2": "Amenorrhea for 3 consecutive months with basal FSH levels >40 IU/L or in the postmenopausal range", "3": "", "4": "", "5": ""}}, {"id": "s18-ovarian-hemorrhage", "term": "Ovarian hemorrhage", "definition": "A disorder characterized by bleeding from the ovary.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-ovarian-rupture", "term": "Ovarian rupture", "definition": "A disorder characterized by tearing or disruption of the ovarian tissue.", "nav": "", "grades": {"1": "Asymptomatic clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic and intervention not indicated", "3": "Transfusion; invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-ovulation-pain", "term": "Ovulation pain", "definition": "A disorder characterized by a sensation of marked discomfort in one side of the abdomen between menstrual cycles, around the time of the discharge of the ovum from the ovarian follicle.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s18-pelvic-floor-muscle-weakness", "term": "Pelvic floor muscle weakness", "definition": "A disorder characterized by a reduction in the strength of the muscles of the pelvic floor.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic, not interfering with bladder, bowel, or vaginal function; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-pelvic-pain", "term": "Pelvic pain", "definition": "A disorder characterized by a sensation of marked discomfort in the pelvis.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-penile-pain", "term": "Penile pain", "definition": "A disorder characterized by a sensation of marked discomfort in the penis.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-perineal-pain", "term": "Perineal pain", "definition": "A disorder characterized by a sensation of marked discomfort in the area between the genital organs and the anus.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-prostatic-hemorrhage", "term": "Prostatic hemorrhage", "definition": "A disorder characterized by bleeding from the prostate gland.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-prostatic-obstruction", "term": "Prostatic obstruction", "definition": "A disorder characterized by compression of the urethra secondary to enlargement of the prostate gland. This results in voiding difficulties (straining to void, slow urine stream, and incomplete emptying of the bladder).", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; elective intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s18-prostatic-pain", "term": "Prostatic pain", "definition": "A disorder characterized by a sensation of marked discomfort in the prostate gland.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-scrotal-pain", "term": "Scrotal pain", "definition": "A disorder characterized by a sensation of marked discomfort in the scrotal area.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-spermatic-cord-hemorrhage", "term": "Spermatic cord hemorrhage", "definition": "A disorder characterized by bleeding from the spermatic cord.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-spermatic-cord-obstruction", "term": "Spermatic cord obstruction", "definition": "A disorder characterized by blockage of the normal flow of the contents of the spermatic cord.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; elective intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s18-testicular-disorder", "term": "Testicular disorder", "definition": "A disorder characterized by abnormal function or appearance of the testis.", "nav": "Consider other AE terms in the Renal and urinary disorders SOC or Reproductive system and breast disorders SOC.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic but not interfering with sexual function; intervention not indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; interfering with sexual function; intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": ""}}, {"id": "s18-testicular-hemorrhage", "term": "Testicular hemorrhage", "definition": "A disorder characterized by bleeding from the testis.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-testicular-pain", "term": "Testicular pain", "definition": "A disorder characterized by a sensation of marked discomfort in the testis.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-uterine-fistula", "term": "Uterine fistula", "definition": "A disorder characterized by an abnormal communication between the uterus and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-uterine-hemorrhage", "term": "Uterine hemorrhage", "definition": "A disorder characterized by bleeding from the uterus.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-uterine-obstruction", "term": "Uterine obstruction", "definition": "A disorder characterized by blockage of the uterine outlet.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; elective intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s18-uterine-pain", "term": "Uterine pain", "definition": "A disorder characterized by a sensation of marked discomfort in the uterus.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-vaginal-discharge", "term": "Vaginal discharge", "definition": "A disorder characterized by vaginal secretions. Mucus produced by the cervical glands is discharged from the vagina naturally, especially during the childbearing years.", "nav": "", "grades": {"1": "Mild vaginal discharge (greater than baseline for patient)", "2": "Moderate to heavy vaginal discharge; use of perineal pad or tampon indicated", "3": "", "4": "", "5": ""}}, {"id": "s18-vaginal-dryness", "term": "Vaginal dryness", "definition": "A disorder characterized by an uncomfortable feeling of itching and burning in the vagina.", "nav": "", "grades": {"1": "Mild vaginal dryness not interfering with sexual function", "2": "Moderate vaginal dryness interfering with sexual function or causing frequent discomfort", "3": "Severe vaginal dryness resulting in dyspareunia or severe discomfort", "4": "", "5": ""}}, {"id": "s18-vaginal-fistula", "term": "Vaginal fistula", "definition": "A disorder characterized by an abnormal communication between the vagina and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-vaginal-hemorrhage", "term": "Vaginal hemorrhage", "definition": "A disorder characterized by bleeding from the vagina.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-vaginal-inflammation", "term": "Vaginal inflammation", "definition": "A disorder characterized by inflammation involving the vagina. Symptoms may include redness, edema, marked discomfort and an increase in vaginal discharge.", "nav": "", "grades": {"1": "Mild discomfort or pain, edema, or redness", "2": "Moderate discomfort or pain, edema, or redness; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe discomfort or pain, edema, or redness; small areas of mucosal ulceration; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; widespread areas of mucosal ulceration; urgent intervention indicated", "5": ""}}, {"id": "s18-vaginal-obstruction", "term": "Vaginal obstruction", "definition": "A disorder characterized by blockage of vaginal canal.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; elective intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s18-vaginal-pain", "term": "Vaginal pain", "definition": "A disorder characterized by a sensation of marked discomfort in the vagina.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s18-vaginal-perforation", "term": "Vaginal perforation", "definition": "A disorder characterized by a rupture in the vaginal wall.", "nav": "", "grades": {"1": "", "2": "Invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s18-vaginal-stricture", "term": "Vaginal stricture", "definition": "A disorder characterized by a narrowing of the vaginal canal.", "nav": "", "grades": {"1": "Asymptomatic; mild vaginal shortening or narrowing", "2": "Vaginal narrowing and/or shortening not interfering with physical examination", "3": "Vaginal narrowing and/or shortening interfering with the use of tampons, sexual activity or physical examination", "4": "", "5": "Death"}}, {"id": "s18-reproductive-system-and-breast-disorders-other-specify", "term": "Reproductive system and breast disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Respiratory, thoracic and mediastinal disorders", "short": "Respiratory", "id": "soc19", "terms": [{"id": "s19-adult-respiratory-distress-syndrome", "term": "Adult respiratory distress syndrome", "definition": "A disorder characterized by progressive and life-threatening pulmonary distress in the absence of an underlying pulmonary condition, usually following major trauma or surgery.", "nav": "Consider Respiratory, thoracic and mediastinal disorders: Pneumonitis.", "grades": {"1": "", "2": "", "3": "Present with radiologic findings; intubation not indicated", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-allergic-rhinitis", "term": "Allergic rhinitis", "definition": "A disorder characterized by an inflammation of the nasal mucous membranes caused by an IgE-mediated response to external allergens. The inflammation may also involve the mucous membranes of the sinuses, eyes, middle ear, and pharynx. Symptoms include sneezing, nasal congestion, rhinorrhea and itching.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s19-aphonia", "term": "Aphonia", "definition": "A disorder characterized by the inability to speak. It may result from injuries to the vocal cords or may be functional (psychogenic).", "nav": "", "grades": {"1": "", "2": "", "3": "Voicelessness; unable to speak", "4": "", "5": ""}}, {"id": "s19-apnea", "term": "Apnea", "definition": "A disorder characterized by cessation of breathing.", "nav": "", "grades": {"1": "", "2": "", "3": "Present; medical intervention indicated", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-aspiration", "term": "Aspiration", "definition": "A disorder characterized by inhalation of solids or liquids into the lungs.", "nav": "", "grades": {"1": "Clinical or diagnostic observations only; intervention not indicated", "2": "Altered eating habits; coughing or choking episodes after eating or swallowing; medical intervention indicated (e.g., suction or oxygen)", "3": "Dyspnea and pneumonia symptoms (e.g., aspiration pneumonia); hospitalization indicated; unable to aliment orally", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-atelectasis", "term": "Atelectasis", "definition": "A disorder characterized by the collapse of part or the entire lung.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., dyspnea, cough); medical intervention indicated (e.g., chest physiotherapy, suctioning); bronchoscopic suctioning", "3": "Supplemental oxygen indicated; hospitalization or elective operative intervention indicated (e.g., stent, laser)", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchial-fistula", "term": "Bronchial fistula", "definition": "A disorder characterized by an abnormal communication between the bronchus and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchial-obstruction", "term": "Bronchial obstruction", "definition": "A disorder characterized by blockage of a bronchus passage, most often by bronchial secretions and exudates.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., mild wheezing); endoscopic evaluation indicated; radiographic evidence of atelectasis/lobar collapse; medical management indicated (e.g., steroids, bronchodilators)", "3": "Shortness of breath with stridor; endoscopic intervention indicated (e.g., laser, stent placement)", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchial-stricture", "term": "Bronchial stricture", "definition": "A disorder characterized by a narrowing of the bronchial tube.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., rhonchi or wheezing) but without respiratory distress; medical intervention indicated (e.g., steroids, bronchodilators)", "3": "Shortness of breath with stridor; endoscopic intervention indicated (e.g., laser, stent placement)", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchopleural-fistula", "term": "Bronchopleural fistula", "definition": "A disorder characterized by an abnormal communication between a bronchus and the pleural cavity.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Hospitalization; invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchopulmonary-hemorrhage", "term": "Bronchopulmonary hemorrhage", "definition": "A disorder characterized by bleeding from the bronchial wall and/or lung parenchyma.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; invasive intervention not indicated", "3": "Hospitalization", "4": "Life-threatening consequences; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-bronchospasm", "term": "Bronchospasm", "definition": "A disorder characterized by a sudden contraction of the smooth muscles of the bronchial wall or narrowing of the airway. May be manifested as wheezing.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Symptomatic; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Supplemental oxygen indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-chylothorax", "term": "Chylothorax", "definition": "A disorder characterized by milky pleural effusion (abnormal collection of fluid) resulting from accumulation of lymph fluid in the pleural cavity.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated (e.g., fat-restricted diet); thoracentesis or tube drainage indicated", "3": "Severe symptoms; elective operative intervention indicated", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-cough", "term": "Cough", "definition": "A disorder characterized by sudden, often repetitive, spasmodic contraction of the thoracic cavity, resulting in violent release of air from the lungs and usually accompanied by a distinctive sound.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild symptoms; nonprescription intervention indicated", "2": "Moderate symptoms, medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-dyspnea", "term": "Dyspnea", "definition": "A disorder characterized by an uncomfortable sensation of difficulty breathing.", "nav": "Consider Cardiac disorders: Heart failure; Record final diagnosis/cause once determined.", "grades": {"1": "Shortness of breath with moderate exertion", "2": "Shortness of breath with minimal exertion; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Shortness of breath at rest; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-epistaxis", "term": "Epistaxis", "definition": "A disorder characterized by bleeding from the nose.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated (e.g., nasal packing, cauterization; topical vasoconstrictors)", "3": "Transfusion; invasive intervention indicated (e.g., hemostasis of bleeding site)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-hiccups", "term": "Hiccups", "definition": "A disorder characterized by repeated gulp sounds that result from an involuntary opening and closing of the glottis. This is attributed to a spasm of the diaphragm.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; interfering with sleep; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-hoarseness", "term": "Hoarseness", "definition": "A disorder characterized by harsh and raspy voice arising from or spreading to the larynx.", "nav": "", "grades": {"1": "Mild or intermittent voice change; fully understandable; self-resolves", "2": "Moderate or persistent voice changes; may require occasional repetition but understandable on telephone; medical evaluation indicated", "3": "Severe voice changes including predominantly whispered speech", "4": "", "5": ""}}, {"id": "s19-hypoxia", "term": "Hypoxia", "definition": "A disorder characterized by a decrease in the level of oxygen in the body.", "nav": "Consider Respiratory, thoracic and mediastinal disorders: Dyspnea, Pneumonitis; Record final diagnosis/cause once determined.", "grades": {"1": "Asymptomatic decrease in oxygen saturation <LLN", "2": "Decreased oxygen saturation with exercise (e.g., pulse oximeter <88%); intermittent supplemental oxygen", "3": "Decreased oxygen saturation at rest (e.g., pulse oximeter <88% or PaO2 <=55 mmHg); continuous supplemental oxygen", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-laryngeal-edema", "term": "Laryngeal edema", "definition": "A disorder characterized by swelling due to an excessive accumulation of fluid in the larynx.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated (e.g., dexamethasone, epinephrine, antihistamines)", "3": "Stridor; respiratory distress; hospitalization indicated", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-laryngeal-fistula", "term": "Laryngeal fistula", "definition": "A disorder characterized by an abnormal communication between the larynx and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-laryngeal-hemorrhage", "term": "Laryngeal hemorrhage", "definition": "A disorder characterized by bleeding from the larynx.", "nav": "", "grades": {"1": "Mild cough or trace hemoptysis; laryngoscopic findings", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-laryngeal-inflammation", "term": "Laryngeal inflammation", "definition": "A disorder characterized by an inflammation involving the larynx.", "nav": "", "grades": {"1": "Mild sore throat; raspy voice", "2": "Moderate sore throat; analgesics indicated", "3": "Severe throat pain; endoscopic intervention indicated", "4": "", "5": ""}}, {"id": "s19-laryngeal-mucositis", "term": "Laryngeal mucositis", "definition": "A disorder characterized by ulceration or inflammation involving the mucous membrane of the larynx.", "nav": "", "grades": {"1": "Endoscopic findings only; mild discomfort with normal intake", "2": "Moderate pain, analgesics indicated; altered oral intake; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; severely altered eating/swallowing; medical intervention indicated", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-laryngeal-obstruction", "term": "Laryngeal obstruction", "definition": "A disorder characterized by blockage of the laryngeal airway.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., noisy airway breathing), no respiratory distress; medical intervention indicated (e.g., steroids); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stridor; endoscopic intervention indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-laryngeal-stenosis", "term": "Laryngeal stenosis", "definition": "A disorder characterized by a narrowing of the laryngeal airway.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., noisy airway breathing), no respiratory distress; medical intervention indicated (e.g., steroids); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stridor; endoscopic intervention indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-laryngopharyngeal-dysesthesia", "term": "Laryngopharyngeal dysesthesia", "definition": "A disorder characterized by an uncomfortable persistent sensation in the area of the laryngopharynx.", "nav": "", "grades": {"1": "Mild symptoms; no anxiety; intervention not indicated", "2": "Moderate symptoms; mild anxiety, but no dyspnea; short duration of observation and/or anxiolytic indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; dyspnea and swallowing difficulty; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s19-laryngospasm", "term": "Laryngospasm", "definition": "A disorder characterized by paroxysmal spasmodic muscular contraction of the vocal cords.", "nav": "", "grades": {"1": "", "2": "Transient episode; intervention not indicated", "3": "Recurrent episodes; noninvasive intervention indicated (e.g., breathing technique, pressure point massage)", "4": "Persistent or severe episodes associated with syncope; urgent intervention indicated (e.g., fiberoptic laryngoscopy, intubation, botox injection)", "5": "Death"}}, {"id": "s19-mediastinal-hemorrhage", "term": "Mediastinal hemorrhage", "definition": "A disorder characterized by bleeding from the mediastinum.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated; radiologic evidence only", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-nasal-congestion", "term": "Nasal congestion", "definition": "A disorder characterized by obstruction of the nasal passage due to mucosal edema.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "Associated with bloody nasal discharge or epistaxis", "4": "", "5": ""}}, {"id": "s19-oropharyngeal-pain", "term": "Oropharyngeal pain", "definition": "A disorder characterized by a sensation of marked discomfort in the oropharynx or pain on swallowing.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; altered oral intake; non-narcotics initiated; topical analgesics initiated", "3": "Severe pain; severely altered eating/swallowing; narcotics initiated; requires parenteral nutrition", "4": "", "5": ""}}, {"id": "s19-pharyngeal-fistula", "term": "Pharyngeal fistula", "definition": "A disorder characterized by an abnormal communication between the pharynx and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-pharyngeal-hemorrhage", "term": "Pharyngeal hemorrhage", "definition": "A disorder characterized by bleeding from the pharynx.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; intervention indicated", "3": "Hospitalization", "4": "Life-threatening consequences; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-pharyngeal-mucositis", "term": "Pharyngeal mucositis", "definition": "A disorder characterized by ulceration or inflammation involving the mucous membrane of the pharynx.", "nav": "", "grades": {"1": "Endoscopic findings only; minimal symptoms with normal oral intake; mild pain but analgesics not indicated", "2": "Moderate pain, analgesics indicated; altered oral intake; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; unable to adequately aliment or hydrate orally; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-pharyngeal-necrosis", "term": "Pharyngeal necrosis", "definition": "A disorder characterized by a necrotic process occurring in the pharynx.", "nav": "", "grades": {"1": "", "2": "", "3": "Inability to aliment adequately by GI tract; invasive intervention indicated; tube feeding or TPN indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s19-pharyngeal-stenosis", "term": "Pharyngeal stenosis", "definition": "A disorder characterized by a narrowing of the pharyngeal airway.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., noisy airway breathing), no respiratory distress; medical intervention indicated (e.g., steroids); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stridor; endoscopic intervention indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-pharyngolaryngeal-pain", "term": "Pharyngolaryngeal pain", "definition": "A disorder characterized by a sensation of marked discomfort in the pharyngolaryngeal region.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-pleural-effusion", "term": "Pleural effusion", "definition": "A disorder characterized by an increase in amounts of fluid within the pleural cavity. Symptoms include shortness of breath, cough and marked chest discomfort.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; intervention indicated (e.g., diuretics or therapeutic thoracentesis)", "3": "Symptomatic with respiratory distress and hypoxia; operative intervention including chest tube or pleurodesis indicated", "4": "Life-threatening respiratory or hemodynamic compromise; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-pleural-hemorrhage", "term": "Pleural hemorrhage", "definition": "A disorder characterized by bleeding from the pleural cavity.", "nav": "", "grades": {"1": "Asymptomatic; mild hemorrhage confirmed by thoracentesis", "2": "Symptomatic or associated with pneumothorax; chest tube drainage indicated", "3": ">1000 ml of blood evacuated; persistent bleeding (150-200 ml/hr for 2 - 4 hr); persistent transfusion indicated; elective operative intervention indicated; hospitalization", "4": "Life-threatening consequences; intubation or urgent intervention indicated", "5": "Death"}}, {"id": "s19-pleuritic-pain", "term": "Pleuritic pain", "definition": "A disorder characterized by a sensation of marked discomfort in the pleura.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-pneumonitis", "term": "Pneumonitis", "definition": "A disorder characterized by inflammation focally or diffusely affecting the lung parenchyma.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; oxygen indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening respiratory compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-pneumothorax", "term": "Pneumothorax", "definition": "A disorder characterized by abnormal presence of air in the pleural cavity resulting in the collapse of the lung.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; intervention indicated", "3": "Sclerosis and/or operative intervention indicated; hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-postnasal-drip", "term": "Postnasal drip", "definition": "A disorder characterized by excessive mucous secretion in the back of the nasal cavity or throat, causing sore throat and/or coughing.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s19-productive-cough", "term": "Productive cough", "definition": "A disorder characterized by expectorated secretions upon coughing.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Occasional/minimal production of sputum with cough", "2": "Moderate sputum production; limitin
