<style>
:root{
 --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
 --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
 --status-warning:#c9820a;
 --g1:#5b6b78; --g1s:#eef1f4; --g2:#c9820a; --g2s:#fbf1dc; --g3:#e0620a; --g3s:#fcecdd;
 --g4:#d8322f; --g4s:#fbeae9; --g5:#7a1512; --g5s:#f4e3e2;
 --emin:#1f8a5b; --emins:#e7f4ee;
 --font-serif:'Noto Serif',Georgia,serif; --font-sans:'Noto Sans',system-ui,sans-serif;
 --sidebar-w:248px;
}
/* Tox-specific dark: the CTCAE grade ramp (--g1..--g5 + soft tints), the normal
   chip and the search highlight are outside the kit's --status-* set, so give them
   dark values here — dark soft tints + lightened saturated colour, mirroring the
   kit's status pattern. Cascades to the grade ladder, calculator chips (.gchip.cN)
   and the irAE by-grade blocks (.igchip.cN), which all read these vars. */
:root[data-theme="dark"]{
  --g1:#8fa0af; --g1s:#222f3c; --g2:#e0a94a; --g2s:#372c12; --g3:#f0872e; --g3s:#3a2410;
  --g4:#f0716e; --g4s:#3c1e1e; --g5:#ef8a87; --g5s:#3a1717;
  --emin:#3cbe86; --emins:#123527;
}
:root[data-theme="dark"] .gchip.c0{border-color:#3cbe86;background:#123527;color:#3cbe86}
:root[data-theme="dark"] mark{background:#5a4a12;color:#f3e6b0}
*{box-sizing:border-box}
html,body{margin:0;overflow-x:clip;max-width:100%}
body{background:var(--paper);color:var(--ink);font:14px/1.5 var(--font-sans);-webkit-text-size-adjust:100%}

.wm{margin:0;font-family:'Montserrat',var(--font-sans);font-weight:700;font-size:22px;letter-spacing:-1px;color:var(--ink);line-height:1;text-decoration:none;flex:0 0 auto}
.wm .os{color:var(--teal)}
.hdiv{width:1px;height:22px;background:var(--hair);flex:0 0 auto}
.tag{margin:0;color:var(--muted);font-size:11px;font-weight:600;font-family:var(--font-sans);letter-spacing:2px;text-transform:uppercase;flex:0 0 auto}

/* --- full-width masthead at every width (sticky top) --- */
.mhead{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1.2px solid var(--rule);
 display:flex;align-items:center;gap:14px;
 padding:calc(11px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) 11px calc(24px + env(safe-area-inset-left))}
.burger{display:flex;flex:0 0 auto;width:36px;height:36px;border:1px solid var(--hair);border-radius:0;background:var(--paper);
 color:var(--ink);align-items:center;justify-content:center;cursor:pointer;padding:0}
.burger svg{width:20px;height:20px}
.barsearch{flex:0 0 auto;width:min(280px,34vw);margin-left:auto;height:36px;padding:0 13px;font:inherit;
 color:var(--ink);background:var(--paper);border:1px solid var(--hair);border-radius:3px}
.barsearch:focus{outline:none;border-color:var(--teal)}
.barsearch::placeholder{color:var(--muted)}
.mhead .theme-toggle{flex:0 0 auto}

/* --- nav is a burger-triggered off-canvas drawer at every width --- */
.layout{display:block}
.sidebar{position:fixed;top:0;left:0;z-index:50;background:var(--paper);border-right:1px solid var(--hair);
 height:100vh;height:100dvh;overflow-y:auto;width:min(84vw,300px);
 transform:translateX(-100%);transition:transform .22s ease;
 padding:calc(22px + env(safe-area-inset-top)) 16px calc(22px + env(safe-area-inset-bottom));
 display:flex;flex-direction:column;gap:20px}
body.nav-open .sidebar{transform:translateX(0)}
.facet .flabel{font-family:var(--font-sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 8px 2px}
.socnav{display:flex;flex-direction:column;gap:1px}
.socnav a{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--slate);text-decoration:none;
 padding:5px 8px;border-left:2px solid transparent;cursor:pointer;line-height:1.35}
.socnav a:hover{color:var(--teal);background:var(--accent-soft)}
.socnav a.on{color:var(--ink);font-weight:600;border-left-color:var(--teal);background:var(--accent-soft)}
.socnav a .c{color:var(--muted);font-weight:400;font-size:11px;font-variant-numeric:tabular-nums}
.sbtn{width:100%;font-family:var(--font-sans);font-size:12.5px;font-weight:600;color:var(--ink);background:var(--paper);
 border:1.2px solid var(--hair);border-radius:0;padding:9px 12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.sbtn:hover{border-color:var(--teal);color:var(--teal)}
.sbtn svg{width:15px;height:15px;flex:0 0 auto}

.backdrop{display:none}
body.nav-open{overflow:hidden}
body.nav-open .backdrop{display:block;position:fixed;inset:0;z-index:45;background:rgba(15,42,67,.18)}
main{max-width:1040px;margin:0 auto;padding:22px clamp(16px,3vw,30px) 40px}
.topbar{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.h-title{font-family:var(--font-serif);font-size:22px;font-weight:600;margin:0;letter-spacing:-.01em}
.count{color:var(--muted);font-size:12px}
.lede{color:var(--slate);font-size:12.5px;margin:0 0 14px;max-width:660px;line-height:1.55}

.socgroup{margin:0 0 26px}
.soch{display:flex;align-items:baseline;gap:10px;margin:0 0 4px;scroll-margin-top:16px}
.soch h2{font-family:var(--font-serif);font-size:18px;font-weight:600;margin:0;letter-spacing:-.01em}
.soch .n{color:var(--muted);font-size:11.5px}

.term{border-top:1px solid var(--grid)}
.term:first-child{border-top:none}
.term>summary{list-style:none;cursor:pointer;padding:12px 2px;display:flex;align-items:center;gap:10px;justify-content:space-between}
.term>summary::-webkit-details-marker{display:none}
.term .tname{font-family:var(--font-serif);font-size:16px;font-weight:600;color:var(--ink);line-height:1.3}
.term .chev{color:var(--muted);flex:0 0 auto;transition:transform .16s}
.term[open] .chev{transform:rotate(90deg)}
.term .body{padding:0 2px 16px}
.def{color:var(--slate);font-size:12.5px;margin:2px 0 0;line-height:1.55}
.nav{color:var(--muted);font-size:12px;margin:9px 0 0;line-height:1.5}
.nav b{color:var(--slate);font-weight:600}

.ladder{margin:12px 0 0;display:grid;gap:6px}
.grow{display:grid;grid-template-columns:48px 1fr;border:1px solid var(--hair);border-left-width:3px;border-radius:0;overflow:hidden}
.gtag{font-family:var(--font-sans);font-weight:700;font-size:11.5px;display:flex;align-items:center;justify-content:center;padding:8px 4px;text-align:center;line-height:1.15}
.gtxt{padding:9px 12px;font-size:13px;color:var(--ink);line-height:1.5}
.gtxt.empty{color:var(--muted)}
.g1{border-color:var(--g1)} .g1 .gtag{background:var(--g1s);color:var(--g1)}
.g2{border-color:var(--g2)} .g2 .gtag{background:var(--g2s);color:var(--g2)}
.g3{border-color:var(--g3)} .g3 .gtag{background:var(--g3s);color:var(--g3)}
.g4{border-color:var(--g4)} .g4 .gtag{background:var(--g4s);color:var(--g4)}
.g5{border-color:var(--g5)} .g5 .gtag{background:var(--g5s);color:var(--g5)}
mark{background:#fdf3b0;color:inherit;padding:0 1px}

/* inline grade calculator */
.calc{border:1px solid var(--hair);border-top:2.5px solid var(--teal);padding:11px 13px 13px;margin:12px 0 2px;background:var(--paper)}
.calc-h{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);font-weight:600;margin:0 0 9px}
.calc-scales{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px}
.csc{font-size:11px;font-weight:600;color:var(--slate);background:var(--paper);border:1px solid var(--hair);border-radius:0;padding:4px 9px;cursor:pointer}
.csc:hover{border-color:var(--teal);color:var(--teal)}
.csc.on{background:var(--teal);color:var(--btn-ink);border-color:var(--teal)}
.calc-in{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.calc-in input{width:104px;padding:8px 9px;font-size:14px;border:1px solid var(--hair);border-radius:0;font-family:var(--font-sans);color:var(--ink);background:var(--paper)}
.calc-in input:focus{outline:none;border-color:var(--teal)}
.calc-in .u{color:var(--muted);font-size:12.5px}
.calc-out{margin:11px 0 0;display:flex;align-items:center;gap:10px;min-height:22px;flex-wrap:wrap}
.gchip{font-family:var(--font-sans);font-weight:700;font-size:12px;padding:3px 9px;border:1px solid;border-left-width:3px;white-space:nowrap}
.gchip.c0{border-color:#1f8a5b;background:#e7f4ee;color:#1f8a5b}
.gchip.c1{border-color:var(--g1);background:var(--g1s);color:var(--g1)}
.gchip.c2{border-color:var(--g2);background:var(--g2s);color:var(--g2)}
.gchip.c3{border-color:var(--g3);background:var(--g3s);color:var(--g3)}
.gchip.c4{border-color:var(--g4);background:var(--g4s);color:var(--g4)}
.gchip.c5{border-color:var(--g5);background:var(--g5s);color:var(--g5)}
.calc-out .cnote{font-size:12px;color:var(--slate);line-height:1.4}
.calc-note{font-size:11px;color:var(--muted);margin:9px 0 0;line-height:1.5}

/* irAE lens */
.icard{background:var(--paper);border:1px solid var(--hair);border-top:2.5px solid var(--teal);margin:0 0 16px}
.icard>summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px}
.icard>summary::-webkit-details-marker{display:none}
.icard>summary:hover .iname{color:var(--teal)}
.icard .iname{font-family:var(--font-serif);font-size:18px;font-weight:600;margin:0}
.icard .chev{color:var(--muted);flex:0 0 auto;transition:transform .16s}
.icard[open] .chev{transform:rotate(90deg)}
.icard .ibody{padding:0 18px 18px}
.icard .imeta{color:var(--slate);font-size:12.5px;margin:2px 0 0;display:flex;flex-wrap:wrap;gap:6px 10px;align-items:baseline}
.icard .imeta .k{color:var(--muted)}
.itag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);background:var(--accent-soft);border:1px solid var(--hair);padding:2px 7px}
.ctlink{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--teal);background:var(--paper);border:1px solid var(--hair);border-radius:0;padding:3px 8px;cursor:pointer}
.ctlink:hover{border-color:var(--teal);background:var(--accent-soft)}
.ctlink.calc{border-left:3px solid var(--g2)}
.ipanel{background:var(--accent-soft);border:1px solid var(--hair);margin:13px 0 4px;padding:11px 14px}
.ifrow{display:grid;grid-template-columns:100px 1fr;gap:9px;padding:3px 0;font-size:13px;line-height:1.5}
.ifrow .fl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding-top:2px}
.ifrow.rf .fl{color:var(--g4)} .ifrow.rc .fl{color:var(--teal)}
.iseclabel{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:13px 0 2px}
.igblock{border:1px solid var(--hair);border-left-width:4px;margin:10px 0 0;padding:10px 14px 11px}
.ig1{border-left-color:var(--g1)}.ig2{border-left-color:var(--g2)}.ig3{border-left-color:var(--g3)}.ig4{border-left-color:var(--g4)}
.ighead{display:flex;align-items:center;gap:9px;margin:0 0 6px}
.igchip{font-weight:700;font-size:11.5px;padding:2px 8px;border:1px solid}
.igchip.c1{background:var(--g1s);color:var(--g1);border-color:var(--g1)}.igchip.c2{background:var(--g2s);color:var(--g2);border-color:var(--g2)}
.igchip.c3{background:var(--g3s);color:var(--g3);border-color:var(--g3)}.igchip.c4{background:var(--g4s);color:var(--g4);border-color:var(--g4)}
.igdesc{color:var(--muted);font-size:12px}
.isrc{font-size:11px;font-style:italic;margin-top:6px;color:var(--muted)}.isrc .l{color:var(--teal)}
.idivg{color:var(--slate)}
.iorgh{display:flex;align-items:baseline;gap:10px;margin:0 0 8px;border-bottom:1.4px solid var(--rule);padding-bottom:6px}
.iorgh h2{font-family:var(--font-serif);font-size:17px;font-weight:600;margin:0}
.iorgh .n{color:var(--muted);font-size:11.5px}
.idisc{color:var(--slate);font-size:12px;background:var(--accent-soft);border-left:3px solid var(--teal);padding:9px 12px;margin:0 0 16px;line-height:1.5}

/* supportive care */
.scard{background:var(--paper);border:1px solid var(--hair);border-top:2.5px solid var(--teal);margin:0 0 16px}
.scard .shead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px 0}
.scard .sname{font-family:var(--font-serif);font-size:18px;font-weight:600;margin:0}
.scard .sbody{padding:6px 18px 20px}
.smeta{color:var(--slate);font-size:12.5px;margin:2px 0 0;display:flex;flex-wrap:wrap;gap:6px 10px;align-items:baseline}
.smeta .k{color:var(--muted)}
.seclabel{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 0 7px}
.lookup{border:1px solid var(--hair);border-left:3px solid var(--teal);padding:14px 16px;background:var(--accent-soft)}
.lhint{font-size:11.5px;color:var(--slate);margin:0 0 10px;line-height:1.5}
.lookrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.lookrow input{flex:1 1 260px;min-width:200px;padding:9px 11px;font-size:16px;border:1px solid var(--hair);border-radius:0;background:var(--paper);color:var(--ink);font-family:var(--font-sans)}
.lookrow input:focus{outline:none;border-color:var(--teal)}
.bfilt{display:flex;gap:6px}
.band{font-size:11.5px;font-weight:700;padding:6px 11px;border:1px solid;border-left-width:3px;cursor:pointer;background:var(--paper);user-select:none}
.band.hi{border-color:var(--g4);color:var(--g4)} .band.hi.act{background:var(--g4s)}
.band.mid{border-color:var(--g2);color:var(--g2)} .band.mid.act{background:var(--g2s)}
.reslist{margin:12px 0 0;max-height:360px;overflow-y:auto;overflow-x:hidden;border-top:1px dashed var(--hair)}
.ritem{display:grid;grid-template-columns:minmax(0,1fr) 128px;gap:12px;padding:9px 4px;border-bottom:1px solid var(--grid);align-items:start}
.ritem .rmain{font-size:13px;line-height:1.4;min-width:0;overflow-wrap:anywhere;word-break:break-word}
.ritem .rname{font-weight:600;color:var(--ink)}
.ritem .rexp{color:var(--muted);font-size:11.5px}
.ritem .rdis{color:var(--slate);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.ritem .rcav{color:var(--g2);font-size:11.5px;line-height:1.4;margin-top:3px;border-left:2px solid var(--g2);padding-left:7px}
.rband{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border:1px solid;border-left-width:3px;text-align:center;white-space:nowrap;height:fit-content}
.rband.high{color:var(--g4);border-color:var(--g4);background:var(--g4s)}
.rband.mid{color:var(--g2);border-color:var(--g2);background:var(--g2s)}
.nomatch{padding:14px 4px;color:var(--slate);font-size:12.5px;line-height:1.5}
.lcount{font-size:11px;color:var(--muted);margin:8px 0 0;font-variant-numeric:tabular-nums}
.decide{border:1px solid var(--hair);padding:12px 14px;margin-top:2px}
.rout{display:grid;gap:7px}
.rrow{display:grid;grid-template-columns:118px 1fr;gap:10px;font-size:12.5px;line-height:1.45;align-items:start}
.rrow .rb{font-size:10.5px;font-weight:700;text-transform:uppercase;padding-top:1px}
.rrow.high .rb{color:var(--g4)} .rrow.mid .rb{color:var(--g2)} .rrow.low .rb{color:var(--g1)}
.rrow.sec .rb{color:var(--slate)}
.loc{display:inline-block;font-size:10px;font-weight:600;color:var(--teal);border:1px solid var(--hair);padding:1px 6px;margin-left:6px;white-space:nowrap}
.boxwrap{margin:10px 0 0} .boxwrap>summary{list-style:none;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--teal)}
.boxwrap>summary::-webkit-details-marker{display:none}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 0}
.chip{font-size:11px;color:var(--slate);border:1px solid var(--hair);padding:3px 8px;line-height:1.3}
.tscroll{margin:2px 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.protab{width:100%;border-collapse:collapse;margin:0;font-size:12.5px}
.protab th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:6px 10px;border-bottom:1px solid var(--hair)}
.protab td{padding:8px 10px;border-bottom:1px solid var(--grid);vertical-align:top;line-height:1.45}
.protab td.ag{font-weight:600;color:var(--ink)} .protab td.ag .sub{font-weight:400;color:var(--muted);font-size:11px}
.protab td.dose{font-variant-numeric:tabular-nums;white-space:nowrap}
.sblock{border:1px solid var(--hair);border-left-width:4px;margin:8px 0 0;padding:9px 14px 10px}
.sblock.dont{border-left-color:var(--g4)} .sblock.treat{border-left-color:var(--g3)} .sblock.trans{border-left-color:var(--teal)}
.sblock h5{margin:0 0 6px;font-size:12.5px;font-weight:700} .sblock.dont h5{color:var(--g4)} .sblock.treat h5{color:var(--g3)}
.sblock ul{margin:0;padding-left:17px;font-size:12.5px;line-height:1.6;color:var(--ink)} .sblock li{margin:1px 0}
.scredit{margin:18px 0 0;padding-top:12px;border-top:1px solid var(--hair);color:var(--muted);font-size:11px;line-height:1.6}
.scredit b{color:var(--slate)}
@media (max-width:560px){ .ritem{grid-template-columns:1fr} .rband{justify-self:start} .rrow{grid-template-columns:1fr}
 .protab{font-size:12px} .protab th,.protab td{padding:6px 7px} .protab td.dose{white-space:normal} }

/* antiemesis (supportive topic 2) */
.chiprow{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0 0;align-items:center}
.aefilt{font-size:11px;font-weight:700;padding:5px 10px;border:1px solid;border-left-width:3px;cursor:pointer;background:var(--paper);user-select:none}
.aefilt.high{border-color:var(--g4);color:var(--g4)} .aefilt.high.act{background:var(--g4s)}
.aefilt.mid{border-color:var(--g3);color:var(--g3)} .aefilt.mid.act{background:var(--g3s)}
.aefilt.low{border-color:var(--g1);color:var(--g1)} .aefilt.low.act{background:var(--g1s)}
.aefilt.min{border-color:var(--emin);color:var(--emin)} .aefilt.min.act{background:var(--emins)}
.aert{font-size:11px;font-weight:600;padding:5px 9px;border:1px solid var(--hair);color:var(--slate);cursor:pointer;background:var(--paper)}
.aert.act{background:var(--teal);color:var(--btn-ink);border-color:var(--teal)}
.aeitem{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:10px;padding:8px 4px;border-bottom:1px solid var(--grid);align-items:center}
.aeitem>*:first-child{min-width:0;overflow-wrap:anywhere}
.aeitem .aename{font-size:13px;font-weight:600;color:var(--ink)} .aeitem .aeq{color:var(--g3);font-weight:600;font-size:12px}
.aeroute{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--muted);border:1px solid var(--hair);padding:2px 6px}

/* --- Meridian component pass (tokens from _oncos-kit/oncos_theme.py; 2026-07-18).
   Restyles Tox's OWN components onto the Meridian language. Design tokens and the
   shared suite chrome (.wm/.mhead/.burger/.barsearch) are owned by the kit, which
   is injected just below (moved from after :root to here so its chrome + :root
   overrides win the cascade). The CTCAE grade ramp (--g1..--g5, .gchip/.igchip
   colours) keeps its own clinical semantics — only its figures go mono. Each card
   rounds its real border-top accent, so no overflow:hidden is needed (that would
   clip the open <details> body). --- */
.term,.icard,.scard{border-radius:12px;box-shadow:var(--shadow)}
.calc,.fnpx{border-radius:var(--radius-sm)}
.icard>summary,.scard .shead{background:var(--ground)}
/* grade chips + ladder tags read as data → mono (colours untouched) */
.gchip,.igchip,.gtag{font-family:var(--font-mono)}
/* neutral inline chips → Meridian pills; colour-coded grade/risk chips keep their
   square left-accent and are intentionally excluded */
.itag,.chip,.csc,.aert,.mucpill,.loc,.srfacet{border-radius:999px}
/* inputs + selects → soft Meridian radius */
.calc-in input,.lookrow input,.cv-field input,.cv-field select{border-radius:var(--radius-sm)}

  /* --- oncOS Meridian webfonts (shared: _oncos-kit/oncos_fonts.py) --- */
  @font-face{font-family:'Montserrat';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Montserrat-normal-700.woff2) format('woff2');}
  @font-face{font-family:'Newsreader';font-style:normal;font-weight:200 800;font-display:swap;src:url(/fonts/Newsreader-normal-200_800.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:normal;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-normal-400_900.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:italic;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-italic-400_900.woff2) format('woff2');}
  @font-face{font-family:'Spline Sans Mono';font-style:normal;font-weight:300 700;font-display:swap;src:url(/fonts/SplineSansMono-normal-300_700.woff2) format('woff2');}

  /* --- oncOS Meridian theme (shared: _oncos-kit/oncos_theme.py) --- */
  :root{
    --m:#8f6206; --teal:var(--m);
    --ink:#131926; --slate:#4d5a6b; --muted:#6b7787;
    --hair:#e3e7ee; --grid:#edf0f5;
    --accent-soft:color-mix(in oklab, var(--m) 8%, #ffffff);
    --paper:#ffffff; --ground:#f6f7f9; --raised:#ffffff;
    --status-success:#0e8f63; --status-success-soft:#e3f3ec;
    --status-warning:#946908; --status-warning-soft:#f7efdb;
    --status-danger:#c23f38; --status-danger-soft:#faeae9;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --font-serif:'Newsreader','Iowan Old Style',Georgia,serif;
    --font-sans:'Schibsted Grotesk',-apple-system,'Helvetica Neue',system-ui,sans-serif;
    --font-mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --rule:#d7dde6; --btn-ink:#ffffff;
    --radius:12px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(19,25,38,.05), 0 10px 28px -12px rgba(19,25,38,.14);
    --glass:rgba(255,255,255,.8);
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --m:#f0b44e; --teal:var(--m);
    --ink:#e8ecf3; --slate:#a3aebe; --muted:#8391a3;
    --hair:#222937; --grid:#1a2130;
    --accent-soft:color-mix(in oklab, var(--m) 13%, #10141c);
    --paper:#10141c; --ground:#0a0d13; --raised:#151b26;
    --status-success:#37c98c; --status-success-soft:#12312a;
    --status-warning:#e5a93e; --status-warning-soft:#32270f;
    --status-danger:#f0716b; --status-danger-soft:#391b19;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --rule:#2a3242; --btn-ink:#0a0d13;
    --shadow:none;
    --glass:rgba(13,17,25,.75);
    color-scheme:dark;
  }
  html{ transition:background .18s ease, color .18s ease; }
  body{ background:var(--ground); }
  /* --- Meridian shared chrome (the locked suite header pattern) --- */
  /* Wordmark is Montserrat Bold (self-hosted via oncos_fonts) — the one place
     the suite keeps its original NCIS wordmark face; everything else is the
     Meridian type system. */
  .wm{ font-family:'Montserrat',var(--font-sans); font-weight:700; letter-spacing:-.03em; }
  .wm .os{ background-image:linear-gradient(100deg,#4e51d8,#0977b0 45%,#0b8a66);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  :root[data-theme="dark"] .wm .os{ background-image:linear-gradient(100deg,#8a8cff,#3fbbef 45%,#3fd6a6); }
  .mhead{ background:var(--glass);
    -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3);
    border-bottom:1px solid var(--hair); }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .mhead{ background:var(--paper); }
  }
  .burger{ border-radius:10px; }
  .barsearch{ border-radius:999px; background:var(--ground); }
  body.nav-open .backdrop{ background:rgba(10,13,19,.35); }
  .theme-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; padding:0; cursor:pointer; flex:0 0 auto;
    background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:999px;
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{ color:var(--m); border-color:var(--m); background:var(--accent-soft); }
  .theme-toggle svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .theme-toggle .i-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-sun{ display:block; }
  /* --- oncOS mobile QA (roadmap #4): no side-scroll + no iOS focus-zoom --- */
  /* Touch devices only: iOS Safari zooms the page when a focused control is
     under 16px, so pin form controls to 16px there (desktop sizing untouched). */
  @media (hover:none) and (pointer:coarse){
    input, select, textarea { font-size:16px !important; }
  }
  /* Belt-and-braces: disable horizontal page scroll on phones. `clip` (not
     `hidden`) doesn't create a scroll container, so position:sticky headers
     keep working. */
  @media (max-width:760px){ html, body { overflow-x:clip; } }

  /* ===== oncOS motion layer (shared: _oncos-kit/oncos_motion.py) ===== */
  :root{
    --mo-dur:150ms;
    --mo-ease:cubic-bezier(.3,0,.1,1);
    interpolate-size: allow-keywords;   /* lets block-size:auto animate */
  }

  /* --- Tier 1: native <details> cards grow + fade open --- */
  details::details-content{
    block-size:0; overflow:clip; opacity:0;
    transition:block-size var(--mo-dur) var(--mo-ease),
               opacity var(--mo-dur) var(--mo-ease),
               content-visibility var(--mo-dur) allow-discrete;
  }
  details[open]::details-content{ block-size:auto; opacity:1; }
  /* chevron rotate — harmless where a module has no .chev */
  details > summary .chev{ transition:transform var(--mo-dur) var(--mo-ease); }
  details[open] > summary .chev{ transform:rotate(90deg); }

  /* --- Tier 1: nav backdrop cross-fades with the drawer slide --- */
  /* Modules toggle .backdrop via display (not animatable); pin it displayed and
     drive opacity/visibility instead. Inert on pages with no .backdrop (Hub). */
  .backdrop{
    display:block !important; position:fixed; inset:0; z-index:45;
    background:rgba(15,42,67,.18);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity var(--mo-dur) var(--mo-ease),
               visibility var(--mo-dur) var(--mo-ease);
  }
  body.nav-open .backdrop{ opacity:1; visibility:visible; pointer-events:auto; }

  /* --- Tier 2: theme-toggle sun/moon cross-fade (replaces the display swap) --- */
  .theme-toggle{ position:relative; overflow:hidden; }
  .theme-toggle svg{
    position:absolute; top:50%; left:50%; margin:0;
    transition:opacity var(--mo-dur) var(--mo-ease), transform var(--mo-dur) var(--mo-ease);
  }
  .theme-toggle .i-moon{ display:block !important; opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }
  .theme-toggle .i-sun{ display:block !important; opacity:0; transform:translate(-50%,-50%) rotate(-90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-moon{ opacity:0; transform:translate(-50%,-50%) rotate(90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-sun{ opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }

  /* --- Tier 1: tap/press feedback (touch has no hover) --- */
  @media (prefers-reduced-motion:no-preference){
    details > summary:active{ transform:scale(.994); }
    a.card:active{ transform:scale(.99); }
  }

  /* --- Tier 2: opt-in staggered content entrance (Hub grid only) --- */
  @media (prefers-reduced-motion:no-preference){
    .mo-stagger > *{ animation:mo-fadeup var(--mo-dur) var(--mo-ease) both; }
    .mo-stagger > *:nth-child(1){ animation-delay:0ms; }
    .mo-stagger > *:nth-child(2){ animation-delay:45ms; }
    .mo-stagger > *:nth-child(3){ animation-delay:90ms; }
    .mo-stagger > *:nth-child(4){ animation-delay:135ms; }
    .mo-stagger > *:nth-child(5){ animation-delay:180ms; }
    .mo-stagger > *:nth-child(6){ animation-delay:225ms; }
    .mo-stagger > *:nth-child(7){ animation-delay:270ms; }
    .mo-stagger > *:nth-child(n+8){ animation-delay:300ms; }
    @keyframes mo-fadeup{ from{ opacity:0; transform:translateY(7px); } to{ opacity:1; transform:none; } }
  }

  /* --- accessibility: honour the OS reduced-motion setting suite-wide --- */
  @media (prefers-reduced-motion:reduce){
    :root{ --mo-dur:0.001ms; }
    *, *::before, *::after{
      animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.001ms !important; scroll-behavior:auto !important;
    }
    details::details-content{ transition-duration:.001ms !important; }
  }

</style>
</head>

1": "Asymptomatic, intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Symptomatic and incompletely controlled medically, or controlled with device (e.g., pacemaker)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-myocardial-infarction", "term": "Myocardial infarction", "definition": "A disorder characterized by gross necrosis of the myocardium; this is due to an interruption of blood supply to the area.", "nav": "", "grades": {"1": "", "2": "Asymptomatic; imaging or ECG features consistent with myocardial infarction which may be of uncertain age", "3": "Hemodynamically stable AND detection of a rise and/or fall of Cardiac troponin values with at least 1 value above the 99th percentile URL AND at least 1 of the following: 1) Symptoms of myocardial ischemia; 2) New ischemic ECG changes; 3) Development of pathological Q waves; 4) Imaging evidence of new loss of viable myocardium or new regional wall motion abnormality in a pattern consistent with an ischemic etiology; 5) Identification of a coronary thrombus by angiography", "4": "Life-threatening consequences; hemodynamically UN stable AND detection of a rise and/or fall of Cardiac troponin values with at least 1 value above the 99th percentile URL AND at least 1 of the following: 1) Symptoms of myocardial ischemia; 2) New ischemic ECG changes; 3) Development of pathological Q waves; 4) Imaging evidence of new loss of viable myocardium or new regional wall motion abnormality in a pattern consistent with an ischemic etiology; 5) Identification of a coronary thrombus by angiography", "5": "Death"}}, {"id": "s1-myocarditis", "term": "Myocarditis", "definition": "A disorder characterized by inflammation of the muscle tissue of the heart.", "nav": "", "grades": {"1": "Asymptomatic with Lab or ECG findings only", "2": "Symptoms with moderate activity or exertion", "3": "Severe with symptoms at rest or with minimal activity or exertion; intervention indicated; new onset of symptoms", "4": "Life-threatening consequences; urgent intervention indicated (e.g., continuous IV therapy or mechanical hemodynamic support); hemodynamically unstable requiring non-invasive or invasive ventilation; complete or high grade AV block; significant ventricular arrhythmia", "5": "Death"}}, {"id": "s1-palpitations", "term": "Palpitations", "definition": "A disorder characterized by an unpleasant sensation of irregular and/or forceful beating of the heart.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s1-paroxysmal-atrial-tachycardia", "term": "Paroxysmal atrial tachycardia", "definition": "A disorder characterized by a dysrhythmia with abrupt onset and sudden termination of atrial contractions with a rate of 150- 250 beats per minute. The rhythm disturbance originates in the atria.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Symptomatic, urgent intervention indicated; ablation", "4": "Life-threatening consequences; incompletely controlled medically; cardioversion indicated", "5": "Death"}}, {"id": "s1-pericardial-effusion", "term": "Pericardial effusion", "definition": "A disorder characterized by fluid collection within the pericardial sac, usually due to inflammation.", "nav": "Consider Cardiac disorders: Pericardial tamponade, Pericarditis.", "grades": {"1": "", "2": "Asymptomatic effusion size small to moderate", "3": "Effusion with physiologic consequences", "4": "Life-threatening consequences; hospitalization", "5": "Death"}}, {"id": "s1-pericardial-tamponade", "term": "Pericardial tamponade", "definition": "A disorder characterized by an increase in intrapericardial pressure due to the collection of blood or fluid in the pericardium.", "nav": "Consider Cardiac disorders: Pericarditis.", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-pericarditis", "term": "Pericarditis", "definition": "A disorder characterized by irritation to the layers of the pericardium (the protective sac around the heart).", "nav": "", "grades": {"1": "Asymptomatic, ECG or physical findings (e.g., rub) consistent with pericarditis", "2": "Symptomatic pericarditis (e.g., chest pain)", "3": "Pericarditis with physiologic consequences (e.g., pericardial constriction)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-pulmonary-valve-disease", "term": "Pulmonary valve disease", "definition": "A disorder characterized by a defect in pulmonary valve function or structure.", "nav": "", "grades": {"1": "Asymptomatic valvular thickening with or without mild valvular regurgitation or stenosis by imaging", "2": "Asymptomatic; moderate regurgitation or stenosis by imaging", "3": "Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled with medical intervention", "4": "Life-threatening consequences; urgent intervention indicated (e.g., valve replacement, valvuloplasty)", "5": "Death"}}, {"id": "s1-sick-sinus-syndrome", "term": "Sick sinus syndrome", "definition": "A disorder characterized by a dysrhythmia with alternating periods of bradycardia and atrial tachycardia accompanied by syncope, fatigue and dizziness.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Symptomatic, intervention not indicated; change in medication initiated", "3": "Symptomatic, intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s1-sinus-bradycardia", "term": "Sinus bradycardia", "definition": "A disorder characterized by a dysrhythmia with a heart rate less than 60 beats per minute that originates in the sinus node.", "nav": "", "grades": {"1": "Asymptomatic, intervention n in", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-external-ear-pain", "term": "External ear pain", "definition": "A disorder characterized by a sensation of marked discomfort in the external ear region.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-hearing-impaired", "term": "Hearing impaired", "definition": "A disorder characterized by partial or complete loss of the ability to detect or understand sounds resulting from damage to ear structures.", "nav": "", "grades": {"1": "Adult: Subjective change in hearing in the absence of documented hearing loss; threshold shift of 15 - 25 dB averaged at 2 contiguous test frequencies in at least one ear (on a 1, 2, 4, 3, 6, and 8 kHz audiogram); Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB hearing loss (HL) (i.e., 25 dB HL or greater); sensorineural hearing loss (SNHL) above 4 kHz (i.e., 6 or 8 kHz) in at least one ear", "2": "Adult: Hearing loss not requiring hearing aid; intervention not indicated; limiting instrumental ADL; threshold shift of >25 dB averaged at 2 contiguous test frequencies in at least one ear (on a 1, 2, 3, 4, 6, and 8 kHz audiogram); Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB at 4 kHz in at least one ear; mild/moderate impact on age-appropriate normal daily activity", "3": "Adult: Hearing loss requiring hearing aid; intervention indicated; limiting self-care ADL; threshold shift of >25 dB averaged at 3 contiguous L or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-vestibular-disorder", "term": "Vestibular disorder", "definition": "A disorder characterized by dizziness, imbalance, nausea, and vision problems.", "nav": "", "grades": {"1": "", "2": "Symptomatic; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s2-ear-and-labyrinth-disorders-other-specify", "term": "Ear and labyrinth disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Endocrine disorders", "short": "Endocrine", "id": "soc3", "terms": [{"id": "s3-adrenal-insufficiency", "term": "Adrenal insufficiency", "definition": "A disorder characterized by the adrenal cortex not producing enough of the hormone cortisol and in some cases, the hormone aldosterone. It may be due to a disorder of the adrenal cortex as in Addison's disease or primary adrenal insufficiency.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "Severe symptoms; hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s3-cushingoid", "term": "Cushingoid", "definition": "A disorder characterized by signs and symptoms that resemble Cushing's disease or syndrome: buffalo hump obesity, striations, adiposity, hypertension, diabetes, and osteoporosis, usually due to exogenous corticosteroids.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "Severe symptoms, medical intervention or hospitalization indicated", "4": "", "5": ""}}, {"id": "s3-delayed-puberty", "term": "Delayed puberty", "definition": "A disorder characterized by unusually late sexual maturity.", "nav": "", "grades": {"1": "", "2": "No breast development by age 13 yrs for females; testes volume of <3 cc or no Tanner Stage 2 development by age 14.5 yrs for males", "3": "No breast development by age 14 yrs for females; no increase in testes volume or no Tanner Stage 2 by age 16 yrs for males; hormone replacement indicated", "4": "", "5": ""}}, {"id": "s3-hyperparathyroidism", "term": "Hyperparathyroidism", "definition": "A disorder characterized by an increase in production of parathyroid hormone by the parathyroid glands. This results in hypercalcemia (abnormally high levels of calcium in the blood).", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s3-hyperthyroidism", "term": "Hyperthyroidism", "definition": "A disorder characterized by excessive levels of thyroid hormone in the body. Common causes include an overactive thyroid gland or thyroid hormone overdose.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; thyroid suppression therapy indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; hospitalization indicated; limi mmatory reaction caused by drugs, especially chemotherapeutic agents, for weeks or months following radiotherapy. The inflammatory reaction is confined to the previously irradiated skin and the symptoms disappear after the removal of the pharmaceutical agent.", "nav": "", "grades": {"1": "Faint erythema or dry desquamation", "2": "Moderate to brisk erythema; patchy moist desquamation, mostly confined to skin folds and creases; moderate edema", "3": "Moist desquamation in areas other than skin folds and creases; bleeding induced by minor trauma or abrasion", "4": "Life-threatening consequences; skin necrosis or ulceration of full thickness dermis; spontaneous bleeding from involved site; skin graft indicated", "5": "Death"}}, {"id": "s10-rectal-anastomotic-leak", "term": "Rectal anastomotic leak", "definition": "A finding of leakage due to breakdown of a rectal anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-seroma", "term": "Seroma", "definition": "A finding of tumor-like collection of serum in the tissues.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; simple aspiration indicated", "3": "Symptomatic, elective invasive intervention indicated", "4": "", "5": ""}}, {"id": "s10-small-intestinal-anastomotic-leak", "term": "Small intestinal anastomotic leak", "definition": "A finding of leakage due to breakdown of an anastomosis (surgical connection of two separate anatomic structures) in the small bowel.", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-spermatic-cord-anastomotic-leak", "term": "Spermatic cord anastomotic leak", "definition": "A finding of leakage due to breakdown of a spermatic cord anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-stenosis-of-gastrointestinal-stoma", "term": "Stenosis of gastrointestinal stoma", "definition": "A finding of narrowing of the gastrointestinal stoma (surgically created opening on the surface of the body).", "nav": "", "grades": {"1": "", "2": "Symptomatic; IV fluids indicated <24 hrs; manual dilation at bedside", "3": "Severely altered GI function; tube feeding, TPN or hospitalization indicated; elective operative intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-stomal-ulcer", "term": "Stomal ulcer", "definition": "A disorder characterized by a circumscribed, erosive lesion on the jejunal mucosal surface close to the anastomosis site following a gastroenterostomy procedure.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; elective operative intervention indicated", "4": "", "5": ""}}, {"id": "s10-systemic-post-immunization-reaction", "term": "Systemic post-immunization reaction", "definition": "A disorder characterized by a systemic manifestation that occurs after the injection of a substance with antigenic properties, administered to activate the immune system.", "nav": "", "g n indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s10-tracheostomy-site-bleeding", "term": "Tracheostomy site bleeding", "definition": "A disorder characterized by bleeding from the tracheostomy site.", "nav": "", "grades": {"1": "Minimal bleeding identified on clinical exam; intervention not indicated", "2": "Moderate bleeding; medical intervention indicated", "3": "Invasive intervention indicated; hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s10-ureteric-anastomotic-leak", "term": "Ureteric anastomotic leak", "definition": "A finding of leakage due to breakdown of a ureteral anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-urethral-anastomotic-leak", "term": "Urethral anastomotic leak", "definition": "A finding of leakage due to breakdown of a urethral anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-urostomy-leak", "term": "Urostomy leak", "definition": "A finding of leakage of contents from a urostomy.", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-urostomy-obstruction", "term": "Urostomy obstruction", "definition": "A disorder characterized by blockage of the urostomy.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; dilation or endoscopic repair or stent placement indicated", "3": "Altered organ function (e.g., sepsis or hydronephrosis, or renal dysfunction); elective operative intervention indicated", "4": "Life-threatening consequences; organ failure; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-urostomy-site-bleeding", "term": "Urostomy site bleeding", "definition": "A disorder characterized by bleeding from the urostomy site.", "nav": "", "grades": {"1": "Minimal bleeding identified on clinical exam; intervention not indicated", "2": "Moderate bleeding; medical intervention indicated", "3": "Invasive intervention indicated; hospitalization", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s10-urostomy-stenosis", "term": "Urostomy stenosis", "definition": "A finding of narrowing of the opening of a urostomy.", "nav": "", "grades": {"1": "", "2": "Symptomatic but no hydronephrosis, sepsis, or renal dysfunction; dilation or endoscopic repair or stent placement indicated", "3": "Symptomatic (e.g., hydronephrosis, or renal dysfunction); elective operative intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-uterine-anastomotic-leak", "term": "Uterine anastomotic leak", "definition": "A finding of leakage due to breakdown of a uterine anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-uterine-perforation", "term": "Uterine perforation", "definition": "A disorder characterized by a rupture in the uterine wall.", "nav": "", "grades": {"1": "", "2": "Invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s10-vaginal-anastomotic-leak", "term": "Vaginal anastomotic leak", "definition": "A finding of leakage due to breakdown of a vaginal anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-vas-deferens-anastomotic-leak", "term": "Vas deferens anastomotic leak", "definition": "A finding of leakage due to breakdown of a vas deferens anastomosis (surgical connection of two separate anatomic structures).", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-vascular-access-complication", "term": "Vascular access complication", "definition": "A finding of a previously undocumented problem related to the vascular access site.", "nav": "", "grades": {"1": "TPA administration into line with no intent for systemic therapy indicated", "2": "Device dislodgement, blockage, leak, or malposition; device replacement indicated", "3": "Pulmonary embolism, deep vein or cardiac thrombosis; intervention indicated", "4": "Life-threatening consequences with hemodynamic or neurologic instability", "5": "Death"}}, {"id": "s10-venous-injury", "term": "Venous injury", "definition": "A finding of damage to a vein.", "nav": "", "grades": {"1": "Asymptomatic diagnostic finding; intervention not indicated", "2": "Symptomatic (e.g., claudication); repair or revision not indicated", "3": "Severe symptoms; repair or revision indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; evidence of end organ damage; urgent operative intervention indicated", "5": "Death"}}, {"id": "s10-wound-complication", "term": "Wound complication", "definition": "A finding of development of a new problem at the site of an existing wound.", "nav": "Prior to using this term consider Injury, poisoning and procedural complications: Wound dehiscence or Infections and infestations: Wound infection.", "grades": {"1": "Observation only; topical intervention indicated", "2": "Bedside local care indicated", "3": "Operative intervention indicated", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s10-wound-dehiscence", "term": "Wound dehiscence", "definition": "A finding of separation of the approximated margins of a surgical wound.", "nav": "Consider Infections and infestations: Wound infection.", "grades": {"1": "Incisional separation, intervention not indicated", "2": "Incisional separation, local care (e.g., suturing) or medical intervention indicated (e.g., analgesic)", "3": "Fascial disruption or dehiscence without evisceration; revision by operative intervention indicated", "4": "Life-threatening consequences; symptomatic hernia with evidence of strangulation; fascial disruption with evisceration; major reconstruction flap, grafting, resection, or amputation indicated", "5": "Death"}}, {"id": "s10-injury-poisoning-and-procedural-complications-other-specify", "term": "Injury, poisoning and procedural c  {"1": "3 - 5 units below LLN if no baseline available; for follow-up, a decrease of 3 - 5 units (ml/min/mmHg) below the baseline value; asymptomatic and intervention not indicated", "2": "6 - 8 units below LLN if no baseline available; for follow-up, an asymptomatic decrease of >5 - 8 units (ml/min/mmHg) below the baseline value; symptomatic and intervention not indicated", "3": "Asymptomatic decrease of >8 units drop; >5 units drop along with the presence of pulmonary symptoms (e.g., >Grade 2 hypoxia or >Grade 2 dyspnea); intervention indicated", "4": "", "5": ""}}, {"id": "s11-cd4-lymphocytes-decreased", "term": "CD4 lymphocytes decreased", "definition": "A finding based on laboratory test results that indicate a decrease in levels of CD4 lymphocytes in a blood specimen.", "nav": "", "grades": {"1": "<LLN - 500/mm3; <LLN - 0.5 x 10^9/L", "2": "<500 - 200/mm3; <0.5 - 0.2 x 10^9/L", "3": "<200 - 50/mm3; <0.2 - 0.05 x 10^9/L", "4": "<50/mm3; <0.05 x 10^9/L", "5": ""}}, {"id": "s11-cholesterol-high", "term": "Cholesterol high", "definition": "A finding based on laboratory test results that indicate higher than normal levels of cholesterol in a blood specimen.", "nav": "", "grades": {"1": ">ULN - 300 mg/dL; >ULN - 7.75 mmol/L", "2": ">300 - 400 mg/dL; >7.75 - 10.34 mmol/L", "3": ">400 - 500 mg/dL; >10.34 - 12.92 mmol/L", "4": ">500 mg/dL; >12.92 mmol/L", "5": ""}}, {"id": "s11-creatinine-clearance-decreased", "term": "Creatinine clearance decreased", "definition": "A finding based on laboratory test results that indicate a decrease in creatinine clearance (CrCl) in a 24-hour urine collection.", "nav": "Report Grade 4 and 5 as Renal and urinary disorders: Acute kidney injury or Chronic kidney disease.", "grades": {"1": "", "2": "26 - 49 ml/min", "3": "10 - 25 ml/min", "4": "", "5": ""}}, {"id": "s11-creatinine-increased", "term": "Creatinine increased", "definition": "A finding based on laboratory test results that indicate increased levels of creatinine in a biological specimen.", "nav": "Consider Renal and urinary disorders: Acute kidney injury, Glomerulonephritis, Tubulointerstitial nephritis.", "grades": {"1": ">ULN - 1.5 x ULN", "2": ">1.5 - 3.0 x baseline if baseline is below LLN; >1.5 - 3.0 x ULN", "3": ">3.0 x baseline if baseline is below LLN; >3.0 - 6.0 x ULN", "4": ">6.0 x ULN", "5": ""}, "calc": {"analyte": "Creatinine", "scales": [{"label": "Creatinine", "unit": "× ULN", "kind": "ratio", "dir": "high", "mildRef": 1.0, "cuts": [[1.5, 1], [3.0, 2], [6.0, 3]], "top": 4}], "note": "CTCAE also grades ×baseline when baseline is below LLN — see the ladder."}}, {"id": "s11-electrocardiogram-qt-corrected-interval-prolonged", "term": "Electrocardiogram QT corrected interval prolonged", "definition": "A finding of a cardiac dysrhythmia characterized by an abnormally long corrected QT interval.", "nav": "Consider Cardiac disorders: Ventricular arrhythmia, Ventricular fibrillation, Ventricular tachycardia.", "grades": {"1": "Average QTc 450 - 480 ms", "2": "Average QTc 481 - 500 ms", "3": "Average QTc >500 ms; >60 ms change from baseline", "4": "Life-threatening consequences; Torsade de pointes; polymorphic ventricular tachycardia", "5": ""}}, {"id": "s11-fibrinogen-decreased", "term": "Fibrinogen decreased", "definition": "A finding based on laboratory test results that indicate an decrease in levels of fibrinogen in a blood specimen.", "nav": "", "grades": {"1": "<1.0 - 0.75 x LLN; if abnormal, <25% decrease from baseline", "2": "<0.75 - 0.5 x LLN; if abnormal, 25 - <50% decrease from baseline", "3": "<0.5 - 0.25 x LLN; if abnormal, 50 - <75% decrease from baseline", "4": "<0.25 x LLN; if abnormal, 75% decrease from baseline; absolute value <50 mg/dL", "5": ""}}, {"id": "s11-forced-expiratory-volume-decreased", "term": "Forced expiratory volume decreased", "definition": "A finding based on test results that indicate a relative decrease in the fraction of the forced vital capacity that is exhaled in a specific number of seconds. atic", "3": ">3.0 - 5.0 x ULN with signs or symptoms; >5.0 x ULN and asymptomatic", "4": ">5.0 x ULN and with signs or symptoms", "5": ""}}, {"id": "s11-lymphocyte-count-increased", "term": "Lymphocyte count increased", "definition": "A finding based on laboratory test results that indicate an abnormal increase in the number of lymphocytes in the blood, effusions or bone marrow.", "nav": "", "grades": {"1": "", "2": ">4000/mm3 - 20,000/mm3", "3": ">20,000/mm3", "4": "", "5": ""}}, {"id": "s11-neutrophil-count-decreased", "term": "Neutrophil count decreased", "definition": "A finding based on laboratory test results that indicate a decrease in number of neutrophils (ANC) in a blood specimen.", "nav": "", "grades": {"1": "<1500 - 1000/mm3; <1.5 - 1.0 x 10^9/L", "2": "<1000 - 500/mm3; <1.0 - 0.5 x 10^9/L", "3": "<500 - 100/mm3; <0.5 - 0.1 x 10^9/L", "4": "<100/mm3; <0.1 x 10^9/L", "5": ""}, "calc": {"analyte": "Absolute neutrophil count", "scales": [{"label": "ANC", "unit": "/mm³", "dir": "low", "mildRef": 1500, "cuts": [[1000, 1], [500, 2], [100, 3]], "top": 4}, {"label": "ANC", "unit": "×10⁹/L", "dir": "low", "mildRef": 1.5, "cuts": [[1.0, 1], [0.5, 2], [0.1, 3]], "top": 4}], "note": null}}, {"id": "s11-neutrophil-count-increased", "term": "Neutrophil count increased", "definition": "A finding based on laboratory test results that indicate an increase in number of neutrophils (ANC) in a blood specimen.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-serum-amylase-increased", "term": "Serum amylase increased", "definition": "A finding based on laboratory test results that indicate an increase in the levels of amylase in a serum specimen.", "nav": "Consider Gastrointestinal disorders: Pancreatitis.", "grades": {"1": ">ULN - 1.5 x ULN", "2": ">1.5 - 2.0 x ULN; >2.0 - 5.0 x ULN and asymptomatic or with mild signs or symptoms", "3": ">2.0 - 5.0 x ULN with moderate or severe signs or symptoms; >5.0 x ULN and asymptomatic", "4": ">5.0 x ULN and with signs or symptoms", "5": ""}}, {"id": "s11-thyroid-stimulating-hormone-increased", "term": "Thyroid stimulating hormone increased", "definition": "A disorder characterized by an increase in thyroid stimulating hormone (TSH).", "nav": "If intervention initiated or symptomatic, report as Endocrine disorders: Hypothyroidism.", "grades": {"1": "TSH increased and no intervention indicated", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s11-urinary-protein-increased", "term": "Urinary protein increased", "definition": "A finding based on laboratory test results that indicate the presence of excessive protein in the urine. It is predominantly albumin, but also globulin.", "nav": "24-hour urine collection takes precedence over dipstick.", "grades": {"1": "Adult: 1+ proteinuria; urinary protein ≥ULN - <1.0 g/24 hrs; P/C <1; Pediatric: 1 + proteinuria", "2": "Adult: 2+ and 3+ proteinuria; urinary protein 1.0 - <3.5 g/24 hrs; P/C 1 - 3.5; Pediatric: Urine P/C (Protein/Creatinine) ratio 0.5 - 1.9; 2 - 3+ proteinuria", "3": "Adult: Urinary protein >=3.5 g/24 hrs; 4+ proteinuria; P/C >3.5; Pediatric: Urine P/C (Protein/Creatinine) ratio >1.9, 4+ proteinuria", "4": "", "5": ""}}, {"id": "s11-urine-output-decreased", "term": "Urine output decreased", "definition": "A finding based on test results that indicate urine production is less relative to previous output.", "nav": "", "grades": {"1": "", "2": "", "3": "Adult: Oliguria (<80 ml in 8 hr); Infants: <1 ml/kg/hour; Children: <0.5 ml/kg/hour", "4": "Adult: Anuria (<240 ml in 24 hr); Pediatric: No urine output over 12 hours", "5": ""}}, {"id": "s11-vital-capacity-abnormal", "term": "Vital capacity abnormal", "definition": "A finding based on pulmonary function test results that indicate an abnormal vital capacity (VC) (amount of exhaled after a maximum inhalation) when compared to the predicted value.", "nav": "Consider Investigations: Forced expiratory volume decreased; Respiratory, thoracic and mediastinal disor bnormally high alkalinity (low hydrogen-ion concentration) of the blood and other body tissues.", "nav": "", "grades": {"1": "pH >normal, but <=7.5", "2": "", "3": "pH >7.5", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s12-anorexia", "term": "Anorexia", "definition": "A disorder characterized by a loss of appetite.", "nav": "", "grades": {"1": "Loss of appetite without alteration in eating habits", "2": "Oral intake altered without significant weight loss or malnutrition; oral nutritional supplements indicated", "3": "Associated with significant weight loss or malnutrition (e.g., inadequate oral caloric and/or fluid intake); tube feeding or TPN indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s12-dehydration", "term": "Dehydration", "definition": "A disorder characterized by excessive loss of water from the body. It is usually caused by severe diarrhea, vomiting or diaphoresis.", "nav": "", "grades": {"1": "Increased oral fluids indicated; dry mucous membranes; diminished skin turgor", "2": "IV fluids indicated", "3": "Hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s12-diabetes-mellitus", "term": "Diabetes mellitus", "definition": "A disorder characterized by increased Hgb A1C that may result in organ damage.", "nav": "Consider Metabolism and nutrition disorders: Hyperglycemia.", "grades": {"1": "Abnormal glucose above baseline; diet changes only; no change in baseline diabetic management", "2": "Oral antiglycemic agent initiated; insulin sliding scale initiated", "3": "Insulin therapy initiated or increased; hospitalization indicated", "4": "Life-threatening consequences; urgent intervention indicated; diabetic ketoacidosis", "5": "Death"}}, {"id": "s12-failure-to-thrive", "term": "Failure to thrive", "definition": "A condition characterized by global decline with weight loss, decreased appetite, poor intake, and/or inactivity.", "nav": "", "grades": {"1": "", "2": "Limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s12-hypercalcemia", "term": "Hypercalcemia", "definition": "A disorder characterized by laboratory test results that indicate an elevation in the concentration of calcium (corrected for albumin) in blood.", "nav": "", "grades": {"1": "Corrected serum calcium of >ULN - 11.5 mg/dL; >ULN - 2.9 mmol/L; Ionized calcium >ULN - 1.5 mmol/L", "2": "Corrected serum calcium of >11.5 - 12.5 mg/dL; >2.9 - 3.1 mmol/L; Ionized calcium >1.5 - 1.6 mmol/L; symptomatic", "3": "Corrected serum calcium of >12.5 - 13.5 mg/dL; >3.1 - 3.4 mmol/L; Ionized calcium >1.6 - 1.8 mmol/L; hospitalization indicated", "4": "Corrected serum calcium of >13.5 mg/dL; >3.4 mmol/L; Ionized calcium >1.8 mmol/L; life-threatening consequences", "5": "Death"}, "calc": {"analyte": "Calcium", "scales": [{"label": "Corrected serum", "unit": "mg/dL", "dir": "high", "mildRef": "ULN", "cuts": [[11.5, 1], [12.5, 2], [13.5, 3]], "top": 4, "caveat": {"2": "symptomatic", "3": "with hospitalization indicated", "4": "life-threatening consequences"}}, {"label": "Corrected serum", "unit": "mmol/L", "dir": "high", "mildRef": "ULN", "cuts": [[2.9, 1], [3.1, 2], [3.4, 3]], "top": 4, "caveat": {"2": "symptomatic", "3": "with hospitalization indicated", "4": "life-threatening consequences"}}, {"label": "Ionised", "unit": "mmol/L", "dir": "high", "mildRef": "ULN", "cuts": [[1.5, 1], [1.6, 2], [1.8, 3]], "top": 4, "caveat": {"2": "symptomatic", "3": "with hospitalization indicated", "4": "life-threatening consequences"}}], "note": null}}, {"id": "s12-hyperglycemia", "term": "Hyperglycemia", "definition": "A condition characterized by laboratory test results that indicate a confirmed, short lasting and unexpected elevation in the concentration of blood sugar (glycemia).", "nav": "Consider Metabolism and nutrition disorders: Diabetes mellitus.", "grades": {"1": "Fasting glucose value >ULN - 160 mg/dL; Fasting glucose value >ULN - 8.9 mmol/L", "2": "Fasting glucose value >160 - 250 mg/dL; Fasting glucose value >8.9 - 13.9 mmol/L", "3": ">250 - 500 mg/dL; >13.9 - 27.8 mmol/L; hospitalization indicated", "4": ">500 mg/dL; >27.8 mmol/L; life-threatening consequences", "5": ""}, "calc": {"analyte": "Glucose (fasting)", "scales": [{"label": "Fasting glucose", "unit": "mg/dL", "dir": "high", "mildRef": "ULN", "cuts": [[160, 1], [250, 2], [500, 3]], "top": 4, "caveat": {"3": "with hospitalization indicated", "4": "life-threatening consequences"}}, {"label": "Fasting glucose", "unit": "mmol/L", "dir": "high", "mildRef": "ULN", "cuts": [[8.9, 1], [13.9, 2], [27.8, 3]], "top": 4, "caveat": {"3": "with hospitalization indicated", "4": "life-threatening consequences"}}], "note": null}}, {"id": "s12-hyperkalemia", "term": "Hyperkalemia", "definition": "A disorder characterized by laboratory test results that indicate an elevation in the concentration of potassium in the blood; associated with kidney failure or sometimes with the use of diuretic drugs.", "nav": "", "grades": {"1": ">ULN - 5.5 mmol/L", "2": ">5.5 - 6.0 mmol/L; intervention initiated", "3": ">6.0 - 7.0 mmol/L; hospitalization indicated", "4": ">7.0 mmol/L; life-threatening consequences", "5": "Death"}, "calc": {"analyte": "Potassium", "scales": [{"label": "Serum potassium", "unit": "mmol/L", "dir": "high", "mildRef": "ULN", "cuts": [[5.5, 1], [6.0, 2], [7.0, 3]], "top": 4, "caveat": {"2": "with intervention initiated", "3": "with hospitalization indicated", "4": "life-threatening consequences"}}], "note": null}}, {"id": "s12-hyperlipidemia", "term": "Hyperlipidemia", "definition": "A disorder characterized by laboratory test results that indicate an elevation in the concentration of lipids in blood.", "nav": "Consider Gastrointestinal disorders: Pancreatitis.", "gra nvulsants; infrequent focal motor seizures not limiting age-appropriate instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "LTLS AND creatinine >3.0 – 6.0 × ULN; cardiac arrhythmia controlled with device (e.g. defibrillator); seizure in which consciousness is altered; poorly controlled seizure disorder; breakthrough generalized seizures despite medical intervention", "4": "LTLS AND creatinine >6.0 x ULN; life-threatening cardiac arrhythmia or seizure", "5": "Death"}}, {"id": "s12-metabolism-and-nutrition-disorders-other-specify", "term": "Metabolism and nutrition disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Musculoskeletal and connective tissue disorders", "short": "Musculoskeletal", "id": "soc13", "terms": [{"id": "s13-abdominal-soft-tissue-necrosis", "term": "Abdominal soft tissue necrosis", "definition": "A disorder characterized by a necrotic process occurring in the soft tissues of the abdominal wall.", "nav": "", "grades": {"1": "", "2": "Local wound care; medical intervention indicated (e.g., dressings or topical medications)", "3": "Operative debridement or other invasive intervention indicated (e.g., tissue reconstruction, flap, or grafting)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s13-arthralgia", "term": "Arthralgia", "definition": "A disorder characterized by a sensation of marked discomfort in a joint.", "nav": "Report Inflammatory arthritis as Musculoskeletal and connective tissue disorder - Other, specify (Inflammatory arthritis).", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-arthritis", "term": "Arthritis", "definition": "A disorder characterized by inflammation involving a joint.", "nav": "Report Inflammatory arthritis as Musculoskeletal and connective tissue disorder - Other, specify (Inflammatory arthritis).", "grades": {"1": "Mild pain with inflammation, erythema, or joint swelling", "2": "Moderate pain associated with signs of inflammation, erythema, or joint swelling; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain associated with signs of inflammation, erythema, or joint swelling; irreversible joint damage; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-back-pain", "term": "Back pain", "definition": "A disorder characterized by a sensation of marked discomfort in the back region.", "nav": "Consider Injury, poisoning and procedural complications: Infusion related reaction; Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-bone-pain", "term": "Bone pain", "definition": "A disorder characterized by a sensation of marked discomfort in the bones.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-buttock-pain", "term": "Buttock pain", "definition": "A disorder characterized by a sensation of marked discomfort in the buttocks.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-chest-wall-necrosis", "term": "Chest wall necrosis", "definition": "A disorder characterized by a necrotic process occurring in the soft tissues of the chest wall including breast.", "nav": "", "grades": {"1": "", "2": "Local wound care; medical intervention indicated (e.g., dressings or topical medications)", "3": "Operative debridement or other invasive intervention indicated (e.g., tissue reconstruction, flap, or grafting)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s13-chest-wall-pain", "term": "Chest wall pain", "definition": "A disorder characterized by a sensation of marked discomfort in the chest wall.", "nav": "Report Inflammatory costochondritis as Musculoskeletal and connective tissue disorder - Other, specify (Inflammatory costochondritis). Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-exostosis", "term": "Exostosis", "definition": "A disorder characterized by non-neoplastic overgrowth of bone.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; elective operative intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-fibrosis-deep-connective-tissue", "term": "Fibrosis deep connective tissue", "definition": "A disorder characterized by fibrotic degeneration of the deep connective tissues.", "nav": "", "grades": {"1": "Mild induration, able to move skin parallel to plane (sliding) and perpendicular to skin (pinching up)", "2": "Moderate induration, able to slide skin, unable to pinch skin; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe induration; unable to slide or pinch skin; limiting joint or orifice movement (e.g., mouth, anus); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Generalized; associated with signs or symptoms of impaired breathing or feeding", "5": "Death"}}, {"id": "s13-flank-pain", "term": "Flank pain", "definition": "A disorder characterized by a sensation of marked discomfort on the lateral side of the body in the region below the ribs and above the hip.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-generalized-muscle-weakness", "term": "Generalized muscle weakness", "definition": "A disorder characterized by a reduction in the strength of muscles in multiple anatomic sites.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Symptomatic; perceived by patient but not evident on physical exam", "2": "Symptomatic; evident on physical exam; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-growth-accelerated", "term": "Growth accelerated", "definition": "A disorder characterized by greater growth than expected for age.", "nav": "", "grades": {"1": "", "2": ">=+2 SD (standard deviation) above mid parental height or target height", "3": "", "4": "", "5": ""}}, {"id": "s13-growth-suppression", "term": "Growth suppression", "definition": "A disorder characterized by stature that is smaller than normal as expected for age.", "nav": "", "grades": {"1": "Reduction in growth velocity by 10 - 29% ideally measured over the period of a year", "2": "Reduction in growth velocity by 30 - 49% ideally measured over the period of a year or 0 - 49% reduction in growth from the baseline growth curve", "3": "Reduction in growth velocity of >=50% ideally measured over the period of a year", "4": "", "5": ""}}, {"id": "s13-head-soft-tissue-necrosis", "term": "Head soft tissue necrosis", "definition": "A disorder characterized by a necrotic process occurring in the soft tissues of the head.", "nav": "Consider Respiratory, thoracic and mediastinal disorders: Sinus disorder, Grade 4.", "grades": {"1": "", "2": "Local wound care; medical intervention indicated (e.g., dressings or topical medications)", "3": "Operative debridement or other invasive intervention indicated (e.g., tissue reconstruction, flap, or grafting)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s13-joint-effusion", "term": "Joint effusion", "definition": "A disorder characterized by matory arthritis as Musculoskeletal and connective tissue disorder - Other, specify (Inflammatory arthritis).", "grades": {"1": "Stiffness; difficulty bending to the floor to pick up a very light object but able to do athletic activity", "2": "Pain with range of motion (ROM) in lumbar spine; requires a reaching aid to pick up a very light object from the floor", "3": "<50% lumbar spine flexion; associated with symptoms of ankylosis or fused over multiple segments with no L-spine flexion (e.g., unable to reach to floor to pick up a very light object)", "4": "", "5": ""}}, {"id": "s13-kyphosis", "term": "Kyphosis", "definition": "A disorder characterized by an abnormal increase in the curvature of the thoracic portion of the spine.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate accentuation; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe accentuation; operative intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-lordosis", "term": "Lordosis", "definition": "A disorder characterized by an abnormal increase in the curvature of the lumbar portion of the spine.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate accentuation; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe accentuation; operative intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-muscle-cramp", "term": "Muscle cramp", "definition": "A disorder characterized by marked cramping sensation originating from a muscle or group of muscles.", "nav": "Synonym: Muscle spasm", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-muscle-weakness-lower-limb", "term": "Muscle weakness lower limb", "definition": "A disorder characterized by a reduction in the strength of the lower limb muscles.", "nav": "Consider Musculoskeletal and connective tissue disorders: Myositis; Immune system disorders: Immune system disorders - Other, specify; Injury, poisoning and procedural complications: Fall.", "grades": {"1": "Symptomatic; perceived by patient but not evident on physical exam", "2": "Symptomatic; evident on physical exam; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-muscle-weakness-trunk", "term": "Muscle weakness trunk", "definition": "A disorder characterized by a reduction in the strength of the trunk muscles.", "nav": "Consider Musculoskeletal and connective tissue disorders: Myositis; Immune system disorders: Immune system disorders - Other, specify; Injury, poisoning and procedural complications: Fall.", "grades": {"1": "Symptomatic; perceived by patient but not evident on physical exam", "2": "Symptomatic; evident on physical exam; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s13-muscle-weakness-upper-limb", "term": "Muscle weakness upper limb", "definition": "A disorder characterized by a reduction in the strength of the upper limb muscles.", "nav": "Consider Musculoskeletal and connective tissue disorders: Myositis; Immune system disorders: Immune system disorders -
