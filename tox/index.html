g instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Persistent or copious production of sputum; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-pulmonary-edema", "term": "Pulmonary edema", "definition": "A disorder characterized by accumulation of fluid in the lung tissues that causes a disturbance of the gas exchange that may lead to respiratory failure.", "nav": "Unless there is a clear non-cardiac cause, please record this event as Cardiac disorders: Heart failure. Record final diagnosis/cause once determined.", "grades": {"1": "Radiologic findings only; minimal dyspnea on exertion", "2": "Moderate dyspnea on exertion; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe dyspnea or dyspnea at rest; oxygen indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening respiratory compromise; urgent intervention or intubation with ventilatory support indicated", "5": "Death"}}, {"id": "s19-pulmonary-fibrosis", "term": "Pulmonary fibrosis", "definition": "A disorder characterized by the replacement of the lung tissue by connective tissue, leading to progressive dyspnea, respiratory failure or right heart failure.", "nav": "", "grades": {"1": "Radiologic pulmonary fibrosis <25% of lung volume associated with hypoxia", "2": "Evidence of pulmonary hypertension; radiographic pulmonary fibrosis 25 - 50% associated with hypoxia", "3": "Severe hypoxia; evidence of right-sided heart failure; radiographic pulmonary fibrosis >50 - 75%", "4": "Life-threatening consequences (e.g., hemodynamic/pulmonary complications); intubation with ventilatory support indicated; radiographic pulmonary fibrosis >75% with severe honeycombing", "5": "Death"}}, {"id": "s19-pulmonary-fistula", "term": "Pulmonary fistula", "definition": "A disorder characterized by an abnormal communication between the lung and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-pulmonary-hypertension", "term": "Pulmonary hypertension", "definition": "A disorder characterized by an increase in pressure within the pulmonary circulation due to lung or heart disorder.", "nav": "", "grades": {"1": "Asymptomatic; radiographic, physical, or diagnostic findings", "2": "Symptomatic; requiring medical intervention", "3": "Severe symptoms, associated with hypoxia, right heart failure; oxygen indicated", "4": "Life-threatening airway consequences; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-respiratory-failure", "term": "Respiratory failure", "definition": "A disorder characterized by impaired gas exchange by the respiratory system resulting in hypoxia and a decrease in oxygenation of the tissues that may be associated with an increase in arterial levels of carbon dioxide.", "nav": "Consider Respiratory, thoracic and mediastinal disorders: Pneumonitis.", "grades": {"1": "", "2": "", "3": "", "4": "Life-threatening consequences; urgent intervention, intubation, or ventilatory support indicated", "5": "Death"}}, {"id": "s19-rhinorrhea", "term": "Rhinorrhea", "definition": "A disorder characterized by excessive mucous secretions draining from the nose.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s19-sinus-disorder", "term": "Sinus disorder", "definition": "A disorder characterized by involvement of the paranasal sinuses.", "nav": "", "grades": {"1": "Asymptomatic mucosal crusting; blood-tinged secretions", "2": "Symptomatic stenosis or edema/narrowing interfering with airflow; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stenosis with significant nasal obstruction; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Necrosis of soft tissue or bone; urgent operative intervention indicated", "5": "Death"}}, {"id": "s19-sinus-pain", "term": "Sinus pain", "definition": "A disorder characterized by a sensation of marked discomfort in the face, between the eyes, or upper teeth originating from the sinuses.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-sleep-apnea", "term": "Sleep apnea", "definition": "A disorder characterized by cessation of breathing for short periods during sleep.", "nav": "", "grades": {"1": "Snoring and nocturnal sleep arousal without apneic periods", "2": "Moderate apnea and oxygen desaturation; excessive daytime sleepiness; medical evaluation indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Oxygen desaturation; associated with pulmonary hypertension; medical intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Cardiovascular or neuropsychiatric symptoms; urgent operative intervention indicated", "5": "Death"}}, {"id": "s19-sneezing", "term": "Sneezing", "definition": "A disorder characterized by the involuntary expulsion of air from the nose.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; medical intervention indicated", "3": "", "4": "", "5": ""}}, {"id": "s19-sore-throat", "term": "Sore throat", "definition": "A disorder characterized by marked discomfort in the throat.", "nav": "", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting ability to swallow; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s19-stridor", "term": "Stridor", "definition": "A disorder characterized by a high pitched breathing sound due to laryngeal or upper airway obstruction.", "nav": "", "grades": {"1": "", "2": "", "3": "Respiratory distress; medical intervention indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-tracheal-fistula", "term": "Tracheal fistula", "definition": "A disorder characterized by an abnormal communication between the trachea and another organ or anatomic site.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic, invasive intervention not indicated", "3": "Invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-tracheal-mucositis", "term": "Tracheal mucositis", "definition": "A disorder characterized by an inflammation or ulceration involving the mucous membrane of the trachea.", "nav": "", "grades": {"1": "Endoscopic findings only; minimal hemoptysis, pain, or respiratory symptoms", "2": "Moderate symptoms; medical intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; hemorrhage or respiratory symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s19-tracheal-stenosis", "term": "Tracheal stenosis", "definition": "A disorder characterized by a narrowing of the trachea.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic (e.g., noisy airway breathing), no respiratory distress; medical intervention indicated (e.g., steroids); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Stridor or respiratory distress; invasive intervention indicated (e.g., stent, laser); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening airway compromise; urgent intervention indicated (e.g., tracheotomy or intubation)", "5": "Death"}}, {"id": "s19-voice-alteration", "term": "Voice alteration", "definition": "A disorder characterized by a change in the sound and/or speed of the voice.", "nav": "", "grades": {"1": "Mild or intermittent change from normal voice", "2": "Moderate or persistent change from normal voice; still understandable", "3": "Severe voice changes including predominantly whispered speech; may require frequent repetition or face-to-face contact for understandability; may require assistive technology", "4": "", "5": ""}}, {"id": "s19-respiratory-thoracic-and-mediastinal-disorders-other-specify", "term": "Respiratory, thoracic and mediastinal disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Skin and subcutaneous tissue disorders", "short": "Skin / subcutaneous", "id": "soc20", "terms": [{"id": "s20-alopecia", "term": "Alopecia", "definition": "A disorder characterized by a decrease in density of hair compared to normal for a given individual at a given age and body location.", "nav": "", "grades": {"1": "Hair loss of <50% of normal for that individual that is not obvious from a distance but only on close inspection; a different hair style may be required to cover the hair loss but it does not require a wig or hair piece to camouflage", "2": "Hair loss of >=50% normal for that individual that is readily apparent to others; a wig or hair piece is necessary if the patient desires to completely camouflage the hair loss; associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-body-odor", "term": "Body odor", "definition": "A disorder characterized by an abnormal body smell resulting from the growth of bacteria on the body.", "nav": "", "grades": {"1": "Mild odor; physician intervention not indicated; self care interventions", "2": "Pronounced odor; psychosocial impact; patient seeks medical intervention", "3": "", "4": "", "5": ""}}, {"id": "s20-dermatitis-psoriasiform", "term": "Dermatitis psoriasiform", "definition": "A disorder characterized by large, red, rounded plaques covered with thicker scales.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-dermatosis-bullous", "term": "Dermatosis bullous", "definition": "A disorder characterized by inflammation of the skin characterized by the presence of bullae which are filled with fluid.", "nav": "If infectious, consider Infections and infestations: Rash pustular or other site-specific Infections and infestations term.", "grades": {"1": "Asymptomatic", "2": "Painful blisters; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Blisters covering >50% BSA; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Blisters covering >75% BSA; associated with fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-dry-skin", "term": "Dry skin", "definition": "A disorder characterized by flaky and dull skin; the pores are generally fine, the texture is a papery thin texture.", "nav": "", "grades": {"1": "No associated erythema or pruritus", "2": "Associated with erythema or pruritus; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s20-eczematous-dermatitis", "term": "Eczematous dermatitis", "definition": "A disorder characterized by dry and itchy patches of skin involving the epidermis and superficial dermis and includes some scaling, crusting, or serous oozing.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "Oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-erythema-multiforme", "term": "Erythema multiforme", "definition": "A disorder characterized by target lesions (a pink-red ring around a pale center).", "nav": "", "grades": {"1": "Not associated with skin tenderness", "2": "Associated with skin tenderness", "3": "Associated with oral or genital erosions", "4": "Associated with fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-erythroderma", "term": "Erythroderma", "definition": "A disorder characterized by generalized inflammatory erythema and exfoliation. The inflammatory process involves >90% of the body surface area.", "nav": "", "grades": {"1": "", "2": "Erythema covering >90% BSA without associated symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Erythema covering >90% BSA with associated symptoms (e.g., pruritus or tenderness); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Erythema covering >90% BSA with associated fluid or electrolyte abnormalities; ICU care or burn unit indicated", "5": "Death"}}, {"id": "s20-exfoliative-dermatitis", "term": "Exfoliative dermatitis", "definition": "A disorder characterized by diffuse erythema and scaling involving > 90% of the body surface area.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s20-hair-color-changes", "term": "Hair color changes", "definition": "A disorder characterized by change in hair color or loss of normal pigmentation.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-hair-texture-abnormal", "term": "Hair texture abnormal", "definition": "A disorder characterized by a change in the way the hair feels.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-hirsutism", "term": "Hirsutism", "definition": "A disorder characterized by the presence of excess hair growth in women in anatomic sites where growth is considered to be a secondary male characteristic and under androgen control (beard, moustache, chest, abdomen).", "nav": "", "grades": {"1": "In women, increase in length, thickness or density of hair in a male distribution that the patient is able to camouflage by periodic shaving, bleaching, or removal of hair", "2": "In women, increase in length, thickness or density of hair in a male distribution that requires daily shaving or consistent destructive means of hair removal to camouflage; associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-hyperhidrosis", "term": "Hyperhidrosis", "definition": "A disorder characterized by excessive sweating.", "nav": "Synonym: Night sweats, diaphoresis.", "grades": {"1": "Limited to one site (palms, soles, or axillae); self care interventions", "2": "Involving >1 site; patient seeks medical intervention; associated with psychosocial impact", "3": "Associated with electrolyte/hemodynamic imbalance", "4": "", "5": ""}}, {"id": "s20-hyperkeratosis", "term": "Hyperkeratosis", "definition": "A disorder characterized by a thickening of the outer layer of the skin.", "nav": "", "grades": {"1": "Present", "2": "", "3": "Limiting self-care ADLs or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-hypertrichosis", "term": "Hypertrichosis", "definition": "A disorder characterized by hair density or length beyond the accepted limits of normal in a particular body region, for a particular age or race.", "nav": "", "grades": {"1": "Increase in length, thickness or density of hair that the patient is either able to camouflage by periodic shaving or removal of hairs or is not concerned enough about the overgrowth to use any form of hair removal", "2": "Increase in length, thickness or density of hair at least on the usual exposed areas of the body [face (not limited to beard/moustache area) plus/minus arms] that requires frequent shaving or use of destructive means of hair removal to camouflage; associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-hypohidrosis", "term": "Hypohidrosis", "definition": "A disorder characterized by reduced sweating.", "nav": "", "grades": {"1": "", "2": "Symptomatic; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Increase in body temperature; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s20-lichenoid-dermatitis", "term": "Lichenoid dermatitis", "definition": "A disorder characterized by a symmetric eruption of flat-topped, red or purple papules on the trunk and extremities.", "nav": "", "grades": {"1": "Present; topical intervention indicated", "2": "oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-nail-changes", "term": "Nail changes", "definition": "A disorder characterized by a change in the nails.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-discoloration", "term": "Nail discoloration", "definition": "A disorder characterized by a change in the color of the nail plate.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-loss", "term": "Nail loss", "definition": "A disorder characterized by loss of all or a portion of the nail.", "nav": "", "grades": {"1": "Asymptomatic separation of the nail bed from the nail plate or nail loss", "2": "Symptomatic separation of the nail bed from the nail plate or nail loss; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "", "4": "", "5": ""}}, {"id": "s20-nail-ridging", "term": "Nail ridging", "definition": "A disorder characterized by vertical or horizontal ridges on the nails.", "nav": "", "grades": {"1": "Present", "2": "", "3": "", "4": "", "5": ""}}, {"id": "s20-pain-of-skin", "term": "Pain of skin", "definition": "A disorder characterized by a sensation of marked discomfort in the skin.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-palmar-plantar-erythrodysesthesia-syndrome", "term": "Palmar-plantar erythrodysesthesia syndrome", "definition": "A disorder characterized by redness, marked discomfort, swelling, and tingling in the palms of the hands or the soles of the feet. Also known as Hand-Foot Syndrome.", "nav": "", "grades": {"1": "Minimal skin changes or dermatitis (e.g., erythema, edema, or hyperkeratosis) without pain", "2": "Skin changes (e.g., peeling, blisters, bleeding, fissures, edema, or hyperkeratosis) with pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe skin changes (e.g., peeling, blisters, bleeding, fissures, edema, or hyperkeratosis) with pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-papulovesicular-rash", "term": "Papulovesicular rash", "definition": "A disorder characterized by an eruption consisting of papules (a small, raised pimple) and vesicles (a small fluid filled blister).", "nav": "", "grades": {"1": "Asymptomatic", "2": "Associated with psychosocial impact; mild symptoms", "3": "Covering >50% BSA; moderate or severe symptoms", "4": "Blisters covering >75% BSA; life-threatening consequences", "5": "Death"}}, {"id": "s20-photosensitivity", "term": "Photosensitivity", "definition": "A disorder characterized by an increase in sensitivity of the skin to light.", "nav": "", "grades": {"1": "Painless erythema", "2": "Tender erythema", "3": "Erythema with blistering; oral corticosteroid therapy indicated; pain control indicated (e.g., narcotics or NSAIDs)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s20-pruritus", "term": "Pruritus", "definition": "A disorder characterized by an intense itching sensation.", "nav": "", "grades": {"1": "Mild or localized; topical intervention indicated", "2": "Widespread and intermittent; skin changes from scratching (e.g., edema, papulation, excoriations, lichenification, oozing/crusts); oral intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Widespread and constant; systemic corticosteroid or immunosuppressive therapy indicated; limiting sleep or self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-purpura", "term": "Purpura", "definition": "A disorder characterized by hemorrhagic areas of the skin and mucous membrane. Newer lesions appear reddish in color. Older lesions are usually a darker purple color and eventually become a brownish-yellow color.", "nav": "", "grades": {"1": "Combined area of lesions covering <10% BSA", "2": "Combined area of lesions covering 10 - 30% BSA", "3": "Combined area of lesions covering >30% BSA", "4": "", "5": ""}}, {"id": "s20-pustular-drug-eruption", "term": "Pustular drug eruption", "definition": "A disorder characterized by the development of nonfollicular, sterile pustules on an erythematous base.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Associated with psychosocial impact; oral antibiotics or steroid indicated; local intervention indicated (e.g., topical antibiotic, antifungal, or antiviral); limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; IV antibiotic or steroid indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s20-rash-maculo-papular", "term": "Rash maculo-papular", "definition": "A disorder characterized by the presence of macules (flat) and papules (elevated). Also known as morbilliform rash, it is one of the most common cutaneous adverse events, frequently affecting the upper trunk, spreading centripetally and associated with pruritis.", "nav": "Consider Skin and subcutaneous tissue disorders: Pustular drug eruption.", "grades": {"1": "Asymptomatic", "2": "Mild symptoms", "3": "Macules/papules covering >50% BSA; moderate or severe symptoms", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s20-scalp-pain", "term": "Scalp pain", "definition": "A disorder characterized by a sensation of marked discomfort in the skin covering the top and the back of the head.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Mild pain", "2": "Moderate pain; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe pain; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-skin-atrophy", "term": "Skin atrophy", "definition": "A disorder characterized by the degeneration and thinning of the epidermis and dermis.", "nav": "", "grades": {"1": "Associated with telangiectasias or changes in skin color", "2": "Associated with striae or adnexal structure loss", "3": "Associated with ulceration", "4": "", "5": ""}}, {"id": "s20-skin-hyperpigmentation", "term": "Skin hyperpigmentation", "definition": "A disorder characterized by darkening of the skin due to excessive melanin deposition.", "nav": "", "grades": {"1": "Present", "2": "Associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-skin-hypopigmentation", "term": "Skin hypopigmentation", "definition": "A disorder characterized by loss of skin pigment (e.g., vitiligo).", "nav": "", "grades": {"1": "Present", "2": "Associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-skin-induration", "term": "Skin induration", "definition": "A disorder characterized by an area of hardness in the skin.", "nav": "", "grades": {"1": "Mild induration, able to move skin parallel to plane (sliding) and perpendicular to skin (pinching up)", "2": "Moderate induration, able to slide skin, unable to pinch skin; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe induration; unable to slide or pinch skin; limiting joint or orifice movement (e.g., mouth, anus); limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Generalized; associated with signs or symptoms of impaired breathing or feeding", "5": "Death"}}, {"id": "s20-skin-ulceration", "term": "Skin ulceration", "definition": "A disorder characterized by a circumscribed, erosive lesion on the skin.", "nav": "", "grades": {"1": "Combined area of ulcers <1 cm; nonblanchable erythema of intact skin with associated warmth or edema", "2": "Combined area of ulcers 1 - 2 cm; partial thickness skin loss involving skin or subcutaneous fat", "3": "Combined area of ulcers >2 cm; full-thickness skin loss involving damage to or necrosis of subcutaneous tissue that may extend down to fascia", "4": "Any size ulcer with extensive destruction, tissue necrosis, or damage to muscle, bone, or supporting structures with or without full thickness skin loss", "5": "Death"}}, {"id": "s20-stevens-johnson-syndrome", "term": "Stevens-Johnson syndrome", "definition": "A disorder characterized by less than 10% total body skin area separation of dermis. The syndrome is thought to be a hypersensitivity complex affecting the skin and the mucous membranes.", "nav": "", "grades": {"1": "", "2": "", "3": "Skin sloughing covering <10% BSA", "4": "Skin sloughing covering >=10% BSA; life-threatening consequences", "5": "Death"}}, {"id": "s20-subcutaneous-emphysema", "term": "Subcutaneous emphysema", "definition": "A disorder characterized by air in the subcutaneous tissue.", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s20-telangiectasia", "term": "Telangiectasia", "definition": "A disorder characterized by local dilatation of small vessels resulting in red discoloration of the skin or mucous membranes.", "nav": "", "grades": {"1": "Present", "2": "Associated with psychosocial impact", "3": "", "4": "", "5": ""}}, {"id": "s20-toxic-epidermal-necrolysis", "term": "Toxic epidermal necrolysis", "definition": "A disorder characterized by greater than 30% total body skin area separation of dermis. The syndrome is thought to be a hypersensitivity complex affecting the skin and the mucous membranes.", "nav": "", "grades": {"1": "", "2": "", "3": "", "4": "Skin sloughing covering >=30% BSA with associated symptoms (e.g., erythema, purpura, or epidermal detachment); life-threatening consequences", "5": "Death"}}, {"id": "s20-urticaria", "term": "Urticaria", "definition": "A disorder characterized by an itchy skin eruption characterized by wheals with pale interiors and well-defined red margins.", "nav": "Consider Immune system disorders: Allergic reaction, Anaphylaxis.", "grades": {"1": "Topical intervention indicated", "2": "Oral intervention indicated", "3": "IV intervention indicated", "4": "", "5": ""}}, {"id": "s20-skin-and-subcutaneous-tissue-disorders-other-specify", "term": "Skin and subcutaneous tissue disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}, {"soc": "Vascular disorders", "short": "Vascular", "id": "soc21", "terms": [{"id": "s21-arterial-thromboembolism", "term": "Arterial thromboembolism", "definition": "A disorder characterized by occlusion of an arterial vessel by a blood clot that develops in an artery.", "nav": "Consider Nervous system disorders: Stroke, Transient ischemic attacks for CNS-related events or Cardiac disorders: Myocardial infarction.", "grades": {"1": "", "2": "", "3": "Urgent intervention indicated", "4": "Life-threatening consequences; hemodynamic or neurologic instability; organ damage; loss of extremity(ies)", "5": "Death"}}, {"id": "s21-capillary-leak-syndrome", "term": "Capillary leak syndrome", "definition": "A disorder characterized by leakage of intravascular fluids into the extravascular space. This syndrome is observed in patients who demonstrate a state of generalized leaky capillaries following shock syndromes, low-flow states, ischemia-reperfusion injuries, toxemias, medications, or poisoning. It can lead to generalized edema and multiple organ failure.", "nav": "", "grades": {"1": "Asymptomatic", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms", "4": "Life-threatening consequences", "5": "Death"}}, {"id": "s21-cyanosis", "term": "Cyanosis", "definition": "A disorder characterized by a bluish discoloration of the skin and/or mucous membranes.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s21-flushing", "term": "Flushing", "definition": "A disorder characterized by episodic reddening of the skin, especially face, neck, or chest.", "nav": "", "grades": {"1": "Mild symptoms; clinical or diagnostic observations only", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Symptomatic, associated with hypotension and/or tachycardia; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s21-hematoma", "term": "Hematoma", "definition": "A disorder characterized by a localized collection of blood, usually clotted, in an organ, space, or tissue, due to a break in the wall of a blood vessel.", "nav": "Report subdural and epidural hematoma under Nervous system disorders: Intracranial hemorrhage.", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Minimally invasive evacuation or aspiration indicated", "3": "Transfusion; invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s21-hot-flashes", "term": "Hot flashes", "definition": "A disorder characterized by an uncomfortable and temporary sensation of intense body warmth, flushing, sometimes accompanied by sweating upon cooling.", "nav": "", "grades": {"1": "Mild symptoms; intervention not indicated", "2": "Moderate symptoms; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s21-hypertension", "term": "Hypertension", "definition": "A disorder characterized by a pathological increase in blood pressure.", "nav": "", "grades": {"1": "", "2": "Adult: Systolic BP 140 - 159 mmHg or diastolic BP 90 - 99 mmHg; recurrent or persistent; Pediatric and adolescent: Recurrent or persistent (>=24 hrs) BP >ULN; monotherapy indicated; systolic and /or diastolic BP between the 95th percentile and 5 mmHg above the 99th percentile; Adolescent: Systolic between 130 - 139 or diastolic between 80 - 89 even if <95th percentile", "3": "Adult: Systolic BP 160 - 179 mmHg or diastolic BP 100 - 109 mmHg persisting over 1 hour; SBP >140 and plus either increase in SBP >20 mmHg or increase MAP >15 mmHg from baseline; Pediatric and adolescent: Systolic and/or diastolic >5 mmHg above the 99 th percentile", "4": "Adult and Pediatric: SBP≥180 or DBP ≥110 mmHg persisting over 1 hour; BP associated with acute hypertension mediated organ damage; life-threatening consequences (e.g., malignant hypertension, transient or permanent neurologic deficit, hypertensive crisis); urgent intervention indicated", "5": "Death"}}, {"id": "s21-hypotension", "term": "Hypotension", "definition": "A disorder characterized by a blood pressure that is below the normal expected for an individual in a given environment.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Non-urgent medical intervention indicated", "3": "Medical intervention indicated; hospitalization indicated", "4": "Life-threatening consequences and urgent intervention indicated", "5": "Death"}}, {"id": "s21-lymph-leakage", "term": "Lymph leakage", "definition": "A disorder characterized by the loss of lymph fluid into the surrounding tissue or body cavity.", "nav": "", "grades": {"1": "", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}, {"id": "s21-lymphedema", "term": "Lymphedema", "definition": "A disorder characterized by excessive fluid collection in tissues that causes swelling.", "nav": "Record final diagnosis/cause once determined.", "grades": {"1": "Trace thickening or faint discoloration", "2": "Marked discoloration; leathery skin texture; papillary formation; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe symptoms; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "", "5": ""}}, {"id": "s21-lymphocele", "term": "Lymphocele", "definition": "A disorder characterized by a cystic lesion containing lymph.", "nav": "", "grades": {"1": "Asymptomatic; clinical or diagnostic observations only; intervention not indicated", "2": "Symptomatic; medical intervention indicated", "3": "Severe symptoms; invasive intervention indicated", "4": "", "5": ""}}, {"id": "s21-peripheral-ischemia", "term": "Peripheral ischemia", "definition": "A disorder characterized by impaired circulation to an extremity.", "nav": "", "grades": {"1": "", "2": "Brief (<24 hrs) episode of ischemia managed medically and without permanent deficit; claudication", "3": "Prolonged (>=24 hrs) or recurring symptoms and/or invasive intervention indicated; pain at rest", "4": "Life-threatening consequences; major tissue loss; urgent operative intervention indicated", "5": "Death"}}, {"id": "s21-phlebitis", "term": "Phlebitis", "definition": "A disorder characterized by inflammation of the wall of a peripheral vein associated with an intravenous line.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s21-superficial-thrombophlebitis", "term": "Superficial thrombophlebitis", "definition": "A disorder characterized by a blood clot and inflammation involving a superficial vein of the extremities.", "nav": "", "grades": {"1": "", "2": "Present", "3": "", "4": "", "5": ""}}, {"id": "s21-superior-vena-cava-syndrome", "term": "Superior vena cava syndrome", "definition": "A disorder characterized by obstruction of the blood flow in the superior vena cava. Signs and symptoms include swelling and cyanosis of the face, neck, and upper arms, cough, orthopnea and headache.", "nav": "", "grades": {"1": "Asymptomatic; incidental finding of SVC thrombosis", "2": "Symptomatic; medical intervention indicated (e.g., anticoagulation, radiation or chemotherapy)", "3": "Severe symptoms; multi-modality intervention indicated (e.g., anticoagulation, chemotherapy, radiation, stenting)", "4": "Life-threatening consequences; urgent multi-modality intervention indicated (e.g., lysis, thrombectomy, surgery)", "5": "Death"}}, {"id": "s21-vasculitis", "term": "Vasculitis", "definition": "A disorder characterized by inflammation involving the wall of a vessel.", "nav": "", "grades": {"1": "Asymptomatic, intervention not indicated", "2": "Moderate symptoms, medical intervention indicated", "3": "Severe symptoms, medical intervention indicated (e.g., steroids)", "4": "Life-threatening consequences; evidence of peripheral or visceral ischemia; urgent intervention indicated", "5": "Death"}}, {"id": "s21-venous-thromboembolism", "term": "Venous thromboembolism", "definition": "A disorder characterized by occlusion of a vessel by a thrombus that has migrated from a distal site via the blood stream (for example, deep vein thrombosis (DVT), pulmonary embolism (PE), etc.).", "nav": "Consider Nervous system disorders: Stroke, Transient ischemic attacks for CNS-related events. Use Vascular disorders: Arterial thromboembolism for arterial thrombi. Use Injury, poisoning and procedural complications: Vascular access complication if related to a catheter.", "grades": {"1": "Medical intervention not indicated (e.g., superficial thrombosis)", "2": "Medical intervention indicated", "3": "Urgent medical intervention indicated", "4": "Life-threatening consequences with hemodynamic or neurologic instability", "5": "Death"}}, {"id": "s21-vascular-disorders-other-specify", "term": "Vascular disorders - Other, specify", "definition": "", "nav": "", "grades": {"1": "Asymptomatic or mild symptoms; clinical or diagnostic observations only; intervention not indicated", "2": "Moderate; minimal, local or noninvasive intervention indicated; limiting instrumental ADL or mild/moderate impact on age-appropriate normal daily activity (pediatric)", "3": "Severe or medically significant but not immediately life-threatening; hospitalization or prolongation of existing hospitalization indicated; limiting self-care ADL or severe impact on age-appropriate normal daily activity (pediatric)", "4": "Life-threatening consequences; urgent intervention indicated", "5": "Death"}}]}], "converters": [{"id": "hgb", "name": "Haemoglobin", "base": "g/dL", "units": [{"u": "g/dL", "f": 1.0}, {"u": "g/L", "f": 10.0}, {"u": "mmol/L", "f": 0.6206}], "note": "CTCAE Anaemia grades in g/dL, mmol/L and g/L."}, {"id": "ca", "name": "Calcium", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "mmol/L", "f": 0.2495}], "note": "For corrected serum or ionised calcium (same molar factor)."}, {"id": "creat", "name": "Creatinine", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "µmol/L", "f": 88.42}], "note": null}, {"id": "bili", "name": "Bilirubin", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "µmol/L", "f": 17.1}], "note": null}, {"id": "glu", "name": "Glucose", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "mmol/L", "f": 0.05551}], "note": null}, {"id": "mg", "name": "Magnesium", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "mmol/L", "f": 0.4114}, {"u": "mEq/L", "f": 0.8226}], "note": null}, {"id": "phos", "name": "Phosphate", "base": "mg/dL", "units": [{"u": "mg/dL", "f": 1.0}, {"u": "mmol/L", "f": 0.3229}], "note": null}, {"id": "urea", "name": "Urea / BUN", "base": "mg/dL (BUN)", "units": [{"u": "mg/dL (BUN)", "f": 1.0}, {"u": "mmol/L (urea)", "f": 0.3571}], "note": "BUN (mg/dL) ↔ urea (mmol/L)."}, {"id": "alb", "name": "Albumin", "base": "g/dL", "units": [{"u": "g/dL", "f": 1.0}, {"u": "g/L", "f": 10.0}], "note": null}]};
const $=s=>document.querySelector(s);
$('#stag').textContent = MODEL.meta.tag; $('#mtag').textContent = MODEL.meta.tag;
let activeSoc='', query='';

// sidebar SOC nav
const socnav=$('#socnav');
function buildNav(){
 socnav.innerHTML='';
 const mk=(label,count,soc)=>{
  const a=document.createElement('a');
  a.className=(activeSoc===soc?'on':'');
  a.innerHTML=`<span>${label}</span><span class="c">${count}</span>`;
  a.onclick=()=>{activeSoc=soc;query='';$('#q').value='';render();document.body.classList.remove('nav-open');window.scrollTo(0,0);};
  socnav.appendChild(a);
 };
 mk('All SOCs', MODEL.meta.n_terms, '');
 MODEL.socs.forEach(s=>{ if(s.terms.length) mk(s.short, s.terms.length, s.soc); });
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hi(s){
 if(!query) return esc(s);
 const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
 return esc(s).replace(re,'<mark>$1</mark>');
}
function ladder(t){
 let h='<div class="ladder">';
 for(const g of ['1','2','3','4','5']){
  const v=t.grades[g];
  h+=`<div class="grow g${g}"><div class="gtag">G${g}</div>`+
     (v?`<div class="gtxt">${hi(v)}</div>`:`<div class="gtxt empty">—</div>`)+`</div>`;
 }
 return h+'</div>';
}
function calcWidget(t){
 if(!t.calc) return '';
 const c=t.calc, multi=c.scales.length>1;
 const pills = multi ? '<div class="calc-scales">'+c.scales.map((s,i)=>
    `<button class="csc${i===0?' on':''}" data-i="${i}">${scaleName(c,s)}</button>`).join('')+'</div>' : '';
 const note = c.note ? `<div class="calc-note">${esc(c.note)}</div>` : '';
 return `<div class="calc" data-tid="${t.id}" data-scale="0">`+
  `<div class="calc-h">Grade calculator · ${esc(c.analyte)}</div>`+
  pills+`<div class="calc-in"></div><div class="calc-out"></div>${note}</div>`;
}
function card(t,open){
 const def=t.definition?`<div class="def">${hi(t.definition)}</div>`:'';
 const nav=t.nav?`<div class="nav"><b>Navigational note:</b> ${hi(t.nav)}</div>`:'';
 return `<details class="term" id="${t.id}"${open?' open':''}>`+
  `<summary><span class="tname">${hi(t.term)}</span>`+
  `<span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span></summary>`+
  `<div class="body">${def}${calcWidget(t)}${ladder(t)}${nav}</div></details>`;
}
// ---- grade calculator engine (mirrors verify_thresholds.py) ----
const CALCMAP={}; MODEL.socs.forEach(s=>s.terms.forEach(t=>{if(t.calc)CALCMAP[t.id]=t.calc;}));
function gradeScale(sc,v){
 const num=typeof sc.mildRef==='number';
 if(sc.dir==='high'){ if(num&&v<=sc.mildRef)return 0; for(const [e,g] of sc.cuts){if(v<=e)return g;} return sc.top; }
 else{ if(num&&v>=sc.mildRef)return 0; for(const [e,g] of sc.cuts){if(v>=e)return g;} return sc.top; }
}
function scaleName(c,s){ // pill label: unit alone if all scales share a label, else "label · unit"
 const sameLabel=c.scales.every(x=>x.label===c.scales[0].label);
 return sameLabel? esc(s.unit) : esc(s.label+' · '+s.unit);
}
function buildCalcInputs(w){
 const c=CALCMAP[w.dataset.tid], sc=c.scales[+w.dataset.scale||0], inp=w.querySelector('.calc-in');
 if(sc.kind==='ratio'){
  inp.innerHTML=`<input type="number" inputmode="decimal" step="any" data-r="val" placeholder="value">`+
   `<span class="u">÷</span><input type="number" inputmode="decimal" step="any" data-r="uln" placeholder="ULN">`+
   `<span class="u">= <span data-r="ratio">—</span></span>`;
 } else {
  inp.innerHTML=`<input type="number" inputmode="decimal" step="any" data-r="val" placeholder="value">`+
   `<span class="u">${esc(sc.unit)}</span>`;
 }
 computeCalc(w);
}
function computeCalc(w){
 const c=CALCMAP[w.dataset.tid], sc=c.scales[+w.dataset.scale||0], out=w.querySelector('.calc-out');
 const val=parseFloat(w.querySelector('[data-r="val"]').value);
 let v=val, ratioSpan=w.querySelector('[data-r="ratio"]');
 if(sc.kind==='ratio'){
  const uln=parseFloat(w.querySelector('[data-r="uln"]').value);
  if(isNaN(val)||isNaN(uln)||uln<=0){ if(ratioSpan)ratioSpan.textContent='—'; out.innerHTML=''; return; }
  v=val/uln; if(ratioSpan)ratioSpan.textContent=v.toFixed(2)+'× ULN';
 }
 if(isNaN(v)){ out.innerHTML=''; return; }
 const g=gradeScale(sc,v);
 let note='';
 const strRef=(typeof sc.mildRef==='string');
 const mildGrade=sc.cuts[0][1];
 if(g===0){ note='within normal range'; }
 else if(g===mildGrade && strRef){ note=(sc.dir==='high'?'if above ':'if below ')+sc.mildRef+' (otherwise normal)'; }
 if(sc.caveat && sc.caveat[String(g)]){ note=(note?note+' · ':'')+sc.caveat[String(g)]; }
 const label = g===0 ? 'Normal' : 'Grade '+g;
 out.innerHTML=`<span class="gchip c${g}">${label}</span>`+(note?`<span class="cnote">${esc(note)}</span>`:'');
}

function render(){
 buildNav();
 const q=query.toLowerCase(), auto=q.length>=2;
 let shown=0; const list=$('#list'); list.innerHTML='';
 MODEL.socs.forEach(s=>{
  if(activeSoc && s.soc!==activeSoc) return;
  let items=s.terms;
  if(q) items=items.filter(t=>t.term.toLowerCase().includes(q)||(t.definition&&t.definition.toLowerCase().includes(q)));
  if(!items.length) return;
  let html=`<section class="socgroup"><div class="soch"><h2>${esc(s.short)}</h2><span class="n">${items.length} term${items.length>1?'s':''}</span></div>`;
  html+=items.map(t=>card(t, auto && shown<40)).join(''); html+='</section>';
  list.insertAdjacentHTML('beforeend', html); shown+=items.length;
 });
 $('#empty').style.display = shown?'none':'block';
 $('#count').textContent = (q||activeSoc) ? `${shown} of ${MODEL.meta.n_terms} terms`
   : `${MODEL.meta.n_terms} terms · ${MODEL.meta.n_socs} SOCs`;
 document.querySelectorAll('.calc').forEach(buildCalcInputs);
}
// delegated calculator interaction
$('#list').addEventListener('input',e=>{const w=e.target.closest('.calc');if(w)computeCalc(w);});
$('#list').addEventListener('click',e=>{const p=e.target.closest('.csc');if(!p)return;
 const w=p.closest('.calc');w.dataset.scale=p.dataset.i;
 w.querySelectorAll('.csc').forEach(x=>x.classList.remove('on'));p.classList.add('on');buildCalcInputs(w);});
$('#q').addEventListener('input',e=>{query=e.target.value.trim();if(query)activeSoc='';render();});

// converter
const CV=MODEL.converters; let cvActive=CV[0];
function buildConv(){
 const pick=$('#cvPick'); pick.innerHTML='';
 CV.forEach(c=>{const b=document.createElement('button');b.className='cvp'+(c.id===cvActive.id?' on':'');b.textContent=c.name;
  b.onclick=()=>{cvActive=c;fillUnits();pick.querySelectorAll('.cvp').forEach(p=>p.classList.remove('on'));b.classList.add('on');cvCompute();};pick.appendChild(b);});
 fillUnits();
}
function fillUnits(){const sel=$('#cvUnit');sel.innerHTML='';cvActive.units.forEach(u=>{const o=document.createElement('option');o.value=u.u;o.textContent=u.u;sel.appendChild(o);});$('#cvNote').textContent=cvActive.note||'';}
function fmt(x){if(!isFinite(x))return '—';const a=Math.abs(x);let s=a>=100?x.toFixed(1):a>=1?x.toFixed(2):x.toFixed(3);return s.replace(/\.?0+$/,'');}
function cvCompute(){
 const val=parseFloat($('#cvVal').value),unit=$('#cvUnit').value,src=cvActive.units.find(u=>u.u===unit),all=$('#cvAll');
 if(isNaN(val)||!src){all.innerHTML=cvActive.units.map(u=>`<div class="r"><span class="u">${u.u}</span><span class="v">—</span></div>`).join('');return;}
 const base=val/src.f;
 all.innerHTML=cvActive.units.map(u=>`<div class="r"><span class="u">${u.u}${u.u===unit?' (entered)':''}</span><span class="v">${fmt(base*u.f)}</span></div>`).join('');
}
$('#cvVal').addEventListener('input',cvCompute); $('#cvUnit').addEventListener('change',cvCompute);
$('#convBtn').onclick=()=>{$('#convModal').classList.add('show');document.body.classList.remove('nav-open');buildConv();cvCompute();$('#cvVal').focus();};
$('#convClose').onclick=()=>$('#convModal').classList.remove('show');
$('#convModal').addEventListener('click',e=>{if(e.target===$('#convModal'))$('#convModal').classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#convModal').classList.remove('show');});

// mobile drawer
$('#burger').onclick=()=>document.body.classList.toggle('nav-open');
$('#backdrop').onclick=()=>document.body.classList.remove('nav-open');

$('#lede').textContent = MODEL.meta.source;
$('#foot').innerHTML = '<b>For clinicians and medical education.</b> A terminology reference reproducing CTCAE v6.0 grade descriptions for personal reference; not medical advice or a substitute for clinical judgement.'+
 `<div class="disc">${MODEL.meta.source} Generated ${MODEL.meta.generated}.</div>`;
render();
</script>
</body>
</html>
