line", "History and physical, pulse oximetry (resting + ambulation); chest CT preferably with contrast (rule out PE / other etiologies). For grade >=2: infectious workup - nasal swab, sputum culture, blood culture, urine antigen (pneumococcus, legionella).", ""], ["Red flags", "New oxygen requirement / hypoxia, involvement of all lobes or >50% of parenchyma, or respiratory compromise -> admit. Steroid-refractory if no clinical improvement after 48-72 h of steroids.", "rf"], ["Rechallenge", "G1: may resume once radiographic improvement or resolution (if no improvement, treat as G2). G2: hold until <=G1. G3-4: permanently discontinue.", "rc"]], "grades": [["G1", "c1", "Asymptomatic; confined to one lobe or <25% of lung parenchyma; clinical/diagnostic observations only", [["ICI", "Hold, or proceed with close monitoring (NCCN: consider holding); may resume with radiographic improvement/resolution - if none, treat as G2"], ["Steroids", "Not routinely indicated"], ["Work-up +", "Monitor weekly (H&P, pulse oximetry); repeat chest imaging in 3-4 wk (NCCN 4-6 wk) or sooner if symptomatic; consider repeat spirometry / DLCO in 3-4 wk if baseline available"]], "ASCO 2021 · Table 3 (3.1 Pneumonitis), G1 · NCCN v1.2026 ICI_PULM-1"], ["G2", "c2", "Symptomatic; involves >1 lobe or 25-50% of parenchyma; medical intervention indicated; limiting instrumental ADL", [["ICI", "Hold until clinical improvement to <=G1"], ["Steroids", "Prednisone / methylprednisolone 1-2 mg/kg/day; taper over 4-6 wk once <=G1"], ["Escalation", "If no clinical improvement after 48-72 h of steroids, treat as G3. NCCN: mycophenolate mofetil as steroid-sparing agent for steroid-dependent pneumonitis at taper"], ["Work-up +", "Monitor >=weekly (H&P, pulse oximetry, +/- imaging); consider bronchoscopy with BAL +/- transbronchial biopsy; empiric antibiotics if infection remains in differential"], ["Referral", "Pulmonary + infectious disease consults"]], "ASCO 2021 · Table 3 (3.1 Pneumonitis), G2 · NCCN v1.2026 ICI_PULM-1"], ["G3", "c3", "Severe symptoms; hospitalization required; involves all lobes or >50% of parenchyma; limiting self-care ADL; oxygen indicated", [["ICI", "Permanently discontinue"], ["Steroids", "Methylprednisolone IV 1-2 mg/kg/day; assess response within 48 h; taper over 4-6 wk (NCCN >=6 wk)"], ["Escalation", "If no improvement after 48 h add second-line: infliximab, mycophenolate mofetil IV (NCCN 1-1.5 g BID), IVIG (2 g/kg over 2-5 days), or cyclophosphamide (NCCN preferred: IVIG or tocilizumab)"], ["Work-up +", "Inpatient care; infectious workup; bronchoscopy with BAL +/- transbronchial biopsy if tolerated; empiric broad-spectrum antibiotics (incl. atypicals) if infection not excluded"], ["Referral", "Pulmonary + infectious disease consults"]], "ASCO 2021 · Table 3 (3.1 Pneumonitis), G3-4 · NCCN v1.2026 ICI_PULM-2"], ["G4", "c4", "Life-threatening respiratory compromise; urgent intervention indicated (intubation)", [["ICI", "Permanently discontinue"], ["Steroids", "IV methylprednisolone 1-2 mg/kg/day; assess response within 48 h; taper over >=6 wk"], ["Escalation", "Add second-line if no improvement after 48 h - NCCN preferred IVIG or tocilizumab; also mycophenolate mofetil or infliximab 5 mg/kg (may repeat at 14 days)"], ["Work-up +", "Inpatient / ICU care; infectious workup incl. immunocompromised panel; bronchoscopy with BAL if feasible; empiric broad-spectrum antibiotics"], ["Referral", "Pulmonary + infectious disease consults"]], "ASCO 2021 · Table 3 (3.1 Pneumonitis), G3-4 · NCCN v1.2026 ICI_PULM-2"]]}, {"id": "irae-hypophysitis", "organ": "Endocrine", "name": "Hypophysitis", "cause": "CTLA-4 · combo > PD-1", "io": ["ctla4", "combo", "pd1"], "ctcae": [{"term": "Hypophysitis", "term_id": "s3-hypophysitis", "calc": false}, {"term": "Hypopituitarism", "term_id": "s3-hypopituitarism", "calc": false}], "shared": [["Exclude", "Pituitary metastasis / other sellar lesion (MRI if DI or mass symptoms).", ""], ["Baseline", "AM ACTH + cortisol, TSH, FT4, electrolytes (Na); ACTH stimulation if indeterminate; MRI brain with pituitary cuts, especially for diabetes insipidus / mass symptoms.", ""], ["Red flags", "Adrenal crisis — start corticosteroid FIRST when multiple deficiencies (other hormones accelerate cortisol clearance → crisis).", "rf"], ["Rechallenge", "Hold during acute phase; ICI may resume once stabilised on replacement (endocrinopathy exception).", "rc"]], "grades": [["G1", "c1", "Asymptomatic / mild", [["ICI", "Hold until stabilised on replacement, then resume (endocrinopathy exception)"], ["Replacement", "Hydrocortisone 15–20 mg/day divided for secondary AI; add thyroid replacement (goal FT4 upper-half range) AFTER adrenal replacement; other axes as needed"]], "ASCO 2021 · Table 4 (4.3), G1 · NCCN v1.2026 ICI_ENDO-3"], ["G2", "c2", "Moderate symptoms, ADL intact", [["ICI", "Hold until stabilised on replacement"], ["Replacement", "As G1 (adrenal first, then thyroid/other)"], ["Steroids", "Pulse prednisone 1 mg/kg/day if MRI swelling / optic chiasm threat; taper 1–2 wk to physiologic (≤5 mg)"], ["Referral", "Endocrinology"]], "ASCO 2021 · Table 4 (4.3), G2 · NCCN v1.2026 ICI_ENDO-3"], ["G3", "c3", "Severe symptoms; medically significant", [["ICI", "Hold"], ["Steroids", "IV stress-dose hydrocortisone 50–100 mg Q6–8h; oral pulse prednisone 1–2 mg/kg/day, taper ≥1–2 wk to physiologic"], ["Replacement", "Maintenance as G1"]], "ASCO 2021 · Table 4 (4.3), G3–4"], ["G4", "c4", "Life-threatening", [["ICI", "Hold; admit"], ["Steroids", "IV stress-dose hydrocortisone; taper over 5–7 days to oral maintenance"], ["Replacement", "Maintenance as G1"]], "ASCO 2021 · Table 4 (4.3), G3–4"]]}, {"id": "irae-hypothyroid", "organ": "Endocrine", "name": "Hypothyroidism", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Hypothyroidism", "term_id": "s3-hypothyroidism", "calc": false}], "shared": [["Exclude", "Central hypothyroidism (low TSH + low FT4 → evaluate as hypophysitis); non-thyroidal illness. Often follows a thyrotoxic/thyroiditis phase.", ""], ["Baseline", "TSH (± FT4) every 4–6 wk on ICI; TSH + FT4 for case detection in symptomatic patients.", ""], ["Red flags", "Severe/myxoedema (rare) → inpatient. If primary vs central uncertain, give hydrocortisone before levothyroxine.", "rf"], ["Rechallenge", "Endocrinopathy exception — ICI usually continued; permanent discontinuation not required. Hold only for severe, resume once euthyroid on replacement.", "rc"]], "grades": [["G1", "c1", "TSH >4.5–<10 mIU/L, asymptomatic", [["ICI", "Continue, with TSH (± FT4) monitoring every 4–6 wk"], ["Replacement", "None routinely; levothyroxine only if TSH persists >10 (measured 4 wk apart)"]], "ASCO 2021 · Table 4 (4.1.1), G1 · NCCN v1.2026 ICI_ENDO-2"], ["G2", "c2", "Moderate symptoms, ADL intact; TSH persistently >10", [["ICI", "May continue or hold until symptoms resolve to baseline"], ["Replacement", "Levothyroxine — symptomatic (any TSH elevation) or asymptomatic TSH >10; titrate to TSH in range, monitor every 6–8 wk"], ["Referral", "Endocrinology for atypical or suspected central hypothyroidism"]], "ASCO 2021 · Table 4 (4.1.1), G2 · NCCN v1.2026 ICI_ENDO-2"], ["G3", "c3", "Severe symptoms; medically significant", [["ICI", "Hold until symptoms resolve to baseline on replacement"], ["Replacement", "Levothyroxine; endocrine consult"], ["Work-up +", "Consider inpatient assessment"]], "ASCO 2021 · Table 4 (4.1.1), G3–4 · NCCN v1.2026 ICI_ENDO-2"], ["G4", "c4", "Life-threatening (myxoedema coma)", [["ICI", "Hold"], ["Replacement", "Inpatient endocrinology — IV levothyroxine, steroids, supportive care"], ["Acute", "Admit"]], "ASCO 2021 · Table 4 (4.1.1), G3–4"]]}, {"id": "irae-dm", "organ": "Endocrine", "name": "Insulin-dependent diabetes (T1DM / DKA)", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Diabetes mellitus", "term_id": "s12-diabetes-mellitus", "calc": false}, {"term": "Hyperglycemia", "term_id": "s12-hyperglycemia", "calc": true}], "shared": [["Exclude", "T2DM / steroid-induced hyperglycaemia. Check anti-GAD / islet-cell Ab, C-peptide, insulin — but do not delay insulin.", ""], ["Baseline", "Glucose; screen for DKA (ketones, pH, anion gap); antibodies + C-peptide (confirm ICI-T1DM once euglycaemic). See the Hyperglycemia calculator.", ""], ["Red flags", "DKA — life-threatening if insulin withheld; urgent/emergent evaluation; admit.", "rf"], ["Rechallenge", "Insulin is lifelong (beta-cell destruction). ICI often continued (mild) or held until glucose controlled — endocrinopathy exception.", "rc"]], "grades": [["G1", "c1", "Fasting glucose >ULN–160 mg/dL; mild", [["ICI", "Continue with close follow-up + labs"], ["Treatment", "Initiate insulin for CIADM (or default if diagnosis uncertain)"]], "ASCO 2021 · Table 4 (4.4), G1 · NCCN v1.2026 ICI_ENDO-1"], ["G2", "c2", "160–250 mg/dL; moderate", [["ICI", "May hold until glucose control obtained"], ["Treatment", "Insulin (multiple daily injections; long-acting alone insufficient)"]], "ASCO 2021 · Table 4 (4.4), G2 · NCCN v1.2026 ICI_ENDO-1"], ["G3", "c3", ">250–500 mg/dL (13.9–27.8 mmol/L)", [["ICI", "Hold until glucose controlled + toxicity ≤G1"], ["Treatment", "Insulin; early endocrinology consult"], ["Acute", "Assess for DKA"]], "ASCO 2021 · Table 4 (4.4), G3–4 · NCCN v1.2026 ICI_ENDO-1"], ["G4", "c4", ">500 mg/dL (>27.8 mmol/L) or ketoacidosis", [["ICI", "Hold"], ["Acute", "Admit — DKA management: volume + electrolyte resuscitation, IV insulin, hourly glucose / ketones / pH / anion gap"]], "ASCO 2021 · Table 4 (4.4), G3–4 · NCCN v1.2026 ICI_ENDO-1"]]}, {"id": "irae-adrenal", "organ": "Endocrine", "name": "Primary adrenal insufficiency", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Adrenal insufficiency", "term_id": "s3-adrenal-insufficiency", "calc": false}], "shared": [["Exclude", "Secondary (central) AI — low ACTH + low cortisol → manage as hypophysitis. Adrenal CT for metastasis / haemorrhage.", ""], ["Baseline", "AM ACTH (>2× ULN in primary) + cortisol (<3 µg/dL); ACTH stimulation test if indeterminate (AM cortisol 3–15 µg/dL). Adrenal CT.", ""], ["Red flags", "Adrenal crisis (hypotension, hyponatraemia) — IV stress-dose hydrocortisone immediately; medical-alert bracelet.", "rf"], ["Rechallenge", "Hold acutely; resume once stabilised on replacement (endocrinopathy exception).", "rc"]], "grades": [["G1", "c1", "Asymptomatic / mild", [["ICI", "Hold until stabilised on replacement, then resume (endocrinopathy exception)"], ["Replacement", "Hydrocortisone 15–20 mg/day divided (max 30 mg for residual symptoms); add fludrocortisone for mineralocorticoid need"]], "ASCO 2021 · Table 4 (4.2), G1 · NCCN v1.2026 ICI_ENDO-3"], ["G2", "c2", "Moderate symptoms, ADL intact", [["ICI", "Hold until stabilised on replacement"], ["Replacement", "Outpatient corticosteroid 2–3× maintenance (hydrocortisone 30–50 mg or prednisone 20 mg/day) for acute symptoms; decrease to maintenance after 2 days"]], "ASCO 2021 · Table 4 (4.2), G2 · NCCN v1.2026 ICI_ENDO-3"], ["G3", "c3", "Severe symptoms; medically significant", [["ICI", "Hold"], ["Acute", "IV stress-dose hydrocortisone 50–100 mg Q6–8h; taper to oral maintenance over 5–7 days"]], "ASCO 2021 · Table 4 (4.2), G3–4"], ["G4", "c4", "Life-threatening (adrenal crisis)", [["ICI", "Hold; admit"], ["Acute", "IV hydrocortisone stress dose + fluid/electrolyte resuscitation; taper to maintenance"]], "ASCO 2021 · Table 4 (4.2), G3–4"]]}, {"id": "irae-hyperthyroid", "organ": "Endocrine", "name": "Thyrotoxicosis / thyroiditis", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Hyperthyroidism", "term_id": "s3-hyperthyroidism", "calc": false}, {"term": "Thyroiditis", "term_id": "s3-thyroiditis", "calc": false}], "shared": [["Exclude", "Graves' disease (TSH-receptor Ab; ophthalmopathy/bruit → early endocrine referral) — rare with ICI. Most ICI cases are destructive thyroiditis.", ""], ["Baseline", "TSH, FT4 (± T3); TSH-receptor Ab if Graves' suspected. Monitor thyroid function every 2–3 wk to catch transition to hypothyroidism (the usual outcome).", ""], ["Red flags", "Thyroid storm (rare) → hold ICI, inpatient.", "rf"], ["Rechallenge", "Transient — most transition to hypothyroidism (then treat as such). ICI continued for G1–2.", "rc"]], "grades": [["G1", "c1", "Asymptomatic / mild", [["ICI", "Continue"], ["Treatment", "Beta-blocker (atenolol/propranolol) for symptoms; monitor every 2–3 wk for hypothyroid transition"]], "ASCO 2021 · Table 4 (4.1.2), G1 · NCCN v1.2026 ICI_ENDO-2"], ["G2", "c2", "Moderate symptoms, ADL intact", [["ICI", "Consider holding until symptoms return to baseline (NCCN: may continue if asymptomatic)"], ["Treatment", "Beta-blocker; endocrine consult if Graves' or persistent"]], "ASCO 2021 · Table 4 (4.1.2), G2 · NCCN v1.2026 ICI_ENDO-2"], ["G3", "c3", "Severe symptoms; medically significant", [["ICI", "Hold until symptoms resolve to baseline"], ["Treatment", "Beta-blocker + supportive; endocrine"]], "ASCO 2021 · Table 4 (4.1.2), G3–4"], ["G4", "c4", "Life-threatening (thyroid storm)", [["ICI", "Hold; inpatient"], ["Treatment", "Beta-blocker + supportive care; endocrine / consider antithyroid if Graves'"]], "ASCO 2021 · Table 4 (4.1.2), G3–4"]]}, {"id": "irae-arthritis", "organ": "Rheumatologic", "name": "Inflammatory arthritis", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Arthralgia", "term_id": "s13-arthralgia", "calc": false}, {"term": "Arthritis", "term_id": "s13-arthritis", "calc": false}], "shared": [["Exclude", "Osteoarthritis / degenerative joint disease, crystal arthropathy (gout, pseudogout), septic arthritis, soft-tissue rheumatic syndromes (rotator cuff tendinitis); pre-existing crystal / soft-tissue / OA can flare on ICPi. Aspirate to exclude septic joint if infection suspected. Improvement with NSAIDs or steroids (but not opioids) is suggestive of ICPi arthritis.", ""], ["Baseline", "Full rheumatologic history + exam of all peripheral joints (tenderness, swelling, range of motion) and spine. Inflammatory markers (ESR, CRP), ANA, RF, anti-CCP; plain X-ray to exclude metastases / erosions if appropriate; HLA-B27 if reactive-arthritis or axial pattern. NCCN: consider arthrocentesis (cell count, gram stain, culture, crystals), joint ultrasound / MRI if synovitis unclear.", ""], ["Red flags", "Severe pain with irreversible / erosive joint damage, disabling, limiting self-care ADL -> urgent rheumatology. Early recognition is critical to avoid erosive joint damage; start steroid-sparing agents earlier than in other irAEs given the likely prolonged course.", "rf"], ["Rechallenge", "G2: hold, resume once controlled. G3-4: hold, may resume in consultation with rheumatology once recovered to <=G1. Consider discontinuing ICPi if arthritis worsens with repeated dosing to where ADL / QoL is severely impaired. Can persist and become a chronic process after ICPi cessation.", "rc"]], "grades": [["G1", "c1", "Mild pain with inflammation, erythema, or joint swelling", [["ICI", "Continue"], ["Analgesia", "Acetaminophen and/or NSAIDs; NCCN: consider intra-articular steroids if only 1-2 joints involved"]], "ASCO 2021 · Table 5 (5.1 IA), G1 · NCCN v1.2026 ICI_MS-1"], ["G2", "c2", "Moderate pain with signs of inflammation, erythema, or joint swelling; limiting instrumental ADL", [["ICI", "Consider holding"], ["Analgesia", "Escalate analgesia, higher-dose NSAIDs as needed"], ["Steroids", "If inadequately controlled, prednisone 10-20 mg/day; slow taper over 4-6 wk on improvement (if no improvement after 4 wk, treat as G3). If unable to lower below 10 mg/day after 6-8 wk, consider DMARD. NCCN: if unable to taper after 1 wk, increase to 30 mg/day"], ["Escalation", "Intra-articular steroid injections for large joints; DMARD if steroid-dependent. NCCN: csDMARD (methotrexate 15-20 mg weekly + folic acid), IL-6 inhibitor (tocilizumab / sarilumab), or TNF inhibitor"], ["Referral", "Rheumatology"]], "ASCO 2021 · Table 5 (5.1 IA), G2 · NCCN v1.2026 ICI_MS-1"], ["G3", "c3", "Severe pain with signs of inflammation; irreversible joint damage; disabling; limiting self-care ADL", [["ICI", "Hold temporarily; may resume in consultation with rheumatology if recover to <=G1"], ["Steroids", "Oral prednisone 0.5-1 mg/kg/day (NCCN: 20-30 mg/day)"], ["Escalation", "If no improvement after 2 wk or worsening -> synthetic or biologic DMARD. Synthetic: methotrexate, leflunomide, hydroxychloroquine, sulfasalazine (alone or in combination). Biologic: anticytokine TNF-alpha or IL-6 antagonist. Caution: IL-6 inhibition can cause intestinal perforation -- do not use with concomitant immune-related colitis"], ["Referral", "Rheumatology"]], "ASCO 2021 · Table 5 (5.1 IA), G3-4 · NCCN v1.2026 ICI_MS-1"], ["G4", "c4", "Severe / disabling arthritis (ASCO manages G3-4 together; CTCAE Arthritis has no distinct G4)", [["ICI", "Hold; may resume in consultation with rheumatology once recover to <=G1"], ["Steroids", "Oral prednisone 0.5-1 mg/kg/day, as per G3"], ["Escalation", "Synthetic or biologic DMARD as per G3 (methotrexate / leflunomide / hydroxychloroquine / sulfasalazine; TNF-alpha or IL-6 antagonist -- avoid IL-6 with colitis)"], ["Referral", "Rheumatology"]], "ASCO 2021 · Table 5 (5.1 IA), G3-4 · NCCN v1.2026 ICI_MS-1"]]}, {"id": "irae-myositis", "organ": "Rheumatologic", "name": "Myositis", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Myositis", "term_id": "s13-myositis", "calc": false}, {"term": "Myalgia", "term_id": "s13-myalgia", "calc": false}], "shared": [["Exclude", "Statin-induced myopathy, polymyalgia rheumatica, fibromyalgia, muscular dystrophy, generalized fatigue; elevated transaminases may reflect muscle (not liver) -- consider differential with immune-mediated hepatitis. Consider holding statins. CRITICAL: screen for overlap with myocarditis and myasthenia gravis (triple-M / 3M syndrome) -- concomitant myocarditis and/or MG carries high mortality.", ""], ["Baseline", "CK and aldolase; AST/ALT and LDH may also be elevated; troponin + ECG + echocardiogram or cardiac MRI to evaluate myocardial involvement; anti-AChR + antistriational antibodies for concomitant MG; ESR/CRP; consider EMG, MRI, muscle biopsy, and myositis autoantibodies (anti-TIF1-gamma, anti-NXP2) if diagnosis uncertain; urinalysis for rhabdomyolysis. Monitor: serial CK/aldolase until resolved.", ""], ["Red flags", "Respiratory muscle weakness, dysphagia, rhabdomyolysis, or concomitant myocarditis / myasthenia gravis (3M overlap) -> hospitalize; high mortality. ASCO: patients with MG-like syndrome or myocarditis and concomitant myositis should be hospitalized.", "rf"], ["Rechallenge", "Caution with rechallenge -- recurrence on rechallenge reported. Do not restart ICPi until CK is normal and clinical manifestations of myositis have resolved. G2 may require permanent discontinuation if severe objective findings (very elevated enzymes; extensive EMG / MRI / histology involvement).", "rc"]], "grades": [["G1", "c1", "Mild weakness with or without pain", [["ICI", "Continue (NCCN: do not hold if no CK elevation or evidence of active myositis)"], ["Steroids", "If CK and/or aldolase elevated and muscle weakness present, may offer oral prednisone 0.5 mg/kg/day"], ["Supportive", "Acetaminophen or NSAIDs for myalgia; consider holding statins"]], "ASCO 2021 · Table 5 (5.2 Myositis), G1 · NCCN v1.2026 ICI_MS-3"], ["G2", "c2", "Moderate weakness with or without pain, limiting instrumental ADL", [["ICI", "Hold temporarily; may resume once CK normal and prednisone <10 mg. Consider permanent discontinuation if severe objective findings"], ["Steroids", "If CK elevated (>=3x ULN), prednisone or equivalent 0.5-1 mg/kg/day (NCCN mild/moderate: prednisone 0.5-1 mg/kg/day)"], ["Supportive", "NSAIDs as needed"], ["Referral", "Early referral to rheumatology or neurology"]], "ASCO 2021 · Table 5 (5.2 Myositis), G2 · NCCN v1.2026 ICI_MS-3"], ["G3", "c3", "Severe weakness with or without pain; limiting self-care ADL", [["ICI", "Hold; consider permanent discontinuation in select patients"], ["Steroids", "Prednisone 1 mg/kg/day; for severe compromise, methylprednisolone IV 1-2 mg/kg or higher-dose bolus (NCCN severe: IV methylprednisolone 500 mg-1 g/day x3 days, then prednisone 1 mg/kg/day)"], ["Escalation", "Plasmapheresis and/or IVIG (note: plasmapheresis immediately after IVIG removes immunoglobulin); biologics (rituximab, TNF-alpha or IL-6 antagonist) if worsening or no improvement after 2 wk; synthetic maintenance (methotrexate, azathioprine, mycophenolate)"], ["Work-up +", "Consider hospitalization for severe weakness limiting mobility, respiratory compromise, dysphagia, or rhabdomyolysis; urgent rheumatology and/or neurology referral"]], "ASCO 2021 · Table 5 (5.2 Myositis), G3-4 · NCCN v1.2026 ICI_MS-3"], ["G4", "c4", "Life-threatening (respiratory muscle or myocardial involvement, rhabdomyolysis); urgent intervention", [["ICI", "Hold; permanently discontinue"], ["Steroids", "IV methylprednisolone 1-2 mg/kg or higher-dose bolus (NCCN: 500 mg-1 g/day x3 days), then prednisone 1 mg/kg/day"], ["Escalation", "Plasmapheresis and/or IVIG (2 g/kg over 2-5 days); rituximab, methotrexate, or mycophenolate. If concomitant myocarditis: cardiology involvement (abatacept with ruxolitinib reported for concomitant myositis + myocarditis)"], ["Acute", "Admit (ICU-level if respiratory / bulbar compromise); cardiology + neurology if 3M overlap"]], "ASCO 2021 · Table 5 (5.2 Myositis), G3-4 · NCCN v1.2026 ICI_MS-3"]]}, {"id": "irae-nephritis", "organ": "Renal", "name": "Nephritis / acute kidney injury", "cause": "PD-1/PD-L1 · CTLA-4 · combo", "io": ["pd1", "pdl1", "combo", "ctla4"], "ctcae": [{"term": "Acute kidney injury", "term_id": "s17-acute-kidney-injury", "calc": false}, {"term": "Tubulointerstitial nephritis", "term_id": "s17-tubulointerstitial-nephritis", "calc": false}, {"term": "Creatinine increased", "term_id": "s11-creatinine-increased", "calc": true}], "shared": [["Exclude", "Pre-renal (dehydration, volume depletion) and post-renal (obstruction -- image to exclude) causes, acute tubular necrosis, recent IV contrast, nephrotoxic drugs (NSAIDs, PPIs, concomitant chemotherapy), UTI. Most ICPi renal toxicity is acute tubulointerstitial nephritis. Renal allograft recipients are at high risk of rejection -- manage only with transplant-nephrology input.", ""], ["Baseline", "Serum creatinine before every dose. Urinalysis (sterile pyuria >=5 WBC/hpf supports irAE); BUN, spot urine protein/creatinine + microalbumin/creatinine ratios, urine electrolytes. If new/worsening proteinuria, rule out glomerulonephritis (ANA, ANCA, anti-dsDNA, C3/C4, hepatitis B/C serologies). Renal biopsy not routinely needed -- reserve for steroid-refractory AKI or diagnostic uncertainty; do not delay steroids for biopsy.", ""], ["Red flags", "Life-threatening / dialysis-requiring AKI, or AKI refractory to steroids -> nephrology, inpatient, escalate immunosuppression. New proteinuria or haematuria -> suspect glomerulonephritis and obtain biopsy.", "rf"], ["Rechallenge", "G2: resume ICPi only after no recurrence and steroids tapered to <=10 mg/day or discontinued, weighing risks/benefits. G3-4: permanently discontinue ICPi if directly implicated in the renal toxicity.", "rc"]], "grades": [["G1", "c1", "Creatinine increase >0.3 mg/dL; 1.5-2.0x above baseline (NCCN Stage 1: 1.5 to <2x baseline or >=0.3 mg/dL over 48 h)", [["ICI", "Consider temporarily holding ICPi and/or other contributing agents, pending evaluation of alternative etiologies (IV contrast, medications, fluid status, UTI) and baseline renal function. NCCN: nephrology consult if sustained elevation"], ["Steroids", "Not routinely indicated"], ["Monitoring", "If improved to baseline, resume routine creatinine monitoring"]], "ASCO 2021 · Table 6 (6.1 Nephritis/AKI), G1 · NCCN v1.2026 ICI_RENAL-1"], ["G2", "c2", "Creatinine 2-3x above baseline", [["ICI", "Hold temporarily. If worsening or no improvement after 1 wk -> permanently discontinue. Resume once no recurrence and steroids tapered to <=10 mg/day"], ["Steroids", "If other etiologies ruled out, prednisone 0.5-1 mg/kg/day; if worsening / no improvement after 1 wk, increase to 1-2 mg/kg/day. If improved to <=G1, taper over at least 4 wk"], ["Escalation", "NCCN: for persistent stage 2 beyond 1 wk, prednisone / IV methylprednisolone 1-2 mg/kg/day; consider renal biopsy if no improvement within 5-7 days and/or new proteinuria"], ["Referral", "Nephrology"]], "ASCO 2021 · Table 6 (6.2 Nephritis/AKI Follow-Up), G2 · NCCN v1.2026 ICI_RENAL-1"], ["G3", "c3", "Creatinine >3x baseline or >4.0 mg/dL; hospitalization indicated", [["ICI", "Permanently discontinue if ICPi is directly implicated in renal toxicity"], ["Steroids", "Corticosteroids 1-2 mg/kg/day prednisone or equivalent. If improved to G1, taper over at least 4 wk"], ["Escalation", "If elevations persist >3-5 days or worsen -> additional immunosuppression (infliximab, azathioprine, cyclophosphamide [monthly], cyclosporine, mycophenolate). NCCN: based on biopsy, add azathioprine / infliximab / mycophenolate / rituximab if injury remains >stage 2 after 4-6 wk steroids"], ["Work-up +", "Nephrology consult; hospitalization; monitor creatinine weekly; reflex kidney biopsy discouraged until steroid treatment attempted"]], "ASCO 2021 · Table 6 (6.1 Nephritis/AKI), G3 · NCCN v1.2026 ICI_RENAL-1"], ["G4", "c4", "Life-threatening consequences; dialysis indicated; creatinine 6x above baseline", [["ICI", "Permanently discontinue"], ["Steroids", "Corticosteroids 1-2 mg/kg/day prednisone or equivalent. If improved to G1, taper over at least 4 wk"], ["Escalation", "If elevations persist >2-3 days or worsen -> additional immunosuppression (infliximab, azathioprine, cyclophosphamide [monthly], cyclosporine, mycophenolate)"], ["Acute", "Nephrology; renal replacement therapy / dialysis as indicated; inpatient care"]], "ASCO 2021 · Table 6 (6.1/6.2 Nephritis/AKI), G4 · NCCN v1.2026 ICI_RENAL-1"]]}, {"id": "irae-myocarditis", "organ": "Cardiovascular", "name": "Myocarditis", "cause": "Combo (highest) > PD-1/PD-L1 · CTLA-4", "io": ["combo", "pd1", "pdl1", "ctla4"], "ctcae": [{"term": "Myocarditis", "term_id": "s1-myocarditis", "calc": false}], "shared": [["Exclude", "MI / acute coronary syndrome, pulmonary embolism, other cardiotoxic medications, viral or post-vaccination myocarditis; rule out alternative reasons for troponin/CK elevation. Concurrent myositis raises CK/troponin (esp. combination immunotherapy).", ""], ["Baseline", "ECG (compare to baseline). Troponin (I or T) + CK/CPK + BNP or NT-proBNP. Echocardiogram (with LV strain if possible). Chest X-ray. If troponin elevated, monitor serially. Guided by cardiology: stress test, cardiac catheterisation, cardiac MRI (T1/T2 mapping, modified Lake Louise); consider endomyocardial biopsy / viral titres.", ""], ["Red flags", "High fatality. Any suspicion -> hold ICI, urgent work-up. Elevated troponin or conduction abnormality -> continuous telemetry + immediate transfer to coronary/intensive care unit; new conduction delay -> consider pacemaker. Watch arrhythmia, heart block, heart failure, cardiogenic shock. Screen the triple-M overlap: myositis + myasthenia gravis + myocarditis. When suspicion is high, treat empirically before confirmatory biopsy.", "rf"], ["Rechallenge", "Holding ICI is recommended for ALL grades (ASCO). NCCN: discontinue immunotherapy for myocarditis. Do not restart after >=G2 myocarditis; appropriateness of any rechallenge is unknown.", "rc"]], "grades": [["G1", "c1", "Abnormal cardiac biomarker testing without symptoms and with no ECG abnormalities", [["ICI", "Hold for G1 elevated troponin and recheck troponin 6 hours later. May consider resuming once normalised or if believed not to be ICI-related."], ["Work-up +", "All grades warrant workup and intervention given the potential for cardiac compromise."], ["Steroids", "High-dose corticosteroids are specified for grade >=2; not indicated at G1 on biomarker abnormality alone."]], "ASCO 2021 · Table 9 (9.1 Myocarditis), G1 · NCCN v1.2026 ICI_CARDIO-1"], ["G2", "c2", "Abnormal cardiac biomarker testing with mild symptoms or new ECG abnormalities without conduction delay", [["ICI", "Hold and permanently discontinue for >=G2 (ASCO). NCCN: discontinue immunotherapy."], ["Steroids", "Early (within 24 h) high-dose corticosteroids: prednisone 1-2 mg/kg/day, oral or IV depending on symptoms. NCCN for overt myocarditis: IV methylprednisolone 1 g/day for 3-5 days, then oral prednisone 1 mg/kg/day tapered slowly over 6-12 weeks by clinical response + biomarkers."], ["Escalation", "No immediate response to high-dose steroids -> cardiac transplant-rejection dose methylprednisolone 1 g/day + add mycophenolate, infliximab, or antithymocyte globulin. NCCN: if no improvement in 24-48 h add (alphabetical) abatacept, alemtuzumab, ATG, infliximab (extreme caution if reduced LVEF), IVIG 2 g/kg over 2-5 days, methotrexate, mycophenolate mofetil (0.5-1 g q12h), or plasmapheresis."], ["Work-up +", "Admit for cardiology consultation; transfer to coronary care unit if elevated troponin or conduction abnormalities."], ["Referral", "Cardiology (cardio-oncology preferred)."]], "ASCO 2021 · Table 9 (9.1 Myocarditis), G2 · NCCN v1.2026 ICI_CARDIO-1"], ["G3", "c3", "Abnormal cardiac biomarker testing with either moderate symptoms or new conduction delay", [["ICI", "Hold and permanently discontinue."], ["Steroids", "Early (within 24 h) high-dose corticosteroids: prednisone 1-2 mg/kg/day (oral or IV). Escalate to methylprednisolone 1 g/day if no immediate response. NCCN: IV methylprednisolone 1 g/day for 3-5 days -> oral prednisone 1 mg/kg/day, taper 6-12 wk."], ["Escalation", "No response -> methylprednisolone 1 g/day + mycophenolate, infliximab, or ATG; abatacept or alemtuzumab in life-threatening cases. Infliximab contraindicated at high dose (>5 mg/kg) in moderate-severe heart failure."], ["Work-up +", "Admit; transfer to coronary/intensive care unit; for new conduction delay consider a pacemaker; manage cardiac symptoms per ACC/AHA guidance with cardiology."], ["Referral", "Cardiology + ICU-level monitoring."]], "ASCO 2021 · Table 9 (9.1 Myocarditis), G3 · NCCN v1.2026 ICI_CARDIO-1"], ["G4", "c4", "Moderate to severe decompensation, IV medication or intervention required, life-threatening conditions", [["ICI", "Permanently discontinue."], ["Steroids", "Cardiac transplant-rejection dose corticosteroids: methylprednisolone 1 g/day IV pulse (ASCO). NCCN: IV methylprednisolone 1 g/day for 3-5 days, then oral prednisone 1 mg/kg/day taper over 6-12 weeks once stable."], ["Escalation", "Add mycophenolate mofetil, infliximab (contraindicated >5 mg/kg in moderate-severe HF; NCCN caution if reduced LVEF), or ATG; consider abatacept or alemtuzumab (+/- ruxolitinib for myositis-myocarditis overlap) as additional immunosuppression in life-threatening cases; IVIG or plasmapheresis (NCCN)."], ["Acute", "ICU/coronary care unit-level monitoring; temporary or permanent pacing as required; manage decompensation per ACC/AHA with cardiology."], ["Referral", "Cardio-oncology + ICU."]], "ASCO 2021 · Table 9 (9.1 Myocarditis), G4 · NCCN v1.2026 ICI_CARDIO-1"]]}, {"id": "irae-pericarditis", "organ": "Cardiovascular", "name": "Pericardial disease", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Pericarditis", "term_id": "s1-pericarditis", "calc": false}, {"term": "Pericardial effusion", "term_id": "s1-pericardial-effusion", "calc": false}], "shared": [["Exclude", "MI / acute coronary syndrome, pulmonary embolism, malignant pericardial involvement, viral or post-vaccination pericarditis, other cardiotoxic medications. Always consider concurrent myocarditis as a contributor (NCCN).", ""], ["Baseline", "ECG (compare to baseline). Troponin (I or T) + CK/CPK + BNP or NT-proBNP. Echocardiogram (size the effusion; LV strain if possible). Chest X-ray. Cardiac MRI / catheterisation as guided by cardiology. Evaluate for the triple-M overlap (myositis, myasthenia gravis, myocarditis).", ""], ["Grading", "ASCO grades cardiovascular irAEs on a biomarker (troponin) ladder, so the grades below describe biomarker-positive / myopericarditis -> high-dose steroids apply. Isolated pericarditis with normal biomarkers: manage per ESC (NSAID + colchicine), not high-dose steroids.", ""], ["Red flags", "Large or expanding pericardial effusion, hypotension / cardiogenic shock, conduction abnormality -> tamponade is a medical emergency; urgent echocardiogram + immediate cardiology. Consider concurrent myocarditis (manage as myocarditis if present).", "rf"], ["Rechallenge", "Holding ICI is recommended for all grades of cardiovascular complications (ASCO); discontinue for >=G2. Appropriateness of rechallenge is unknown.", "rc"]], "grades": [["G1", "c1", "Abnormal cardiac biomarker testing without symptoms and with no ECG abnormalities", [["ICI", "Hold for G1 elevated troponin and recheck troponin 6 hours later; may resume once normalised or if believed not ICI-related."], ["Treatment", "Consider myocarditis as a contributor; if myocarditis not present, manage as per usual pericardial-disease recommendations (NCCN defers to ESC / Adler 2015). [UNVERIFIED: NSAID + colchicine specifics are not stated in the ASCO/NCCN text.]"], ["Work-up +", "All grades warrant workup and intervention given the potential for cardiac compromise."]], "ASCO 2021 · Table 9 (9.1 Pericarditis), G1 · NCCN v1.2026 ICI_CARDIO-1"], ["G2", "c2", "Abnormal cardiac biomarker testing with mild symptoms or new ECG abnormalities without conduction delay", [["ICI", "Hold and discontinue for >=G2."], ["Steroids", "Early (within 24 h) high-dose corticosteroids per the ASCO combined cardiovascular pathway: prednisone 1-2 mg/kg/day, oral or IV depending on symptoms."], ["Treatment", "Consider myocarditis contribution; otherwise manage pericarditis per usual (ESC) recommendations. [UNVERIFIED: NSAID/colchicine dosing not specified in ASCO/NCCN text.]"], ["Work-up +", "Admit for cardiology consultation; echocardiogram to size the effusion."], ["Referral", "Cardiology (cardio-oncology preferred)."]], "ASCO 2021 · Table 9 (9.1 Pericarditis), G2 · NCCN v1.2026 ICI_CARDIO-1"], ["G3", "c3", "Abnormal cardiac biomarker testing with either moderate symptoms or new conduction delay", [["ICI", "Hold and discontinue."], ["Steroids", "High-dose corticosteroids: prednisone 1-2 mg/kg/day (oral or IV); escalate to methylprednisolone 1 g/day if no immediate response (ASCO combined cardiovascular column)."], ["Escalation", "No response -> methylprednisolone 1 g/day + mycophenolate, infliximab, or ATG (infliximab contraindicated >5 mg/kg in moderate-severe HF)."], ["Work-up +", "Admit; transfer to coronary care unit if haemodynamic compromise or conduction abnormality."], ["Referral", "Cardiology + ICU-level monitoring."]], "ASCO 2021 · Table 9 (9.1 Pericarditis), G3 · NCCN v1.2026 ICI_CARDIO-1"], ["G4", "c4", "Moderate to severe decompensation, IV medication or intervention required, life-threatening conditions (includes tamponade)", [["ICI", "Permanently discontinue."], ["Acute", "Cardiac tamponade is an emergency -> urgent echocardiogram + cardiology; ICU. [UNVERIFIED: pericardiocentesis / pericardial drainage not spelled out in the ASCO/NCCN text; NCCN defers to the ESC pericardial-disease guideline (Adler 2015).] Manage decompensation per ACC/AHA with cardiology."], ["Steroids", "High-dose / transplant-rejection-dose corticosteroids: methylprednisolone 1 g/day IV pulse for severe (ASCO combined cardiovascular column)."], ["Referral", "Cardio-oncology + ICU."]], "ASCO 2021 · Table 9 (9.1 Pericarditis), G4 · NCCN v1.2026 ICI_CARDIO-1"]]}, {"id": "irae-encephalitis", "organ": "Neurologic", "name": "Encephalitis / aseptic meningitis", "cause": "PD-1/PD-L1 · combo · CTLA-4", "io": ["pd1", "pdl1", "combo", "ctla4"], "ctcae": [{"term": "Encephalitis", "term_id": "s9-encephalitis", "calc": false}, {"term": "Aseptic meningitis", "term_id": "s9-aseptic-meningitis", "calc": false}], "shared": [["Exclude", "EXCLUDE infection and CNS malignancy FIRST: bacterial/viral meningoencephalitis (HSV/VZV PCR, Gram stain, cultures) and CNS metastases / leptomeningeal disease (MRI + CSF cytology). Rule out concurrent anaemia/thrombocytopenia (can mimic with severe headache + confusion). Distinguish aseptic meningitis (NORMAL mentation) from encephalitis (altered mentation/behaviour, seizures).", ""], ["Baseline", "MRI brain w/wo contrast (+ pituitary/sellar protocol; + spine if indicated); LP - opening pressure, cell count/diff, cytology, protein, glucose, Gram stain, cultures, HSV/VZV + viral PCR, oligoclonal bands, autoimmune-encephalopathy + paraneoplastic panels; EEG (subclinical seizures) for encephalitis; AM cortisol + ACTH; ESR, CRP, ANCA, thyroid panel (TPO/thyroglobulin), GQ1b.", ""], ["Red flags", "Altered mentation, seizures, depressed consciousness, or focal deficit = encephalitis (treat aggressively); admit for G3-4. Start empiric IV acyclovir (10 mg/kg q8h) + antibacterial cover until infection excluded.", "rf"], ["Rechallenge", "Hold ICPi; discuss resumption only after weighing risks/benefits. NCCN: aseptic meningitis - hold if mild/moderate, consider discontinuing if severe; encephalitis - hold if mild, discontinue if moderate/severe.", "rc"]], "grades": [["G1", "c1", "Mild: no functional interference. Any cranial-nerve problem is managed as G2", [["ICI", "Hold; discuss resumption only after weighing risks/benefits"], ["Antimicrobials", "Empiric IV acyclovir (10 mg/kg q8h) + antibacterial cover until CSF cultures and HSV/VZV PCR return negative"], ["Steroids", "Aseptic meningitis: once infection excluded, monitor OFF steroids or oral prednisone 0.5-1 mg/kg/day. Encephalitis: trial IV methylprednisolone 1-2 mg/kg/day. Taper after 2-4 wk"], ["Referral", "Neurology consult"]], "ASCO 2021 · Table 7 (7.5 Aseptic meningitis / 7.6 Encephalitis), G1 · NCCN v1.2026 ICI_NEURO-4"], ["G2", "c2", "Moderate: some interference with ADLs", [["ICI", "Aseptic meningitis: hold. Encephalitis: discontinue immunotherapy (NCCN, moderate/severe)"], ["Antimicrobials", "Continue empiric IV acyclovir + antibacterial cover until infection excluded"], ["Steroids", "Aseptic meningitis: oral prednisone 0.5-1 mg/kg/day or IV methylprednisolone 1 mg/kg/day. Encephalitis: IV methylprednisolone 1-2 mg/kg/day; taper over 2-4 wk"], ["Escalation", "Encephalitis, if severe/progressing (over ~24 h) or oligoclonal bands: pulse IV methylprednisolone 1 g/day x3-5 days + IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis"], ["Referral", "Neurology"]], "ASCO 2021 · Table 7 (7.5 Aseptic meningitis / 7.6 Encephalitis), G2 · NCCN v1.2026 ICI_NEURO-4"], ["G3", "c3", "Severe: limiting self-care and aids warranted", [["ICI", "Aseptic meningitis: consider discontinuing (NCCN). Encephalitis: discontinue (NCCN). ASCO: hold, weigh risks/benefits"], ["Steroids", "Encephalitis: pulse IV methylprednisolone 1 g/day x3-5 days; taper over >=4-6 wk. Aseptic meningitis: IV methylprednisolone 1 mg/kg/day"], ["Escalation", "Encephalitis: add IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis; rituximab if autoimmune-encephalopathy/paraneoplastic antibody positive or no improvement (NCCN: after 7-14 days)"], ["Work-up +", "Hospitalize (G3-4)"], ["Referral", "Neurology; ID team for encephalitis"]], "ASCO 2021 · Table 7 (7.5 Aseptic meningitis / 7.6 Encephalitis), G3-4 · NCCN v1.2026 ICI_NEURO-4"], ["G4", "c4", "Life-threatening consequences", [["ICI", "Discontinue immunotherapy (NCCN: discontinue if moderate/severe; ASCO: hold, resume only after weighing risks/benefits)"], ["Steroids", "Pulse IV methylprednisolone 1 g/day x3-5 days; taper over >=4-6 wk"], ["Escalation", "IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis; rituximab if antibody-positive or refractory"], ["Acute", "ICU-level inpatient care"]], "ASCO 2021 · Table 7 (7.6 Encephalitis), G3-4 · NCCN v1.2026 ICI_NEURO-4"]]}, {"id": "irae-gbs", "organ": "Neurologic", "name": "Guillain-Barre / peripheral neuropathy", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Guillain-Barre syndrome", "term_id": "s15-guillain-barre-syndrome", "calc": false}, {"term": "Peripheral motor neuropathy", "term_id": "s15-peripheral-motor-neuropathy", "calc": false}, {"term": "Peripheral sensory neuropathy", "term_id": "s15-peripheral-sensory-neuropathy", "calc": false}], "shared": [["Exclude", "Other neuropathy causes before calling it irAE: chemotherapy, B12/B6/folate deficiency, diabetes (HbA1c), thyroid (TSH), paraproteinaemia (SPEP + immunofixation), Lyme, HIV, hepatitis B/C, paraneoplastic. CSF shows albuminocytologic dissociation (high protein, usually normal WBC in classical GBS); send cytology to exclude leptomeningeal disease, which can mimic GBS.", ""], ["Baseline", "Neurology consult; MRI spine w/wo contrast (+ brain if cranial-nerve involvement, + plexus if indicated); LP/CSF (cell count, cytology, protein, glucose, cultures); serum antiganglioside antibodies (anti-GQ1b = Miller Fisher variant); electrodiagnostics (NCS + EMG); PFT (NIF or VC); reversible-cause labs (HbA1c, B12, TSH, B6, folate, SPEP, CPK).", ""], ["Red flags", "Rapidly ascending / progressive weakness, respiratory compromise (monitor NIF/VC), bulbar signs (dysphagia, facial weakness), or autonomic dysfunction = GBS - admit with ICU access. Severe peripheral neuropathy may BE GBS and is managed as such.", "rf"], ["Rechallenge", "Peripheral neuropathy G2: resume once returned to <=G1. GBS / severe cases: extreme caution - rechallenge only after complete symptom resolution AND tapered off immunosuppression.", "rc"]], "grades": [["G1", "c1", "Mild peripheral neuropathy - no functional interference (GBS has no G1); any cranial-nerve deficit is managed as G2", [["ICI", "Low threshold to hold and monitor symptoms for ~1 week; if continuing, monitor very closely for progression"], ["Treatment", "Observation; non-opioid neuropathic pain control (gabapentin, pregabalin, or duloxetine) if needed"], ["Work-up +", "Serum reversible-cause screen (B12, HbA1c, SPEP + immunofixation, HIV, ANCA); consider neuraxial imaging + neurology consult"]], "ASCO 2021 · Table 7 (7.3 Peripheral neuropathy), G1 · NCCN v1.2026 ICI_NEURO-3"], ["G2", "c2", "Moderate: some interference with ADLs (pain, no weakness/gait limitation). Progressive weakness = treat as GBS", [["ICI", "Hold; resume once returned to <=G1. Progressive / GBS features: discontinue"], ["Steroids", "Initial observation OR prednisone 0.5-1 mg/kg/day if progressing from mild; taper over 4-6 wk once <=G1 (NCCN). If progressing -> IV methylprednisolone 2-4 mg/kg/day and manage as GBS"], ["Escalation", "Moderate GBS: IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis (do NOT plasmapherese immediately after IVIG - it removes the immunoglobulin); steroids optional in idiopathic GBS but a trial is reasonable in ICI-related forms"], ["Treatment", "Gabapentin, pregabalin, or duloxetine for neuropathic pain"], ["Referral", "Neurology; inpatient with ICU access if GBS features"]], "ASCO 2021 · Table 7 (7.2 GBS / 7.3 Peripheral neuropathy), G2 · NCCN v1.2026 ICI_NEURO-2/3"], ["G3", "c3", "Severe: limiting self-care, weakness limiting walking or respiratory problems (foot drop, rapidly ascending changes) - manage as GBS", [["ICI", "Permanently discontinue"], ["Steroids", "Idiopathic GBS is usually steroid-sparing, but a trial is reasonable in ICI-related forms: IV methylprednisolone 2-4 mg/kg/day; pulse methylprednisolone 1 g/day x5 days may be added for G3-4; taper over 4-6 wk. (NCCN: IV methylprednisolone 1 g/day x5 days, then taper over 4 wk)"], ["Escalation", "IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis, alongside steroids"], ["Work-up +", "Frequent neuro checks + PFT (NIF/VC); monitor for autonomic dysfunction; treat constipation/ileus"], ["Referral", "Admit; inpatient with rapid transfer to ICU-level monitoring; neurology"]], "ASCO 2021 · Table 7 (7.2 GBS), G3-4 · NCCN v1.2026 ICI_NEURO-2"], ["G4", "c4", "Life-threatening (respiratory failure / dysautonomia)", [["ICI", "Permanently discontinue"], ["Steroids", "IV methylprednisolone 2-4 mg/kg/day (or pulse 1 g/day x5 days) with taper over 4-6 wk"], ["Escalation", "IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis"], ["Acute", "ICU-level care; ventilatory support if respiratory failure; monitor for autonomic instability"]], "ASCO 2021 · Table 7 (7.2 GBS), G3-4 · NCCN v1.2026 ICI_NEURO-2"]]}, {"id": "irae-mg", "organ": "Neurologic", "name": "Myasthenia gravis", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Myasthenia gravis", "term_id": "s15-myasthenia-gravis", "calc": false}], "shared": [["Exclude", "Overlap myocarditis + myositis (the 3 M's) - check troponin, CK/aldolase, ECG, TTE. Rule out CNS metastasis / leptomeningeal disease (MRI brain), and pneumonitis for respiratory symptoms. AChR-negative does NOT exclude MG - consider MuSK and LRP4 antibodies.", ""], ["Baseline", "Neurology consult. AChR + antistriational antibodies (add MuSK/LRP4 if AChR negative); PFT with NIF + VC; CPK, aldolase, ESR, CRP (concurrent myositis); troponin, ECG, consider TTE/cardiac MRI (concurrent myocarditis); EMG/NCS with repetitive stimulation +/- single-fibre EMG.", ""], ["Red flags", "Respiratory muscle weakness, bulbar signs (dysphagia, facial weakness), or rapidly progressive weakness = impending myasthenic crisis - monitor NIF/VC, admit (ICU-level). Concurrent myocarditis carries high fatality. Inpatient care may be appropriate even for initially mild cases.", "rf"], ["Rechallenge", "Hold at all grades. Resume ONLY in G2 (MGFA I-II) if symptoms resolve AND steroid taper completed; permanently discontinue for G3-4. Avoid drugs that worsen MG: beta-blockers, IV magnesium, fluoroquinolones, aminoglycosides, macrolides.", "rc"]], "grades": [["G2", "c2", "Some symptoms interfering with ADLs; MGFA class I (ocular only) or II (mild generalized weakness)", [["ICI", "Hold; may resume only if symptoms resolve and steroid taper completed (NCCN: discontinue immunotherapy)"], ["Steroids", "Prednisone 0.5 mg/kg/day PO - deliberately lower than 1 mg/kg, as high-dose steroid can transiently worsen MG; wean on improvement. (NCCN: start prednisone 20 mg/day, escalate q3-5 days to 1 mg/kg/day, max 100 mg/day, if no response; avoid >=2 mg/kg/day)"], ["Symptomatic", "Pyridostigmine 30 mg PO three times a day, titrate up to max 120 mg PO four times a day as tolerated"], ["Referral", "Neurology; strongly consider inpatient care - patients can deteriorate quickly"]], "ASCO 2021 · Table 7 (7.1 Myasthenia gravis), G2 · NCCN v1.2026 ICI_NEURO-1"], ["G3", "c3", "Limiting self-care; weakness limiting walking, ANY dysphagia, facial/respiratory muscle weakness, or rapidly progressive; MGFA III-V", [["ICI", "Permanently discontinue"], ["Steroids", "Continue steroids; taper should begin 3-4 wk after initiation, then wean on symptom improvement. (NCCN: IV methylprednisolone 1-2 mg/kg/day)"], ["Escalation", "IVIG 2 g/kg IV over 5 days (0.4 g/kg/day) OR plasmapheresis x5 days; add rituximab if refractory (NCCN: 375 mg/m2 weekly x4, or 500 mg/m2 q2wk x2)"], ["Work-up +", "Frequent PFT (NIF/VC); daily neurologic review"], ["Referral", "Admit; may need ICU-level monitoring"]], "ASCO 2021 · Table 7 (7.1 Myasthenia gravis), G3-4 · NCCN v1.2026 ICI_NEURO-1"], ["G4", "c4", "Life-threatening (myasthenic crisis)", [["ICI", "Permanently discontinue"], ["Steroids", "Continue steroids; taper begins 3-4 wk after initiation (NCCN: IV methylprednisolone 1-2 mg/kg/day)"], ["Escalation", "IVIG 2 g/kg over 5 days (0.4 g/kg/day) OR plasmapheresis x5 days; rituximab if refractory"], ["Acute", "Admit; ICU-level monitoring for respiratory compromise/crisis; frequent PFT + daily neurologic review"]], "ASCO 2021 · Table 7 (7.1 Myasthenia gravis), G3-4 · NCCN v1.2026 ICI_NEURO-1"]]}, {"id": "irae-uveitis", "organ": "Ocular", "name": "Uveitis / ocular inflammation", "cause": "CTLA-4 · PD-1/PD-L1 · combo higher", "io": ["ctla4", "pd1", "pdl1"], "ctcae": [{"term": "Uveitis", "term_id": "s4-uveitis", "calc": false}], "shared": [["Exclude", "Infectious/other uveitis - syphilis, toxoplasmosis, TB (NCCN); evaluate + rule out before stopping ICI or starting local therapy. Rule out myasthenia gravis. Exclude patients with pre-existing active or recurrent uveitis needing systemic/continuous local therapy.", ""], ["Baseline", "Urgent ophthalmology referral for ALL grades: slit-lamp exam, visual acuity each eye, colour vision, red reflex, pupil size/shape/reactivity, intraocular pressure, dilated fundoscopy (+/- retinal nerve fibre layer, macular OCT per NCCN).", ""], ["Red flags", "Any visual compromise (vision <20/40), posterior/pan-uveitis, or 20/200-or-worse -> urgent/emergent ophthalmology. Panuveitis can cause exudative retinal detachment and blindness.", "rf"], ["Rechallenge", "May resume once off systemic steroids (or prednisone <=10 mg/day) if ocular-only irAE and resolved to <=G1; topical/ocular steroids permitted on resumption. Permanently discontinue after recurrent events or a G4 presentation.", "rc"]], "grades": [["G1", "c1", "Anterior uveitis with trace cells", [["ICI", "Continue"], ["Treatment", "Artificial tears"], ["Referral", "Prompt ophthalmology referral (usually within 1 wk)"]], "ASCO 2021 · Table 10 (10.1 Uveitis), G1 · NCCN v1.2026 ICI_OCUL-1"], ["G2", "c2", "Anterior uveitis with 1+ or 2+ cells", [["ICI", "Hold temporarily until after ophthalmology consult. NCCN: if stable on topical therapy, consider restarting in discussion with ophthalmology"], ["Treatment", "Topical corticosteroids (eg 1% prednisolone acetate) + cycloplegic (eg atropine); add systemic corticosteroids if needed"], ["Referral", "Urgent ophthalmology referral"]], "ASCO 2021 · Table 10 (10.1 Uveitis), G2 · NCCN v1.2026 ICI_OCUL-1"], ["G3", "c3", "Anterior uveitis with 3+ or greater cells; intermediate, posterior or pan-uveitis", [["ICI", "Permanently discontinue (ASCO). NCCN: hold for posterior/pan-uveitis"], ["Steroids", "Systemic corticosteroids + intravitreal/periocular/topical corticosteroids. NCCN: prednisone/IV methylprednisolone 1 mg/kg/day (max 60 mg/day) until <=G1, then taper over 4-6 wk"], ["Escalation", "Methotrexate if poor response to systemic steroids or severe sight-threatening inflammation; if refractory consider infliximab/other TNF-a blockers or IVIG"], ["Referral", "Urgent ophthalmology referral"]], "ASCO 2021 · Table 10 (10.1 Uveitis), G3 · NCCN v1.2026 ICI_OCUL-1"], ["G4", "c4", "Best-corrected visual acuity of 20/200 or worse in the affected eye", [["ICI", "Permanently discontinue"], ["Steroids", "Systemic prednisone 1-2 mg/kg/day or methylprednisolone 0.8-1.6 mg/kg/day, plus intravitreal/periocular/topical corticosteroids per ophthalmology"], ["Escalation", "Infliximab/other TNF-a blockers or IVIG for severe, treatment-refractory cases"], ["Referral", "Emergent ophthalmology referral"]], "ASCO 2021 · Table 10 (10.1 Uveitis), G4 · NCCN v1.2026 ICI_OCUL-1"]]}, {"id": "irae-aiha", "organ": "Haematologic", "name": "Autoimmune haemolytic anaemia", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Hemolytic anemia", "term_id": "s0-hemolytic-anemia", "calc": false}, {"term": "Hemolysis", "term_id": "s0-hemolysis", "calc": false}, {"term": "Anemia", "term_id": "s0-anemia", "calc": true}], "shared": [["Exclude", "Non-immune haemolysis - G6PD deficiency, drugs (dapsone, ribavirin, cephalosporins, penicillins, quinine), infection (mycoplasma, viral), TTP/HUS/DIC, PNH, MDS/bone-marrow failure. A negative DAT does NOT exclude ICI-AIHA (NCCN).", ""], ["Baseline", "CBC + peripheral smear (spherocytes, agglutination); reticulocyte count, LDH, haptoglobin, direct + indirect bilirubin, free haemoglobin; direct antiglobulin (Coombs) + cold agglutinin; PNH screen; G6PD; DIC panel. Monitor Hgb weekly until steroid taper complete.", ""], ["Red flags", "Rapid Hgb fall, transfusion need, cardiorespiratory compromise, or multi-lineage cytopenias -> urgent hematology/inpatient. Consider HLH if pancytopenia + very high ferritin.", "rf"], ["Rechallenge", "Hold from G2 and strongly consider permanent discontinuation for significant AIHA (ASCO). No data support restart after G3-4.", "rc"]], "grades": [["G1", "c1", "Hgb <LLN to 10.0 g/dL (NCCN G1 = laboratory evidence of hemolysis only)", [["ICI", "Continue with close clinical follow-up + lab evaluation (ASCO). NCCN: hold"], ["Steroids", "Not routinely indicated"], ["Work-up +", "Increased CBC + hemolysis-lab monitoring; rule out non-ICI causes"]], "ASCO 2021 · Table 8 (8.1 Hemolytic Anemia), G1 · NCCN v1.2026 ICI_HEM-2"], ["G2", "c2", "Hgb <10.0 to 8.0 g/dL (NCCN: hemolysis + >=2 g Hb drop, monitoring only, no transfusion)", [["ICI", "Hold; strongly consider permanent discontinuation (ASCO)"], ["Steroids", "Prednisone 0.5-1 mg/kg/day equivalents (NCCN 1 mg/kg/day); treat until Hgb stable off transfusion, then taper over 4-8 wk"], ["Referral", "Consider hematology"]], "ASCO 2021 · Table 8 (8.1 Hemolytic Anemia), G2 · NCCN v1.2026 ICI_HEM-2"], ["G3", "c3", "Hgb <8.0 g/dL; transfusion indicated (NCCN: hemolysis necessitating transfusion)", [["ICI", "Permanently discontinue"], ["Steroids", "Prednisone 1-2 mg/kg/day (oral or IV per severity). NCCN: 1 mg/kg/day"], ["Escalation", "No response after 5-7 days -> add rituximab; then IVIG 2 g/kg (over 2-5 days), tacrolimus, cyclophosphamide, or mycophenolate mofetil"], ["Work-up +", "RBC transfusion per guidelines (minimum units; target 7-8 g/dL in stable noncardiac inpatients); folic acid 1 mg daily"], ["Referral", "Urgent hematology; consider inpatient care"]], "ASCO 2021 · Table 8 (8.1 Hemolytic Anemia), G3 · NCCN v1.2026 ICI_HEM-2"], ["G4", "c4", "Life-threatening consequences; urgent intervention indicated", [["ICI", "Permanently discontinue"], ["Steroids", "IV (methyl)prednisolone 1-2 mg/kg/day"], ["Escalation", "No response/worsening after 3-5 days (or severe at presentation) -> add rituximab; then IVIG, cyclosporine, infliximab, mycophenolate mofetil, cyclophosphamide, tacrolimus, or ATG"], ["Work-up +", "Admit; RBC transfusion per guidelines"], ["Referral", "Hematology consult"]], "ASCO 2021 · Table 8 (8.1 Hemolytic Anemia), G4 · NCCN v1.2026 ICI_HEM-2"]]}, {"id": "irae-hlh", "organ": "Haematologic", "name": "Haemophagocytic lymphohistiocytosis", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Secondary hemophagocytic lymphohistiocytosis", "term_id": "s8-secondary-hemophagocytic-lymphohistiocytosis", "calc": false}], "shared": [["Exclude", "Sepsis/infection (EBV, CMV), lymphoma or other malignancy-driven HLH, and other cytokine-release syndromes; ICI-related HLH-like findings may overlap CRS.", ""], ["Baseline", "Ferritin, fibrinogen, triglycerides, soluble IL-2 receptor (sCD25), CBC (cytopenias), LFTs, coagulation; calculate HScore; consider NK-cell activity; tissue biopsy (marrow/liver) for haemophagocytosis. Supportive: ferritin >=500 ng/mL, hypofibrinogenaemia, hypertriglyceridaemia, transaminitis (NCCN, HLH2004-like criteria).", ""], ["Red flags", "Pancytopenia + high ferritin + fever + hepatosplenomegaly = emergency; high mortality if untreated -> urgent inpatient hematology.", "rf"], ["Rechallenge", "Hold ICI; resume only after full recovery with specialist input (IMMUNO-C). No established safe-rechallenge data.", "rc"]], "grades": [["All grades", "c4", "No agreed grading scale (NCCN); grade individual abnormalities (anaemia, thrombocytopenia, fever, liver enzymes)", [["ICI", "Hold immunotherapy (high mortality; resume only after recovery + specialist input)"], ["Steroids", "Prednisone/IV methylprednisolone 0.5-1 mg/kg/day (or dexamethasone at equivalent dose); taper slowly (~10 mg/wk) titrated to response (ferritin, inflammatory markers)"], ["Escalation", "No response to steroids by day 5 -> add tocilizumab, anakinra, ruxolitinib, cyclosporine, or emapalumab-lzsg. Etoposide 150 mg/m2 IV twice weekly (wk 1-2) then once weekly for severe/refractory HLH (ASCO immunosuppressant appendix)"], ["Acute", "Inpatient care with hematology consult (high mortality if left untreated); consider consult with an HLH-like-syndrome expert"]], "NCCN v1.2026 ICI_HEM-4 · ASCO 2021 Table 8 has no HLH grading section (etoposide only, immunosuppressant appendix)"]]}, {"id": "irae-itp", "organ": "Haematologic", "name": "Immune thrombocytopenia", "cause": "PD-1/PD-L1 · combo", "io": ["pd1", "pdl1", "combo"], "ctcae": [{"term": "Thrombocytopenia", "term_id": "s0-thrombocytopenia", "calc": true}], "shared": [["Exclude", "Other causes of thrombocytopenia - TTP, HUS, DIC, MDS, drug-induced, infection, HLH; check direct antiglobulin test to rule out concurrent Evans' syndrome (AIHA + ITP).", ""], ["Baseline", "CBC + peripheral blood smear + reticulocyte count; PT/INR, PTT, fibrinogen; HIV/HCV/HBV/H. pylori; abdominal ultrasound (NCCN). Bone marrow only if other cell lines affected or aplastic anaemia suspected.", ""], ["Red flags", "Signs of bleeding (mucosal, GI, intracranial) or platelets <25,000/mm3 -> urgent hematology + inpatient care.", "rf"], ["Rechallenge", "Hold and resume once recovered to <=G1 (IMMUNO-C). ICI not routinely permanently discontinued for isolated ITP.", "rc"]], "grades": [["G1", "c1", "Platelets <LLN to 75,000/mm3", [["ICI", "Continue with close clinical follow-up + platelet monitoring"], ["Treatment", "None; monitor for signs of bleeding"]], "ASCO 2021 · Table 8 (8.6 ITP), G1 · NCCN v1.2026 ICI_HEM-5"], ["G2", "c2", "Platelets <75,000 to 50,000/mm3", [["ICI", "Hold; resume once recovered to <=G1"], ["Steroids", "Prednisone 1 mg/kg/day (range 0.5-2) orally ~4 wk, then taper over 4-6 wk to lowest effective dose. NCCN: start if no improvement within 4-6 wk"], ["Escalation", "IVIG with corticosteroids if a more rapid platelet rise is needed (NCCN: add IVIG 2 g/kg if bleeding)"], ["Referral", "Consider hematology"]], "ASCO 2021 · Table 8 (8.6 ITP), G2 · NCCN v1.2026 ICI_HEM-5"], ["G3", "c3", "Platelets <50,000 to 25,000/mm3", [["ICI", "Hold; interrupt until recovered to <=G1"], ["Steroids", "Prednisone/IV methylprednisolone 1-2 mg/kg/day (NCCN); or dexamethasone 40 mg daily x4 days (ASCO alternative)"], ["Escalation", "IVIG 1 g/kg one-time (add if bleeding); if no response after 1-2 wk -> rituximab or thrombopoietin receptor agonists (romiplostim, eltrombopag)"], ["Referral", "Hematology consult; consider inpatient care"]], "ASCO 2021 · Table 8 (8.6 ITP), G3 · NCCN v1.2026 ICI_HEM-5"], ["G4", "c4", "Platelets <25,000/mm3", [["ICI", "Hold; interrupt until recovered to <=G1"], ["Steroids", "Prednisone/IV methylprednisolone 1-2 mg/kg/day (IV per severity/speed of onset); or dexamethasone 40 mg daily x4 days"], ["Escalation", "IVIG 1 g/kg initial one-time dose; if refractory -> rituximab or thrombopoietin receptor agonists (romiplostim, eltrombopag)"], ["Referral", "Urgent hematology; inpatient care"]], "ASCO 2021 · Table 8 (8.6 ITP), G3-4 · NCCN v1.2026 ICI_HEM-5"]]}, {"id": "irae-infusion", "organ": "Infusion reactions", "name": "Infusion-related reaction", "cause": "PD-L1 (avelumab highest) > PD-1/L1 > CTLA-4 lowest", "io": ["pd1", "pdl1", "ctla4"], "ctcae": [{"term": "Infusion related reaction", "term_id": "s10-infusion-related-reaction", "calc": false}, {"term": "Cytokine release syndrome", "term_id": "s8-cytokine-release-syndrome", "calc": false}], "shared": [["Exclude", "Distinguish from anaphylaxis/hypersensitivity and cytokine release syndrome; onset is typically during or shortly after the infusion.", ""], ["Baseline", "Vital signs, pulse oximetry during infusion; ECG if chest pain or sustained tachycardia. Avelumab (PD-L1) has the highest IRR rate (any-grade ~25%) - premedicate the first 4 infusions with acetaminophen + antihistamine per label.", ""], ["Red flags", "Hypoxaemia, hypotension, angioedema, bronchospasm, or chest pain -> stop infusion, manage as severe reaction/anaphylaxis, urgent intervention.", "rf"], ["Rechallenge", "After a severe reaction, switch to an alternate agent in the class (NCCN: PD-L1 -> PD-1) or rechallenge via desensitisation under allergist supervision (ASCO); premedication may prevent recurrence.", "rc"]], "grades": [["G1", "c1", "Mild transient reaction; infusion interruption not indicated; intervention not indicated", [["ICI", "Continue. NCCN: hold until symptoms resolve, then resume infusion as tolerated"], ["Treatment", "No intervention needed"], ["Premedication", "Consider acetaminophen + antihistamine (H1/H2) for subsequent infusions"]], "ASCO 2021 · Table 11 (11.1 IRRs), G1 · NCCN v1.2026 ICI_INF-1"], ["G2", "c2", "Infusion interruption indicated but responds promptly to symptomatic treatment; prophylactic medication indicated for <=24 h", [["ICI", "Consider holding temporarily and/or reduce infusion rate to 50%; may resume/continue (NCCN: continue)"], ["Treatment", "Symptomatic - antihistamines, NSAIDs, opioids, IV fluids as clinically appropriate (per institutional guidelines)"], ["Premedication", "Prophylactic acetaminophen + antihistamine (H1/H2) for subsequent infusions; NCCN: consider corticosteroid premedication if prior reaction"]], "ASCO 2021 · Table 11 (11.1 IRRs), G2 · NCCN v1.2026 ICI_INF-1"], ["G3", "c3", "Prolonged (not rapidly responsive to symptomatic Rx and/or brief interruption); recurrence after initial improvement; hospitalisation for other sequelae", [["ICI", "Hold; ASCO: may resume at 50% rate once <=G1. NCCN (G3-4): discontinue offending agent; consider an alternate agent in the therapeutic class"], ["Steroids", "IV corticosteroids + antihistamines (ASCO high-grade: cessation + IV corticosteroid + urgent intervention)"], ["Treatment", "Antihistamines, NSAIDs, opioids, IV fluids; hospitalisation for clinical sequelae"]], "ASCO 2021 · Table 11 (11.1 IRRs), G3 ·
