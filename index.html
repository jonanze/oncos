<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>oncOS</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1668a3">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="oncOS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){try{var t=localStorage.getItem('oncos-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{
    --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
    --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
    --red:#e00020; --orange:#f05010;
    --font-serif:'Noto Serif',Georgia,serif; --font-sans:'Noto Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:var(--font-sans);
    color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;
  }
  .hub{margin:auto;width:100%;max-width:760px;padding:64px 40px;}
  .hero{text-align:center;margin-bottom:44px;}
  .ticks{display:flex;justify-content:center;gap:6px;margin-bottom:22px;}
  .tick{width:28px;height:5px;border-radius:1px;}
  .tick.r{background:var(--red);} .tick.o{background:var(--orange);} .tick.b{background:var(--teal);}
  .wm{
    margin:0;font-family:'Montserrat',var(--font-sans);
    font-weight:700;font-size:46px;letter-spacing:-1px;color:var(--ink);
    line-height:1;
  }
  .wm .os{color:var(--teal);}
  .tag{
    margin:14px 0 0;color:var(--muted);font-size:12px;font-weight:600;
    font-family:var(--font-sans);
    letter-spacing:2px;text-transform:uppercase;
  }
  .rule{border:none;border-top:1.2px solid var(--rule);margin:0 0 32px;}
  .themetoggle-fixed{position:fixed;top:calc(16px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));z-index:5;}
  .list{display:flex;flex-direction:column;}
  .card{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    padding:20px 4px;border-bottom:1px solid var(--grid);
    transition:background .12s;
  }
  .card:first-child{border-top:1px solid var(--grid);}
  .card:hover{background:var(--accent-soft);}
  .ic{
    flex:0 0 auto;width:34px;height:34px;
    color:var(--teal);display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:22px;height:22px;}
  .cname{
    flex:1 1 auto;min-width:0;color:var(--ink);
    font-family:var(--font-serif);
    font-weight:500;font-size:19px;letter-spacing:0;text-transform:none;
  }
  .cgo{flex:0 0 auto;color:var(--teal);font-size:18px;opacity:.55;transition:opacity .14s;}
  .card:hover .cgo{opacity:1;}
  .disc{
    margin-top:40px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;
    border-top:1px solid var(--grid);padding-top:18px;
    font-family:var(--font-sans);letter-spacing:.3px;
  }
  @media(max-width:560px){
    .hub{padding:40px 22px;}
    .wm{font-size:36px;}
  }

  /* --- oncOS dark mode (shared: _oncos-kit/oncos_theme.py) --- */
  :root{ --rule:var(--ink); --btn-ink:#ffffff; color-scheme:light; }
  :root[data-theme="dark"]{
    --ink:#e8eef4; --teal:#4aa6e2; --slate:#a8bac8; --muted:#8497a7;
    --hair:#263d52; --grid:#1c3145; --accent-soft:#173350; --paper:#0e2233;
    --rule:#37546e; --btn-ink:#08243b;
    --status-success:#3cbe86; --status-success-soft:#123527;
    --status-warning:#e0a94a; --status-warning-soft:#372c12;
    --status-danger:#f0716e; --status-danger-soft:#3c1e1e;
    --status-info:#4aa6e2; --status-info-soft:#173350;
    color-scheme:dark;
  }
  html{ transition:background .18s ease, color .18s ease; }
  .theme-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; padding:0; cursor:pointer; flex:0 0 auto;
    background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:0;
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{ color:var(--teal); border-color:var(--teal); background:var(--accent-soft); }
  .theme-toggle svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .theme-toggle .i-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-sun{ display:block; }
  /* --- oncOS mobile QA (roadmap #4): no side-scroll + no iOS focus-zoom --- */
  /* Touch devices only: iOS Safari zooms the page when a focused control is
     under 16px, so pin form controls to 16px there (desktop sizing untouched). */
  @media (hover:none) and (pointer:coarse){
    input, select, textarea { font-size:16px !important; }
  }
  /* Belt-and-braces: disable horizontal page scroll on phones. `clip` (not
     `hidden`) doesn't create a scroll container, so position:sticky headers
     keep working. */
  @media (max-width:760px){ html, body { overflow-x:clip; } }
</style>
</head>
<body>
<div class="themetoggle-fixed"><button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle light / dark"><svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button></div>
<main class="hub">
  <header class="hero">
    <div class="ticks"><span class="tick r"></span><span class="tick o"></span><span class="tick b"></span></div>
    <h1 class="wm" aria-label="oncOS">onc<span class="os">OS</span></h1>
    <p class="tag">Clinical Hub</p>
  </header>
  <hr class="rule">
  <section class="list">
      <a class="card" href="evidence/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5c0 1.66 3.13 3 7 3s7-1.34 7-3-3.13-3-7-3-7 1.34-7 3z"/><path d="M5 5v7c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 12v7c0 1.66 3.13 3 7 3s7-1.34 7-3v-7"/></svg></span><span class="cname">Evidence</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="staging/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M6 21v-6"/><path d="M12 21V10"/><path d="M18 21V5"/></svg></span><span class="cname">Staging</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="drugs/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></span><span class="cname">Drugs</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="tox/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span><span class="cname">Tox</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="acute/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3.5l2-6 4 12 2.5-8 1.5 2H21"/></svg></span><span class="cname">Acute</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
  </section>
  <footer class="disc">
    &copy; Jonan Tan 2026
  </footer>
</main>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
<script>(function(){var m=document.querySelector('meta[name="theme-color"]');var D='#0e2233',L=(m&&m.getAttribute('content'))||'#1668a3';function s(){if(m)m.setAttribute('content',document.documentElement.getAttribute('data-theme')==='dark'?D:L);}s();document.querySelectorAll('.theme-toggle').forEach(function(b){b.addEventListener('click',function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('oncos-theme',t);}catch(e){}s();});});})();</script>
</body>
</html>
