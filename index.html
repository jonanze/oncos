<style>

  /* --- oncOS Meridian webfonts (shared: _oncos-kit/oncos_fonts.py) --- */
  @font-face{font-family:'Montserrat';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Montserrat-normal-700.woff2) format('woff2');}
  @font-face{font-family:'Newsreader';font-style:normal;font-weight:200 800;font-display:swap;src:url(/fonts/Newsreader-normal-200_800.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:normal;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-normal-400_900.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:italic;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-italic-400_900.woff2) format('woff2');}
  @font-face{font-family:'Spline Sans Mono';font-style:normal;font-weight:300 700;font-display:swap;src:url(/fonts/SplineSansMono-normal-300_700.woff2) format('woff2');}

  /* --- oncOS Meridian theme (shared: _oncos-kit/oncos_theme.py) --- */
  :root{
    --m:#4e51d8; --teal:var(--m);
    --ink:#131926; --slate:#4d5a6b; --muted:#6b7787;
    --hair:#e3e7ee; --grid:#edf0f5;
    --accent-soft:color-mix(in oklab, var(--m) 8%, #ffffff);
    --paper:#ffffff; --ground:#f6f7f9; --raised:#ffffff;
    --status-success:#0e8f63; --status-success-soft:#e3f3ec;
    --status-warning:#946908; --status-warning-soft:#f7efdb;
    --status-danger:#c23f38; --status-danger-soft:#faeae9;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --font-serif:'Newsreader','Iowan Old Style',Georgia,serif;
    --font-sans:'Schibsted Grotesk',-apple-system,'Helvetica Neue',system-ui,sans-serif;
    --font-mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --rule:#d7dde6; --btn-ink:#ffffff;
    --radius:12px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(19,25,38,.05), 0 10px 28px -12px rgba(19,25,38,.14);
    --glass:rgba(255,255,255,.8);
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --m:#8a8cff; --teal:var(--m);
    --ink:#e8ecf3; --slate:#a3aebe; --muted:#8391a3;
    --hair:#222937; --grid:#1a2130;
    --accent-soft:color-mix(in oklab, var(--m) 13%, #10141c);
    --paper:#10141c; --ground:#0a0d13; --raised:#151b26;
    --status-success:#37c98c; --status-success-soft:#12312a;
    --status-warning:#e5a93e; --status-warning-soft:#32270f;
    --status-danger:#f0716b; --status-danger-soft:#391b19;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --rule:#2a3242; --btn-ink:#0a0d13;
    --shadow:none;
    --glass:rgba(13,17,25,.75);
    color-scheme:dark;
  }
  html{ transition:background .18s ease, color .18s ease; }
  body{ background:var(--ground); }
  /* --- Keyboard focus: a visible ring in the module wavelength, only on
     keyboard focus (:focus-visible), suite-wide. Before this the clickable
     nav links, hub cards, drawer controls and details summaries had no visible
     focus state. Inputs keep their own border-colour focus affordance (their
     :focus{outline:none} is more specific, so this doesn't override it). --- */
  :focus-visible{ outline:2px solid var(--m, var(--teal)); outline-offset:2px; border-radius:4px; }
  /* --- Meridian shared chrome (the locked suite header pattern) --- */
  /* Wordmark is Montserrat Bold (self-hosted via oncos_fonts) — the one place
     the suite keeps its original NCIS wordmark face; everything else is the
     Meridian type system. */
  .wm{ font-family:'Montserrat',var(--font-sans); font-weight:700; letter-spacing:-.03em; }
  .wm .os{ background-image:linear-gradient(100deg,#4e51d8,#0977b0 45%,#0b8a66);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  :root[data-theme="dark"] .wm .os{ background-image:linear-gradient(100deg,#8a8cff,#3fbbef 45%,#3fd6a6); }
  .mhead{ background:var(--glass);
    -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3);
    border-bottom:1px solid var(--hair); }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .mhead{ background:var(--paper); }
  }
  .burger{ border-radius:10px; }
  .barsearch{ border-radius:999px; background:var(--ground); }
  body.nav-open .backdrop{ background:rgba(10,13,19,.35); }
  /* --- Suite switcher: module-to-module navigation, injected at the top of
     every module drawer by the kit script (see toggle_script) — before it, the
     only route between modules was back through the hub. Wavelength dots come
     from the generated .sdot-<module> rules appended below. --- */
  .suite-nav{ padding:2px 0 10px; margin-bottom:8px; border-bottom:1px solid var(--hair); }
  .suite-nav .suite-label{ font-size:10.5px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted); padding:8px 20px 5px; }
  .suite-link{ display:flex; align-items:center; gap:10px; padding:7px 20px;
    font-size:13.5px; color:var(--ink); text-decoration:none; }
  .suite-link:hover{ background:var(--accent-soft); color:var(--m); }
  .suite-link[aria-current="page"]{ color:var(--m); font-weight:600; background:var(--accent-soft); }
  .sdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .sdot-evidence{ background:#4e51d8; }
  :root[data-theme="dark"] .sdot-evidence{ background:#8a8cff; }
  .sdot-drugs{ background:#0977b0; }
  :root[data-theme="dark"] .sdot-drugs{ background:#3fbbef; }
  .sdot-staging{ background:#0b8a66; }
  :root[data-theme="dark"] .sdot-staging{ background:#3fd6a6; }
  .sdot-tox{ background:#8f6206; }
  :root[data-theme="dark"] .sdot-tox{ background:#f0b44e; }
  .sdot-acute{ background:#d23d34; }
  :root[data-theme="dark"] .sdot-acute{ background:#ff6f61; }
  .sdot-hub{ background:linear-gradient(135deg,#4e51d8,#0977b0,#0b8a66,#8f6206,#d23d34); }
  :root[data-theme="dark"] .sdot-hub{ background:linear-gradient(135deg,#8a8cff,#3fbbef,#3fd6a6,#f0b44e,#ff6f61); }

  .theme-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; padding:0; cursor:pointer; flex:0 0 auto;
    background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:999px;
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{ color:var(--m); border-color:var(--m); background:var(--accent-soft); }
  .theme-toggle svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .theme-toggle .i-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-sun{ display:block; }
  /* --- oncOS mobile QA (roadmap #4): no side-scroll + no iOS focus-zoom --- */
  /* Touch devices only: iOS Safari zooms the page when a focused control is
     under 16px, so pin form controls to 16px there (desktop sizing untouched). */
  @media (hover:none) and (pointer:coarse){
    input, select, textarea { font-size:16px !important; }
  }
  /* Belt-and-braces: disable horizontal page scroll on phones. `clip` (not
     `hidden`) doesn't create a scroll container, so position:sticky headers
     keep working. */
  @media (max-width:760px){ html, body { overflow-x:clip; } }

  /* ===== oncOS motion layer (shared: _oncos-kit/oncos_motion.py) ===== */
  :root{
    --mo-dur:150ms;
    --mo-ease:cubic-bezier(.3,0,.1,1);
    interpolate-size: allow-keywords;   /* lets block-size:auto animate */
  }

  /* --- Tier 1: native <details> cards grow + fade open --- */
  details::details-content{
    block-size:0; overflow:clip; opacity:0;
    transition:block-size var(--mo-dur) var(--mo-ease),
               opacity var(--mo-dur) var(--mo-ease),
               content-visibility var(--mo-dur) allow-discrete;
  }
  details[open]::details-content{ block-size:auto; opacity:1; }
  /* chevron rotate — harmless where a module has no .chev */
  details > summary .chev{ transition:transform var(--mo-dur) var(--mo-ease); }
  details[open] > summary .chev{ transform:rotate(90deg); }

  /* --- Tier 1: nav backdrop cross-fades with the drawer slide --- */
  /* Modules toggle .backdrop via display (not animatable); pin it displayed and
     drive opacity/visibility instead. Inert on pages with no .backdrop (Hub). */
  .backdrop{
    display:block !important; position:fixed; inset:0; z-index:45;
    background:rgba(15,42,67,.18);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity var(--mo-dur) var(--mo-ease),
               visibility var(--mo-dur) var(--mo-ease);
  }
  body.nav-open .backdrop{ opacity:1; visibility:visible; pointer-events:auto; }

  /* --- Tier 2: theme-toggle sun/moon cross-fade (replaces the display swap) --- */
  .theme-toggle{ position:relative; overflow:hidden; }
  .theme-toggle svg{
    position:absolute; top:50%; left:50%; margin:0;
    transition:opacity var(--mo-dur) var(--mo-ease), transform var(--mo-dur) var(--mo-ease);
  }
  .theme-toggle .i-moon{ display:block !important; opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }
  .theme-toggle .i-sun{ display:block !important; opacity:0; transform:translate(-50%,-50%) rotate(-90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-moon{ opacity:0; transform:translate(-50%,-50%) rotate(90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-sun{ opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }

  /* --- Tier 1: tap/press feedback (touch has no hover) --- */
  @media (prefers-reduced-motion:no-preference){
    details > summary:active{ transform:scale(.994); }
    a.card:active{ transform:scale(.99); }
  }

  /* --- Tier 2: opt-in staggered content entrance (Hub grid only) --- */
  @media (prefers-reduced-motion:no-preference){
    .mo-stagger > *{ animation:mo-fadeup var(--mo-dur) var(--mo-ease) both; }
    .mo-stagger > *:nth-child(1){ animation-delay:0ms; }
    .mo-stagger > *:nth-child(2){ animation-delay:45ms; }
    .mo-stagger > *:nth-child(3){ animation-delay:90ms; }
    .mo-stagger > *:nth-child(4){ animation-delay:135ms; }
    .mo-stagger > *:nth-child(5){ animation-delay:180ms; }
    .mo-stagger > *:nth-child(6){ animation-delay:225ms; }
    .mo-stagger > *:nth-child(7){ animation-delay:270ms; }
    .mo-stagger > *:nth-child(n+8){ animation-delay:300ms; }
    @keyframes mo-fadeup{ from{ opacity:0; transform:translateY(7px); } to{ opacity:1; transform:none; } }
  }

  /* --- accessibility: honour the OS reduced-motion setting suite-wide --- */
  @media (prefers-reduced-motion:reduce){
    :root{ --mo-dur:0.001ms; }
    *, *::before, *::after{
      animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.001ms !important; scroll-behavior:auto !important;
    }
    details::details-content{ transition-duration:.001ms !important; }
  }

@property --m { syntax:'<color>'; inherits:true; initial-value:#4e51d8; }
@media (prefers-reduced-motion: no-preference){ :root{ transition: --m .35s var(--mo-ease, cubic-bezier(.3,0,.1,1)); } }
html[data-view="evidence"]{ --m:#4e51d8; --teal:var(--m); }
html[data-view="evidence"][data-theme="dark"]{ --m:#8a8cff; }
html[data-view="drugs"]{ --m:#0977b0; --teal:var(--m); }
html[data-view="drugs"][data-theme="dark"]{ --m:#3fbbef; }
html[data-view="staging"]{ --m:#0b8a66; --teal:var(--m); }
html[data-view="staging"][data-theme="dark"]{ --m:#3fd6a6; }
html[data-view="tox"]{ --m:#8f6206; --teal:var(--m); }
html[data-view="tox"][data-theme="dark"]{ --m:#f0b44e; }
html[data-view="acute"]{ --m:#d23d34; --teal:var(--m); }
html[data-view="acute"][data-theme="dark"]{ --m:#ff6f61; }

*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:var(--font-sans);color:var(--ink);background:var(--ground);
  font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%;}
a{color:var(--teal);}
.mhead{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:calc(11px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) 11px calc(24px + env(safe-area-inset-left));}
.burger{display:flex;flex:0 0 auto;width:36px;height:36px;border:1px solid var(--hair);
  background:var(--paper);color:var(--ink);align-items:center;justify-content:center;cursor:pointer;padding:0;}
.burger svg{width:20px;height:20px;}
.wm{margin:0;font-size:22px;color:var(--ink);line-height:1;text-decoration:none;flex:0 0 auto;}
.hdiv{width:1px;height:22px;background:var(--hair);flex:0 0 auto;}
.tag{margin:0;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;flex:0 0 auto;}
/* Suite tabs in the masthead (replaces the drawer suite section). Resets the
   kit's drawer .suite-nav box styling; active tab lights in the current
   wavelength (--m IS the active module's hue by definition). */
.mast-suite{display:flex;align-items:center;gap:2px;margin:0 auto;padding:0;border:0;
  min-width:0;overflow-x:auto;scrollbar-width:none;}
.mast-suite::-webkit-scrollbar{display:none;}
/* Icon tabs (Jonan 2026-07-18): the masthead carries the module ICONS, no
   text — names live in title/aria-label. Active icon lights in its wavelength
   (--m is the active module's hue by definition). */
.mast-suite .suite-link{display:flex;align-items:center;justify-content:center;
  width:36px;height:32px;border-radius:9px;color:var(--muted);text-decoration:none;}
.mast-suite .suite-link:hover{color:var(--ink);background:var(--accent-soft);}
.mast-suite .suite-link[aria-current="page"]{color:var(--m);
  background:color-mix(in oklab, var(--m) 11%, transparent);}
.mast-suite .tico{display:flex;}
.mast-suite .tico svg{width:18px;height:18px;display:block;}
/* True geometric centring where the bar is wide enough that the tabs can
   never collide with the search field; below that they centre in the free
   span (margin:auto), and on mobile they give way to the dropdown. */
@media (min-width:880px){
  .mhead{position:sticky;}
  .mast-suite{position:absolute;left:50%;transform:translateX(-50%);margin:0;}
}
/* Mobile module switcher: single thin masthead row; the active module's icon
   + caret opens a dropdown sheet under the bar. */
.mob-suite{display:none;flex:0 0 auto;align-items:center;gap:3px;height:32px;padding:0 7px;
  border:1px solid var(--hair);border-radius:9px;background:transparent;color:var(--m);cursor:pointer;}
.mob-suite .tico svg{width:18px;height:18px;display:block;}
.mob-suite .caret{width:13px;height:13px;color:var(--muted);transition:transform .15s;}
.mob-suite[aria-expanded="true"] .caret{transform:rotate(180deg);}
.suite-drop{position:fixed;z-index:55;right:12px;top:calc(54px + env(safe-area-inset-top));
  min-width:200px;background:var(--paper);border:1px solid var(--hair);border-radius:12px;
  box-shadow:var(--shadow);padding:6px;display:none;}
.suite-drop .drop-link{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;
  color:var(--ink);text-decoration:none;font-size:14px;}
.suite-drop .drop-link .tico svg{width:18px;height:18px;display:block;}
.suite-drop .drop-link:hover{background:var(--accent-soft);}
.suite-drop .drop-link[aria-current="page"]{color:var(--m);
  background:color-mix(in oklab, var(--m) 10%, transparent);}
@media (prefers-reduced-motion: no-preference){
  .suite-drop{transform-origin:top right;}
  .suite-drop.open{animation:drop-in .16s var(--mo-ease, cubic-bezier(.3,0,.1,1));}
  @keyframes drop-in{from{opacity:0;transform:scale(.96) translateY(-4px);}to{opacity:1;transform:none;}}
}
.suite-drop.open{display:block;}
.barsearch{flex:0 0 auto;width:min(280px,34vw);margin-left:auto;height:36px;padding:0 13px;
  font:inherit;color:var(--ink);border:1px solid var(--hair);}
.barsearch:focus{outline:none;border-color:var(--teal);}
.mhead .theme-toggle{flex:0 0 auto;}
aside.sidebar{position:fixed;top:0;left:0;z-index:50;background:var(--paper);
  border-right:1px solid var(--hair);height:100vh;height:100dvh;overflow-y:auto;
  width:min(82vw,300px);transform:translateX(-100%);transition:transform .22s ease;
  padding:calc(16px + env(safe-area-inset-top)) 0 calc(20px + env(safe-area-inset-bottom));}
body.nav-open aside.sidebar{transform:translateX(0);}
body.nav-open{overflow:hidden;}
#viewroot{min-height:60vh;}
/* Drawer padding: evidence/staging nav items carry their own indent; drugs,
   tox and acute relied on their (stripped) module-aside padding — restore it
   at the mount point so content doesn't hug the drawer edges. */
[data-view="drugs"] #viewnav,[data-view="tox"] #viewnav,[data-view="acute"] #viewnav{
  padding:6px 18px 20px;}
/* in-view hash anchors (drugs A–Z) land below the sticky masthead */
:target{scroll-margin-top:72px;}
@media (max-width:760px){
  .mhead{padding-left:15px;padding-right:15px;gap:10px;}
  .barsearch{margin-left:auto;}
  .mast-suite{display:none;}
  .mob-suite{display:flex;}
}
/* view swap: quiet fade/rise, wavelength slides via the :root --m transition */
@media (prefers-reduced-motion: no-preference){
  #viewroot{transition:opacity .15s var(--mo-ease, cubic-bezier(.3,0,.1,1)),
            transform .15s var(--mo-ease, cubic-bezier(.3,0,.1,1));}
}
#viewroot.leaving{opacity:0;transform:translateY(5px);}
/* loading shimmer between fetch start and mount (usually invisible: cached) */
.viewload{padding:60px 0;text-align:center;color:var(--muted);font-size:13px;}
/* Chrome hardening: view fragments carry generic element rules
   ([data-view=x] a{color:var(--teal)} etc.) that outrank bare class selectors
   and were tinting the persistent wordmark per module (the original
   "wordmark differs across the suite" bug). Two-class selectors win back. */
.mhead a.wm{color:var(--ink);text-decoration:none;}
.mhead .mast-suite .suite-link{text-decoration:none;}
/* ---- home: the ORIGINAL hub page, unchanged (Jonan 2026-07-18) — shell
   masthead hidden on this view so it reads exactly as before the integration;
   its own fixed corner toggle returns. ---- */
[data-view="hub"] .mhead{display:none;}
[data-view="hub"] .suite-drop{display:none !important;}
[data-view="hub"] .themetoggle-fixed{position:fixed;top:calc(16px + env(safe-area-inset-top));
  right:calc(16px + env(safe-area-inset-right));z-index:5;}
[data-view="hub"] .hub{margin:auto;width:100%;max-width:760px;padding:64px 40px;}
[data-view="hub"] #viewroot{min-height:100vh;min-height:100dvh;display:flex;}
[data-view="hub"] .hero{text-align:center;margin-bottom:44px;}
[data-view="hub"] .hero .wm{margin:0;font-size:46px;letter-spacing:-1px;color:var(--ink);line-height:1;}
[data-view="hub"] .rule{border:none;border-top:1px solid var(--rule);margin:0 0 32px;}
[data-view="hub"] .list{display:flex;flex-direction:column;gap:12px;}
[data-view="hub"] .card{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
  padding:18px 20px;background:var(--paper);border:1px solid var(--grid);border-radius:14px;
  box-shadow:var(--shadow);transition:background .12s,border-color .15s,transform .15s;}
[data-view="hub"] .card:hover{background:color-mix(in oklab, var(--cm, var(--teal)) 5%, var(--paper));
  border-color:color-mix(in oklab, var(--cm, var(--teal)) 45%, var(--grid));transform:translateY(-2px);}
[data-view="hub"] .ic{flex:0 0 auto;width:38px;height:38px;border-radius:10px;color:var(--cm, var(--teal));
  background:color-mix(in oklab, var(--cm, var(--teal)) 12%, transparent);
  display:flex;align-items:center;justify-content:center;}
[data-view="hub"] .ic svg{width:22px;height:22px;}
[data-view="hub"] .cname{flex:1 1 auto;min-width:0;color:var(--ink);font-family:var(--font-serif);
  font-weight:500;font-size:19px;}
[data-view="hub"] .cgo{flex:0 0 auto;color:var(--cm, var(--teal));font-size:18px;opacity:.55;}
[data-view="hub"] .card:hover .cgo{opacity:1;}
[data-view="hub"] .disc{margin-top:40px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;
  border-top:1px solid var(--grid);padding-top:18px;letter-spacing:.3px;}
@media (max-width:560px){
  [data-view="hub"] .hub{padding:40px 22px;}
  [data-view="hub"] .hero .wm{font-size:36px;}
}

<script>(function(){var m=document.querySelector('meta[name="theme-color"]');var D='#0d1119',L=(m&&m.getAttribute('content'))||'#f6f7f9';function s(){if(m)m.setAttribute('content',document.documentElement.getAttribute('data-theme')==='dark'?D:L);}s();document.querySelectorAll('.theme-toggle').forEach(function(b){b.addEventListener('click',function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('oncos-theme',t);}catch(e){}s();});});var q=document.querySelector('.barsearch');document.addEventListener('keydown',function(e){if(e.defaultPrevented)return;if(e.key==='/'){var t=e.target,g=(t&&t.tagName||'').toLowerCase();if(g==='input'||g==='textarea'||g==='select'||(t&&t.isContentEditable))return;if(q){e.preventDefault();q.focus();}}else if(e.key==='Escape'){if(document.body.classList.contains('nav-open')){document.body.classList.remove('nav-open');}else if(q&&document.activeElement===q){q.blur();}}});var sb=document.querySelector('aside.sidebar,aside#sidebar');if(sb&&!document.querySelector('.suite-nav')){var here=(location.pathname.match(/\/(evidence|staging|drugs|tox|acute)\//)||[])[1]||'';var mods=[['hub','Hub','../'],['evidence','Evidence','../evidence/'],['staging','Staging','../staging/'],['drugs','Drugs','../drugs/'],['tox','Tox','../tox/'],['acute','Acute','../acute/']];var h='<div class="suite-label">Suite</div>';mods.forEach(function(m){var cur=m[0]===here;h+='<a class="suite-link" href="'+m[2]+'"'+(cur?' aria-current="page"':'')+'>'+'<span class="sdot sdot-'+m[0]+'"></span>'+m[1]+'</a>';});var d=document.createElement('nav');d.className='suite-nav';d.setAttribute('aria-label','oncOS suite');d.innerHTML=h;sb.insertBefore(d,sb.firstChild);}})();</script>
<script>

(function(){
  var VIEWS = {"evidence": {"title": "Evidence", "searchId": "q"}, "staging": {"title": "Staging", "searchId": "q"}, "drugs": {"title": "Drugs", "searchId": "search"}, "tox": {"title": "Tox", "searchId": "q"}, "acute": {"title": "Acute", "searchId": "q"}, "hub": {"title": ""}};
  var root = document.documentElement;
  var viewroot = document.getElementById('viewroot');
  var viewnav = document.getElementById('viewnav');
  var vname = document.getElementById('viewname');
  var homeTpl = document.getElementById('home-view');
  var cache = {};          // name -> fragment text
  var current = null;      // active view name
  var active = null;       // active window.oncosView
  var capt = [];           // captured doc/window listeners for auto-cleanup
  var pendingQuery = null; // query handed from the home search into a view

  function pathToView(p){
    var m = p.match(/^\/(evidence|staging|drugs|tox|acute)(\/|$)/);
    return m ? m[1] : 'hub';
  }
  function searchEl(){ return document.querySelector('.barsearch'); }
  function freshChrome(){
    // drop accumulated listeners on shared chrome nodes by clone-replacing
    ['.barsearch','#burger','#backdrop'].forEach(function(sel){
      var el = document.querySelector(sel);
      if (el) el.parentNode.replaceChild(el.cloneNode(true), el);
    });
    var burger = document.getElementById('burger');
    var backdrop = document.getElementById('backdrop');
    if (burger) burger.onclick = function(){ document.body.classList.toggle('nav-open'); };
    if (backdrop) backdrop.onclick = function(){ document.body.classList.remove('nav-open'); };
  }
  function captureOn(){
    var da = document.addEventListener.bind(document), wa = window.addEventListener.bind(window);
    document.addEventListener = function(t,f,o){ capt.push(['d',t,f,o]); da(t,f,o); };
    window.addEventListener = function(t,f,o){ capt.push(['w',t,f,o]); wa(t,f,o); };
    return function(){ document.addEventListener = da; window.addEventListener = wa; };
  }
  function releaseCaptured(){
    capt.forEach(function(c){
      (c[0]==='d'?document:window).removeEventListener(c[1],c[2],c[3]);
    });
    capt = [];
  }
  function fetchView(name){
    if (cache[name]) return Promise.resolve(cache[name]);
    return fetch('/views/'+name+'.html', {credentials:'same-origin'}).then(function(r){
      if (!r.ok) throw new Error(r.status);
      return r.text();
    }).then(function(t){ cache[name] = t; return t; });
  }
  function mount(name, fragText){
    // remember where we were (for the home "resume" affordance)
    if (current && current !== 'hub') {
      var oldQ = searchEl();
      try { localStorage.setItem('oncos-one-last', JSON.stringify(
        { v: current, q: (oldQ && oldQ.value) || '' })); } catch(e){}
    }
    // teardown
    if (active && active.destroy) { try{ active.destroy(); }catch(e){} }
    releaseCaptured();
    document.body.classList.remove('nav-open');
    freshChrome();
    active = null; window.oncosView = null;

    // swap
    root.setAttribute('data-view', name);
    var v = VIEWS[name];
    if (vname) vname.textContent = v ? v.title : '';
    var q = searchEl();
    if (q) { q.value=''; q.placeholder = 'Search\u2026'; q.style.display = (name==='hub'?'none':'');
      q.id = (v && v.searchId) || 'q'; }
    var tagdiv = document.getElementById('hdiv');
    if (tagdiv) tagdiv.style.display = (name==='hub'?'none':'');
    document.title = name==='hub' ? 'oncOS' : 'oncOS \u2014 ' + (v?v.title:name);

    viewnav.innerHTML = '';
    if (name === 'hub') {
      viewroot.innerHTML = '';
      viewroot.appendChild(homeTpl.content.cloneNode(true));
      hookHome();
    } else {
      var doc = new DOMParser().parseFromString(fragText, 'text/html');
      viewroot.innerHTML = '';
      doc.querySelectorAll('style[data-view-css]').forEach(function(s){
        viewroot.appendChild(document.importNode(s, true));
      });
      var frag = doc.querySelector('.viewfrag');
      if (frag) viewroot.appendChild(document.importNode(frag, true));
      var nav = doc.querySelector('template[data-nav]');
      if (nav) viewnav.appendChild(document.importNode(nav.content, true));
      // execute the view script (innerHTML'd scripts don't run)
      var vs = doc.querySelector('script');
      if (vs) {
        var restore = captureOn();
        try {
          (new Function(vs.textContent))();
          if (window.oncosView && window.oncosView.init) {
            active = window.oncosView;
            try { active.init({ root:viewroot, nav:viewnav, search:searchEl() }); }
            catch(err){ console.error('oncOS view init failed:', name, err); }
          }
        } finally { restore(); }
        // hand a home-search query into the freshly-initialised view
        if (pendingQuery) {
          var qh = searchEl();
          if (qh) { qh.value = pendingQuery;
            qh.dispatchEvent(new Event('input', {bubbles:true})); }
          pendingQuery = null;
        }
      }
    }
    // suite active state — masthead tabs and the mobile dropdown alike
    document.querySelectorAll('.suite-link, .drop-link').forEach(function(a){
      var to = pathToView(new URL(a.href, location.href).pathname);
      if (to === name) a.setAttribute('aria-current','page');
      else a.removeAttribute('aria-current');
    });
    // mobile switcher: show the active module's icon; close the dropdown
    var mob = document.getElementById('mobsuite');
    var drop = document.getElementById('suitedrop');
    if (mob && drop){
      var mico = document.getElementById('mobsuite-ico');
      var srcIco = name!=='hub' && document.querySelector('.mast-suite .suite-link[data-nav="'+name+'"] .tico');
      if (mico) mico.innerHTML = srcIco ? srcIco.innerHTML : '';
      drop.classList.remove('open'); mob.setAttribute('aria-expanded','false');
    }
    window.scrollTo(0,0);
  }
  function hookHome(){
    var hq = document.getElementById('homeq');
    var routes = document.getElementById('hqroutes');
    var resume = document.getElementById('resume');
    if (!hq) return;
    hq.addEventListener('input', function(){ routes.hidden = !hq.value.trim(); });
    hq.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && hq.value.trim()) { pendingQuery = hq.value.trim(); go('evidence', true); }
    });
    routes.querySelectorAll('.hq-route').forEach(function(b){
      b.addEventListener('click', function(){
        pendingQuery = hq.value.trim() || null;
        go(b.dataset.route, true);
      });
    });
    try {
      var last = JSON.parse(localStorage.getItem('oncos-one-last') || 'null');
      if (last && last.v && VIEWS[last.v]) {
        resume.hidden = false;
        resume.textContent = 'Resume: ' + VIEWS[last.v].title + (last.q ? ' \u2014 \u201C' + last.q + '\u201D' : '');
        resume.addEventListener('click', function(){
          pendingQuery = last.q || null; go(last.v, true);
        });
      }
    } catch(e){}
  }
  function go(name, push, minWait, onMounted){
    if (name === current) { document.body.classList.remove('nav-open'); return; }
    var url = name==='hub' ? '/' : '/'+name+'/';
    if (push) history.pushState({v:name}, '', url);
    var done = function(txt){
      current = name;
      mount(name, txt);
      viewroot.classList.remove('leaving');
      if (onMounted) { try{ onMounted(); }catch(e){} }
    };
    viewroot.classList.add('leaving');
    var t0 = Date.now();
    var p = name==='hub' ? Promise.resolve(null) : fetchView(name);
    p.then(function(txt){
      var wait = Math.max(0, (minWait==null?150:minWait) - (Date.now()-t0));
      setTimeout(function(){ done(txt); }, wait);
    }).catch(function(){
      // fetch failed (offline, gate) — hard-navigate as a fallback
      location.href = url;
    });
  }

  // intercept same-origin suite navigation
  document.addEventListener('click', function(e){
    if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button!==0) return;
    var a = e.target.closest ? e.target.closest('a') : null;
    if (!a || a.origin !== location.origin) return;
    // same-page hash anchors (drugs A-Z letters) are the browser's business —
    // scroll natively, close the drawer, and never hijack them as navigation
    if (a.hash && a.pathname.replace(/\/$/,'') === location.pathname.replace(/\/$/,'')) {
      setTimeout(function(){ document.body.classList.remove('nav-open'); }, 40);
      return;
    }
    var to = a.pathname;
    if (/^\/(evidence|staging|drugs|tox|acute)\/?$/.test(to) || to === '/' ) {
      e.preventDefault();
      go(pathToView(to), true);
    }
  }, true);
  window.addEventListener('popstate', function(){ go(pathToView(location.pathname), false); });

  // mobile module dropdown
  (function(){
    var mob = document.getElementById('mobsuite');
    var drop = document.getElementById('suitedrop');
    if (!mob || !drop) return;
    mob.addEventListener('click', function(e){
      e.stopPropagation();
      var open = drop.classList.toggle('open');
      mob.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    document.addEventListener('click', function(e){
      if (drop.classList.contains('open') && !drop.contains(e.target) && e.target!==mob && !mob.contains(e.target)){
        drop.classList.remove('open'); mob.setAttribute('aria-expanded','false');
      }
    });
    document.addEventListener('keydown', function(e){
      if (e.key==='Escape' && drop.classList.contains('open')){
        drop.classList.remove('open'); mob.setAttribute('aria-expanded','false');
      }
    });
  })();

  // retire old per-module service workers (scope != root)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(rs){
      rs.forEach(function(r){
        if (new URL(r.scope).pathname !== '/') r.unregister();
      });
    });
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }

  // boot on whatever path we were served at
  go(pathToView(location.pathname), false);
  // prefetch remaining views when idle (instant later hops)
  var idle = window.requestIdleCallback || function(f){ setTimeout(f, 1500); };
  idle(function(){ Object.keys(VIEWS).forEach(function(n){ if(n!=='hub') fetchView(n).catch(function(){}); }); });
})();

</script>
