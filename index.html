<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>oncOS</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f6f7f9">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="oncOS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){try{var t=localStorage.getItem('oncos-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>

  :root{
    --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
    --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
    --font-serif:'Noto Serif',Georgia,serif; --font-sans:'Noto Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:var(--font-sans);
    color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;
  }
  .hub{margin:auto;width:100%;max-width:760px;padding:64px 40px;}
  .hero{text-align:center;margin-bottom:44px;}
  /* Meridian spectrum: the five module wavelengths as one line (kit hues). */
  .spectrumbar{width:132px;height:3px;border-radius:999px;margin:0 auto 24px;}
  .wm{
    margin:0;font-family:'Montserrat',var(--font-sans);
    font-weight:700;font-size:46px;letter-spacing:-1px;color:var(--ink);
    line-height:1;
  }
  .wm .os{color:var(--teal);}
  .tag{
    margin:14px 0 0;color:var(--muted);font-size:12px;font-weight:600;
    font-family:var(--font-sans);
    letter-spacing:2px;text-transform:uppercase;
  }
  .rule{border:none;border-top:1px solid var(--rule);margin:0 0 32px;}
  .themetoggle-fixed{position:fixed;top:calc(16px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));z-index:5;}
  .list{display:flex;flex-direction:column;gap:12px;}
  /* Meridian cards: raised surfaces, each carrying its module wavelength --m
     (set by the generated .m-<hue> classes appended below this sheet). */
  .card{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    padding:18px 20px;background:var(--paper);
    border:1px solid var(--grid);border-radius:14px;box-shadow:var(--shadow);
    transition:background .12s, border-color .15s, transform .15s;
  }
  .card:hover{
    background:color-mix(in oklab, var(--m, var(--teal)) 5%, var(--paper));
    border-color:color-mix(in oklab, var(--m, var(--teal)) 45%, var(--grid));
    transform:translateY(-2px);
  }
  .ic{
    flex:0 0 auto;width:38px;height:38px;border-radius:10px;
    color:var(--m, var(--teal));
    background:color-mix(in oklab, var(--m, var(--teal)) 12%, transparent);
    display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:22px;height:22px;}
  .cname{
    flex:1 1 auto;min-width:0;color:var(--ink);
    font-family:var(--font-serif);
    font-weight:500;font-size:19px;letter-spacing:0;text-transform:none;
  }
  .cgo{flex:0 0 auto;color:var(--m, var(--teal));font-size:18px;opacity:.55;transition:opacity .14s;}
  .card:hover .cgo{opacity:1;}
  .disc{
    margin-top:40px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;
    border-top:1px solid var(--grid);padding-top:18px;
    font-family:var(--font-sans);letter-spacing:.3px;
  }
  @media(max-width:560px){
    .hub{padding:40px 22px;}
    .wm{font-size:36px;}
  }

  .m-evidence{--m:#4e51d8;}
  :root[data-theme="dark"] .m-evidence{--m:#8a8cff;}
  .m-drugs{--m:#0977b0;}
  :root[data-theme="dark"] .m-drugs{--m:#3fbbef;}
  .m-staging{--m:#0b8a66;}
  :root[data-theme="dark"] .m-staging{--m:#3fd6a6;}
  .m-tox{--m:#8f6206;}
  :root[data-theme="dark"] .m-tox{--m:#f0b44e;}
  .m-acute{--m:#d23d34;}
  :root[data-theme="dark"] .m-acute{--m:#ff6f61;}
  .spectrumbar{background:linear-gradient(90deg,#4e51d8,#0977b0,#0b8a66,#8f6206,#d23d34);}
  :root[data-theme="dark"] .spectrumbar{background:linear-gradient(90deg,#8a8cff,#3fbbef,#3fd6a6,#f0b44e,#ff6f61);}

  /* --- oncOS Meridian webfonts (shared: _oncos-kit/oncos_fonts.py) --- */
  @font-face{font-family:'Newsreader';font-style:normal;font-weight:200 800;font-display:swap;src:url(/fonts/Newsreader-normal-200_800.woff2) format('woff2');}
  @font-face{font-family:'Newsreader';font-style:italic;font-weight:200 800;font-display:swap;src:url(/fonts/Newsreader-italic-200_800.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:normal;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-normal-400_900.woff2) format('woff2');}
  @font-face{font-family:'Schibsted Grotesk';font-style:italic;font-weight:400 900;font-display:swap;src:url(/fonts/SchibstedGrotesk-italic-400_900.woff2) format('woff2');}
  @font-face{font-family:'Spline Sans Mono';font-style:normal;font-weight:300 700;font-display:swap;src:url(/fonts/SplineSansMono-normal-300_700.woff2) format('woff2');}

  /* --- oncOS Meridian theme (shared: _oncos-kit/oncos_theme.py) --- */
  :root{
    --m:#4e51d8; --teal:var(--m);
    --ink:#131926; --slate:#4d5a6b; --muted:#6b7787;
    --hair:#e3e7ee; --grid:#edf0f5;
    --accent-soft:color-mix(in oklab, var(--m) 8%, #ffffff);
    --paper:#ffffff; --ground:#f6f7f9; --raised:#ffffff;
    --status-success:#0e8f63; --status-success-soft:#e3f3ec;
    --status-warning:#946908; --status-warning-soft:#f7efdb;
    --status-danger:#c23f38; --status-danger-soft:#faeae9;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --font-serif:'Newsreader','Iowan Old Style',Georgia,serif;
    --font-sans:'Schibsted Grotesk',-apple-system,'Helvetica Neue',system-ui,sans-serif;
    --font-mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --rule:#d7dde6; --btn-ink:#ffffff;
    --radius:12px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(19,25,38,.05), 0 10px 28px -12px rgba(19,25,38,.14);
    --glass:rgba(255,255,255,.8);
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --m:#8a8cff; --teal:var(--m);
    --ink:#e8ecf3; --slate:#a3aebe; --muted:#8391a3;
    --hair:#222937; --grid:#1a2130;
    --accent-soft:color-mix(in oklab, var(--m) 13%, #10141c);
    --paper:#10141c; --ground:#0a0d13; --raised:#151b26;
    --status-success:#37c98c; --status-success-soft:#12312a;
    --status-warning:#e5a93e; --status-warning-soft:#32270f;
    --status-danger:#f0716b; --status-danger-soft:#391b19;
    --status-info:var(--m); --status-info-soft:var(--accent-soft);
    --rule:#2a3242; --btn-ink:#0a0d13;
    --shadow:none;
    --glass:rgba(13,17,25,.75);
    color-scheme:dark;
  }
  html{ transition:background .18s ease, color .18s ease; }
  body{ background:var(--ground); }
  /* --- Meridian shared chrome (the locked suite header pattern) --- */
  .wm{ font-family:var(--font-sans); font-weight:700; letter-spacing:-.03em; }
  .wm .os{ background-image:linear-gradient(100deg,#4e51d8,#0977b0 45%,#0b8a66);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  :root[data-theme="dark"] .wm .os{ background-image:linear-gradient(100deg,#8a8cff,#3fbbef 45%,#3fd6a6); }
  .mhead{ background:var(--glass);
    -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3);
    border-bottom:1px solid var(--hair); }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .mhead{ background:var(--paper); }
  }
  .burger{ border-radius:10px; }
  .barsearch{ border-radius:999px; background:var(--ground); }
  body.nav-open .backdrop{ background:rgba(10,13,19,.35); }
  .theme-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; padding:0; cursor:pointer; flex:0 0 auto;
    background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:999px;
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{ color:var(--m); border-color:var(--m); background:var(--accent-soft); }
  .theme-toggle svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .theme-toggle .i-sun{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-moon{ display:none; }
  :root[data-theme="dark"] .theme-toggle .i-sun{ display:block; }
  /* --- oncOS mobile QA (roadmap #4): no side-scroll + no iOS focus-zoom --- */
  /* Touch devices only: iOS Safari zooms the page when a focused control is
     under 16px, so pin form controls to 16px there (desktop sizing untouched). */
  @media (hover:none) and (pointer:coarse){
    input, select, textarea { font-size:16px !important; }
  }
  /* Belt-and-braces: disable horizontal page scroll on phones. `clip` (not
     `hidden`) doesn't create a scroll container, so position:sticky headers
     keep working. */
  @media (max-width:760px){ html, body { overflow-x:clip; } }

  /* ===== oncOS motion layer (shared: _oncos-kit/oncos_motion.py) ===== */
  :root{
    --mo-dur:150ms;
    --mo-ease:cubic-bezier(.3,0,.1,1);
    interpolate-size: allow-keywords;   /* lets block-size:auto animate */
  }

  /* --- Tier 1: native <details> cards grow + fade open --- */
  details::details-content{
    block-size:0; overflow:clip; opacity:0;
    transition:block-size var(--mo-dur) var(--mo-ease),
               opacity var(--mo-dur) var(--mo-ease),
               content-visibility var(--mo-dur) allow-discrete;
  }
  details[open]::details-content{ block-size:auto; opacity:1; }
  /* chevron rotate — harmless where a module has no .chev */
  details > summary .chev{ transition:transform var(--mo-dur) var(--mo-ease); }
  details[open] > summary .chev{ transform:rotate(90deg); }

  /* --- Tier 1: nav backdrop cross-fades with the drawer slide --- */
  /* Modules toggle .backdrop via display (not animatable); pin it displayed and
     drive opacity/visibility instead. Inert on pages with no .backdrop (Hub). */
  .backdrop{
    display:block !important; position:fixed; inset:0; z-index:45;
    background:rgba(15,42,67,.18);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity var(--mo-dur) var(--mo-ease),
               visibility var(--mo-dur) var(--mo-ease);
  }
  body.nav-open .backdrop{ opacity:1; visibility:visible; pointer-events:auto; }

  /* --- Tier 2: theme-toggle sun/moon cross-fade (replaces the display swap) --- */
  .theme-toggle{ position:relative; overflow:hidden; }
  .theme-toggle svg{
    position:absolute; top:50%; left:50%; margin:0;
    transition:opacity var(--mo-dur) var(--mo-ease), transform var(--mo-dur) var(--mo-ease);
  }
  .theme-toggle .i-moon{ display:block !important; opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }
  .theme-toggle .i-sun{ display:block !important; opacity:0; transform:translate(-50%,-50%) rotate(-90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-moon{ opacity:0; transform:translate(-50%,-50%) rotate(90deg) scale(.6); }
  :root[data-theme="dark"] .theme-toggle .i-sun{ opacity:1; transform:translate(-50%,-50%) rotate(0) scale(1); }

  /* --- Tier 1: tap/press feedback (touch has no hover) --- */
  @media (prefers-reduced-motion:no-preference){
    details > summary:active{ transform:scale(.994); }
    a.card:active{ transform:scale(.99); }
  }

  /* --- Tier 2: opt-in staggered content entrance (Hub grid only) --- */
  @media (prefers-reduced-motion:no-preference){
    .mo-stagger > *{ animation:mo-fadeup var(--mo-dur) var(--mo-ease) both; }
    .mo-stagger > *:nth-child(1){ animation-delay:0ms; }
    .mo-stagger > *:nth-child(2){ animation-delay:45ms; }
    .mo-stagger > *:nth-child(3){ animation-delay:90ms; }
    .mo-stagger > *:nth-child(4){ animation-delay:135ms; }
    .mo-stagger > *:nth-child(5){ animation-delay:180ms; }
    .mo-stagger > *:nth-child(6){ animation-delay:225ms; }
    .mo-stagger > *:nth-child(7){ animation-delay:270ms; }
    .mo-stagger > *:nth-child(n+8){ animation-delay:300ms; }
    @keyframes mo-fadeup{ from{ opacity:0; transform:translateY(7px); } to{ opacity:1; transform:none; } }
  }

  /* --- accessibility: honour the OS reduced-motion setting suite-wide --- */
  @media (prefers-reduced-motion:reduce){
    :root{ --mo-dur:0.001ms; }
    *, *::before, *::after{
      animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.001ms !important; scroll-behavior:auto !important;
    }
    details::details-content{ transition-duration:.001ms !important; }
  }
</style>
</head>
<body>
<div class="themetoggle-fixed"><button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle light / dark"><svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button></div>
<main class="hub">
  <header class="hero">
    <div class="spectrumbar" aria-hidden="true"></div>
    <h1 class="wm" aria-label="oncOS">onc<span class="os">OS</span></h1>
    <p class="tag">Clinical Hub</p>
  </header>
  <hr class="rule">
  <section class="list mo-stagger">
      <a class="card m-evidence" href="evidence/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5c0 1.66 3.13 3 7 3s7-1.34 7-3-3.13-3-7-3-7 1.34-7 3z"/><path d="M5 5v7c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 12v7c0 1.66 3.13 3 7 3s7-1.34 7-3v-7"/></svg></span><span class="cname">Evidence</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card m-staging" href="staging/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M6 21v-6"/><path d="M12 21V10"/><path d="M18 21V5"/></svg></span><span class="cname">Staging</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card m-drugs" href="drugs/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></span><span class="cname">Drugs</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card m-tox" href="tox/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span><span class="cname">Tox</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card m-acute" href="acute/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3.5l2-6 4 12 2.5-8 1.5 2H21"/></svg></span><span class="cname">Acute</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
  </section>
  <footer class="disc">
    &copy; Jonan Tan 2026
  </footer>
</main>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
<script>(function(){var m=document.querySelector('meta[name="theme-color"]');var D='#0d1119',L=(m&&m.getAttribute('content'))||'#f6f7f9';function s(){if(m)m.setAttribute('content',document.documentElement.getAttribute('data-theme')==='dark'?D:L);}s();document.querySelectorAll('.theme-toggle').forEach(function(b){b.addEventListener('click',function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('oncos-theme',t);}catch(e){}s();});});})();</script>
</body>
