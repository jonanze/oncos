<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OncOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1668a3">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OncOS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#f7f8fa;--panel:#ffffff;--ink:#0f2a43;--muted:#5b6b78;--line:#e4e8ee;
    --accent:#1668a3;--accent-soft:#eaf1f7;--chip:#eef1f5;
    --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;
  }
  .hub{margin:auto;width:100%;max-width:780px;padding:48px 22px 40px;}
  .hero{text-align:center;margin-bottom:30px;}
  .wm{
    margin:0;font-family:"Public Sans",-apple-system,sans-serif;
    font-weight:400;font-size:54px;letter-spacing:-.02em;color:var(--ink);
    display:inline-flex;align-items:flex-end;line-height:1;
  }
  .wm .wm-mark{width:.82em;height:.82em;margin:0 .03em;color:var(--ink);transform:translateY(-.05em);flex:none;}
  .wm .os{font-weight:700;color:var(--accent);}
  .tag{
    margin:13px 0 0;color:var(--muted);font-size:11px;font-weight:600;
    font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    letter-spacing:.18em;text-transform:uppercase;
  }
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
  .card{
    display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:18px;
    transition:border-color .14s,box-shadow .14s,transform .14s;
  }
  .card:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(20,30,50,.10);transform:translateY(-2px);}
  .ic{
    flex:0 0 auto;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);
    color:var(--accent);display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:24px;height:24px;}
  .cname{
    flex:1 1 auto;min-width:0;text-align:center;color:var(--ink);
    font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  }
  .cgo{flex:0 0 auto;color:var(--accent);font-size:20px;opacity:.5;transition:opacity .14s,transform .14s;}
  .card:hover .cgo{opacity:1;transform:translateX(2px);}
  .disc{
    margin-top:30px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px;
  }
  @media(max-width:560px){
    .hub{padding:34px 16px 30px;}
    .wm{font-size:42px;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<main class="hub">
  <header class="hero">
    <h1 class="wm" aria-label="OncOS">onc<svg class="wm-mark" viewBox="7 7 34 34" fill="none" stroke-linecap="round" aria-hidden="true"><path d="M30.5 12.74 A13 13 0 0 0 11.78 28.45" stroke="currentColor" stroke-width="3.8"/><path d="M17.5 35.26 A13 13 0 0 0 36.21 19.55" stroke="currentColor" stroke-width="3.8"/><circle cx="24" cy="24" r="5.5" fill="var(--accent)" stroke="none"/></svg><span class="os">S</span></h1>
    <p class="tag">Clinical Hub</p>
  </header>
  <section class="grid">
      <a class="card" href="https://jonanze.github.io/oncos-evidence/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5c0 1.66 3.13 3 7 3s7-1.34 7-3-3.13-3-7-3-7 1.34-7 3z"/><path d="M5 5v7c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 12v7c0 1.66 3.13 3 7 3s7-1.34 7-3v-7"/></svg></span><span class="cname">Evidence</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-staging/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M6 21v-6"/><path d="M12 21V10"/><path d="M18 21V5"/></svg></span><span class="cname">Staging</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-drugs/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></span><span class="cname">Drugs</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-algorithms/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="2" width="6" height="4.5" rx="1"/><rect x="2.5" y="17.5" width="6" height="4.5" rx="1"/><rect x="15.5" y="17.5" width="6" height="4.5" rx="1"/><path d="M12 6.5v7"/><path d="M5.5 17.5v-3a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v3"/></svg></span><span class="cname">Algorithms</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
  </section>
  <footer class="disc">
    &copy; Jonan Tan 2026
  </footer>
</main>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
