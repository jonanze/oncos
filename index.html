<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OncOS</title>
<style>
  :root{
    --bg:#f7f8fa;--panel:#ffffff;--ink:#1a2230;--muted:#5c6878;--line:#e4e8ee;
    --accent:#1f6f8b;--accent-soft:#e8f1f4;--chip:#eef1f5;
    --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;
  }
  .hub{margin:auto;width:100%;max-width:780px;padding:48px 22px 40px;}
  .hero{text-align:center;margin-bottom:30px;}
  .wm{
    margin:0;font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    font-weight:700;font-size:54px;letter-spacing:2px;color:var(--ink);
    display:inline-block;border-left:4px solid var(--accent);padding-left:16px;line-height:1;
  }
  .wm .os{color:var(--accent);}
  .tag{
    margin:13px 0 0;color:var(--muted);font-size:11px;font-weight:600;
    font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    letter-spacing:.18em;text-transform:uppercase;
  }
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
  .card{
    display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:18px;
    transition:border-color .14s,box-shadow .14s,transform .14s;
  }
  .card:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(20,30,50,.10);transform:translateY(-2px);}
  .ic{
    flex:0 0 auto;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);
    color:var(--accent);display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:24px;height:24px;}
  .cname{
    flex:1 1 auto;min-width:0;text-align:center;color:var(--ink);
    font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  }
  .cgo{flex:0 0 auto;color:var(--accent);font-size:20px;opacity:.5;transition:opacity .14s,transform .14s;}
  .card:hover .cgo{opacity:1;transform:translateX(2px);}
  .disc{
    margin-top:30px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px;
  }
  .disc .cr{display:block;margin-top:9px;}
  @media(max-width:560px){
    .hub{padding:34px 16px 30px;}
    .wm{font-size:42px;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<main class="hub">
  <header class="hero">
    <h1 class="wm" aria-label="OncOS">Onc<span class="os">OS</span></h1>
    <p class="tag">Clinical Hub</p>
  </header>
  <section class="grid">
      <a class="card" href="https://jonanze.github.io/oncos-database/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5c0 1.66 3.13 3 7 3s7-1.34 7-3-3.13-3-7-3-7 1.34-7 3z"/><path d="M5 5v7c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 12v7c0 1.66 3.13 3 7 3s7-1.34 7-3v-7"/></svg></span><span class="cname">Evidence Database</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-staging/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M6 21v-6"/><path d="M12 21V10"/><path d="M18 21V5"/></svg></span><span class="cname">Staging</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
  </section>
  <footer class="disc">
    A not-for-profit project for clinicians and medical education. Not medical advice &mdash; verify against the primary source before clinical use.
    <span class="cr">&copy; Jonan Tan 2026</span>
  </footer>
</main>
</body>
</html>
