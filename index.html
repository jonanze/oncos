<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>oncOS</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1668a3">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="oncOS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{
    --ink:#0f2a43; --teal:#1668a3; --slate:#5b6b78; --muted:#77899a;
    --hair:#dce3e9; --grid:#e4ebf0; --accent-soft:#eef3f7; --paper:#ffffff;
    --red:#e00020; --orange:#f05010;
    --font-serif:'Noto Serif',Georgia,serif; --font-sans:'Noto Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:var(--font-sans);
    color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;
  }
  .hub{margin:auto;width:100%;max-width:760px;padding:64px 40px;}
  .hero{text-align:center;margin-bottom:44px;}
  .ticks{display:flex;justify-content:center;gap:6px;margin-bottom:22px;}
  .tick{width:28px;height:5px;border-radius:1px;}
  .tick.r{background:var(--red);} .tick.o{background:var(--orange);} .tick.b{background:var(--teal);}
  .wm{margin:0;line-height:0;}
  .wm img{height:76px;width:auto;display:block;margin:0 auto;}
  .tag{
    margin:14px 0 0;color:var(--muted);font-size:12px;font-weight:600;
    font-family:var(--font-sans);
    letter-spacing:2px;text-transform:uppercase;
  }
  .rule{border:none;border-top:1.2px solid var(--ink);margin:0 0 32px;}
  .list{display:flex;flex-direction:column;}
  .card{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    padding:20px 4px;border-bottom:1px solid var(--grid);
    transition:background .12s;
  }
  .card:first-child{border-top:1px solid var(--grid);}
  .card:hover{background:var(--accent-soft);}
  .ic{
    flex:0 0 auto;width:34px;height:34px;
    color:var(--teal);display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:22px;height:22px;}
  .cname{
    flex:1 1 auto;min-width:0;color:var(--ink);
    font-family:var(--font-serif);
    font-weight:500;font-size:19px;letter-spacing:0;text-transform:none;
  }
  .cgo{flex:0 0 auto;color:var(--teal);font-size:18px;opacity:.55;transition:opacity .14s;}
  .card:hover .cgo{opacity:1;}
  .disc{
    margin-top:40px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;
    border-top:1px solid var(--grid);padding-top:18px;
    font-family:var(--font-sans);letter-spacing:.3px;
  }
  @media(max-width:560px){
    .hub{padding:40px 22px;}
    .wm img{height:58px;}
  }
</style>
</head>
<body>
<main class="hub">
  <header class="hero">
    <div class="ticks"><span class="tick r"></span><span class="tick o"></span><span class="tick b"></span></div>
    <h1 class="wm"><img src="oncos-logo-final.png" alt="oncOS"></h1>
    <p class="tag">Clinical Hub</p>
  </header>
  <hr class="rule">
  <section class="list">
      <a class="card" href="https://jonanze.github.io/oncos-evidence/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5c0 1.66 3.13 3 7 3s7-1.34 7-3-3.13-3-7-3-7 1.34-7 3z"/><path d="M5 5v7c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 12v7c0 1.66 3.13 3 7 3s7-1.34 7-3v-7"/></svg></span><span class="cname">Evidence</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-staging/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M6 21v-6"/><path d="M12 21V10"/><path d="M18 21V5"/></svg></span><span class="cname">Staging</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-drugs/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></span><span class="cname">Drugs</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
      <a class="card" href="https://jonanze.github.io/oncos-algorithms/"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="2" width="6" height="4.5" rx="1"/><rect x="2.5" y="17.5" width="6" height="4.5" rx="1"/><rect x="15.5" y="17.5" width="6" height="4.5" rx="1"/><path d="M12 6.5v7"/><path d="M5.5 17.5v-3a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v3"/></svg></span><span class="cname">Algorithms</span><span class="cgo" aria-hidden="true">&rarr;</span></a>
  </section>
  <footer class="disc">
    &copy; Jonan Tan 2026
  </footer>
</main>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
